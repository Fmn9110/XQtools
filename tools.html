<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>所有工具 - 小Q工具箱</title>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pinyin-match@1.2.5/dist/main.js"></script>

</head>

<body>
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='index.html'">
                <div
                    class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">
                    Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="tools.html" class="text-pink-500 transition-colors">所有工具</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto max-w-[1100px] py-4 px-4 min-h-[60vh] pt-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800">全站 <span class="gradient-text">工具</span> 总览
            </h1>
            <div class="relative w-full md:w-96">
                <input type="text" id="toolFilter" placeholder="输入名称或描述筛选..."
                    class="w-full px-6 py-3 rounded-2xl outline-none bg-white text-sm">
            </div>
        </div>

        <div id="allToolsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-5 animate-item"
            style="animation-delay: 0.1s">
        </div>
    </main>

    <footer class="bg-white py-8 border-t border-pink-50 mt-10">
        <div class="container mx-auto text-center text-gray-400 text-xs">
            © 2026 小Q工具箱. 所有处理均在本地完成，绝不上传数据。💖
        </div>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script>
        const CHUNK_SIZE = 48;
        let currentRenderIndex = 0;
        let activeTools = [];

        function renderAllTools(filter = '', isAppend = false) {
            const grid = document.getElementById('allToolsGrid');
            
            if (!isAppend) {
                grid.innerHTML = '';
                currentRenderIndex = 0;
                activeTools = filter.trim() ? Utils.searchTools(filter, window.toolsData) : window.toolsData;
            }

            if (activeTools.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400 text-sm">哎呀，没有找到相关工具...</div>`;
                return;
            }

            const nextBatch = activeTools.slice(currentRenderIndex, currentRenderIndex + CHUNK_SIZE);
            
            const html = nextBatch.map(t => `
                <div class="cute-card p-3 md:p-5 text-center cursor-pointer flex flex-col items-center justify-center group" onclick="location.href='tools/${t.category}/${t.slug}.html'">
                    <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-50 rounded-xl flex items-center justify-center mb-2 md:mb-3 group-hover:bg-pink-100 transition-colors text-sm md:text-base">${t.icon || '🔧'}</div>
                    <div class="font-bold text-gray-700 text-xs md:text-sm group-hover:text-pink-500 transition-colors truncate w-full">${t.name}</div>
                    <div class="text-[10px] font-bold text-pink-300 mt-2 px-2 py-0.5 bg-pink-50 rounded-full uppercase">${t.category}</div>
                </div>
            `).join('');

            grid.insertAdjacentHTML('beforeend', html);
            currentRenderIndex += CHUNK_SIZE;

            // 如果还有更多，且没有正在筛选，则在滚动时自动加载或显示加载更多（此处采用滚动检测）
            if (currentRenderIndex < activeTools.length) {
                if (!window.scrollObserver) {
                    window.scrollObserver = new IntersectionObserver((entries) => {
                        if (entries[0].isIntersecting && currentRenderIndex < activeTools.length) {
                            renderAllTools(filter, true);
                        }
                    }, { rootMargin: '200px' });
                }
                
                // 确保有一个哨兵元素
                let sentinel = document.getElementById('render-sentinel');
                if (!sentinel) {
                    sentinel = document.createElement('div');
                    sentinel.id = 'render-sentinel';
                    sentinel.className = 'col-span-full h-10';
                    grid.after(sentinel);
                }
                window.scrollObserver.observe(sentinel);
            }
        }

        let filterTimeout;
        document.getElementById('toolFilter').addEventListener('input', (e) => {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                renderAllTools(e.target.value.trim());
            }, 300); // 防抖处理
        });

        window.addEventListener('DOMContentLoaded', () => {
            renderAllTools();
        });

        // 加载与点击特效
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });

        // 回到顶部按钮显隐逻辑
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTopBtn');
            if (window.scrollY > 300) {
                btn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            } else {
                btn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            }
        });
    </script>

    <!-- 回到顶部按钮 -->
    <button id="backToTopBtn" class="fixed right-6 bottom-24 md:bottom-12 w-12 h-12 bg-pink-400 text-white rounded-full shadow-2xl flex items-center justify-center text-xl hover:bg-pink-500 hover:scale-110 transition-all z-50 opacity-0 pointer-events-none translate-y-4" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
        ⬆️
    </button>

    <!-- 移动端底部导航 -->
    <div class="mobile-tab-bar">
        <a href="index.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🏠</span>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="categories.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🗂️</span>
            <span class="text-[10px] font-bold">分类</span>
        </a>
        <a href="tools.html" class="flex flex-col items-center text-pink-500">
            <span class="text-xl mb-1">🛠️</span>
            <span class="text-[10px] font-bold">全部</span>
        </a>
    </div>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="assets/css/webmeji.css">
    <script src="assets/js/webmeji-config.js"></script>
    <script src="assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="assets/js/pwa-register.js"></script>
</body>

</html>
