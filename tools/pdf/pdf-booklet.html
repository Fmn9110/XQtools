    <script src="../../assets/js/utils.js"></script>
    <script>

let pdfBytes=null;
async function loadPdf(e){
    const file=e.target.files[0];if(!file)return;
    pdfBytes=await file.arrayBuffer();
    document.getElementById('status').textContent=`已加载: ${file.name}`;
    document.getElementById('processBtn').classList.remove('hidden');
}
async function makeBooklet(){
    if(!pdfBytes)return;
    const{PDFDocument}=PDFLib;
    const src=await PDFDocument.load(pdfBytes);
    const total=src.getPageCount();
    // 补齐到4的倍数
    const padded=Math.ceil(total/4)*4;
    const booklet=await PDFDocument.create();
    // 小册子排列：每张纸的正面反面各放2页
    for(let i=0;i<padded/2;i+=2){
        const sheet=i/2;
        const frontLeft=padded-1-sheet*2;const frontRight=sheet*2;
        const backLeft=sheet*2+1;const backRight=padded-2-sheet*2;
        for(const [left,right] of [[frontLeft,frontRight],[backLeft,backRight]]){
            const page=booklet.addPage();
            const{width,height}=page.getSize();
            if(left<total){
                const [embedded]=await booklet.embedPages([src.getPage(left)]);
                page.drawPage(embedded,{x:0,y:0,width:width/2,height});
            }
            if(right<total){
                const [embedded]=await booklet.embedPages([src.getPage(right)]);
                page.drawPage(embedded,{x:width/2,y:0,width:width/2,height});
            }
        }
    }
    const output=await booklet.save();
    const blob=new Blob([output],{type:'application/pdf'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='booklet.pdf';a.click();
}

        // 加载与点击特效
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });

    </script>
