<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>

    </style>

    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">

</head>
<body class="bg-[#fafafa]">

    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">📄 PDF双面打印排版</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">将PDF重排为奇偶页分组，便于手动双面打印</p>
        </header>

        <section class="cute-card p-8 mb-12 bg-white text-center">
    <div class="border-2 border-dashed border-pink-300 rounded-xl p-8 mb-4 cursor-pointer bg-pink-50/50 hover:bg-pink-50" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf" class="hidden" onchange="loadPdf(event)">
        <p class="text-pink-400 text-lg">📁 选择PDF文件</p>
    </div>
    <div id="status" class="text-sm text-gray-400 mb-4"></div>
    <div class="flex gap-3" id="btns" style="display:none">
        <button onclick="extractPages('odd')" class="flex-1 py-3 bg-blue-500 text-white font-bold rounded-xl">📄 导出奇数页</button>
        <button onclick="extractPages('even')" class="flex-1 py-3 bg-green-500 text-white font-bold rounded-xl">📄 导出偶数页</button>
    </div>
</section>
<section class="cute-card p-6 mb-8 bg-white"><h2 class="text-xl font-bold text-gray-800 mb-3">📘 使用说明</h2><ol class="text-gray-600 text-sm space-y-2 list-decimal list-inside"><li>上传PDF文件</li><li>先打印奇数页</li><li>将纸张翻面放回打印机</li><li>再打印偶数页</li></ol></section>

        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.3em] pb-12">Universal PDF Processing & Document Intelligence Archive</p>
    </main>

    <!-- 移动端底部导航 -->
    <div class="mobile-tab-bar">
        <a href="../../index.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🏠</span>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="../../categories.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🗂️</span>
            <span class="text-[10px] font-bold">分类</span>
        </a>
        <a href="../../tools.html" class="flex flex-col items-center text-pink-500">
            <span class="text-xl mb-1">🛠️</span>
            <span class="text-[10px] font-bold">工具</span>
        </a>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>

let pdfBytes=null;
async function loadPdf(e){const file=e.target.files[0];if(!file)return;pdfBytes=await file.arrayBuffer();const{PDFDocument}=PDFLib;const pdf=await PDFDocument.load(pdfBytes);document.getElementById('status').textContent=`已加载: ${file.name} (共${pdf.getPageCount()}页)`;document.getElementById('btns').style.display='flex';}
async function extractPages(type){
    if(!pdfBytes)return;
    const{PDFDocument}=PDFLib;
    const src=await PDFDocument.load(pdfBytes);
    const newPdf=await PDFDocument.create();
    const indices=[];
    for(let i=0;i<src.getPageCount();i++){
        if(type==='odd'&&i%2===0)indices.push(i);
        if(type==='even'&&i%2===1)indices.push(i);
    }
    if(!indices.length){alert('没有'+{odd:'奇数',even:'偶数'}[type]+'页');return;}
    const copied=await newPdf.copyPages(src,indices);
    copied.forEach(p=>newPdf.addPage(p));
    const output=await newPdf.save();
    const blob=new Blob([output],{type:'application/pdf'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=type+'-pages.pdf';a.click();
}

        // 加载与点击特效
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });

    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>

    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
