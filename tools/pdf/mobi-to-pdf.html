    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    </style>

    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">

<body class="bg-[#fafafa]">

    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">📖 MOBI转PDF</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">将MOBI电子书转换为PDF格式（提取文本）</p>
        </header>

        <section class="cute-card p-8 mb-12 bg-white text-center">
    <div class="border-2 border-dashed border-pink-300 rounded-xl p-8 mb-4 cursor-pointer bg-pink-50/50 hover:bg-pink-50" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".mobi" class="hidden" onchange="loadFile(event)">
        <p class="text-pink-400 text-lg">📁 选择MOBI文件</p>
    </div>
    <div id="status" class="text-sm text-gray-400 mb-4"></div>
    <div id="content" class="hidden bg-gray-50 rounded-xl p-6 text-left text-sm text-gray-700 max-h-64 overflow-auto mb-4 whitespace-pre-line"></div>
    <p class="text-xs text-amber-500 mb-4">⚠ 纯前端限制：MOBI格式为专有二进制格式，完整解析需要专用库。此工具将尝试提取可读文本。</p>
    <button onclick="window.print()" id="printBtn" class="hidden w-full py-3 bg-pink-500 text-white font-bold rounded-xl">🖨️ 打印为PDF</button>
</section>
<section class="cute-card p-6 mb-8 bg-white"><h2 class="text-xl font-bold text-gray-800 mb-3">📘 使用说明</h2><ol class="text-gray-600 text-sm space-y-2 list-decimal list-inside"><li>选择MOBI文件</li><li>工具尝试提取文本内容</li><li>使用浏览器"打印→另存为PDF"</li></ol></section>

        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.3em] pb-12">Universal PDF Processing & Document Intelligence Archive</p>
    </main>

    <!-- 移动端底部导航 -->
    <div class="mobile-tab-bar">
        <a href="../../index.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🏠</span>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="../../categories.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🗂️</span>
            <span class="text-[10px] font-bold">分类</span>
        </a>
        <a href="../../tools.html" class="flex flex-col items-center text-pink-500">
            <span class="text-xl mb-1">🛠️</span>
            <span class="text-[10px] font-bold">工具</span>
        </a>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>

async function loadFile(e){
    const file=e.target.files[0];if(!file)return;
    document.getElementById('status').textContent='正在读取...';
    const buf=await file.arrayBuffer();
    const bytes=new Uint8Array(buf);
    // 尝试提取ASCII+中文可读文本
    let text='';
    const decoder=new TextDecoder('utf-8',{fatal:false});
    text=decoder.decode(bytes);
    const clean=text.replace(/<[^>]*>/g,' ').replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s，。、！？；：""''（）\.\,\!\?\n]/g,'').replace(/\s+/g,' ').trim();
    if(clean.length>50){
        document.getElementById('content').textContent=clean.slice(0,50000);
        document.getElementById('content').classList.remove('hidden');
        document.getElementById('printBtn').classList.remove('hidden');
        document.getElementById('status').textContent=`提取到 ${clean.length} 个字符`;
    }else{
        document.getElementById('status').textContent='⚠ 无法解析此MOBI文件。建议使用Calibre等专业工具转换。';
    }
}

        // 加载与点击特效
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });

    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>

    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
