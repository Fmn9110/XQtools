<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>购物待办清单 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🛒 购物待办清单</h1>
            <p class="text-gray-500">列出你的购物清单，逛超市再也不会遗漏</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="flex gap-3 mb-6">
                <input type="text" id="itemName" placeholder="添加物品..." class="flex-1 p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" onkeydown="if(event.key==='Enter')addItem()">
                <input type="number" id="itemQty" placeholder="数量" value="1" class="w-20 p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                <button onclick="addItem()" class="px-6 py-4 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl whitespace-nowrap">添加</button>
            </div>
            <div class="flex justify-between items-center mb-4">
                <p class="text-sm text-gray-400">共 <strong id="totalItems">0</strong> 项，已购 <strong id="doneItems">0</strong> 项</p>
                <button onclick="clearDone()" class="text-xs text-gray-400 hover:text-red-400">清除已购</button>
            </div>
            <div class="space-y-2" id="list"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入物品名称和数量并点击添加。</li><li>点击物品可以标记为"已购"。</li><li>数据自动保存在浏览器本地。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">数据在哪里？</div><div class="text-gray-500 text-sm">数据仅保存在当前浏览器的LocalStorage中。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const KEY = 'xq_shopping_list';
        function getList() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
        function saveList(list) { localStorage.setItem(KEY, JSON.stringify(list)); }

        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const qty = parseInt(document.getElementById('itemQty').value) || 1;
            if (!name) return;
            const list = getList();
            list.push({ name, qty, done: false });
            saveList(list);
            document.getElementById('itemName').value = '';
            render();
        }

        function toggleItem(i) {
            const list = getList();
            list[i].done = !list[i].done;
            saveList(list);
            render();
        }

        function removeItem(i) {
            const list = getList();
            list.splice(i, 1);
            saveList(list);
            render();
        }

        function clearDone() {
            const list = getList().filter(item => !item.done);
            saveList(list);
            render();
        }

        function render() {
            const list = getList();
            const done = list.filter(i => i.done).length;
            document.getElementById('totalItems').textContent = list.length;
            document.getElementById('doneItems').textContent = done;

            let html = '';
            list.forEach((item, i) => {
                html += `<div class="flex items-center gap-3 p-3 rounded-xl border ${item.done ? 'bg-green-50/50 border-green-100' : 'bg-white border-gray-100'} cursor-pointer group" onclick="toggleItem(${i})">
                    <span class="text-xl">${item.done ? '✅' : '⬜'}</span>
                    <span class="flex-1 ${item.done ? 'line-through text-gray-400' : 'text-gray-700 font-medium'}">${item.name}</span>
                    <span class="text-sm text-gray-400">×${item.qty}</span>
                    <button onclick="event.stopPropagation();removeItem(${i})" class="text-gray-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = html || '<p class="text-center text-gray-400 py-8">清单空空的，添加一些吧 🛒</p>';
        }
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
