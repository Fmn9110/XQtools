        // 简化农历数据(1900-2100)
        const lunarInfo = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06b20,0x1a6c4,0x0aae0,0x092e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4,0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x14b55,0x04b60,0x0a570,0x054e4,0x0d160,0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252,0x0d520];

        const tianGan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
        const diZhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
        const zodiacEmojis = ['🐭','🐮','🐯','🐰','🐲','🐍','🐴','🐑','🐵','🐔','🐕','🐷'];
        const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
        const lunarDays = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
        const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

        function lYearDays(y){let s=348;for(let i=0x8000;i>0x8;i>>=1)s+=(lunarInfo[y-1900]&i)?1:0;return s+leapDays(y);}
        function leapMonth(y){return lunarInfo[y-1900]&0xf;}
        function leapDays(y){if(leapMonth(y))return(lunarInfo[y-1900]&0x10000)?30:29;return 0;}
        function monthDays(y,m){return(lunarInfo[y-1900]&(0x10000>>m))?30:29;}

        function solar2lunar(y,m,d) {
            let offset = Math.floor((new Date(y,m-1,d) - new Date(1900,0,31)) / 86400000);
            let ly=1900;
            for(;ly<2101&&offset>0;ly++){let daysInLY=lYearDays(ly);if(offset<daysInLY)break;offset-=daysInLY;}
            let lm=1,isLeap=false;const leap=leapMonth(ly);
            for(;lm<13&&offset>0;lm++){
                let days;
                if(leap>0&&lm===(leap+1)&&!isLeap){--lm;isLeap=true;days=leapDays(ly);}
                else{days=monthDays(ly,lm);}
                if(isLeap&&lm===(leap+1))isLeap=false;
                offset-=days;
            }
            if(offset===0&&leap>0&&lm===leap+1)if(isLeap){isLeap=false;}else{isLeap=true;--lm;}
            if(offset<0){offset+=monthDays(ly,lm);--lm;}
            const ld=offset+1;
            return {year:ly,month:lm,day:ld,isLeap};
        }

        function convert() {
            const dateStr = document.getElementById('solarDate').value;
            if(!dateStr){alert('请选择日期');return;}
            const [y,m,d] = dateStr.split('-').map(Number);
            const lunar = solar2lunar(y,m,d);
            const tg = tianGan[(lunar.year-4)%10];
            const dz = diZhi[(lunar.year-4)%12];
            const zodiacIdx = (lunar.year-4)%12;

            document.getElementById('rLunar').textContent = `${lunarMonths[lunar.month-1]}月${lunarDays[lunar.day]}`;
            document.getElementById('rTianGan').textContent = `${tg}${dz}年 · 农历${lunar.year}年`;
            document.getElementById('rZodiac').textContent = zodiacEmojis[zodiacIdx];
            document.getElementById('rWeek').textContent = weekdays[new Date(y,m-1,d).getDay()];
            document.getElementById('result').classList.remove('hidden');
        }

        document.getElementById('solarDate').value = new Date().toISOString().slice(0,10);
    </script>
