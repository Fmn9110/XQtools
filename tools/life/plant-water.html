<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>植物浇水提醒 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🌱 植物浇水提醒</h1>
            <p class="text-gray-500">管理你的绿植，再也不怕忘记浇水</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">植物名</label><input type="text" id="plantName" placeholder="如：绿萝" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">浇水周期(天)</label><input type="number" id="interval" value="3" min="1" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">上次浇水</label><input type="date" id="lastWater" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
            </div>
            <button onclick="addPlant()" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl">🌿 添加植物</button>
            <div class="mt-6 space-y-3" id="list"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>添加植物名称和浇水周期。</li><li>点击"已浇水"更新记录。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">常见植物浇水周期？</div><div class="text-gray-500 text-sm">绿萝3天、多肉7-10天、仙人掌14天、吊兰5天。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const KEY = 'xq_plant_water';
        document.getElementById('lastWater').value = new Date().toISOString().slice(0,10);

        function getPlants() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }

        function addPlant() {
            const name = document.getElementById('plantName').value.trim();
            const interval = parseInt(document.getElementById('interval').value);
            const lastWater = document.getElementById('lastWater').value;
            if (!name) { alert('请输入植物名'); return; }
            const plants = getPlants();
            plants.push({ name, interval, lastWater, id: Date.now() });
            localStorage.setItem(KEY, JSON.stringify(plants));
            document.getElementById('plantName').value = '';
            render();
        }

        function water(id) {
            const plants = getPlants();
            const p = plants.find(x => x.id === id);
            if (p) p.lastWater = new Date().toISOString().slice(0,10);
            localStorage.setItem(KEY, JSON.stringify(plants));
            render();
        }

        function del(id) {
            localStorage.setItem(KEY, JSON.stringify(getPlants().filter(x => x.id !== id)));
            render();
        }

        function render() {
            const plants = getPlants();
            const now = new Date();
            let html = '';
            plants.forEach(p => {
                const last = new Date(p.lastWater);
                const daysSince = Math.floor((now - last) / 86400000);
                const daysLeft = p.interval - daysSince;
                let status, bg;
                if (daysLeft <= 0) { status = '🚨 需要浇水！'; bg = 'bg-red-50'; }
                else if (daysLeft <= 1) { status = '⚠️ 明天该浇了'; bg = 'bg-yellow-50'; }
                else { status = `✅ ${daysLeft}天后浇水`; bg = 'bg-green-50'; }
                html += `<div class="flex items-center gap-3 p-4 ${bg} rounded-xl">
                    <span class="text-2xl">🌱</span>
                    <div class="flex-1"><p class="font-bold text-gray-700">${p.name}</p><p class="text-xs text-gray-500">${status} · 每${p.interval}天</p></div>
                    <button onclick="water(${p.id})" class="px-3 py-1 bg-blue-500 text-white text-xs rounded-lg">💧已浇</button>
                    <button onclick="del(${p.id})" class="text-gray-300 hover:text-red-400 text-sm">✕</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = html || '<p class="text-center text-gray-400 text-sm py-4">还没有添加植物</p>';
        }
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
