<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>历史上的今天 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📅 历史上的今天</h1>
            <p class="text-gray-500">今天在历史上发生了哪些大事？</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="max-w-md mx-auto mb-6">
                <input type="date" id="date" class="w-full p-4 bg-gray-50 rounded-xl border outline-none text-center" onchange="show()">
            </div>
            <div class="text-center mb-4"><p class="text-lg font-bold text-gray-700" id="dateTitle"></p></div>
            <div class="space-y-3" id="events"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择日期查看历史大事件。</li><li>默认显示今天的历史事件。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">数据完整吗？</div><div class="text-gray-500 text-sm">收录了部分重要历史事件，持续更新中。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        // 内置历史事件数据(Month-Day格式)
        const historyData = {
            '01-01':[{y:1912,e:'中华民国成立'},{y:1942,e:'26国签署《联合国家宣言》'},{y:2002,e:'欧元正式流通'}],
            '01-08':[{y:1976,e:'周恩来总理逝世'}],
            '03-08':[{y:1975,e:'联合国确立国际妇女节'}],
            '03-12':[{y:1925,e:'孙中山先生逝世'},{y:1979,e:'中国植树节确立'}],
            '04-01':[{y:1976,e:'苹果公司成立'}],
            '05-01':[{y:1886,e:'国际劳动节起源，芝加哥工人大罢工'}],
            '05-04':[{y:1919,e:'五四运动爆发'}],
            '06-01':[{y:1925,e:'国际儿童节设立'}],
            '07-01':[{y:1921,e:'中国共产党成立'},{y:1997,e:'香港回归祖国'}],
            '07-04':[{y:1776,e:'美国独立宣言签署'}],
            '07-20':[{y:1969,e:'阿波罗11号登月，人类首次踏上月球'}],
            '08-01':[{y:1927,e:'南昌起义'}],
            '09-01':[{y:1939,e:'第二次世界大战爆发'}],
            '09-03':[{y:1945,e:'中国人民抗日战争胜利纪念日'}],
            '10-01':[{y:1949,e:'中华人民共和国成立'},{y:1964,e:'东京奥运会开幕'}],
            '10-24':[{y:1945,e:'联合国正式成立'}],
            '11-09':[{y:1989,e:'柏林墙倒塌'}],
            '11-11':[{y:1918,e:'第一次世界大战结束'}],
            '12-12':[{y:1936,e:'西安事变'}],
            '12-20':[{y:1999,e:'澳门回归祖国'}],
            '12-25':[{y:1991,e:'苏联解体'}],
            '12-26':[{y:1893,e:'毛泽东诞辰'}],
        };

        document.getElementById('date').value = new Date().toISOString().slice(0,10);

        function show() {
            const dateStr = document.getElementById('date').value;
            const d = new Date(dateStr);
            const md = String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            document.getElementById('dateTitle').textContent = `${d.getMonth()+1}月${d.getDate()}日`;
            const events = historyData[md];
            let html = '';
            if (events && events.length > 0) {
                events.forEach(e => {
                    html += `<div class="flex items-start gap-4 p-4 bg-blue-50 rounded-xl">
                        <span class="px-3 py-1 bg-blue-500 text-white rounded-lg font-bold text-sm flex-shrink-0">${e.y}</span>
                        <span class="text-gray-700">${e.e}</span>
                    </div>`;
                });
            } else {
                html = '<p class="text-center text-gray-400 py-8">暂无收录该日的历史事件，你可以换个日期试试 🗓️</p>';
            }
            document.getElementById('events').innerHTML = html;
        }
        show();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
