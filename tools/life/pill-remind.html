<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吃药提醒 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">💊 吃药提醒</h1>
            <p class="text-gray-500">设置用药提醒，不再忘记吃药</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">药品名称</label><input type="text" id="medName" placeholder="如：阿莫西林" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">提醒时间</label><input type="time" id="medTime" value="08:00" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">频率</label><select id="freq" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"><option>每天1次</option><option>每天2次</option><option>每天3次</option><option>按需服用</option></select></div>
            </div>
            <button onclick="addMed()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl">➕ 添加提醒</button>
            <div class="mt-6 space-y-3" id="list"></div>
            <div id="alarm" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                <div class="bg-white rounded-3xl p-8 text-center max-w-sm mx-4 animate-bounce">
                    <p class="text-5xl mb-4">⏰💊</p>
                    <p class="text-2xl font-bold text-gray-700">该吃药啦！</p>
                    <p class="text-gray-500 mt-2" id="alarmName"></p>
                    <button onclick="dismissAlarm()" class="mt-4 px-8 py-3 bg-green-500 text-white font-bold rounded-xl">✅ 已吃</button>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>添加药品名称和提醒时间。</li><li>到时间会弹出提醒。</li><li>需要保持页面打开才能生效。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">关闭页面还能提醒吗？</div><div class="text-gray-500 text-sm">不能，需保持页面打开。建议同时设置手机闹钟。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const KEY = 'xq_pill_remind';
        function getMeds() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }

        function addMed() {
            const name = document.getElementById('medName').value.trim();
            const time = document.getElementById('medTime').value;
            const freq = document.getElementById('freq').value;
            if (!name) { alert('请输入药品名称'); return; }
            const meds = getMeds();
            meds.push({ name, time, freq, id: Date.now() });
            localStorage.setItem(KEY, JSON.stringify(meds));
            document.getElementById('medName').value = '';
            render();
        }

        function delMed(id) {
            const meds = getMeds().filter(m => m.id !== id);
            localStorage.setItem(KEY, JSON.stringify(meds));
            render();
        }

        function render() {
            const meds = getMeds();
            let html = '';
            meds.forEach(m => {
                html += `<div class="flex items-center gap-3 p-4 bg-blue-50 rounded-xl">
                    <span class="text-2xl">💊</span>
                    <div class="flex-1"><p class="font-bold text-gray-700">${m.name}</p><p class="text-xs text-gray-400">${m.time} · ${m.freq}</p></div>
                    <button onclick="delMed(${m.id})" class="text-gray-300 hover:text-red-400">✕</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = html || '<p class="text-center text-gray-400 text-sm py-4">暂无药品提醒</p>';
        }

        function checkAlarms() {
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
            const meds = getMeds();
            meds.forEach(m => {
                if (m.time === timeStr) {
                    document.getElementById('alarmName').textContent = m.name + ' - ' + m.freq;
                    document.getElementById('alarm').classList.remove('hidden');
                }
            });
        }

        function dismissAlarm() { document.getElementById('alarm').classList.add('hidden'); }

        // 每分钟检查一次
        setInterval(checkAlarms, 60000);
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
