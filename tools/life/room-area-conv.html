<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>面积换算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📐 房屋面积换算</h1>
            <p class="text-gray-500">平方米 / 平方英尺 / 坪 / 亩 快速互转</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">输入面积</label><input type="number" id="area" value="100" step="any" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" oninput="calc()"></div>
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">单位</label>
                    <select id="unit" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" onchange="calc()">
                        <option value="sqm">平方米 (㎡)</option><option value="sqft">平方英尺 (ft²)</option><option value="ping">坪</option><option value="mu">亩</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-blue-50 rounded-2xl p-6 text-center"><p class="text-2xl font-black text-blue-500" id="rSqm">0</p><p class="text-xs text-gray-400">平方米</p></div>
                <div class="bg-green-50 rounded-2xl p-6 text-center"><p class="text-2xl font-black text-green-500" id="rSqft">0</p><p class="text-xs text-gray-400">平方英尺</p></div>
                <div class="bg-purple-50 rounded-2xl p-6 text-center"><p class="text-2xl font-black text-purple-500" id="rPing">0</p><p class="text-xs text-gray-400">坪</p></div>
                <div class="bg-orange-50 rounded-2xl p-6 text-center"><p class="text-2xl font-black text-orange-500" id="rMu">0</p><p class="text-xs text-gray-400">亩</p></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入面积数值并选择单位。</li><li>实时显示四种单位的换算结果。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">1坪等于多少？</div><div class="text-gray-500 text-sm">1坪 ≈ 3.305785 平方米，常用于台湾地区。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const val = parseFloat(document.getElementById('area').value) || 0;
            const unit = document.getElementById('unit').value;
            let sqm;
            if (unit === 'sqm') sqm = val;
            else if (unit === 'sqft') sqm = val * 0.092903;
            else if (unit === 'ping') sqm = val * 3.305785;
            else sqm = val * 666.667;

            document.getElementById('rSqm').textContent = sqm.toFixed(2);
            document.getElementById('rSqft').textContent = (sqm / 0.092903).toFixed(2);
            document.getElementById('rPing').textContent = (sqm / 3.305785).toFixed(2);
            document.getElementById('rMu').textContent = (sqm / 666.667).toFixed(4);
        }
        calc();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
