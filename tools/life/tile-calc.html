<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瓷砖用量估算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🧱 瓷砖用量估算</h1>
            <p class="text-gray-500">根据地面/墙面面积和瓷砖尺寸，计算所需瓷砖数量</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">铺贴面积(㎡)</label><input type="number" id="area" value="20" step="0.1" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">瓷砖长(cm)</label><input type="number" id="tileL" value="80" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">瓷砖宽(cm)</label><input type="number" id="tileW" value="80" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">损耗率(%)</label><input type="number" id="waste" value="5" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl text-lg">🔢 计算用量</button>
            <div id="result" class="hidden mt-8 grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-orange-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-orange-500" id="rCount">0</p><p class="text-xs text-gray-400">所需数量(片)</p></div>
                <div class="bg-blue-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-blue-500" id="rBoxes">0</p><p class="text-xs text-gray-400">约需(箱, 10片/箱)</p></div>
                <div class="bg-green-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-green-500" id="rTileArea">0</p><p class="text-xs text-gray-400">单片面积(㎡)</p></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入要铺贴的面积和瓷砖尺寸。</li><li>损耗率一般为3%-10%，复杂造型取高值。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">常见瓷砖尺寸？</div><div class="text-gray-500 text-sm">地砖常见: 60×60, 80×80, 100×100cm；墙砖常见: 30×60, 30×45cm。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const area = parseFloat(document.getElementById('area').value);
            const tl = parseFloat(document.getElementById('tileL').value) / 100;
            const tw = parseFloat(document.getElementById('tileW').value) / 100;
            const waste = parseFloat(document.getElementById('waste').value) / 100;
            const tileArea = tl * tw;
            const count = Math.ceil(area * (1 + waste) / tileArea);
            document.getElementById('rCount').textContent = count;
            document.getElementById('rBoxes').textContent = Math.ceil(count / 10);
            document.getElementById('rTileArea').textContent = tileArea.toFixed(4);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
