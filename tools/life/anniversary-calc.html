<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>纪念日计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">💕 纪念日计算器</h1>
            <p class="text-gray-500">记录你们在一起的每一个重要时刻</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">纪念日名称</label>
                    <input type="text" id="annName" placeholder="例如：在一起纪念日" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">纪念日日期</label>
                    <input type="date" id="annDate" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl transition-colors text-lg">💝 计算纪念日</button>

            <div id="result" class="hidden mt-8 text-center">
                <div class="bg-gradient-to-r from-pink-100 to-red-100 rounded-3xl p-8 mb-6">
                    <p class="text-gray-500 text-sm mb-1" id="annLabel"></p>
                    <p class="text-7xl font-black text-pink-500 mb-2" id="totalDays">0</p>
                    <p class="text-gray-400">天</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-pink-50 rounded-xl p-4"><p class="text-2xl font-bold text-pink-500" id="rYears">0</p><p class="text-xs text-gray-400">年</p></div>
                    <div class="bg-purple-50 rounded-xl p-4"><p class="text-2xl font-bold text-purple-500" id="rMonths">0</p><p class="text-xs text-gray-400">月</p></div>
                    <div class="bg-blue-50 rounded-xl p-4"><p class="text-2xl font-bold text-blue-500" id="rWeeks">0</p><p class="text-xs text-gray-400">周</p></div>
                    <div class="bg-green-50 rounded-xl p-4"><p class="text-2xl font-bold text-green-500" id="rHours">0</p><p class="text-xs text-gray-400">小时</p></div>
                </div>
                <div class="bg-yellow-50 rounded-2xl p-4">
                    <p class="text-sm text-gray-600">🎉 即将到来的纪念日里程碑</p>
                    <div id="milestones" class="mt-3 flex flex-wrap gap-2 justify-center"></div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 list-disc list-inside">
                        <li>输入纪念日名称和日期。</li>
                        <li>点击按钮查看已过天数。</li>
                        <li>查看即将到来的里程碑日期。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">可以记录多个纪念日吗？</div>
                        <div class="text-gray-500 text-sm">目前支持单次计算，后续将支持多个纪念日管理。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const name = document.getElementById('annName').value || '纪念日';
            const dateStr = document.getElementById('annDate').value;
            if (!dateStr) { alert('请选择纪念日日期'); return; }

            const start = new Date(dateStr);
            const now = new Date();
            const diffMs = now - start;
            const totalDays = Math.floor(diffMs / (1000*60*60*24));

            if (totalDays < 0) { alert('纪念日不能在未来'); return; }

            document.getElementById('annLabel').textContent = `距离「${name}」已经过去`;
            document.getElementById('totalDays').textContent = totalDays;
            document.getElementById('rYears').textContent = (totalDays / 365.25).toFixed(1);
            document.getElementById('rMonths').textContent = Math.floor(totalDays / 30.44);
            document.getElementById('rWeeks').textContent = Math.floor(totalDays / 7);
            document.getElementById('rHours').textContent = (totalDays * 24).toLocaleString();

            // 里程碑计算
            const milestones = [100, 200, 365, 500, 520, 730, 999, 1000, 1095, 1314, 1825, 2000, 3650];
            let html = '';
            milestones.forEach(m => {
                if (m > totalDays) {
                    const futureDate = new Date(start);
                    futureDate.setDate(futureDate.getDate() + m);
                    const daysLeft = m - totalDays;
                    html += `<span class="inline-block bg-white px-3 py-1 rounded-full text-xs border border-pink-200 text-pink-500">
                        ${m}天 · 还有${daysLeft}天 · ${futureDate.getMonth()+1}/${futureDate.getDate()}</span>`;
                }
            });
            document.getElementById('milestones').innerHTML = html || '<span class="text-gray-400 text-sm">已超过所有预设里程碑 🎊</span>';
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
