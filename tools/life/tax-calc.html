<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个税计算器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🧾 基础个税计算器</h1>
            <p class="text-gray-500">根据2019年新个税法，计算月度个人所得税及税后工资</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">税前月薪 (元)</label>
                    <input type="number" id="salary" value="15000" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">五险一金 (元)</label>
                    <input type="number" id="socialIns" value="2000" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">专项附加扣除 (元)</label>
                    <input type="number" id="special" value="1500" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">起征点 (元)</label>
                    <input type="number" id="threshold" value="5000" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" readonly>
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-lg">🧮 计算个税</button>
            <div id="result" class="hidden mt-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-red-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">应纳税额</p>
                        <p class="text-2xl font-black text-red-500" id="rTax">0</p>
                    </div>
                    <div class="bg-green-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">税后工资</p>
                        <p class="text-2xl font-black text-green-500" id="rAfterTax">0</p>
                    </div>
                    <div class="bg-blue-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">适用税率</p>
                        <p class="text-2xl font-black text-blue-500" id="rRate">0%</p>
                    </div>
                    <div class="bg-orange-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">速算扣除</p>
                        <p class="text-2xl font-black text-orange-500" id="rQuick">0</p>
                    </div>
                </div>
                <div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-500">
                    <p>应纳税所得额 = 税前工资 - 五险一金 - 专项附加扣除 - 起征点 = <strong id="taxableIncome" class="text-gray-700">0</strong> 元</p>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入税前月薪和五险一金。</li><li>可选填专项附加扣除（子女教育、住房贷款等）。</li><li>按2019年新税法7级超额累进税率计算。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">年终奖怎么算？</div><div class="text-gray-500 text-sm">本工具仅计算月度个税，年终奖可选择单独计税或并入综合所得。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        // 2019年新个税法7级超额累进税率
        const brackets = [
            { max: 3000, rate: 0.03, deduction: 0 },
            { max: 12000, rate: 0.10, deduction: 210 },
            { max: 25000, rate: 0.20, deduction: 1410 },
            { max: 35000, rate: 0.25, deduction: 2660 },
            { max: 55000, rate: 0.30, deduction: 4410 },
            { max: 80000, rate: 0.35, deduction: 7160 },
            { max: Infinity, rate: 0.45, deduction: 15160 }
        ];

        function calc() {
            const salary = parseFloat(document.getElementById('salary').value);
            const socialIns = parseFloat(document.getElementById('socialIns').value);
            const special = parseFloat(document.getElementById('special').value);
            const threshold = parseFloat(document.getElementById('threshold').value);

            const taxableIncome = Math.max(0, salary - socialIns - special - threshold);
            let tax = 0, rate = 0, quick = 0;

            for (const b of brackets) {
                if (taxableIncome <= b.max) {
                    tax = taxableIncome * b.rate - b.deduction;
                    rate = b.rate;
                    quick = b.deduction;
                    break;
                }
            }
            tax = Math.max(0, tax);

            document.getElementById('rTax').textContent = '¥' + tax.toFixed(2);
            document.getElementById('rAfterTax').textContent = '¥' + (salary - socialIns - tax).toFixed(2);
            document.getElementById('rRate').textContent = (rate * 100) + '%';
            document.getElementById('rQuick').textContent = '¥' + quick;
            document.getElementById('taxableIncome').textContent = taxableIncome.toFixed(2);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
