<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心率记录 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">❤️ 心率记录与评估</h1>
            <p class="text-gray-500">记录你的静息心率，评估心脏健康状况</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">静息心率 (bpm)</label><input type="number" id="hr" value="72" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">年龄</label><input type="number" id="age" value="30" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">性别</label><select id="gender" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"><option value="male">男</option><option value="female">女</option></select></div>
            </div>
            <button onclick="evaluate()" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl text-lg">📊 评估心率</button>
            <div id="result" class="hidden mt-8">
                <div class="rounded-3xl p-8 text-center mb-4" id="card">
                    <p class="text-5xl font-black mb-2" id="rHR"></p>
                    <p class="text-sm text-gray-600" id="rLevel"></p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="bg-red-50 rounded-xl p-4 text-center"><p class="text-xl font-bold text-red-500" id="rMax">0</p><p class="text-xs text-gray-400">最大心率</p></div>
                    <div class="bg-green-50 rounded-xl p-4 text-center"><p class="text-xl font-bold text-green-500" id="rFat">0</p><p class="text-xs text-gray-400">燃脂区间</p></div>
                    <div class="bg-orange-50 rounded-xl p-4 text-center"><p class="text-xl font-bold text-orange-500" id="rCardio">0</p><p class="text-xs text-gray-400">有氧区间</p></div>
                    <div class="bg-purple-50 rounded-xl p-4 text-center"><p class="text-xl font-bold text-purple-500" id="rPeak">0</p><p class="text-xs text-gray-400">极限区间</p></div>
                </div>
            </div>
            <div class="mt-6">
                <h3 class="text-sm font-bold text-gray-500 mb-3">📋 记录历史</h3>
                <div class="space-y-2 max-h-40 overflow-y-auto" id="history"></div>
                <button onclick="saveRecord()" class="mt-2 w-full py-2 bg-gray-200 hover:bg-gray-300 rounded-xl text-sm text-gray-600">💾 保存本次记录</button>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>在安静状态下测量脉搏60秒。</li><li>输入心率和年龄进行评估。</li><li>可保存记录追踪变化。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">正常心率是多少？</div><div class="text-gray-500 text-sm">成人静息心率60-100 bpm为正常，运动员可低至40-50 bpm。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const KEY = 'xq_heart_rate_log';
        function getLog() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }

        function evaluate() {
            const hr = parseInt(document.getElementById('hr').value);
            const age = parseInt(document.getElementById('age').value);
            const maxHR = 220 - age;

            let level, bg;
            if (hr < 60) { level = '💙 偏低 - 如非运动员，建议咨询医生'; bg = 'bg-blue-100'; }
            else if (hr <= 70) { level = '💚 优秀 - 心脏功能很棒！'; bg = 'bg-green-100'; }
            else if (hr <= 80) { level = '✅ 良好 - 保持这个状态'; bg = 'bg-green-50'; }
            else if (hr <= 100) { level = '⚡ 正常 - 可以加强有氧运动'; bg = 'bg-yellow-100'; }
            else { level = '⚠️ 偏高 - 建议就医检查'; bg = 'bg-red-100'; }

            document.getElementById('card').className = `rounded-3xl p-8 text-center mb-4 ${bg}`;
            document.getElementById('rHR').textContent = hr + ' bpm';
            document.getElementById('rLevel').textContent = level;
            document.getElementById('rMax').textContent = maxHR;
            document.getElementById('rFat').textContent = Math.round(maxHR*0.6) + '-' + Math.round(maxHR*0.7);
            document.getElementById('rCardio').textContent = Math.round(maxHR*0.7) + '-' + Math.round(maxHR*0.85);
            document.getElementById('rPeak').textContent = Math.round(maxHR*0.85) + '-' + maxHR;
            document.getElementById('result').classList.remove('hidden');
        }

        function saveRecord() {
            const hr = parseInt(document.getElementById('hr').value);
            const log = getLog();
            log.unshift({ hr, date: new Date().toISOString() });
            localStorage.setItem(KEY, JSON.stringify(log.slice(0, 30)));
            renderHistory();
        }

        function renderHistory() {
            const log = getLog();
            let html = '';
            log.forEach(r => {
                const d = new Date(r.date);
                html += `<div class="flex items-center gap-3 p-2 bg-gray-50 rounded-lg text-sm"><span class="text-gray-400">${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span><span class="font-bold text-red-500">${r.hr} bpm</span></div>`;
            });
            document.getElementById('history').innerHTML = html || '<p class="text-gray-400 text-sm text-center">暂无记录</p>';
        }
        renderHistory();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
