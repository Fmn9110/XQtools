<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AA制分账计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">💳 AA制分账计算</h1>
            <p class="text-gray-500">聚餐旅行后快速分账，谁该收钱谁该转账一目了然</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">总消费金额 (元)</label><input type="number" id="total" value="500" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">参与人数</label><input type="number" id="people" value="5" min="2" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">小费比例 (%)</label><input type="number" id="tip" value="0" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl text-lg">🧮 计算分账</button>

            <div id="result" class="hidden mt-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-green-50 rounded-2xl p-4 text-center"><p class="text-2xl font-black text-green-500" id="rPerPerson">¥0</p><p class="text-xs text-gray-400">每人应付</p></div>
                    <div class="bg-blue-50 rounded-2xl p-4 text-center"><p class="text-2xl font-black text-blue-500" id="rTotal">¥0</p><p class="text-xs text-gray-400">总计(含小费)</p></div>
                    <div class="bg-yellow-50 rounded-2xl p-4 text-center"><p class="text-2xl font-black text-yellow-500" id="rTip">¥0</p><p class="text-xs text-gray-400">小费金额</p></div>
                    <div class="bg-purple-50 rounded-2xl p-4 text-center"><p class="text-2xl font-black text-purple-500" id="rPeople">0</p><p class="text-xs text-gray-400">共几人</p></div>
                </div>
                <div class="bg-gray-50 rounded-xl p-4">
                    <h3 class="text-sm font-bold text-gray-500 mb-3">💡 付款建议</h3>
                    <div class="space-y-2" id="suggestions"></div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入总消费和人数。</li><li>可选添加小费百分比。</li><li>查看每人应付金额。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">金额不整怎么办？</div><div class="text-gray-500 text-sm">可以由某人多付几分钱，下次由另一人补上。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const total = parseFloat(document.getElementById('total').value);
            const people = parseInt(document.getElementById('people').value);
            const tipPct = parseFloat(document.getElementById('tip').value) / 100;
            const tipAmt = total * tipPct;
            const grandTotal = total + tipAmt;
            const perPerson = grandTotal / people;

            document.getElementById('rPerPerson').textContent = '¥' + perPerson.toFixed(2);
            document.getElementById('rTotal').textContent = '¥' + grandTotal.toFixed(2);
            document.getElementById('rTip').textContent = '¥' + tipAmt.toFixed(2);
            document.getElementById('rPeople').textContent = people;

            // 付款建议：向上取整
            const rounded = Math.ceil(perPerson);
            const extra = rounded * people - grandTotal;
            let suggestions = `<p class="text-sm text-gray-600">• 每人付 <strong>¥${rounded}</strong>（取整），多出 ¥${extra.toFixed(2)} 留做下次基金</p>`;
            suggestions += `<p class="text-sm text-gray-600">• 或者精确到分，每人转 <strong>¥${perPerson.toFixed(2)}</strong></p>`;
            if (people >= 3) {
                const oneMore = Math.ceil(grandTotal - Math.floor(perPerson) * (people - 1));
                suggestions += `<p class="text-sm text-gray-600">• ${people-1} 人各付 ¥${Math.floor(perPerson)}，1 人付 ¥${oneMore.toFixed(2)}</p>`;
            }
            document.getElementById('suggestions').innerHTML = suggestions;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
