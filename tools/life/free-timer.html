<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自由倒计时生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">⏳ 自由倒计时生成器</h1>
            <p class="text-gray-500">为任何事件创建一个精美的倒计时页面</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">事件名称</label>
                    <input type="text" id="eventName" placeholder="例如：生日派对" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">目标日期时间</label>
                    <input type="datetime-local" id="eventDate" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="startCountdown()" class="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl transition-colors text-lg">🚀 开始倒计时</button>

            <div id="countdown" class="hidden mt-8">
                <div class="text-center mb-4">
                    <p class="text-gray-400 text-sm">距离 <strong id="evName" class="text-pink-500"></strong> 还有</p>
                </div>
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-gradient-to-b from-pink-500 to-pink-600 rounded-2xl p-6 text-center text-white shadow-lg">
                        <p class="text-5xl font-black" id="cDays">0</p>
                        <p class="text-xs mt-1 opacity-80">天</p>
                    </div>
                    <div class="bg-gradient-to-b from-purple-500 to-purple-600 rounded-2xl p-6 text-center text-white shadow-lg">
                        <p class="text-5xl font-black" id="cHours">0</p>
                        <p class="text-xs mt-1 opacity-80">时</p>
                    </div>
                    <div class="bg-gradient-to-b from-blue-500 to-blue-600 rounded-2xl p-6 text-center text-white shadow-lg">
                        <p class="text-5xl font-black" id="cMins">0</p>
                        <p class="text-xs mt-1 opacity-80">分</p>
                    </div>
                    <div class="bg-gradient-to-b from-green-500 to-green-600 rounded-2xl p-6 text-center text-white shadow-lg">
                        <p class="text-5xl font-black" id="cSecs">0</p>
                        <p class="text-xs mt-1 opacity-80">秒</p>
                    </div>
                </div>
                <div class="mt-4 bg-gray-50 rounded-xl p-3">
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="progressBar" class="bg-pink-500 h-2 rounded-full transition-all" style="width:0%"></div>
                    </div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 list-disc list-inside">
                        <li>输入事件名称和目标日期时间。</li>
                        <li>点击"开始倒计时"即可实时显示倒计时。</li>
                        <li>倒计时结束会显示"已到达"提示。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">关闭页面后还能倒计时吗？</div>
                        <div class="text-gray-500 text-sm">倒计时基于目标时间实时计算，重新打开页面即可继续。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        let timer = null;
        let startTime = null;

        function startCountdown() {
            const name = document.getElementById('eventName').value || '未来事件';
            const dateStr = document.getElementById('eventDate').value;
            if (!dateStr) { alert('请选择目标日期'); return; }

            const target = new Date(dateStr);
            if (target <= new Date()) { alert('目标时间需要在当前时间之后'); return; }

            startTime = new Date();
            document.getElementById('evName').textContent = name;
            document.getElementById('countdown').classList.remove('hidden');

            if (timer) clearInterval(timer);
            timer = setInterval(() => updateCountdown(target), 1000);
            updateCountdown(target);
        }

        function updateCountdown(target) {
            const now = new Date();
            const diff = target - now;

            if (diff <= 0) {
                clearInterval(timer);
                document.getElementById('cDays').textContent = '🎉';
                document.getElementById('cHours').textContent = '已';
                document.getElementById('cMins').textContent = '到';
                document.getElementById('cSecs').textContent = '达';
                document.getElementById('progressBar').style.width = '100%';
                return;
            }

            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
            const secs = Math.floor((diff % (1000*60)) / 1000);

            document.getElementById('cDays').textContent = days;
            document.getElementById('cHours').textContent = String(hours).padStart(2,'0');
            document.getElementById('cMins').textContent = String(mins).padStart(2,'0');
            document.getElementById('cSecs').textContent = String(secs).padStart(2,'0');

            // 进度条：从设置倒计时那一刻到目标
            if (startTime) {
                const total = target - startTime;
                const elapsed = now - startTime;
                const pct = Math.min(100, (elapsed / total) * 100);
                document.getElementById('progressBar').style.width = pct.toFixed(2) + '%';
            }
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
