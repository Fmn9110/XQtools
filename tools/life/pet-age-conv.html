<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宠物年龄换算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🐾 宠物年龄换算</h1>
            <p class="text-gray-500">看看你的毛孩子相当于人类几岁</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">宠物类型</label>
                    <select id="petType" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" onchange="calc()">
                        <option value="dog-small">🐕 小型犬 (≤10kg)</option>
                        <option value="dog-medium">🐕 中型犬 (10-25kg)</option>
                        <option value="dog-large">🐕 大型犬 (>25kg)</option>
                        <option value="cat">🐱 猫咪</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">宠物实际年龄</label>
                    <input type="number" id="petAge" value="3" min="0" max="30" step="0.5" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" oninput="calc()">
                </div>
            </div>
            <div id="result" class="text-center">
                <div class="bg-gradient-to-r from-orange-50 to-yellow-50 rounded-3xl p-8 mb-4">
                    <p class="text-6xl mb-2" id="emoji">🐕</p>
                    <p class="text-gray-500 text-sm">相当于人类</p>
                    <p class="text-6xl font-black text-orange-500 my-2" id="humanAge">0</p>
                    <p class="text-gray-400">岁</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-500" id="lifeStage"></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择宠物类型（猫/小中大型犬）。</li><li>输入宠物实际年龄。</li><li>查看对应的人类年龄。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">换算标准？</div><div class="text-gray-500 text-sm">基于美国兽医学会(AVMA)推荐的非线性换算方式。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const type = document.getElementById('petType').value;
            const age = parseFloat(document.getElementById('petAge').value) || 0;
            let humanAge = 0;

            if (type === 'cat') {
                // 猫: 第1年=15, 第2年=24, 之后每年+4
                if (age <= 1) humanAge = age * 15;
                else if (age <= 2) humanAge = 15 + (age - 1) * 9;
                else humanAge = 24 + (age - 2) * 4;
                document.getElementById('emoji').textContent = '🐱';
            } else {
                // 犬: 第1年=15, 第2年=24, 之后根据体型
                const perYear = type === 'dog-small' ? 4 : type === 'dog-medium' ? 5 : 6;
                if (age <= 1) humanAge = age * 15;
                else if (age <= 2) humanAge = 15 + (age - 1) * 9;
                else humanAge = 24 + (age - 2) * perYear;
                document.getElementById('emoji').textContent = '🐕';
            }

            document.getElementById('humanAge').textContent = Math.round(humanAge);

            let stage = '';
            if (humanAge < 15) stage = '🍼 幼年期 - 好奇宝宝，需要多多关爱和训练';
            else if (humanAge < 25) stage = '🎓 青年期 - 精力充沛，活泼好动的年纪';
            else if (humanAge < 40) stage = '💪 壮年期 - 身体状态最佳，享受生活';
            else if (humanAge < 60) stage = '🧘 中年期 - 逐渐稳重，注意定期体检';
            else if (humanAge < 80) stage = '👴 老年期 - 需要更多关爱，注意饮食和运动';
            else stage = '🎂 高龄期 - 珍惜每一天，给予最温柔的陪伴';
            document.getElementById('lifeStage').textContent = stage;
        }
        calc();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
