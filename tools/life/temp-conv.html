<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>温度换算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🌡️ 温度换算助手</h1>
            <p class="text-gray-500">摄氏度 / 华氏度 / 开尔文 快速互转</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">输入温度</label>
                    <input type="number" id="temp" value="180" step="any" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" oninput="calc()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">单位</label>
                    <select id="unit" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" onchange="calc()">
                        <option value="C">摄氏度 (°C)</option>
                        <option value="F">华氏度 (°F)</option>
                        <option value="K">开尔文 (K)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-red-50 rounded-2xl p-6 text-center">
                    <p class="text-3xl font-black text-red-500" id="rC">0</p>
                    <p class="text-xs text-gray-400">°C 摄氏度</p>
                </div>
                <div class="bg-blue-50 rounded-2xl p-6 text-center">
                    <p class="text-3xl font-black text-blue-500" id="rF">0</p>
                    <p class="text-xs text-gray-400">°F 华氏度</p>
                </div>
                <div class="bg-purple-50 rounded-2xl p-6 text-center">
                    <p class="text-3xl font-black text-purple-500" id="rK">0</p>
                    <p class="text-xs text-gray-400">K 开尔文</p>
                </div>
            </div>
            <div class="mt-6 bg-yellow-50 rounded-xl p-4 text-sm text-gray-500">
                <p>🍞 常用烤箱温度参考：150°C=302°F(低温) · 180°C=356°F(中温) · 200°C=392°F(高温) · 220°C=428°F(极高)</p>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入温度数值并选择单位。</li><li>实时显示三种温标换算结果。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">公式是什么？</div><div class="text-gray-500 text-sm">°F = °C × 9/5 + 32；K = °C + 273.15</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const val = parseFloat(document.getElementById('temp').value) || 0;
            const unit = document.getElementById('unit').value;
            let c, f, k;
            if (unit === 'C') { c = val; f = c * 9/5 + 32; k = c + 273.15; }
            else if (unit === 'F') { c = (val - 32) * 5/9; f = val; k = c + 273.15; }
            else { k = val; c = k - 273.15; f = c * 9/5 + 32; }
            document.getElementById('rC').textContent = c.toFixed(2);
            document.getElementById('rF').textContent = f.toFixed(2);
            document.getElementById('rK').textContent = k.toFixed(2);
        }
        calc();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
