<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星座速查 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">⭐ 星座速查</h1>
            <p class="text-gray-500">输入生日查看你的星座和性格特征</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="max-w-md mx-auto mb-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">选择生日</label>
                <input type="date" id="birthday" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
            </div>
            <button onclick="calc()" class="w-full max-w-md mx-auto block py-4 bg-purple-500 hover:bg-purple-600 text-white font-bold rounded-xl text-lg">🔮 查看星座</button>
            <div id="result" class="hidden mt-8 text-center">
                <div class="bg-gradient-to-br from-purple-100 to-blue-100 rounded-3xl p-8">
                    <p class="text-6xl mb-3" id="rEmoji"></p>
                    <p class="text-3xl font-black text-purple-600 mb-2" id="rName"></p>
                    <p class="text-sm text-gray-500 mb-4" id="rDate"></p>
                    <div class="grid grid-cols-2 gap-3 text-sm max-w-sm mx-auto">
                        <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400">元素</span><p class="font-bold" id="rElem"></p></div>
                        <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400">守护星</span><p class="font-bold" id="rPlanet"></p></div>
                    </div>
                    <p class="mt-4 text-gray-600 text-sm" id="rDesc"></p>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择你的出生日期。</li><li>查看对应星座和特征描述。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">边界日期怎么办？</div><div class="text-gray-500 text-sm">星座日期边界因年份可能有1天差异，以通用日期为准。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const signs = [
            {name:'摩羯座',emoji:'♑',start:[12,22],end:[1,19],elem:'土象',planet:'土星',desc:'成熟稳重、有责任感、目标明确，是天生的领导者。'},
            {name:'水瓶座',emoji:'♒',start:[1,20],end:[2,18],elem:'风象',planet:'天王星',desc:'独立思考、富有创意、追求自由，是思想的先驱者。'},
            {name:'双鱼座',emoji:'♓',start:[2,19],end:[3,20],elem:'水象',planet:'海王星',desc:'温柔浪漫、直觉敏锐、富有同情心，是天生的艺术家。'},
            {name:'白羊座',emoji:'♈',start:[3,21],end:[4,19],elem:'火象',planet:'火星',desc:'热情冲动、勇敢直率、充满活力，天生的行动派。'},
            {name:'金牛座',emoji:'♉',start:[4,20],end:[5,20],elem:'土象',planet:'金星',desc:'务实可靠、有耐心、重视物质享受，稳扎稳打。'},
            {name:'双子座',emoji:'♊',start:[5,21],end:[6,21],elem:'风象',planet:'水星',desc:'机智善变、好奇心强、善于沟通，社交达人。'},
            {name:'巨蟹座',emoji:'♋',start:[6,22],end:[7,22],elem:'水象',planet:'月亮',desc:'重视家庭、温柔细腻、情感丰富，是天生的守护者。'},
            {name:'狮子座',emoji:'♌',start:[7,23],end:[8,22],elem:'火象',planet:'太阳',desc:'自信大方、有领导力、慷慨热情，天生的王者。'},
            {name:'处女座',emoji:'♍',start:[8,23],end:[9,22],elem:'土象',planet:'水星',desc:'追求完美、注重细节、勤勉务实，是可靠的伙伴。'},
            {name:'天秤座',emoji:'♎',start:[9,23],end:[10,23],elem:'风象',planet:'金星',desc:'优雅和谐、善于社交、追求公平，天生的外交家。'},
            {name:'天蝎座',emoji:'♏',start:[10,24],end:[11,22],elem:'水象',planet:'冥王星',desc:'深邃神秘、意志坚定、洞察力强，是天生的战略家。'},
            {name:'射手座',emoji:'♐',start:[11,23],end:[12,21],elem:'火象',planet:'木星',desc:'乐观自由、热爱冒险、知识渊博，天生的探索者。'},
        ];

        function calc() {
            const dateStr = document.getElementById('birthday').value;
            if (!dateStr) { alert('请选择日期'); return; }
            const d = new Date(dateStr);
            const m = d.getMonth() + 1;
            const day = d.getDate();

            let found = null;
            for (const s of signs) {
                const [sm, sd] = s.start;
                const [em, ed] = s.end;
                if (sm > em) {
                    // 跨年（摩羯座）
                    if ((m === sm && day >= sd) || (m === em && day <= ed)) { found = s; break; }
                } else {
                    if ((m === sm && day >= sd) || (m === em && day <= ed) || (m > sm && m < em)) { found = s; break; }
                }
            }
            if (!found) found = signs[0]; // 默认摩羯

            document.getElementById('rEmoji').textContent = found.emoji;
            document.getElementById('rName').textContent = found.name;
            document.getElementById('rDate').textContent = `${found.start[0]}月${found.start[1]}日 - ${found.end[0]}月${found.end[1]}日`;
            document.getElementById('rElem').textContent = found.elem;
            document.getElementById('rPlanet').textContent = found.planet;
            document.getElementById('rDesc').textContent = found.desc;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
