<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>急救指南 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🏥 急救指南速查</h1>
            <p class="text-gray-500">常见紧急情况的急救步骤，关键时刻能救命</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="bg-red-100 rounded-xl p-4 text-center mb-6 text-red-600 font-bold text-lg">🚨 紧急情况请先拨打 120 ！</div>
            <div class="flex gap-2 mb-4 flex-wrap justify-center" id="tabs"></div>
            <div id="content"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择紧急情况类型。</li><li>按步骤进行急救。</li><li>同时拨打120等待专业救护。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">本指南能替代急救培训吗？</div><div class="text-gray-500 text-sm">不能。建议参加红十字会急救培训获取专业技能。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const guides = [
            {title:'心肺复苏(CPR)',icon:'❤️',steps:['确认环境安全，拍肩呼唤检查意识','令人拨打120并取AED','检查呼吸(看胸廓起伏10秒)','无呼吸：双手交叠放在胸骨中下段','用力快速按压，深度≥5cm，频率100-120次/分','每30次按压后做2次人工呼吸','持续直到AED到达或急救人员接手']},
            {title:'异物卡喉(海姆立克)',icon:'😮',steps:['让患者站立，站在其身后','双臂环抱患者腰部','一手握拳，拳眼对准脐上两横指处','另一手握住拳头','向上、向内快速冲击','重复直到异物排出','婴儿：面朝下，拍背5次+胸部按压5次交替']},
            {title:'烫伤处理',icon:'🔥',steps:['立即用流动冷水冲洗≥20分钟','不要用冰块直接冰敷','不要涂牙膏、酱油等偏方','用干净纱布轻轻覆盖','不要刺破水泡','严重烫伤(面积大/深度深)立即就医']},
            {title:'中暑急救',icon:'☀️',steps:['转移到阴凉通风处','解开衣扣散热','用湿毛巾擦拭身体降温','补充含盐饮料或淡盐水','重度中暑(意识不清)立即送医','注意：不要一次性大量饮水']},
            {title:'出血止血',icon:'🩸',steps:['戴上手套(如有)','用干净布料直接压迫伤口','持续按压不松手','抬高受伤部位(高于心脏)','如血液渗出，在上面再加布按压','严重出血送医途中保持按压']},
            {title:'骨折急救',icon:'🦴',steps:['不要试图复位骨折','用夹板或硬物固定伤处','固定骨折上下两个关节','开放性骨折用干净布覆盖伤口','注意保暖，防止休克','等待120专业救援']},
        ];

        let tabsHtml = '';
        guides.forEach((g, i) => {
            tabsHtml += `<button onclick="show(${i})" class="tab-btn px-4 py-2 rounded-full text-sm font-bold ${i===0?'bg-red-500 text-white':'bg-gray-100 text-gray-500'}">${g.icon} ${g.title}</button>`;
        });
        document.getElementById('tabs').innerHTML = tabsHtml;

        function show(idx) {
            const g = guides[idx];
            document.querySelectorAll('.tab-btn').forEach((b,i) => b.className = `tab-btn px-4 py-2 rounded-full text-sm font-bold ${i===idx?'bg-red-500 text-white':'bg-gray-100 text-gray-500'}`);
            let html = `<div class="bg-red-50 rounded-2xl p-6"><h3 class="text-lg font-bold text-red-600 mb-4">${g.icon} ${g.title}</h3><ol class="space-y-3">`;
            g.steps.forEach((s, i) => {
                html += `<li class="flex items-start gap-3"><span class="w-7 h-7 bg-red-500 text-white rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0">${i+1}</span><span class="text-gray-700">${s}</span></li>`;
            });
            html += '</ol></div>';
            document.getElementById('content').innerHTML = html;
        }
        show(0);
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
