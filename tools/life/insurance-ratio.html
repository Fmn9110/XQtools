<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五险一金计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🏛️ 五险一金计算器</h1>
            <p class="text-gray-500">查看你的社保公积金明细，了解扣费去向</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">税前月薪 (元)</label>
                    <input type="number" id="salary" value="10000" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">公积金比例 (%)</label>
                    <input type="number" id="gjjRate" value="12" min="5" max="12" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-lg">🧮 计算五险一金</button>
            <div id="result" class="hidden mt-8">
                <h3 class="text-lg font-bold text-gray-700 mb-4">个人缴纳部分</h3>
                <div class="overflow-x-auto mb-6">
                    <table class="w-full text-sm"><thead><tr class="bg-blue-50"><th class="p-3 text-left rounded-tl-xl">项目</th><th class="p-3 text-right">比例</th><th class="p-3 text-right rounded-tr-xl">金额</th></tr></thead>
                    <tbody id="personalTable"></tbody>
                    <tfoot><tr class="bg-blue-100 font-bold"><td class="p-3">合计</td><td class="p-3 text-right" id="pTotalRate"></td><td class="p-3 text-right" id="pTotal"></td></tr></tfoot>
                    </table>
                </div>
                <h3 class="text-lg font-bold text-gray-700 mb-4">单位缴纳部分</h3>
                <div class="overflow-x-auto mb-6">
                    <table class="w-full text-sm"><thead><tr class="bg-green-50"><th class="p-3 text-left rounded-tl-xl">项目</th><th class="p-3 text-right">比例</th><th class="p-3 text-right rounded-tr-xl">金额</th></tr></thead>
                    <tbody id="companyTable"></tbody>
                    <tfoot><tr class="bg-green-100 font-bold"><td class="p-3">合计</td><td class="p-3 text-right" id="cTotalRate"></td><td class="p-3 text-right" id="cTotal"></td></tr></tfoot>
                    </table>
                </div>
                <div class="bg-yellow-50 rounded-xl p-4 text-sm text-gray-600 text-center">
                    💡 你的实际到手（扣除五险一金后）约 ¥<strong id="takeHome" class="text-green-500">0</strong>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入税前月薪和公积金缴费比例。</li><li>查看个人和单位分别承担的费用。</li><li>各地比例可能略有差异，此为通用参考。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">各城市比例一样吗？</div><div class="text-gray-500 text-sm">养老、医疗等比例各地有微调，本工具使用全国通用比例作为参考。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const salary = parseFloat(document.getElementById('salary').value);
            const gjjRate = parseFloat(document.getElementById('gjjRate').value) / 100;

            // 个人缴费比例（通用参考）
            const personalItems = [
                { name: '养老保险', rate: 0.08 },
                { name: '医疗保险', rate: 0.02 },
                { name: '失业保险', rate: 0.005 },
                { name: '工伤保险', rate: 0 },
                { name: '生育保险', rate: 0 },
                { name: '住房公积金', rate: gjjRate }
            ];
            const companyItems = [
                { name: '养老保险', rate: 0.16 },
                { name: '医疗保险', rate: 0.095 },
                { name: '失业保险', rate: 0.005 },
                { name: '工伤保险', rate: 0.004 },
                { name: '生育保险', rate: 0.008 },
                { name: '住房公积金', rate: gjjRate }
            ];

            let pTotal = 0, cTotal = 0, pTotalRate = 0, cTotalRate = 0;
            let pHtml = '', cHtml = '';

            personalItems.forEach(item => {
                const amount = salary * item.rate;
                pTotal += amount;
                pTotalRate += item.rate;
                pHtml += `<tr class="border-b border-gray-50"><td class="p-3">${item.name}</td><td class="p-3 text-right">${(item.rate*100).toFixed(1)}%</td><td class="p-3 text-right">¥${amount.toFixed(2)}</td></tr>`;
            });
            companyItems.forEach(item => {
                const amount = salary * item.rate;
                cTotal += amount;
                cTotalRate += item.rate;
                cHtml += `<tr class="border-b border-gray-50"><td class="p-3">${item.name}</td><td class="p-3 text-right">${(item.rate*100).toFixed(1)}%</td><td class="p-3 text-right">¥${amount.toFixed(2)}</td></tr>`;
            });

            document.getElementById('personalTable').innerHTML = pHtml;
            document.getElementById('companyTable').innerHTML = cHtml;
            document.getElementById('pTotalRate').textContent = (pTotalRate*100).toFixed(1) + '%';
            document.getElementById('pTotal').textContent = '¥' + pTotal.toFixed(2);
            document.getElementById('cTotalRate').textContent = (cTotalRate*100).toFixed(1) + '%';
            document.getElementById('cTotal').textContent = '¥' + cTotal.toFixed(2);
            document.getElementById('takeHome').textContent = (salary - pTotal).toFixed(2);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
