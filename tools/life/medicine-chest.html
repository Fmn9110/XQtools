<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭药箱清单 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">💊 家庭药箱清单</h1>
            <p class="text-gray-500">家庭常备药品清单和保质期管理</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="space-y-3" id="list"></div>
            <div class="mt-6 bg-red-50 rounded-xl p-4 text-sm text-red-600">⚠️ 本清单仅供参考。用药请遵医嘱，过敏体质请咨询药师。儿童药物请使用儿童专用制剂。</div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>浏览常备药品清单。</li><li>定期检查药品保质期。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">药品怎么存放？</div><div class="text-gray-500 text-sm">阴凉干燥处，避免日晒，部分药品需要冷藏(看说明书)。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const meds = [
            {cat:'感冒发烧',items:[{name:'布洛芬',use:'退烧止痛'},{name:'对乙酰氨基酚',use:'退烧止痛(可替代)'},{name:'板蓝根颗粒',use:'风热感冒'},{name:'体温计',use:'测量体温'}]},
            {cat:'肠胃消化',items:[{name:'蒙脱石散',use:'止泻'},{name:'口服补液盐',use:'防脱水'},{name:'健胃消食片',use:'消化不良'},{name:'藿香正气水',use:'中暑肠胃型'}]},
            {cat:'外伤护理',items:[{name:'创口贴',use:'小伤口'},{name:'碘伏/酒精棉球',use:'伤口消毒'},{name:'医用纱布&胶带',use:'包扎'},{name:'红霉素软膏',use:'小面积感染'}]},
            {cat:'过敏皮肤',items:[{name:'氯雷他定',use:'抗过敏'},{name:'炉甘石洗剂',use:'止痒'},{name:'开瑞坦',use:'花粉过敏'}]},
            {cat:'其他',items:[{name:'维生素C',use:'补充维C'},{name:'风油精/清凉油',use:'提神防蚊'},{name:'口罩',use:'防护'},{name:'棉签',use:'清洁'}]},
        ];

        const colors = ['bg-red-50','bg-blue-50','bg-green-50','bg-yellow-50','bg-purple-50'];
        let html = '';
        meds.forEach((cat, i) => {
            html += `<div class="rounded-xl p-4 ${colors[i%colors.length]}">
                <h3 class="font-bold text-gray-700 mb-3">${cat.cat}</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                    ${cat.items.map(item => `<div class="bg-white rounded-lg p-3 flex items-center gap-3">
                        <span class="text-lg">💊</span>
                        <div><p class="font-bold text-sm text-gray-700">${item.name}</p><p class="text-xs text-gray-400">${item.use}</p></div>
                    </div>`).join('')}
                </div>
            </div>`;
        });
        document.getElementById('list').innerHTML = html;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
