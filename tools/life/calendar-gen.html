<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万年历生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📅 万年历生成器</h1>
            <p class="text-gray-500">浏览任何年份的月历</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="flex items-center justify-center gap-4 mb-6">
                <button onclick="changeMonth(-1)" class="w-10 h-10 bg-pink-100 hover:bg-pink-200 rounded-full flex items-center justify-center text-pink-500 font-bold text-xl">‹</button>
                <select id="year" onchange="render()" class="p-3 bg-gray-50 rounded-xl border outline-none text-lg font-bold"></select>
                <select id="month" onchange="render()" class="p-3 bg-gray-50 rounded-xl border outline-none text-lg font-bold">
                    <option value="0">1月</option><option value="1">2月</option><option value="2">3月</option><option value="3">4月</option><option value="4">5月</option><option value="5">6月</option><option value="6">7月</option><option value="7">8月</option><option value="8">9月</option><option value="9">10月</option><option value="10">11月</option><option value="11">12月</option>
                </select>
                <button onclick="changeMonth(1)" class="w-10 h-10 bg-pink-100 hover:bg-pink-200 rounded-full flex items-center justify-center text-pink-500 font-bold text-xl">›</button>
                <button onclick="goToday()" class="px-4 py-2 bg-pink-500 text-white rounded-xl text-sm font-bold">今天</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center mb-2">
                <div class="text-xs font-bold text-red-400 py-2">日</div>
                <div class="text-xs font-bold text-gray-400 py-2">一</div>
                <div class="text-xs font-bold text-gray-400 py-2">二</div>
                <div class="text-xs font-bold text-gray-400 py-2">三</div>
                <div class="text-xs font-bold text-gray-400 py-2">四</div>
                <div class="text-xs font-bold text-gray-400 py-2">五</div>
                <div class="text-xs font-bold text-blue-400 py-2">六</div>
            </div>
            <div class="grid grid-cols-7 gap-1" id="calGrid"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择年份和月份查看日历。</li><li>点击"今天"快速回到当前月。</li><li>今天的日期会高亮标记。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">支持哪些年份？</div><div class="text-gray-500 text-sm">支持1900年到2100年。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const yearSel = document.getElementById('year');
        const monthSel = document.getElementById('month');
        for (let y = 1900; y <= 2100; y++) yearSel.innerHTML += `<option value="${y}">${y}年</option>`;

        const now = new Date();
        yearSel.value = now.getFullYear();
        monthSel.value = now.getMonth();

        function changeMonth(delta) {
            let m = parseInt(monthSel.value) + delta;
            let y = parseInt(yearSel.value);
            if (m > 11) { m = 0; y++; }
            if (m < 0) { m = 11; y--; }
            yearSel.value = y;
            monthSel.value = m;
            render();
        }

        function goToday() {
            yearSel.value = now.getFullYear();
            monthSel.value = now.getMonth();
            render();
        }

        function render() {
            const y = parseInt(yearSel.value);
            const m = parseInt(monthSel.value);
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            const today = new Date();
            const isCurrentMonth = y === today.getFullYear() && m === today.getMonth();
            const todayDate = today.getDate();

            let html = '';
            // 填空
            for (let i = 0; i < firstDay; i++) html += '<div></div>';
            // 日期
            for (let d = 1; d <= daysInMonth; d++) {
                const dayOfWeek = new Date(y, m, d).getDay();
                const isToday = isCurrentMonth && d === todayDate;
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                html += `<div class="aspect-square rounded-xl flex items-center justify-center font-bold text-sm cursor-default transition-all hover:scale-105
                    ${isToday ? 'bg-pink-500 text-white shadow-lg ring-2 ring-pink-300' : isWeekend ? 'bg-red-50 text-red-400' : 'bg-gray-50 text-gray-600 hover:bg-pink-50'}">${d}</div>`;
            }
            document.getElementById('calGrid').innerHTML = html;
        }
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
