<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食物GI值查询 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📊 食物GI值查询</h1>
            <p class="text-gray-500">升糖指数(GI)速查，帮助控糖和健康饮食</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="mb-4 grid grid-cols-3 gap-3 text-center text-sm">
                <div class="bg-green-50 rounded-lg p-3"><div class="text-2xl mb-1">🟢</div><p class="font-bold text-green-600">低GI ≤55</p><p class="text-xs text-gray-400">升糖慢</p></div>
                <div class="bg-yellow-50 rounded-lg p-3"><div class="text-2xl mb-1">🟡</div><p class="font-bold text-yellow-600">中GI 56-69</p><p class="text-xs text-gray-400">适中</p></div>
                <div class="bg-red-50 rounded-lg p-3"><div class="text-2xl mb-1">🔴</div><p class="font-bold text-red-600">高GI ≥70</p><p class="text-xs text-gray-400">升糖快</p></div>
            </div>
            <input type="text" id="search" placeholder="🔍 搜索食物..." class="w-full p-3 bg-gray-50 rounded-xl border outline-none mb-4" oninput="filter()">
            <div class="space-y-2 max-h-96 overflow-y-auto" id="list"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>搜索食物名称查看GI值。</li><li>绿色表示低GI，推荐选择。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">GI值有什么用？</div><div class="text-gray-500 text-sm">低GI食物升糖慢，适合糖尿病患者和减脂人群。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const foods = [
            {name:'白米饭',gi:83},{name:'糙米',gi:56},{name:'燕麦',gi:55},{name:'全麦面包',gi:51},{name:'白面包',gi:75},
            {name:'意大利面',gi:49},{name:'红薯',gi:61},{name:'土豆(煮)',gi:78},{name:'玉米',gi:52},{name:'小米粥',gi:71},
            {name:'苹果',gi:36},{name:'香蕉',gi:52},{name:'橙子',gi:43},{name:'西瓜',gi:72},{name:'葡萄',gi:46},
            {name:'草莓',gi:40},{name:'芒果',gi:51},{name:'猕猴桃',gi:53},{name:'樱桃',gi:22},{name:'菠萝',gi:59},
            {name:'牛奶',gi:27},{name:'酸奶',gi:36},{name:'豆腐',gi:15},{name:'鸡蛋',gi:0},{name:'鸡胸肉',gi:0},
            {name:'牛肉',gi:0},{name:'鱼肉',gi:0},{name:'花生',gi:14},{name:'核桃',gi:15},{name:'巧克力',gi:40},
            {name:'蜂蜜',gi:61},{name:'白砂糖',gi:68},{name:'可乐',gi:63},{name:'胡萝卜',gi:71},{name:'南瓜',gi:75},
            {name:'黄瓜',gi:23},{name:'西兰花',gi:15},{name:'番茄',gi:30},{name:'绿叶蔬菜',gi:15},{name:'豆浆',gi:25},
        ];

        function getLevel(gi) {
            if (gi <= 55) return {label:'低GI',color:'text-green-600',bg:'bg-green-50',dot:'🟢'};
            if (gi <= 69) return {label:'中GI',color:'text-yellow-600',bg:'bg-yellow-50',dot:'🟡'};
            return {label:'高GI',color:'text-red-600',bg:'bg-red-50',dot:'🔴'};
        }

        function filter() {
            const q = document.getElementById('search').value.trim().toLowerCase();
            const filtered = foods.filter(f => !q || f.name.includes(q)).sort((a,b) => a.gi - b.gi);
            let html = '';
            filtered.forEach(f => {
                const l = getLevel(f.gi);
                html += `<div class="flex items-center gap-3 p-3 ${l.bg} rounded-xl">
                    <span>${l.dot}</span>
                    <span class="font-bold text-gray-700 flex-1">${f.name}</span>
                    <span class="text-xl font-black ${l.color}">${f.gi}</span>
                    <span class="text-xs ${l.color}">${l.label}</span>
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
        }
        filter();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
