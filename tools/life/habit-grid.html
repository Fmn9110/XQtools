<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>习惯打卡网格 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">✅ 每日习惯打卡</h1>
            <p class="text-gray-500">像GitHub贡献图一样可视化你的每日坚持</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="flex gap-3 mb-6">
                <input type="text" id="habitName" placeholder="添加新习惯..." class="flex-1 p-3 bg-gray-50 rounded-xl border border-pink-100 outline-none" onkeydown="if(event.key==='Enter')addHabit()">
                <button onclick="addHabit()" class="px-6 py-3 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl">添加</button>
            </div>
            <div id="habits" class="space-y-6"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>添加你想培养的习惯。</li><li>每天点击格子进行打卡。</li><li>绿色越深表示连续坚持。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">数据保存在哪？</div><div class="text-gray-500 text-sm">LocalStorage本地存储，清除浏览器数据会丢失。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const KEY = 'xq_habit_grid';
        function getData() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
        function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

        function getDateStr(offset) {
            const d = new Date();
            d.setDate(d.getDate() + offset);
            return d.toISOString().slice(0, 10);
        }

        function addHabit() {
            const name = document.getElementById('habitName').value.trim();
            if (!name) return;
            const data = getData();
            data.push({ name, checks: {} });
            saveData(data);
            document.getElementById('habitName').value = '';
            render();
        }

        function toggleDay(habitIdx, dateStr) {
            const data = getData();
            if (data[habitIdx].checks[dateStr]) {
                delete data[habitIdx].checks[dateStr];
            } else {
                data[habitIdx].checks[dateStr] = true;
            }
            saveData(data);
            render();
        }

        function removeHabit(idx) {
            if (!confirm('确定删除这个习惯？')) return;
            const data = getData();
            data.splice(idx, 1);
            saveData(data);
            render();
        }

        function render() {
            const data = getData();
            const DAYS = 30; // 显示最近30天

            let html = '';
            data.forEach((habit, hi) => {
                const checkedCount = Object.keys(habit.checks).length;
                html += `<div class="bg-gray-50 rounded-2xl p-4">
                    <div class="flex items-center justify-between mb-3">
                        <span class="font-bold text-gray-700">${habit.name}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-400">${checkedCount}天</span>
                            <button onclick="removeHabit(${hi})" class="text-gray-300 hover:text-red-400 text-xs">删除</button>
                        </div>
                    </div>
                    <div class="grid gap-1" style="grid-template-columns: repeat(${Math.min(DAYS, 15)}, 1fr)">`;

                for (let d = DAYS - 1; d >= 0; d--) {
                    const dateStr = getDateStr(-d);
                    const checked = habit.checks[dateStr];
                    const dayNum = new Date(dateStr).getDate();
                    const isToday = d === 0;
                    html += `<div onclick="toggleDay(${hi},'${dateStr}')" title="${dateStr}" class="aspect-square rounded cursor-pointer flex items-center justify-center text-[9px] font-bold transition-all hover:scale-110
                        ${checked ? 'bg-green-400 text-white' : isToday ? 'bg-pink-100 text-pink-400 ring-2 ring-pink-300' : 'bg-gray-200 text-gray-400'}">${dayNum}</div>`;
                }

                html += `</div></div>`;
            });

            document.getElementById('habits').innerHTML = html || '<p class="text-center text-gray-400 py-8">还没有习惯，添加一个开始坚持吧 💪</p>';
        }
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
