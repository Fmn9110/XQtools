<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>饮酒酒精代谢时间估算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🍺 酒精代谢时间估算</h1>
            <p class="text-gray-500">酒后多久才能开车？估算你的酒精代谢所需时间</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">体重 (kg)</label><input type="number" id="weight" value="70" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">性别</label><select id="gender" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"><option value="male">男性</option><option value="female">女性</option></select></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">饮酒量 (ml)</label><input type="number" id="volume" value="500" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">酒精度数 (%)</label><select id="abv" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"><option value="4">啤酒 4%</option><option value="12">红酒 12%</option><option value="38">白酒(低度) 38%</option><option value="52">白酒(高度) 52%</option></select></div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl text-lg">⏰ 开始计算</button>
            <div id="result" class="hidden mt-8 text-center">
                <div class="bg-gradient-to-r from-orange-100 to-red-100 rounded-3xl p-8 mb-4">
                    <p class="text-gray-500 text-sm">预估需要</p>
                    <p class="text-6xl font-black text-orange-500 my-2" id="rHours">0</p>
                    <p class="text-gray-400" id="rLabel">小时后可以开车</p>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-orange-50 rounded-xl p-4"><p class="text-xl font-bold text-orange-500" id="rAlcohol">0</p><p class="text-xs text-gray-400">摄入酒精(g)</p></div>
                    <div class="bg-red-50 rounded-xl p-4"><p class="text-xl font-bold text-red-500" id="rBAC">0</p><p class="text-xs text-gray-400">血液酒精浓度(‰)</p></div>
                    <div class="bg-blue-50 rounded-xl p-4"><p class="text-xl font-bold text-blue-500" id="rSafe">-</p><p class="text-xs text-gray-400">预计安全时间</p></div>
                </div>
                <div class="mt-4 bg-red-50 rounded-xl p-4 text-sm text-red-600 text-left">⚠️ 仅供参考！个体差异很大，代谢速度受年龄、肝脏功能、是否空腹等因素影响。<strong>醉酒状态绝对不能驾车！</strong></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入体重、性别和饮酒量。</li><li>选择酒精度数。</li><li>查看代谢所需时间。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">法律标准？</div><div class="text-gray-500 text-sm">中国法规：血液酒精&ge;20mg/100ml为饮酒驾车，&ge;80mg/100ml为醉酒驾车。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const weight = parseFloat(document.getElementById('weight').value);
            const gender = document.getElementById('gender').value;
            const volume = parseFloat(document.getElementById('volume').value);
            const abv = parseFloat(document.getElementById('abv').value);

            // 酒精密度0.789 g/ml
            const alcoholGrams = volume * (abv / 100) * 0.789;
            // Widmark公式: BAC = A / (r × W) - β × t
            // r: 男0.68, 女0.55; β: 代谢率约0.15‰/h
            const r = gender === 'male' ? 0.68 : 0.55;
            const bac = (alcoholGrams / (r * weight * 1000)) * 1000; // ‰
            const metaRate = 0.15; // ‰/小时
            const hoursToSafe = bac / metaRate;

            const now = new Date();
            const safeTime = new Date(now.getTime() + hoursToSafe * 3600 * 1000);
            const safeStr = `${safeTime.getMonth()+1}/${safeTime.getDate()} ${String(safeTime.getHours()).padStart(2,'0')}:${String(safeTime.getMinutes()).padStart(2,'0')}`;

            document.getElementById('rHours').textContent = hoursToSafe.toFixed(1);
            document.getElementById('rAlcohol').textContent = alcoholGrams.toFixed(1) + 'g';
            document.getElementById('rBAC').textContent = bac.toFixed(2);
            document.getElementById('rSafe').textContent = safeStr;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
