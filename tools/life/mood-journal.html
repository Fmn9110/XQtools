<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心情日志 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">😊 心情日志</h1>
            <p class="text-gray-500">每天记录心情，回顾你的情绪变化</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="text-center mb-6">
                <p class="text-sm text-gray-400 mb-3">今天你的心情是？</p>
                <div class="flex justify-center gap-3" id="moodBtns">
                    <button onclick="selectMood(this,'😄','很开心')" class="mood-btn text-4xl p-3 rounded-2xl hover:bg-green-50 transition-colors">😄</button>
                    <button onclick="selectMood(this,'😊','不错')" class="mood-btn text-4xl p-3 rounded-2xl hover:bg-blue-50 transition-colors">😊</button>
                    <button onclick="selectMood(this,'😐','一般')" class="mood-btn text-4xl p-3 rounded-2xl hover:bg-yellow-50 transition-colors">😐</button>
                    <button onclick="selectMood(this,'😔','不太好')" class="mood-btn text-4xl p-3 rounded-2xl hover:bg-orange-50 transition-colors">😔</button>
                    <button onclick="selectMood(this,'😢','难过')" class="mood-btn text-4xl p-3 rounded-2xl hover:bg-red-50 transition-colors">😢</button>
                </div>
            </div>
            <textarea id="note" rows="3" class="w-full p-4 bg-gray-50 rounded-xl border outline-none mb-3 text-sm" placeholder="可以写下原因或想法（可选）"></textarea>
            <button onclick="save()" class="w-full py-3 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl">✏️ 记录心情</button>
            <div class="mt-6">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-bold text-gray-500">历史记录</h3>
                    <button onclick="clearAll()" class="text-xs text-gray-400 hover:text-red-400 theme-secondary-btn">清空</button>
                </div>
                <div class="space-y-2 max-h-80 overflow-y-auto" id="list"></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择今天的心情表情。</li><li>可选写下原因或想法。</li><li>保存后可回顾历史。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">数据存在哪里？</div><div class="text-gray-500 text-sm">存储在浏览器本地(LocalStorage)，不会上传到任何服务器。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const KEY = 'xq_mood_journal';
        let selectedMood = '';
        let selectedLabel = '';

        function selectMood(btn, emoji, label) {
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('bg-pink-100','ring-2','ring-pink-400'));
            btn.classList.add('bg-pink-100','ring-2','ring-pink-400');
            selectedMood = emoji; selectedLabel = label;
        }

        function save() {
            if (!selectedMood) { alert('请选择心情'); return; }
            const note = document.getElementById('note').value.trim();
            const list = JSON.parse(localStorage.getItem(KEY) || '[]');
            list.unshift({ mood: selectedMood, label: selectedLabel, note, date: new Date().toISOString() });
            localStorage.setItem(KEY, JSON.stringify(list.slice(0, 100)));
            document.getElementById('note').value = '';
            render();
        }

        function clearAll() { if (confirm('确定清空所有记录？')) { localStorage.removeItem(KEY); render(); } }

        function render() {
            const list = JSON.parse(localStorage.getItem(KEY) || '[]');
            let html = '';
            list.forEach(r => {
                const d = new Date(r.date);
                const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                html += `<div class="flex items-start gap-3 p-3 bg-gray-50 rounded-xl">
                    <span class="text-2xl">${r.mood}</span>
                    <div class="flex-1"><p class="text-sm font-bold text-gray-600">${r.label} <span class="text-gray-300 font-normal text-xs">${dateStr}</span></p>
                    ${r.note ? `<p class="text-gray-500 text-sm mt-1">${r.note}</p>` : ''}</div>
                </div>`;
            });
            document.getElementById('list').innerHTML = html || '<p class="text-center text-gray-400 text-sm py-4">还没有记录</p>';
        }
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
