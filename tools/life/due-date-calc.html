<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>预产期计算器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🤰 预产期计算器</h1>
            <p class="text-gray-500">根据末次月经日期，使用奈格勒公式估算预产期</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="max-w-md mx-auto mb-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">末次月经第一天</label>
                <input type="date" id="lmp" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
            </div>
            <button onclick="calc()" class="w-full max-w-md mx-auto block py-4 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl text-lg">🍼 计算预产期</button>
            <div id="result" class="hidden mt-8 text-center">
                <div class="bg-gradient-to-r from-pink-100 to-purple-100 rounded-3xl p-8 mb-6">
                    <p class="text-gray-500 text-sm">预估预产期</p>
                    <p class="text-5xl font-black text-pink-500 my-3" id="edd"></p>
                    <p class="text-gray-400 text-sm" id="eddWeekday"></p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-pink-50 rounded-xl p-4"><p class="text-2xl font-bold text-pink-500" id="rWeeks">0</p><p class="text-xs text-gray-400">当前孕周</p></div>
                    <div class="bg-purple-50 rounded-xl p-4"><p class="text-2xl font-bold text-purple-500" id="rDaysLeft">0</p><p class="text-xs text-gray-400">剩余天数</p></div>
                    <div class="bg-blue-50 rounded-xl p-4"><p class="text-2xl font-bold text-blue-500" id="rTrimester">-</p><p class="text-xs text-gray-400">当前孕期</p></div>
                    <div class="bg-green-50 rounded-xl p-4"><p class="text-2xl font-bold text-green-500" id="rProgress">0%</p><p class="text-xs text-gray-400">进度</p></div>
                </div>
                <div class="mt-4 bg-gray-50 rounded-xl p-3">
                    <div class="w-full bg-gray-200 rounded-full h-3"><div id="bar" class="bg-pink-500 h-3 rounded-full transition-all"></div></div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入末次月经(LMP)第一天日期。</li><li>查看预产期、当前孕周和孕期进度。</li><li>仅供参考，请以医生判断为准。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">什么是奈格勒公式？</div><div class="text-gray-500 text-sm">月份-3(或+9)，日期+7，是最广泛使用的预产期估算方法。实际孕期约280天(40周)。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
        function calc() {
            const lmpStr = document.getElementById('lmp').value;
            if (!lmpStr) { alert('请选择日期'); return; }
            const lmp = new Date(lmpStr);
            // 预产期 = LMP + 280天
            const edd = new Date(lmp);
            edd.setDate(edd.getDate() + 280);

            const now = new Date();
            const daysPassed = Math.floor((now - lmp) / (1000*60*60*24));
            const weeks = Math.floor(daysPassed / 7);
            const days = daysPassed % 7;
            const daysLeft = Math.max(0, 280 - daysPassed);
            const progress = Math.min(100, (daysPassed / 280) * 100);

            let trimester = '早期(1-12周)';
            if (weeks >= 28) trimester = '晚期(28-40周)';
            else if (weeks >= 13) trimester = '中期(13-27周)';

            document.getElementById('edd').textContent = `${edd.getFullYear()}年${edd.getMonth()+1}月${edd.getDate()}日`;
            document.getElementById('eddWeekday').textContent = weekdays[edd.getDay()];
            document.getElementById('rWeeks').textContent = `${weeks}周${days}天`;
            document.getElementById('rDaysLeft').textContent = daysLeft;
            document.getElementById('rTrimester').textContent = trimester;
            document.getElementById('rProgress').textContent = progress.toFixed(0) + '%';
            document.getElementById('bar').style.width = progress + '%';
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
