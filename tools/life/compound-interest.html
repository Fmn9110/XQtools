<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>复利计算器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📈 复利计算器</h1>
            <p class="text-gray-500">理解复利的力量，规划你的财富增长</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">初始本金 (元)</label>
                    <input type="number" id="principal" value="10000" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">年利率 (%)</label>
                    <input type="number" id="rate" value="5" step="0.1" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">投资年限 (年)</label>
                    <input type="number" id="years" value="10" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">每月追加投入 (元)</label>
                    <input type="number" id="monthly" value="1000" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl text-lg">💰 计算收益</button>

            <div id="result" class="hidden mt-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-green-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">最终金额</p>
                        <p class="text-xl font-black text-green-600" id="rTotal">0</p>
                    </div>
                    <div class="bg-blue-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">总投入</p>
                        <p class="text-xl font-black text-blue-600" id="rInvested">0</p>
                    </div>
                    <div class="bg-orange-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">利息收益</p>
                        <p class="text-xl font-black text-orange-600" id="rInterest">0</p>
                    </div>
                    <div class="bg-purple-50 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-400">收益率</p>
                        <p class="text-xl font-black text-purple-600" id="rRate">0%</p>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead><tr class="bg-gray-50"><th class="p-3 text-left rounded-tl-xl">年份</th><th class="p-3 text-right">年初余额</th><th class="p-3 text-right">年投入</th><th class="p-3 text-right">利息</th><th class="p-3 text-right rounded-tr-xl">年末余额</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 list-disc list-inside">
                        <li>输入初始本金和年利率。</li>
                        <li>设定投资年限和每月追加金额。</li>
                        <li>查看逐年资产增长明细。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">计算精确吗？</div>
                        <div class="text-gray-500 text-sm">采用月复利模型计算，结果为理论估算值。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const P = parseFloat(document.getElementById('principal').value);
            const annualRate = parseFloat(document.getElementById('rate').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const monthly = parseFloat(document.getElementById('monthly').value);
            const monthlyRate = annualRate / 12;

            let balance = P;
            let totalInvested = P;
            let html = '';

            for (let y = 1; y <= years; y++) {
                const startBalance = balance;
                let yearInterest = 0;
                for (let m = 0; m < 12; m++) {
                    const interest = balance * monthlyRate;
                    yearInterest += interest;
                    balance += interest + monthly;
                    totalInvested += monthly;
                }
                html += `<tr class="border-b border-gray-50 hover:bg-gray-50">
                    <td class="p-3">${y}</td>
                    <td class="p-3 text-right">${startBalance.toFixed(0)}</td>
                    <td class="p-3 text-right">${(monthly*12).toFixed(0)}</td>
                    <td class="p-3 text-right text-green-500">+${yearInterest.toFixed(0)}</td>
                    <td class="p-3 text-right font-bold">${balance.toFixed(0)}</td>
                </tr>`;
            }

            const interest = balance - totalInvested;
            document.getElementById('rTotal').textContent = '¥' + Math.round(balance).toLocaleString();
            document.getElementById('rInvested').textContent = '¥' + Math.round(totalInvested).toLocaleString();
            document.getElementById('rInterest').textContent = '¥' + Math.round(interest).toLocaleString();
            document.getElementById('rRate').textContent = ((interest / totalInvested) * 100).toFixed(1) + '%';
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
