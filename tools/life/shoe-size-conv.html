<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鞋码换算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">👟 鞋码中外换算</h1>
            <p class="text-gray-500">中国/欧洲/美国/英国/日本 鞋码对照速查</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="flex gap-3 mb-6 justify-center">
                <button onclick="showTable('men')" id="btnMen" class="px-6 py-3 rounded-xl font-bold bg-blue-500 text-white">男鞋</button>
                <button onclick="showTable('women')" id="btnWomen" class="px-6 py-3 rounded-xl font-bold bg-gray-100 text-gray-500">女鞋</button>
            </div>
            <div class="overflow-x-auto" id="tableContainer"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择男鞋或女鞋查看对照表。</li><li>找到你的中国码对应的各国尺码。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">品牌之间有差异？</div><div class="text-gray-500 text-sm">是的，建议以品牌官方尺码表为准，本表为通用参考。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const menData = [
            {cn:'38',eu:'38',us:'5.5',uk:'5',jp:'24',cm:'24'},
            {cn:'39',eu:'39',us:'6.5',uk:'6',jp:'24.5',cm:'24.5'},
            {cn:'40',eu:'40',us:'7',uk:'6.5',jp:'25',cm:'25'},
            {cn:'41',eu:'41',us:'8',uk:'7.5',jp:'25.5',cm:'25.5'},
            {cn:'42',eu:'42',us:'8.5',uk:'8',jp:'26',cm:'26'},
            {cn:'43',eu:'43',us:'9.5',uk:'9',jp:'27',cm:'27'},
            {cn:'44',eu:'44',us:'10',uk:'9.5',jp:'27.5',cm:'27.5'},
            {cn:'45',eu:'45',us:'11',uk:'10.5',jp:'28.5',cm:'28.5'},
            {cn:'46',eu:'46',us:'12',uk:'11',jp:'29',cm:'29'},
        ];
        const womenData = [
            {cn:'35',eu:'35',us:'5',uk:'2.5',jp:'22',cm:'22'},
            {cn:'36',eu:'36',us:'6',uk:'3.5',jp:'23',cm:'23'},
            {cn:'37',eu:'37',us:'6.5',uk:'4',jp:'23.5',cm:'23.5'},
            {cn:'38',eu:'38',us:'7.5',uk:'5',jp:'24',cm:'24'},
            {cn:'39',eu:'39',us:'8',uk:'5.5',jp:'24.5',cm:'24.5'},
            {cn:'40',eu:'40',us:'9',uk:'6.5',jp:'25.5',cm:'25.5'},
            {cn:'41',eu:'41',us:'9.5',uk:'7',jp:'26',cm:'26'},
        ];

        function showTable(type) {
            const data = type === 'men' ? menData : womenData;
            document.getElementById('btnMen').className = type === 'men' ? 'px-6 py-3 rounded-xl font-bold bg-blue-500 text-white' : 'px-6 py-3 rounded-xl font-bold bg-gray-100 text-gray-500';
            document.getElementById('btnWomen').className = type === 'women' ? 'px-6 py-3 rounded-xl font-bold bg-pink-500 text-white' : 'px-6 py-3 rounded-xl font-bold bg-gray-100 text-gray-500';

            let html = `<table class="w-full text-sm"><thead><tr class="bg-gray-50"><th class="p-3">中国</th><th class="p-3">欧洲EU</th><th class="p-3">美国US</th><th class="p-3">英国UK</th><th class="p-3">日本JP</th><th class="p-3">脚长cm</th></tr></thead><tbody>`;
            data.forEach(d => {
                html += `<tr class="border-b hover:bg-blue-50"><td class="p-3 text-center font-bold">${d.cn}</td><td class="p-3 text-center">${d.eu}</td><td class="p-3 text-center">${d.us}</td><td class="p-3 text-center">${d.uk}</td><td class="p-3 text-center">${d.jp}</td><td class="p-3 text-center">${d.cm}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }
        showTable('men');
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
