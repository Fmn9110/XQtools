<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝宝喂奶量计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🍼 宝宝喂奶量计算</h1>
            <p class="text-gray-500">根据宝宝月龄和体重，计算每日参考喂奶量</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">宝宝月龄</label><select id="age" class="w-full p-3 bg-gray-50 rounded-xl border outline-none" onchange="calc()"><option value="0">新生儿(0-1个月)</option><option value="1">1-2个月</option><option value="3">3-4个月</option><option value="5">5-6个月</option><option value="7">7-9个月</option><option value="10">10-12个月</option></select></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">体重 (kg)</label><input type="number" id="weight" value="5" step="0.1" class="w-full p-3 bg-gray-50 rounded-xl border outline-none" oninput="calc()"></div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="result">
                <div class="bg-pink-50 rounded-2xl p-5 text-center"><p class="text-2xl font-bold text-pink-500" id="rDaily">0</p><p class="text-xs text-gray-400">每日总量(ml)</p></div>
                <div class="bg-blue-50 rounded-2xl p-5 text-center"><p class="text-2xl font-bold text-blue-500" id="rPerFeed">0</p><p class="text-xs text-gray-400">每次量(ml)</p></div>
                <div class="bg-green-50 rounded-2xl p-5 text-center"><p class="text-2xl font-bold text-green-500" id="rTimes">0</p><p class="text-xs text-gray-400">每日次数</p></div>
                <div class="bg-purple-50 rounded-2xl p-5 text-center"><p class="text-2xl font-bold text-purple-500" id="rInterval">0</p><p class="text-xs text-gray-400">间隔(小时)</p></div>
            </div>
            <div class="mt-6 bg-yellow-50 rounded-xl p-4 text-xs text-gray-500">⚠️ 以上数据仅供参考，实际喂养应根据宝宝需求和医生建议调整。每个宝宝都是独特的！</div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择宝宝月龄。</li><li>输入宝宝体重。</li><li>查看每日参考喂奶量。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">按需喂养还是按量？</div><div class="text-gray-500 text-sm">WHO建议按需喂养(尤其母乳)，本工具提供奶粉喂养参考量。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        // 参考数据：每kg体重的每日奶量(ml)和喂养次数
        const ageData = {
            '0': {mlPerKg: 120, times: 8, interval: 3},
            '1': {mlPerKg: 150, times: 7, interval: 3},
            '3': {mlPerKg: 150, times: 6, interval: 3.5},
            '5': {mlPerKg: 120, times: 5, interval: 4},
            '7': {mlPerKg: 100, times: 4, interval: 4},
            '10': {mlPerKg: 80, times: 3, interval: 5},
        };

        function calc() {
            const age = document.getElementById('age').value;
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const data = ageData[age];
            const daily = Math.round(weight * data.mlPerKg);
            const perFeed = Math.round(daily / data.times);

            document.getElementById('rDaily').textContent = daily;
            document.getElementById('rPerFeed').textContent = perFeed;
            document.getElementById('rTimes').textContent = data.times + '次';
            document.getElementById('rInterval').textContent = data.interval + 'h';
        }
        calc();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
