<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日星期几计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📅 生日星期几计算</h1>
            <p class="text-gray-500">输入你的出生日期，看看那天是星期几！</p>
        </header>

        <section class="cute-card p-8 mb-12 bg-white">
            <div class="max-w-md mx-auto">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">选择出生日期</label>
                <input type="date" id="birthDate" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 focus:border-pink-400 outline-none mb-6">
                <button onclick="calc()" class="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl transition-colors text-lg">✨ 查询星期几</button>
            </div>

            <div id="result" class="hidden mt-8 text-center">
                <div class="bg-gradient-to-r from-pink-50 to-purple-50 rounded-3xl p-10">
                    <p class="text-gray-500 mb-2">你出生在</p>
                    <p class="text-6xl font-black text-pink-500 mb-2" id="weekday"></p>
                    <p class="text-gray-400 text-sm" id="fullDate"></p>
                    <div class="mt-6 grid grid-cols-7 gap-2" id="weekGrid"></div>
                </div>
                <div class="mt-6 bg-yellow-50 rounded-2xl p-4 text-sm text-gray-600">
                    <p id="funFact"></p>
                </div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 list-disc list-inside">
                        <li>选择你的出生日期。</li>
                        <li>点击"查询星期几"按钮。</li>
                        <li>查看结果和趣味信息。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">支持范围？</div>
                        <div class="text-gray-500 text-sm">支持任何有效日期的查询。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const weekNames = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
        const weekEmoji = ['🌞','🌙','🔥','💧','🌲','💰','🪐'];
        const funFacts = [
            '星期日出生的人性格热情开朗，像阳光一样温暖！☀️',
            '星期一出生的人感性细腻，富有想象力！🌛',
            '星期二出生的人充满活力，行动力超强！🔥',
            '星期三出生的人聪明伶俐，善于沟通！💬',
            '星期四出生的人慷慨大方，心胸宽广！🌳',
            '星期五出生的人热爱美好事物，审美出众！💎',
            '星期六出生的人沉稳内敛，喜欢思考！🪐'
        ];

        function calc() {
            const val = document.getElementById('birthDate').value;
            if (!val) { alert('请选择日期'); return; }
            const d = new Date(val);
            const day = d.getDay();

            document.getElementById('weekday').textContent = weekNames[day];
            document.getElementById('fullDate').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
            document.getElementById('funFact').textContent = '💡 ' + funFacts[day];

            // 绘制周视图高亮
            let grid = '';
            weekNames.forEach((n, i) => {
                const active = i === day;
                grid += `<div class="p-3 rounded-xl text-center text-xs font-bold ${active ? 'bg-pink-500 text-white scale-110 shadow-lg' : 'bg-white text-gray-400'} transition-all">
                    <div class="text-lg">${weekEmoji[i]}</div>${n.slice(2)}</div>`;
            });
            document.getElementById('weekGrid').innerHTML = grid;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
