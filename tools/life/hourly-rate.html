<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工资时薪折算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">💰 工资时薪折算</h1>
            <p class="text-gray-500">把固定月薪量化为时薪、分钟薪，看看你的时间值多少</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">月薪 (元)</label>
                    <input type="number" id="salary" value="8000" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">每月工作天数</label>
                    <input type="number" id="workDays" value="22" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">每天工作小时</label>
                    <input type="number" id="workHours" value="8" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl text-lg">🧮 开始折算</button>
            <div id="result" class="hidden mt-8 grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-green-50 rounded-2xl p-6 text-center">
                    <p class="text-3xl font-black text-green-500" id="rYear">0</p>
                    <p class="text-xs text-gray-400 mt-1">年薪</p>
                </div>
                <div class="bg-blue-50 rounded-2xl p-6 text-center">
                    <p class="text-3xl font-black text-blue-500" id="rDay">0</p>
                    <p class="text-xs text-gray-400 mt-1">日薪</p>
                </div>
                <div class="bg-purple-50 rounded-2xl p-6 text-center">
                    <p class="text-3xl font-black text-purple-500" id="rHour">0</p>
                    <p class="text-xs text-gray-400 mt-1">时薪</p>
                </div>
                <div class="bg-pink-50 rounded-2xl p-6 text-center">
                    <p class="text-3xl font-black text-pink-500" id="rMin">0</p>
                    <p class="text-xs text-gray-400 mt-1">分钟薪</p>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入月薪、月工作天数、日工作小时。</li><li>点击计算查看各维度薪资拆分。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">加班怎么算？</div><div class="text-gray-500 text-sm">本工具仅折算基本工资，加班费需额外计算。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const salary = parseFloat(document.getElementById('salary').value);
            const days = parseFloat(document.getElementById('workDays').value);
            const hours = parseFloat(document.getElementById('workHours').value);
            const daily = salary / days;
            const hourly = daily / hours;
            const perMin = hourly / 60;
            document.getElementById('rYear').textContent = '¥' + (salary * 12).toLocaleString();
            document.getElementById('rDay').textContent = '¥' + daily.toFixed(1);
            document.getElementById('rHour').textContent = '¥' + hourly.toFixed(2);
            document.getElementById('rMin').textContent = '¥' + perMin.toFixed(2);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
