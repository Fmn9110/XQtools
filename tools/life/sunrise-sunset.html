<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🌅 日出日落估算</h1>
            <p class="text-gray-500">根据城市和日期估算日出日落时间和日照时长</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">城市</label><select id="city" class="w-full p-3 bg-gray-50 rounded-xl border outline-none" onchange="calc()"><option value="39.9">北京 (39.9°N)</option><option value="31.2">上海 (31.2°N)</option><option value="23.1">广州 (23.1°N)</option><option value="30.6">成都 (30.6°N)</option><option value="29.6">重庆 (29.6°N)</option><option value="45.8">哈尔滨 (45.8°N)</option><option value="18.3">三亚 (18.3°N)</option><option value="43.8">乌鲁木齐 (43.8°N)</option></select></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">日期</label><input type="date" id="date" class="w-full p-3 bg-gray-50 rounded-xl border outline-none" onchange="calc()"></div>
            </div>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-gradient-to-b from-orange-100 to-yellow-100 rounded-2xl p-6"><p class="text-3xl mb-1">🌅</p><p class="text-2xl font-black text-orange-500" id="rSunrise">-</p><p class="text-xs text-gray-400">日出</p></div>
                <div class="bg-gradient-to-b from-blue-100 to-cyan-100 rounded-2xl p-6"><p class="text-3xl mb-1">☀️</p><p class="text-2xl font-black text-blue-500" id="rDayLen">-</p><p class="text-xs text-gray-400">日照时长</p></div>
                <div class="bg-gradient-to-b from-purple-100 to-pink-100 rounded-2xl p-6"><p class="text-3xl mb-1">🌇</p><p class="text-2xl font-black text-purple-500" id="rSunset">-</p><p class="text-xs text-gray-400">日落</p></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择城市和日期。</li><li>查看估算的日出日落时间。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">精确度如何？</div><div class="text-gray-500 text-sm">使用简化天文公式，误差约±5分钟。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        document.getElementById('date').value = new Date().toISOString().slice(0, 10);

        function calc() {
            const lat = parseFloat(document.getElementById('city').value);
            const dateStr = document.getElementById('date').value;
            if (!dateStr) return;
            const date = new Date(dateStr);
            // 一年中的第几天
            const start = new Date(date.getFullYear(), 0, 0);
            const dayOfYear = Math.floor((date - start) / 86400000);

            // 简化日出日落计算(基于纬度和日期)
            const decl = 23.45 * Math.sin((2 * Math.PI / 365) * (dayOfYear - 81));
            const latRad = lat * Math.PI / 180;
            const declRad = decl * Math.PI / 180;
            const cosHA = -Math.tan(latRad) * Math.tan(declRad);
            const clampedCos = Math.max(-1, Math.min(1, cosHA));
            const HA = Math.acos(clampedCos) * 180 / Math.PI;
            const dayLenHours = 2 * HA / 15;
            const solarNoon = 12; // 简化假设正午12点
            const sunriseHour = solarNoon - dayLenHours / 2;
            const sunsetHour = solarNoon + dayLenHours / 2;

            function formatTime(h) {
                const hours = Math.floor(h);
                const mins = Math.round((h - hours) * 60);
                return `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
            }
            const dayLenH = Math.floor(dayLenHours);
            const dayLenM = Math.round((dayLenHours - dayLenH) * 60);

            document.getElementById('rSunrise').textContent = formatTime(sunriseHour);
            document.getElementById('rSunset').textContent = formatTime(sunsetHour);
            document.getElementById('rDayLen').textContent = `${dayLenH}h${dayLenM}m`;
        }
        calc();
    </script>
