<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生肖属相查询 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🐉 生肖属相查询</h1>
            <p class="text-gray-500">输入出生年份，查看你的生肖和性格描述</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="max-w-md mx-auto mb-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">出生年份</label>
                <input type="number" id="year" value="2000" min="1900" max="2100" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none text-center text-xl" oninput="calc()">
            </div>
            <div class="grid grid-cols-4 md:grid-cols-6 gap-2 mb-6" id="zodiacGrid"></div>
            <div id="result" class="hidden text-center">
                <div class="bg-gradient-to-br from-red-100 to-yellow-100 rounded-3xl p-8">
                    <p class="text-6xl mb-2" id="rEmoji"></p>
                    <p class="text-3xl font-black text-red-600 mb-2" id="rName"></p>
                    <p class="text-gray-600 text-sm" id="rDesc"></p>
                    <div class="grid grid-cols-2 gap-3 mt-4 max-w-sm mx-auto text-sm">
                        <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400">五行</span><p class="font-bold" id="rElement"></p></div>
                        <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400">最佳搭档</span><p class="font-bold" id="rMatch"></p></div>
                    </div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入出生年份查看生肖。</li><li>也可以直接点击生肖查看描述。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">农历还是公历？</div><div class="text-gray-500 text-sm">严格来说应按农历，1-2月出生者可能需要参考农历年份。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const zodiacs = [
            {name:'鼠',emoji:'🐭',desc:'聪明伶俐、反应灵敏、善于理财，有敏锐的洞察力。',match:'龙、猴、牛',element:'水'},
            {name:'牛',emoji:'🐮',desc:'勤劳踏实、忍耐力强、有责任感，是可靠的伙伴。',match:'鼠、蛇、鸡',element:'土'},
            {name:'虎',emoji:'🐯',desc:'勇猛果敢、自信大方、有领导力，天生的王者。',match:'马、狗、猪',element:'木'},
            {name:'兔',emoji:'🐰',desc:'温柔善良、心思细腻、有艺术天赋，人缘极好。',match:'羊、猪、狗',element:'木'},
            {name:'龙',emoji:'🐲',desc:'自信霸气、精力充沛、志向远大，有贵人相助。',match:'鸡、鼠、猴',element:'土'},
            {name:'蛇',emoji:'🐍',desc:'智慧深沉、洞察敏锐、优雅神秘，有哲学家气质。',match:'牛、鸡',element:'火'},
            {name:'马',emoji:'🐴',desc:'热情奔放、自由不羁、行动力强，追求诗和远方。',match:'虎、羊、狗',element:'火'},
            {name:'羊',emoji:'🐑',desc:'温和善良、富有同情心、有艺术感觉，是美好的存在。',match:'兔、马、猪',element:'土'},
            {name:'猴',emoji:'🐵',desc:'聪慧机敏、幽默风趣、多才多艺，社交小天才。',match:'龙、鼠',element:'金'},
            {name:'鸡',emoji:'🐔',desc:'勤奋努力、观察力强、直言不讳，做事精益求精。',match:'牛、龙、蛇',element:'金'},
            {name:'狗',emoji:'🐕',desc:'忠诚正义、诚实可靠、有责任心，是最好的朋友。',match:'虎、兔、马',element:'土'},
            {name:'猪',emoji:'🐷',desc:'善良耿直、宽容大度、有福气、乐天知命。',match:'虎、兔、羊',element:'水'},
        ];

        let gridHtml = '';
        zodiacs.forEach((z, i) => {
            gridHtml += `<button onclick="showZodiac(${i})" class="p-3 bg-red-50 hover:bg-red-100 rounded-xl text-center transition-colors"><span class="text-2xl">${z.emoji}</span><p class="text-xs font-bold text-gray-600">${z.name}</p></button>`;
        });
        document.getElementById('zodiacGrid').innerHTML = gridHtml;

        function showZodiac(idx) {
            const z = zodiacs[idx];
            document.getElementById('rEmoji').textContent = z.emoji;
            document.getElementById('rName').textContent = '属' + z.name;
            document.getElementById('rDesc').textContent = z.desc;
            document.getElementById('rElement').textContent = z.element;
            document.getElementById('rMatch').textContent = z.match;
            document.getElementById('result').classList.remove('hidden');
        }

        function calc() {
            const year = parseInt(document.getElementById('year').value);
            if (year < 1900 || year > 2100) return;
            const idx = (year - 4) % 12; // 公元4年为鼠年
            const adjustedIdx = idx < 0 ? idx + 12 : idx;
            showZodiac(adjustedIdx);
        }
        calc();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
