<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生体验时间可视化 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">⏳ 人生体验时间可视化</h1>
            <p class="text-gray-500">用圆点可视化你的一生：已度过的和剩余的</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-2 gap-4 mb-6 max-w-md mx-auto">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">出生日期</label><input type="date" id="birth" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">预期寿命</label><input type="number" id="lifespan" value="80" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
            </div>
            <button onclick="visualize()" class="w-full max-w-md mx-auto block py-4 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-xl text-lg">🎨 生成人生地图</button>
            <div id="result" class="hidden mt-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 text-center">
                    <div class="bg-indigo-50 rounded-xl p-4"><p class="text-2xl font-black text-indigo-500" id="rYears">0</p><p class="text-xs text-gray-400">已活年数</p></div>
                    <div class="bg-purple-50 rounded-xl p-4"><p class="text-2xl font-black text-purple-500" id="rWeeks">0</p><p class="text-xs text-gray-400">已过周数</p></div>
                    <div class="bg-pink-50 rounded-xl p-4"><p class="text-2xl font-black text-pink-500" id="rLeft">0</p><p class="text-xs text-gray-400">剩余周数</p></div>
                    <div class="bg-green-50 rounded-xl p-4"><p class="text-2xl font-black text-green-500" id="rPct">0%</p><p class="text-xs text-gray-400">剩余比例</p></div>
                </div>
                <div class="mb-3 text-sm text-gray-500 text-center">每个方块 = 1周 · <span class="inline-block w-3 h-3 bg-indigo-400 rounded-sm"></span> 已过 · <span class="inline-block w-3 h-3 bg-gray-200 rounded-sm"></span> 剩余</div>
                <div class="flex flex-wrap gap-[2px] justify-center" id="grid"></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入出生日期和预期寿命。</li><li>每个色块代表一周时间。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">想表达什么？</div><div class="text-gray-500 text-sm">人生有限，每一周都值得珍惜。把时间花在重要的事上。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        document.getElementById('birth').value = '1995-01-01';

        function visualize() {
            const birth = new Date(document.getElementById('birth').value);
            const lifespan = parseInt(document.getElementById('lifespan').value) || 80;
            if (!birth || isNaN(birth.getTime())) { alert('请输入有效日期'); return; }

            const now = new Date();
            const totalWeeks = lifespan * 52;
            const livedMs = now - birth;
            const livedWeeks = Math.floor(livedMs / (7 * 24 * 60 * 60 * 1000));
            const leftWeeks = Math.max(0, totalWeeks - livedWeeks);
            const livedYears = (livedMs / (365.25 * 24 * 60 * 60 * 1000)).toFixed(1);

            document.getElementById('rYears').textContent = livedYears;
            document.getElementById('rWeeks').textContent = livedWeeks.toLocaleString();
            document.getElementById('rLeft').textContent = leftWeeks.toLocaleString();
            document.getElementById('rPct').textContent = (leftWeeks / totalWeeks * 100).toFixed(1) + '%';

            let gridHtml = '';
            for (let i = 0; i < totalWeeks; i++) {
                const isLived = i < livedWeeks;
                gridHtml += `<div class="w-[5px] h-[5px] rounded-[1px] ${isLived ? 'bg-indigo-400' : 'bg-gray-200'}"></div>`;
            }
            document.getElementById('grid').innerHTML = gridHtml;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
