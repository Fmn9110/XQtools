<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>衣物洗涤标识查询 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">👔 衣物洗涤标识查询</h1>
            <p class="text-gray-500">看不懂衣服标签上的洗涤图标？这里全部告诉你</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="flex gap-2 mb-4 flex-wrap justify-center" id="catBtns"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="list"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>按分类浏览洗涤标识。</li><li>对照衣服标签查看含义。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">国际标准统一吗？</div><div class="text-gray-500 text-sm">全球使用ISO/GINETEX标准，图标基本统一。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const symbols = [
            // 水洗
            {cat:'水洗',icon:'🫧',name:'可机洗',desc:'可以用洗衣机正常洗涤'},
            {cat:'水洗',icon:'🤲',name:'手洗',desc:'建议手洗，水温不超过40°C'},
            {cat:'水洗',icon:'🚫',name:'不可水洗',desc:'标签上画X表示不能水洗'},
            {cat:'水洗',icon:'30°',name:'30°C水洗',desc:'水温不应超过30°C'},
            {cat:'水洗',icon:'40°',name:'40°C水洗',desc:'水温不应超过40°C'},
            {cat:'水洗',icon:'60°',name:'60°C水洗',desc:'水温不应超过60°C'},
            {cat:'水洗',icon:'〰️',name:'轻柔洗涤',desc:'盆下一横线表示轻柔程序'},
            // 漂白
            {cat:'漂白',icon:'△',name:'可漂白',desc:'三角形表示允许漂白'},
            {cat:'漂白',icon:'△/',name:'仅氧漂',desc:'三角形斜线表示只能用含氧漂白剂'},
            {cat:'漂白',icon:'△✕',name:'不可漂白',desc:'三角形打X表示不能漂白'},
            // 干燥
            {cat:'干燥',icon:'□',name:'可烘干',desc:'正方形表示可以烘干'},
            {cat:'干燥',icon:'□•',name:'低温烘干',desc:'正方形中一点表示低温烘干'},
            {cat:'干燥',icon:'□••',name:'正常烘干',desc:'正方形中两点表示正常温度烘干'},
            {cat:'干燥',icon:'□✕',name:'不可烘干',desc:'正方形打X表示不能烘干'},
            {cat:'干燥',icon:'||',name:'悬挂晾干',desc:'垂直线表示挂起来晾干'},
            {cat:'干燥',icon:'—',name:'平铺晾干',desc:'水平线表示平铺晾干，防变形'},
            // 熨烫
            {cat:'熨烫',icon:'🔥',name:'可熨烫',desc:'熨斗图标表示可以熨烫'},
            {cat:'熨烫',icon:'•',name:'低温熨烫',desc:'一点=110°C，适合丝绸、尼龙'},
            {cat:'熨烫',icon:'••',name:'中温熨烫',desc:'两点=150°C，适合羊毛、涤纶'},
            {cat:'熨烫',icon:'•••',name:'高温熨烫',desc:'三点=200°C，适合棉、麻'},
            {cat:'熨烫',icon:'✕',name:'不可熨烫',desc:'熨斗打X表示不能熨烫'},
            // 干洗
            {cat:'干洗',icon:'○',name:'可干洗',desc:'圆圈表示可以干洗'},
            {cat:'干洗',icon:'P',name:'石油溶剂干洗',desc:'圆圈内P表示用石油类溶剂'},
            {cat:'干洗',icon:'F',name:'氟化碳干洗',desc:'圆圈内F表示用氟化碳溶剂'},
            {cat:'干洗',icon:'○✕',name:'不可干洗',desc:'圆圈打X表示不能干洗'},
        ];

        const categories = [...new Set(symbols.map(s => s.cat))];
        const catColors = {'水洗':'blue','漂白':'yellow','干燥':'green','熨烫':'orange','干洗':'purple'};
        let activeCat = '';

        let catHtml = '<button onclick="setCat(\'\')" class="px-4 py-2 rounded-full text-sm font-bold bg-pink-500 text-white" id="cat-all">全部</button>';
        categories.forEach(c => {
            catHtml += `<button onclick="setCat('${c}')" class="px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-500" id="cat-${c}">${c}</button>`;
        });
        document.getElementById('catBtns').innerHTML = catHtml;

        function setCat(cat) {
            activeCat = cat;
            document.querySelectorAll('#catBtns button').forEach(b => b.className = 'px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-500');
            (cat ? document.getElementById('cat-'+cat) : document.getElementById('cat-all')).className = 'px-4 py-2 rounded-full text-sm font-bold bg-pink-500 text-white';
            render();
        }

        function render() {
            const filtered = symbols.filter(s => !activeCat || s.cat === activeCat);
            let html = '';
            filtered.forEach(s => {
                const c = catColors[s.cat] || 'gray';
                html += `<div class="flex items-center gap-4 p-4 bg-${c}-50 rounded-xl border border-${c}-100">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-xl font-bold shadow-sm">${s.icon}</div>
                    <div class="flex-1"><p class="font-bold text-gray-700">${s.name}</p><p class="text-xs text-gray-500">${s.desc}</p></div>
                    <span class="text-xs px-2 py-1 bg-white rounded-lg text-gray-400">${s.cat}</span>
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
        }
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
