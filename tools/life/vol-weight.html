<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快递体积重计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📦 快递体积重计算</h1>
            <p class="text-gray-500">对比实际重量与体积重，预估运费按哪个收费</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">长 (cm)</label><input type="number" id="len" value="40" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">宽 (cm)</label><input type="number" id="wid" value="30" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">高 (cm)</label><input type="number" id="hei" value="20" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">实际重量 (kg)</label><input type="number" id="weight" value="2" step="0.1" class="w-full p-3 bg-gray-50 rounded-xl border outline-none"></div>
            </div>
            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-400 mb-2">快递类型</label>
                <select id="carrier" class="w-full p-3 bg-gray-50 rounded-xl border outline-none">
                    <option value="5000">国内快递 (÷5000)</option>
                    <option value="6000">国内物流 (÷6000)</option>
                    <option value="5000">国际快递 (÷5000)</option>
                    <option value="8000">海运 (÷8000)</option>
                </select>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-lg">📊 计算</button>
            <div id="result" class="hidden mt-8 grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-blue-50 rounded-2xl p-6 text-center"><p class="text-2xl font-black text-blue-500" id="rVol">0</p><p class="text-xs text-gray-400">体积重 (kg)</p></div>
                <div class="bg-green-50 rounded-2xl p-6 text-center"><p class="text-2xl font-black text-green-500" id="rActual">0</p><p class="text-xs text-gray-400">实际重 (kg)</p></div>
                <div class="bg-orange-50 rounded-2xl p-6 text-center"><p class="text-2xl font-black text-orange-500" id="rCharged">0</p><p class="text-xs text-gray-400">计费重量 (kg)</p></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入包裹的长/宽/高和实际重量。</li><li>选择快递类型。</li><li>取两者中较大值为计费重量。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">什么是体积重？</div><div class="text-gray-500 text-sm">体积重 = 长×宽×高 ÷ 系数。对于轻而大的包裹，按体积重计费。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const l = parseFloat(document.getElementById('len').value);
            const w = parseFloat(document.getElementById('wid').value);
            const h = parseFloat(document.getElementById('hei').value);
            const actual = parseFloat(document.getElementById('weight').value);
            const divisor = parseInt(document.getElementById('carrier').value);
            const volWeight = (l * w * h) / divisor;
            const charged = Math.max(volWeight, actual);
            document.getElementById('rVol').textContent = volWeight.toFixed(2);
            document.getElementById('rActual').textContent = actual.toFixed(2);
            document.getElementById('rCharged').textContent = charged.toFixed(2) + (charged === volWeight ? ' (体积重)' : ' (实际重)');
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
