<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡路里消耗计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🔥 卡路里消耗计算</h1>
            <p class="text-gray-500">选择运动类型和时长，估算你的热量消耗</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">体重 (kg)</label>
                    <input type="number" id="weight" value="65" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">运动类型</label>
                    <select id="exercise" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                        <option value="3.5">散步（慢速）</option>
                        <option value="5">快走</option>
                        <option value="7" selected>慢跑</option>
                        <option value="9.8">快跑</option>
                        <option value="12">冲刺跑</option>
                        <option value="6">骑自行车（中速）</option>
                        <option value="8">游泳（自由泳）</option>
                        <option value="10">跳绳</option>
                        <option value="5.5">瑜伽</option>
                        <option value="4">太极拳</option>
                        <option value="6.5">爬山</option>
                        <option value="8.5">篮球</option>
                        <option value="7">足球</option>
                        <option value="6">羽毛球</option>
                        <option value="7.5">网球</option>
                        <option value="3">拖地/打扫</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">运动时长 (分钟)</label>
                    <input type="number" id="duration" value="30" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl text-lg">🏃 计算卡路里消耗</button>

            <div id="result" class="hidden mt-8">
                <div class="bg-gradient-to-r from-orange-50 to-yellow-50 rounded-3xl p-8 text-center mb-6">
                    <p class="text-gray-500 text-sm">预计消耗</p>
                    <p class="text-6xl font-black text-orange-500 my-2" id="calories">0</p>
                    <p class="text-gray-400">千卡 (kcal)</p>
                </div>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="bg-gray-50 rounded-xl p-4">
                        <p class="text-xl font-bold text-gray-600" id="eqRice">0</p>
                        <p class="text-xs text-gray-400">碗米饭</p>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-4">
                        <p class="text-xl font-bold text-gray-600" id="eqApple">0</p>
                        <p class="text-xs text-gray-400">个苹果</p>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-4">
                        <p class="text-xl font-bold text-gray-600" id="eqCola">0</p>
                        <p class="text-xs text-gray-400">罐可乐</p>
                    </div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 list-disc list-inside">
                        <li>输入你的体重。</li>
                        <li>选择运动类型和运动时长。</li>
                        <li>查看预估卡路里消耗和食物等价量。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">计算准确吗？</div>
                        <div class="text-gray-500 text-sm">基于MET(代谢当量)标准估算，实际消耗因个体差异可能有所不同。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const weight = parseFloat(document.getElementById('weight').value);
            const met = parseFloat(document.getElementById('exercise').value);
            const duration = parseFloat(document.getElementById('duration').value);
            if (!weight || !duration) { alert('请填写完整信息'); return; }

            // 卡路里计算公式: MET × 体重(kg) × 时间(小时)
            const calories = met * weight * (duration / 60);

            document.getElementById('calories').textContent = Math.round(calories);
            document.getElementById('eqRice').textContent = (calories / 232).toFixed(1);
            document.getElementById('eqApple').textContent = (calories / 52).toFixed(1);
            document.getElementById('eqCola').textContent = (calories / 139).toFixed(1);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
