<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>应急包清单 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🎒 应急包清单</h1>
            <p class="text-gray-500">地震、台风、洪水...准备好应急物资，有备无患</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="flex gap-2 mb-4 flex-wrap" id="catBtns"></div>
            <div class="mb-4 flex justify-between items-center"><span class="text-sm text-gray-500">已准备 <strong id="done">0</strong>/<span id="total">0</span> 项</span><button onclick="clearChecks()" class="text-xs text-gray-400 hover:text-red-400 theme-secondary-btn">重置</button></div>
            <div class="w-full bg-gray-200 rounded-full h-2 mb-4"><div id="bar" class="bg-green-500 h-2 rounded-full transition-all"></div></div>
            <div class="space-y-2" id="list"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>按分类浏览应急物资清单。</li><li>勾选已准备好的物品。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">需要准备多少天？</div><div class="text-gray-500 text-sm">建议准备至少3天的物资，包括饮用水(1人/天3升)。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const items = [
            {name:'饮用水(3天份)',cat:'食物饮水'},{name:'压缩饼干/能量棒',cat:'食物饮水'},{name:'罐头食品',cat:'食物饮水'},{name:'开罐器',cat:'食物饮水'},
            {name:'急救包(创口贴等)',cat:'医疗'},{name:'常用药物',cat:'医疗'},{name:'口罩',cat:'医疗'},{name:'消毒酒精/碘伏',cat:'医疗'},{name:'体温计',cat:'医疗'},
            {name:'手电筒+备用电池',cat:'工具'},{name:'充电宝+充电线',cat:'工具'},{name:'收音机',cat:'工具'},{name:'打火机/火柴',cat:'工具'},{name:'瑞士军刀',cat:'工具'},{name:'绳索(5m+)',cat:'工具'},{name:'哨子',cat:'工具'},
            {name:'身份证复印件',cat:'证件'},{name:'银行卡/现金',cat:'证件'},{name:'户口簿复印件',cat:'证件'},{name:'保险单复印件',cat:'证件'},
            {name:'保暖毯/睡袋',cat:'生活'},{name:'替换衣物',cat:'生活'},{name:'雨衣/雨伞',cat:'生活'},{name:'纸巾/湿巾',cat:'生活'},{name:'垃圾袋',cat:'生活'},{name:'笔和纸',cat:'生活'},
        ];
        const KEY = 'xq_emergency_bag';
        const categories = [...new Set(items.map(i => i.cat))];
        let activeCat = '';
        let checks = JSON.parse(localStorage.getItem(KEY) || '{}');

        let catHtml = '<button onclick="setCat(\'\')" class="px-3 py-1 rounded-full text-sm bg-pink-500 text-white" id="cat-all">全部</button>';
        categories.forEach(c => { catHtml += `<button onclick="setCat('${c}')" class="px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-500" id="cat-${c}">${c}</button>`; });
        document.getElementById('catBtns').innerHTML = catHtml;

        function setCat(cat) {
            activeCat = cat;
            document.querySelectorAll('#catBtns button').forEach(b => b.className = 'px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-500');
            (cat ? document.getElementById('cat-'+cat) : document.getElementById('cat-all')).className = 'px-3 py-1 rounded-full text-sm bg-pink-500 text-white';
            render();
        }

        function toggle(name) {
            checks[name] = !checks[name];
            localStorage.setItem(KEY, JSON.stringify(checks));
            render();
        }

        function clearChecks() { checks = {}; localStorage.removeItem(KEY); render(); }

        function render() {
            const filtered = items.filter(i => !activeCat || i.cat === activeCat);
            const total = items.length;
            const done = Object.values(checks).filter(Boolean).length;
            document.getElementById('done').textContent = done;
            document.getElementById('total').textContent = total;
            document.getElementById('bar').style.width = (done/total*100) + '%';

            let html = '';
            filtered.forEach(i => {
                const checked = checks[i.name];
                html += `<label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors ${checked ? 'bg-green-50' : 'bg-gray-50'}" onclick="toggle('${i.name}')">
                    <span class="w-5 h-5 rounded border-2 flex items-center justify-center ${checked ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300'}"><span class="text-xs">${checked ? '✓' : ''}</span></span>
                    <span class="${checked ? 'line-through text-gray-400' : 'text-gray-700'}">${i.name}</span>
                    <span class="text-xs text-gray-300 ml-auto">${i.cat}</span>
                </label>`;
            });
            document.getElementById('list').innerHTML = html;
        }
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
