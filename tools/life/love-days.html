<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恋爱天数正计时 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">💑 恋爱天数正计时</h1>
            <p class="text-gray-500">记录你们相爱的每一天 ❤️</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="max-w-md mx-auto mb-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">在一起的日期</label>
                <input type="date" id="loveDate" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
            </div>
            <button onclick="startLove()" class="w-full max-w-md mx-auto block py-4 bg-gradient-to-r from-pink-500 to-red-400 hover:from-pink-600 hover:to-red-500 text-white font-bold rounded-xl transition-all text-lg">💖 开始计时</button>

            <div id="result" class="hidden mt-8 text-center">
                <div class="relative bg-gradient-to-r from-pink-100 via-red-50 to-pink-100 rounded-3xl p-10 overflow-hidden">
                    <div class="absolute inset-0 opacity-10 text-9xl flex items-center justify-center">❤️</div>
                    <p class="text-gray-500 text-sm relative z-10">我们已经在一起</p>
                    <p class="text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-red-500 relative z-10 my-4" id="loveDays">0</p>
                    <p class="text-gray-400 relative z-10">天</p>
                </div>
                <div class="grid grid-cols-3 gap-4 mt-6">
                    <div class="bg-pink-50 rounded-xl p-4">
                        <p class="text-2xl font-bold text-pink-500" id="loveHours">0</p>
                        <p class="text-xs text-gray-400">小时</p>
                    </div>
                    <div class="bg-red-50 rounded-xl p-4">
                        <p class="text-2xl font-bold text-red-500" id="loveMins">0</p>
                        <p class="text-xs text-gray-400">分钟</p>
                    </div>
                    <div class="bg-rose-50 rounded-xl p-4">
                        <p class="text-2xl font-bold text-rose-500" id="loveSecs">0</p>
                        <p class="text-xs text-gray-400">秒</p>
                    </div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 list-disc list-inside">
                        <li>选择你们在一起的日期。</li>
                        <li>点击"开始计时"即可实时显示。</li>
                        <li>秒数实时跳动，记录每一秒的爱意。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">时间准确吗？</div>
                        <div class="text-gray-500 text-sm">精确到秒，实时更新。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        let loveTimer = null;
        function startLove() {
            const dateStr = document.getElementById('loveDate').value;
            if (!dateStr) { alert('请选择日期'); return; }
            const start = new Date(dateStr);
            if (start > new Date()) { alert('日期不能在未来哦~'); return; }

            document.getElementById('result').classList.remove('hidden');
            if (loveTimer) clearInterval(loveTimer);
            loveTimer = setInterval(() => updateLove(start), 1000);
            updateLove(start);
        }

        function updateLove(start) {
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor(diff / (1000*60*60));
            const mins = Math.floor(diff / (1000*60));
            const secs = Math.floor(diff / 1000);

            document.getElementById('loveDays').textContent = days;
            document.getElementById('loveHours').textContent = hours.toLocaleString();
            document.getElementById('loveMins').textContent = mins.toLocaleString();
            document.getElementById('loveSecs').textContent = secs.toLocaleString();
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
