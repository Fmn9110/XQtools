<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日喝水提醒 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">💧 每日喝水提醒</h1>
            <p class="text-gray-500">设定你的饮水目标，生成科学喝水时间表</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">体重 (kg)</label>
                    <input type="number" id="weight" value="65" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">起床时间</label>
                    <input type="time" id="wakeUp" value="07:00" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">睡觉时间</label>
                    <input type="time" id="bedTime" value="23:00" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="genPlan()" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-lg">📋 生成饮水计划</button>

            <div id="result" class="hidden mt-8">
                <div class="bg-blue-50 rounded-2xl p-6 text-center mb-6">
                    <p class="text-gray-500 text-sm">你的每日建议饮水量</p>
                    <p class="text-5xl font-black text-blue-500 my-2" id="totalWater">0</p>
                    <p class="text-gray-400">毫升 (ml)</p>
                </div>
                <div class="space-y-3" id="schedule"></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 list-disc list-inside">
                        <li>输入你的体重计算建议饮水量。</li>
                        <li>设定起床和睡觉时间。</li>
                        <li>自动生成等间隔的饮水时间表。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">建议量标准？</div>
                        <div class="text-gray-500 text-sm">按每公斤体重30-35ml计算，适合一般健康成人。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function genPlan() {
            const weight = parseFloat(document.getElementById('weight').value);
            const [wH, wM] = document.getElementById('wakeUp').value.split(':').map(Number);
            const [bH, bM] = document.getElementById('bedTime').value.split(':').map(Number);

            // 建议每公斤体重约35ml
            const totalMl = Math.round(weight * 35);
            document.getElementById('totalWater').textContent = totalMl;

            const wakeMin = wH * 60 + wM;
            let bedMin = bH * 60 + bM;
            if (bedMin <= wakeMin) bedMin += 1440;
            const awakeMin = bedMin - wakeMin;

            // 每次约200-250ml，计算次数
            const cups = Math.round(totalMl / 220);
            const interval = Math.floor(awakeMin / cups);
            const perCup = Math.round(totalMl / cups);

            const tips = ['☀️ 起床后第一杯水', '🍳 早餐后补水', '🌤️ 上午补充', '🍜 午餐前一杯', '☕ 午后提神', '🌆 下午茶时间', '🍽️ 晚餐前一杯', '🌙 睡前2h最后一杯'];

            let html = '';
            for (let i = 0; i < cups; i++) {
                const t = wakeMin + i * interval;
                const h = Math.floor((t % 1440) / 60);
                const m = (t % 1440) % 60;
                const tip = tips[i] || '💧 补充水分';
                html += `<div class="flex items-center gap-4 bg-blue-50/50 rounded-xl p-4 border border-blue-100">
                    <div class="w-16 text-center">
                        <p class="text-lg font-black text-blue-500">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}</p>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-700">${tip}</p>
                        <p class="text-xs text-gray-400">喝 ${perCup} ml</p>
                    </div>
                    <div class="text-2xl">💧</div>
                </div>`;
            }
            document.getElementById('schedule').innerHTML = html;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
