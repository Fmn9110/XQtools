<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消费账本 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📒 日常消费账本</h1>
            <p class="text-gray-500">用LocalStorage记录你的每一笔开销，数据永不丢失</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-red-50 rounded-xl p-4 text-center">
                    <p class="text-xs text-gray-400">本月支出</p>
                    <p class="text-2xl font-black text-red-500" id="monthExpense">¥0</p>
                </div>
                <div class="bg-green-50 rounded-xl p-4 text-center">
                    <p class="text-xs text-gray-400">本月收入</p>
                    <p class="text-2xl font-black text-green-500" id="monthIncome">¥0</p>
                </div>
                <div class="bg-blue-50 rounded-xl p-4 text-center">
                    <p class="text-xs text-gray-400">本月结余</p>
                    <p class="text-2xl font-black text-blue-500" id="monthBalance">¥0</p>
                </div>
                <div class="bg-purple-50 rounded-xl p-4 text-center">
                    <p class="text-xs text-gray-400">总记录数</p>
                    <p class="text-2xl font-black text-purple-500" id="totalCount">0</p>
                </div>
            </div>

            <div class="bg-gray-50 rounded-2xl p-6 mb-6">
                <h3 class="text-sm font-bold text-gray-500 mb-4">➕ 新增记录</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <select id="type" class="p-3 bg-white rounded-xl border outline-none">
                        <option value="expense">支出</option>
                        <option value="income">收入</option>
                    </select>
                    <input type="number" id="amount" placeholder="金额" class="p-3 bg-white rounded-xl border outline-none">
                    <select id="category" class="p-3 bg-white rounded-xl border outline-none">
                        <option>🍜 餐饮</option><option>🚗 交通</option><option>🛒 购物</option><option>🏠 居住</option><option>🎭 娱乐</option><option>📱 通讯</option><option>💊 医疗</option><option>📚 教育</option><option>💰 工资</option><option>🎁 奖金</option><option>📦 其他</option>
                    </select>
                    <input type="text" id="note" placeholder="备注(选填)" class="p-3 bg-white rounded-xl border outline-none">
                </div>
                <button onclick="addRecord()" class="mt-4 w-full py-3 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl">记一笔</button>
            </div>

            <div class="space-y-2 max-h-96 overflow-y-auto" id="records"></div>
            <button onclick="clearAll()" class="mt-4 w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-600 font-bold rounded-xl text-sm theme-secondary-btn">🗑️ 清空所有记录</button>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择收入/支出，填写金额和分类。</li><li>数据自动保存在浏览器本地。</li><li>随时查看月度统计汇总。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">数据安全吗？</div><div class="text-gray-500 text-sm">数据存储在你的浏览器中(LocalStorage)，不会上传到任何服务器。清除浏览器数据会丢失记录。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const STORAGE_KEY = 'xq_ledger_records';

        function getRecords() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
        }
        function saveRecords(records) { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

        function addRecord() {
            const type = document.getElementById('type').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const note = document.getElementById('note').value;
            if (!amount || amount <= 0) { alert('请输入有效金额'); return; }

            const records = getRecords();
            records.unshift({ type, amount, category, note, date: new Date().toISOString() });
            saveRecords(records);
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            render();
        }

        function deleteRecord(idx) {
            const records = getRecords();
            records.splice(idx, 1);
            saveRecords(records);
            render();
        }

        function clearAll() {
            if (confirm('确定清空所有记录？')) {
                localStorage.removeItem(STORAGE_KEY);
                render();
            }
        }

        function render() {
            const records = getRecords();
            const now = new Date();
            const thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            let monthIncome = 0, monthExpense = 0;

            records.forEach(r => {
                const rMonth = r.date.slice(0, 7);
                if (rMonth === thisMonth) {
                    if (r.type === 'income') monthIncome += r.amount;
                    else monthExpense += r.amount;
                }
            });

            document.getElementById('monthIncome').textContent = '¥' + monthIncome.toFixed(0);
            document.getElementById('monthExpense').textContent = '¥' + monthExpense.toFixed(0);
            document.getElementById('monthBalance').textContent = '¥' + (monthIncome - monthExpense).toFixed(0);
            document.getElementById('totalCount').textContent = records.length;

            let html = '';
            records.forEach((r, i) => {
                const d = new Date(r.date);
                const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                const isExpense = r.type === 'expense';
                html += `<div class="flex items-center gap-3 p-3 rounded-xl ${isExpense ? 'bg-red-50/50' : 'bg-green-50/50'} border border-gray-100">
                    <span class="text-lg">${r.category.slice(0,2)}</span>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-700">${r.category}${r.note ? ' · ' + r.note : ''}</p>
                        <p class="text-xs text-gray-400">${dateStr}</p>
                    </div>
                    <p class="font-bold ${isExpense ? 'text-red-500' : 'text-green-500'}">${isExpense ? '-' : '+'}¥${r.amount}</p>
                    <button onclick="deleteRecord(${i})" class="text-gray-300 hover:text-red-400 text-sm">✕</button>
                </div>`;
            });
            document.getElementById('records').innerHTML = html || '<p class="text-center text-gray-400 py-8">暂无记录，快来记一笔吧 ✍️</p>';
        }

        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
