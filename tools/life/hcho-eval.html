<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>甲醛浓度评估 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🏠 甲醛浓度评估</h1>
            <p class="text-gray-500">输入检测值，评估室内甲醛是否超标</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="max-w-md mx-auto mb-6">
                <label class="block text-xs font-bold text-gray-400 mb-2">检测浓度 (mg/m³)</label>
                <input type="number" id="val" value="0.05" step="0.01" class="w-full p-4 bg-gray-50 rounded-xl border outline-none text-center text-xl" oninput="eval2()">
            </div>
            <div id="result" class="text-center">
                <div class="rounded-3xl p-8 mb-4" id="card">
                    <p class="text-5xl mb-2" id="rEmoji"></p>
                    <p class="text-3xl font-black mb-2" id="rLevel"></p>
                    <p class="text-sm text-gray-600" id="rDesc"></p>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm"><thead><tr class="bg-gray-50"><th class="p-3">浓度范围</th><th class="p-3">等级</th><th class="p-3">健康影响</th></tr></thead>
                    <tbody>
                        <tr class="border-b bg-green-50"><td class="p-3 text-center">0 - 0.08 mg/m³</td><td class="p-3 text-center text-green-600 font-bold">达标 ✅</td><td class="p-3">符合国标GB/T 18883</td></tr>
                        <tr class="border-b bg-yellow-50"><td class="p-3 text-center">0.08 - 0.15 mg/m³</td><td class="p-3 text-center text-yellow-600 font-bold">轻度超标 ⚠️</td><td class="p-3">可能引起不适、异味</td></tr>
                        <tr class="border-b bg-orange-50"><td class="p-3 text-center">0.15 - 0.5 mg/m³</td><td class="p-3 text-center text-orange-600 font-bold">中度超标 ❌</td><td class="p-3">刺激眼鼻、头痛头晕</td></tr>
                        <tr class="bg-red-50"><td class="p-3 text-center">&gt; 0.5 mg/m³</td><td class="p-3 text-center text-red-600 font-bold">严重超标 🚨</td><td class="p-3">强烈不适，必须处理</td></tr>
                    </tbody></table>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入专业检测仪测得的甲醛浓度。</li><li>查看是否达标。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">达标标准是多少？</div><div class="text-gray-500 text-sm">国标GB/T 18883规定室内甲醛≤0.08mg/m³（关窗12小时后）。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function eval2() {
            const val = parseFloat(document.getElementById('val').value) || 0;
            let emoji, level, desc, bg;
            if (val <= 0.08) { emoji='✅';level='达标';desc='符合国家标准，可以放心入住。';bg='bg-green-100'; }
            else if (val <= 0.15) { emoji='⚠️';level='轻度超标';desc='建议通风换气，暂缓入住。可使用活性炭、绿植辅助。';bg='bg-yellow-100'; }
            else if (val <= 0.5) { emoji='❌';level='中度超标';desc='请勿入住！需要专业治理+持续通风至少3个月。';bg='bg-orange-100'; }
            else { emoji='🚨';level='严重超标';desc='立即离开！必须找专业除甲醛公司治理，治理后复测达标才可入住。';bg='bg-red-100'; }

            document.getElementById('rEmoji').textContent = emoji;
            document.getElementById('rLevel').textContent = level;
            document.getElementById('rDesc').textContent = desc;
            document.getElementById('card').className = `rounded-3xl p-8 mb-4 ${bg}`;
        }
        eval2();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
