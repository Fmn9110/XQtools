<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二十四节气查询 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🌿 二十四节气</h1>
            <p class="text-gray-500">中国传统二十四节气速查与习俗</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-4 md:grid-cols-6 gap-2 mb-6" id="grid"></div>
            <div id="detail" class="hidden bg-gradient-to-br from-green-50 to-blue-50 rounded-3xl p-6">
                <div class="text-center mb-4"><p class="text-4xl" id="dEmoji"></p><p class="text-2xl font-black text-green-600" id="dName"></p><p class="text-sm text-gray-500" id="dDate"></p></div>
                <p class="text-gray-600 text-sm" id="dDesc"></p>
                <div class="mt-3 grid grid-cols-2 gap-3 text-sm">
                    <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400 text-xs">习俗</span><p id="dCustom"></p></div>
                    <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400 text-xs">饮食</span><p id="dFood"></p></div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>点击节气查看详情。</li><li>了解每个节气的习俗和饮食。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">节气是阳历还是阴历？</div><div class="text-gray-500 text-sm">节气基于太阳在黄道上的位置，属于阳历系统，日期相对固定。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const terms = [
            {name:'立春',emoji:'🌸',date:'2月3-5日',desc:'春季开始，万物复苏。',custom:'打春、咬春',food:'春饼、春卷'},
            {name:'雨水',emoji:'🌧️',date:'2月18-20日',desc:'降雨增多，气温回升。',custom:'拉保保、回娘家',food:'罐罐肉'},
            {name:'惊蛰',emoji:'⛈️',date:'3月5-7日',desc:'雷声惊醒冬眠中的昆虫。',custom:'祭白虎、打小人',food:'梨'},
            {name:'春分',emoji:'🌼',date:'3月20-22日',desc:'昼夜等长，春暖花开。',custom:'竖蛋、踏青',food:'春菜'},
            {name:'清明',emoji:'🍃',date:'4月4-6日',desc:'祭祖扫墓，缅怀先人。',custom:'扫墓、踏青',food:'青团'},
            {name:'谷雨',emoji:'🌾',date:'4月19-21日',desc:'雨生百谷，播种时节。',custom:'喝谷雨茶',food:'谷雨茶、香椿'},
            {name:'立夏',emoji:'☀️',date:'5月5-7日',desc:'夏季开始。',custom:'称人、吃蛋',food:'乌米饭、鸡蛋'},
            {name:'小满',emoji:'🌿',date:'5月20-22日',desc:'麦类等夏熟作物籽粒开始饱满。',custom:'祈蚕、枇杷',food:'苦菜'},
            {name:'芒种',emoji:'🌻',date:'6月5-7日',desc:'忙碌的收种季节。',custom:'煮梅、送花神',food:'青梅'},
            {name:'夏至',emoji:'🌞',date:'6月21-22日',desc:'白昼最长的一天。',custom:'祭地、吃冷面',food:'凉面、馄饨'},
            {name:'小暑',emoji:'🌡️',date:'7月6-8日',desc:'天气开始炎热。',custom:'晒伏',food:'莲藕、绿豆汤'},
            {name:'大暑',emoji:'🔥',date:'7月22-24日',desc:'一年中最热的时期。',custom:'烧伏香、饮伏茶',food:'仙草、凉茶'},
            {name:'立秋',emoji:'🍂',date:'8月7-9日',desc:'秋季开始，暑去凉来。',custom:'贴秋膘',food:'西瓜、茄子'},
            {name:'处暑',emoji:'🌊',date:'8月22-24日',desc:'暑气消退。',custom:'放河灯、开渔节',food:'鸭子'},
            {name:'白露',emoji:'💧',date:'9月7-9日',desc:'天气渐凉，露珠凝结。',custom:'收清露、饮白露茶',food:'龙眼'},
            {name:'秋分',emoji:'🍁',date:'9月22-24日',desc:'昼夜再次等长。',custom:'秋祭月',food:'螃蟹、桂花酒'},
            {name:'寒露',emoji:'🥶',date:'10月8-9日',desc:'气温更低，露水有寒意。',custom:'赏菊',food:'芝麻、柿子'},
            {name:'霜降',emoji:'❄️',date:'10月23-24日',desc:'初霜出现。',custom:'赏菊、吃柿子',food:'柿子、萝卜'},
            {name:'立冬',emoji:'🧣',date:'11月7-8日',desc:'冬季开始。',custom:'补冬',food:'饺子、羊肉'},
            {name:'小雪',emoji:'🌨️',date:'11月22-23日',desc:'开始出现小雪。',custom:'腌腊肉',food:'腊肉、糍粑'},
            {name:'大雪',emoji:'☃️',date:'12月6-8日',desc:'降雪量增多。',custom:'观赏封河',food:'羊肉、萝卜'},
            {name:'冬至',emoji:'🥟',date:'12月21-23日',desc:'白昼最短。',custom:'吃饺子/汤圆',food:'饺子(北)、汤圆(南)'},
            {name:'小寒',emoji:'🧊',date:'1月5-7日',desc:'进入严寒时期。',custom:'探梅',food:'腊八粥'},
            {name:'大寒',emoji:'🏔️',date:'1月20-21日',desc:'一年中最冷的时期。',custom:'除旧布新',food:'八宝饭、年糕'},
        ];

        let gridHtml = '';
        const seasons = ['bg-green-50','bg-green-50','bg-green-50','bg-green-100','bg-green-100','bg-green-100',
                         'bg-red-50','bg-red-50','bg-red-50','bg-red-100','bg-red-100','bg-red-100',
                         'bg-yellow-50','bg-yellow-50','bg-yellow-50','bg-yellow-100','bg-yellow-100','bg-yellow-100',
                         'bg-blue-50','bg-blue-50','bg-blue-50','bg-blue-100','bg-blue-100','bg-blue-100'];
        terms.forEach((t, i) => {
            gridHtml += `<button onclick="showDetail(${i})" class="p-2 ${seasons[i]} rounded-xl text-center hover:ring-2 hover:ring-green-400 transition-all"><span class="text-lg">${t.emoji}</span><p class="text-xs font-bold text-gray-600">${t.name}</p></button>`;
        });
        document.getElementById('grid').innerHTML = gridHtml;

        function showDetail(i) {
            const t = terms[i];
            document.getElementById('dEmoji').textContent = t.emoji;
            document.getElementById('dName').textContent = t.name;
            document.getElementById('dDate').textContent = t.date;
            document.getElementById('dDesc').textContent = t.desc;
            document.getElementById('dCustom').textContent = t.custom;
            document.getElementById('dFood').textContent = t.food;
            document.getElementById('detail').classList.remove('hidden');
        }
        showDetail(0);
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
