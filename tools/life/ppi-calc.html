<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PPI计算器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📱 屏幕PPI计算器</h1>
            <p class="text-gray-500">输入分辨率和屏幕尺寸，计算像素密度</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">水平分辨率 (px)</label>
                    <input type="number" id="width" value="2560" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" oninput="calc()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">垂直分辨率 (px)</label>
                    <input type="number" id="height" value="1440" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" oninput="calc()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">屏幕尺寸 (英寸)</label>
                    <input type="number" id="size" value="27" step="0.1" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none" oninput="calc()">
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-blue-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-blue-500" id="rPPI">0</p><p class="text-xs text-gray-400">PPI</p></div>
                <div class="bg-green-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-green-500" id="rDot">0</p><p class="text-xs text-gray-400">点距(mm)</p></div>
                <div class="bg-purple-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-purple-500" id="rTotal">0</p><p class="text-xs text-gray-400">总像素(万)</p></div>
                <div class="bg-orange-50 rounded-2xl p-6 text-center"><p class="text-xl font-black text-orange-500" id="rLevel">-</p><p class="text-xs text-gray-400">等级</p></div>
            </div>
            <div class="mt-4 bg-gray-50 rounded-xl p-4 text-xs text-gray-500">
                <p>📱 常见参考：iPhone 15 Pro: 460 PPI | MacBook Air 13: 227 PPI | 4K 27寸显示器: 163 PPI</p>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入屏幕水平和垂直分辨率。</li><li>输入屏幕对角线尺寸（英寸）。</li><li>实时计算PPI像素密度。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">PPI越高越好？</div><div class="text-gray-500 text-sm">超过300 PPI人眼几乎无法分辨像素，被称为"视网膜"级别。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const w = parseInt(document.getElementById('width').value) || 0;
            const h = parseInt(document.getElementById('height').value) || 0;
            const s = parseFloat(document.getElementById('size').value) || 1;
            const diag = Math.sqrt(w * w + h * h);
            const ppi = diag / s;
            const dotPitch = 25.4 / ppi;
            const totalPixels = w * h;
            let level = '普通';
            if (ppi >= 400) level = '🌟 顶级';
            else if (ppi >= 300) level = '✅ 视网膜';
            else if (ppi >= 200) level = '👍 清晰';
            else if (ppi >= 100) level = '⚠️ 一般';
            else level = '🔴 粗糙';
            document.getElementById('rPPI').textContent = Math.round(ppi);
            document.getElementById('rDot').textContent = dotPitch.toFixed(3);
            document.getElementById('rTotal').textContent = (totalPixels / 10000).toFixed(0);
            document.getElementById('rLevel').textContent = level;
        }
        calc();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
