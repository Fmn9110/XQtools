<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打车费用预估 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🚕 打车费用预估</h1>
            <p class="text-gray-500">根据距离和城市计费标准，预估打车费用</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">行驶距离 (公里)</label><input type="number" id="distance" value="10" step="0.1" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">城市计费</label>
                    <select id="city" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                        <option value="beijing">北京 (起步13元/3km)</option>
                        <option value="shanghai">上海 (起步14元/3km)</option>
                        <option value="guangzhou">广州 (起步12元/2.5km)</option>
                        <option value="shenzhen">深圳 (起步10元/2km)</option>
                        <option value="chengdu">成都 (起步9元/2km)</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 mb-6">
                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="isNight" class="w-4 h-4"> <span class="text-sm text-gray-600">夜间 (23:00-5:00, +20%)</span></label>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded-xl text-lg">💰 计算费用</button>
            <div id="result" class="hidden mt-8 grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-yellow-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-yellow-600" id="rTotal">¥0</p><p class="text-xs text-gray-400">预估总费用</p></div>
                <div class="bg-blue-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-blue-500" id="rBase">¥0</p><p class="text-xs text-gray-400">起步费</p></div>
                <div class="bg-green-50 rounded-2xl p-6 text-center"><p class="text-3xl font-black text-green-500" id="rPerKm">¥0</p><p class="text-xs text-gray-400">公里单价</p></div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入行驶距离公里数。</li><li>选择城市核算标准。</li><li>勾选夜间模式会加收20%。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">包含堵车费吗？</div><div class="text-gray-500 text-sm">不包含拥堵附加费和燃油附加费，仅按公里数估算。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const cityRates = {
            beijing: {base: 13, baseDist: 3, perKm: 2.3, longDist: 15, longPerKm: 3.45},
            shanghai: {base: 14, baseDist: 3, perKm: 2.5, longDist: 15, longPerKm: 3.6},
            guangzhou: {base: 12, baseDist: 2.5, perKm: 2.6, longDist: 15, longPerKm: 3.9},
            shenzhen: {base: 10, baseDist: 2, perKm: 2.4, longDist: 15, longPerKm: 3.0},
            chengdu: {base: 9, baseDist: 2, perKm: 1.9, longDist: 10, longPerKm: 2.85},
        };

        function calc() {
            const dist = parseFloat(document.getElementById('distance').value);
            const city = document.getElementById('city').value;
            const isNight = document.getElementById('isNight').checked;
            const rate = cityRates[city];

            let total = rate.base;
            if (dist > rate.baseDist) {
                const extraDist = dist - rate.baseDist;
                if (dist <= rate.longDist) {
                    total += extraDist * rate.perKm;
                } else {
                    const normalDist = rate.longDist - rate.baseDist;
                    const longDist = dist - rate.longDist;
                    total += normalDist * rate.perKm + longDist * rate.longPerKm;
                }
            }

            if (isNight) total *= 1.2;

            document.getElementById('rTotal').textContent = '¥' + total.toFixed(1);
            document.getElementById('rBase').textContent = '¥' + rate.base;
            document.getElementById('rPerKm').textContent = '¥' + rate.perKm + '/km';
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
