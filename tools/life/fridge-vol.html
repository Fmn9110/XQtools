<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冰箱容量推荐 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🧊 冰箱容量推荐</h1>
            <p class="text-gray-500">根据家庭人数和使用习惯推荐合适的冰箱容量</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 mb-2">家庭人数</label><select id="people" class="w-full p-3 bg-gray-50 rounded-xl border outline-none" onchange="calc()"><option value="1">1人</option><option value="2" selected>2人</option><option value="3">3人</option><option value="4">4人</option><option value="5">5人及以上</option></select></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">做饭频率</label><select id="cook" class="w-full p-3 bg-gray-50 rounded-xl border outline-none" onchange="calc()"><option value="1">很少做饭</option><option value="1.3" selected>经常做饭</option><option value="1.6">天天下厨,爱囤货</option></select></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2">是否有母婴</label><select id="baby" class="w-full p-3 bg-gray-50 rounded-xl border outline-none" onchange="calc()"><option value="0">无</option><option value="50">有(需额外空间)</option></select></div>
            </div>
            <div id="result" class="text-center">
                <div class="bg-gradient-to-r from-blue-100 to-cyan-100 rounded-3xl p-8 mb-4">
                    <p class="text-sm text-gray-500">推荐冰箱容量</p>
                    <p class="text-5xl font-black text-blue-500 my-2"><span id="rVol">0</span>L</p>
                    <p class="text-gray-400 text-sm" id="rType">双门冰箱</p>
                </div>
                <div class="grid grid-cols-3 gap-3 text-center">
                    <div class="bg-blue-50 rounded-xl p-3"><p class="font-bold text-blue-500" id="rFridge">0L</p><p class="text-xs text-gray-400">冷藏</p></div>
                    <div class="bg-purple-50 rounded-xl p-3"><p class="font-bold text-purple-500" id="rFreezer">0L</p><p class="text-xs text-gray-400">冷冻</p></div>
                    <div class="bg-green-50 rounded-xl p-3"><p class="font-bold text-green-500" id="rEnergy">-</p><p class="text-xs text-gray-400">能效等级</p></div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>选择家庭人数和做饭频率。</li><li>查看推荐的冰箱容量。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">容量怎么算的？</div><div class="text-gray-500 text-sm">按人均80-100L基础用量，根据做饭频率和特殊需求调整。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const people = parseInt(document.getElementById('people').value);
            const cook = parseFloat(document.getElementById('cook').value);
            const baby = parseInt(document.getElementById('baby').value);
            const base = people * 80 * cook + baby;
            const vol = Math.round(base / 10) * 10;
            const fridge = Math.round(vol * 0.65);
            const freezer = vol - fridge;

            let type = '单门小冰箱';
            if (vol >= 400) type = '多门/对开门大冰箱';
            else if (vol >= 250) type = '三门冰箱';
            else if (vol >= 150) type = '双门冰箱';

            document.getElementById('rVol').textContent = vol;
            document.getElementById('rType').textContent = type;
            document.getElementById('rFridge').textContent = fridge + 'L';
            document.getElementById('rFreezer').textContent = freezer + 'L';
            document.getElementById('rEnergy').textContent = '建议1级';
        }
        calc();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
