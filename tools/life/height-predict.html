<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>儿童身高预测 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">📏 儿童身高预测</h1>
            <p class="text-gray-500">根据父母身高估算孩子成年后的身高</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">父亲身高 (cm)</label><input type="number" id="fatherH" value="175" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">母亲身高 (cm)</label><input type="number" id="motherH" value="163" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">孩子性别</label>
                    <select id="childGender" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                        <option value="male">男孩</option><option value="female">女孩</option>
                    </select>
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-lg">📐 预测身高</button>
            <div id="result" class="hidden mt-8 text-center">
                <div class="bg-gradient-to-r from-blue-100 to-green-100 rounded-3xl p-8">
                    <p class="text-gray-500 text-sm">预估成年身高</p>
                    <p class="text-6xl font-black text-blue-500 my-3" id="rHeight">0</p>
                    <p class="text-gray-400">cm（±5cm）</p>
                    <div class="grid grid-cols-2 gap-3 mt-6 max-w-sm mx-auto text-sm">
                        <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400">CMH公式</span><p class="font-bold text-blue-500" id="rCMH">0 cm</p></div>
                        <div class="bg-white/80 rounded-xl p-3"><span class="text-gray-400">FPH公式</span><p class="font-bold text-green-500" id="rFPH">0 cm</p></div>
                    </div>
                </div>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入父母身高和孩子性别。</li><li>使用两种公式综合预测。</li><li>±5cm为正常误差范围。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">预测准确吗？</div><div class="text-gray-500 text-sm">遗传只是影响身高的因素之一，后天的营养、运动和睡眠同样重要。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const fh = parseFloat(document.getElementById('fatherH').value);
            const mh = parseFloat(document.getElementById('motherH').value);
            const gender = document.getElementById('childGender').value;

            let cmh, fph;
            if (gender === 'male') {
                // CMH公式（男）: (父高+母高) × 1.08 / 2
                cmh = (fh + mh) * 1.08 / 2;
                // FPH公式（男）: (父高+母高+13) / 2
                fph = (fh + mh + 13) / 2;
            } else {
                // CMH公式（女）: (父高 × 0.923 + 母高) / 2
                cmh = (fh * 0.923 + mh) / 2;
                // FPH公式（女）: (父高+母高-13) / 2
                fph = (fh + mh - 13) / 2;
            }

            const avg = (cmh + fph) / 2;

            document.getElementById('rHeight').textContent = avg.toFixed(1);
            document.getElementById('rCMH').textContent = cmh.toFixed(1) + ' cm';
            document.getElementById('rFPH').textContent = fph.toFixed(1) + ' cm';
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
