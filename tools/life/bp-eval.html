<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血压评估 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">❤️ 血压健康评估</h1>
            <p class="text-gray-500">输入血压值，快速了解你的血压健康等级</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">收缩压/高压 (mmHg)</label>
                    <input type="number" id="systolic" value="120" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">舒张压/低压 (mmHg)</label>
                    <input type="number" id="diastolic" value="80" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none">
                </div>
            </div>
            <button onclick="calc()" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl text-lg">🩺 评估血压</button>
            <div id="result" class="hidden mt-8 text-center">
                <div class="rounded-3xl p-8 mb-6" id="resultCard">
                    <p class="text-5xl font-black mb-2" id="rLevel"></p>
                    <p class="text-gray-500 text-sm" id="rRange"></p>
                    <p class="mt-4 text-sm" id="rAdvice"></p>
                </div>
            </div>
            <div class="mt-6 overflow-x-auto">
                <table class="w-full text-sm"><thead><tr class="bg-gray-50"><th class="p-3 text-left">分类</th><th class="p-3">收缩压</th><th class="p-3">舒张压</th></tr></thead>
                <tbody>
                    <tr class="border-b"><td class="p-3"><span class="text-green-500 font-bold">理想</span></td><td class="p-3 text-center">&lt;120</td><td class="p-3 text-center">&lt;80</td></tr>
                    <tr class="border-b"><td class="p-3"><span class="text-blue-500 font-bold">正常</span></td><td class="p-3 text-center">120-129</td><td class="p-3 text-center">80-84</td></tr>
                    <tr class="border-b"><td class="p-3"><span class="text-yellow-500 font-bold">正常高值</span></td><td class="p-3 text-center">130-139</td><td class="p-3 text-center">85-89</td></tr>
                    <tr class="border-b"><td class="p-3"><span class="text-orange-500 font-bold">I级高血压</span></td><td class="p-3 text-center">140-159</td><td class="p-3 text-center">90-99</td></tr>
                    <tr class="border-b"><td class="p-3"><span class="text-red-500 font-bold">II级高血压</span></td><td class="p-3 text-center">160-179</td><td class="p-3 text-center">100-109</td></tr>
                    <tr><td class="p-3"><span class="text-red-700 font-bold">III级高血压</span></td><td class="p-3 text-center">≥180</td><td class="p-3 text-center">≥110</td></tr>
                </tbody></table>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入你测量的收缩压和舒张压。</li><li>查看血压分级和健康建议。</li><li>仅供参考，不作为医疗诊断依据。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">标准是什么？</div><div class="text-gray-500 text-sm">参照中国高血压防治指南(2018)的分级标准。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const sys = parseInt(document.getElementById('systolic').value);
            const dia = parseInt(document.getElementById('diastolic').value);
            let level, bg, advice;

            if (sys < 90 || dia < 60) {
                level = '⚠️ 低血压'; bg = 'bg-blue-100'; advice = '血压偏低，可能出现头晕、乏力。建议适当增加盐分摄入和饮水量。';
            } else if (sys < 120 && dia < 80) {
                level = '💚 理想血压'; bg = 'bg-green-100'; advice = '血压状态非常好！保持健康的生活方式。';
            } else if (sys < 130 && dia < 85) {
                level = '✅ 正常血压'; bg = 'bg-green-50'; advice = '血压正常，继续保持良好的生活习惯。';
            } else if (sys < 140 && dia < 90) {
                level = '⚡ 正常高值'; bg = 'bg-yellow-100'; advice = '血压偏高，建议注意控制饮食，减少盐分摄入，适当运动。';
            } else if (sys < 160 && dia < 100) {
                level = '⚠️ I级高血压'; bg = 'bg-orange-100'; advice = '轻度高血压，建议进行生活方式调整，必要时就医咨询。';
            } else if (sys < 180 && dia < 110) {
                level = '🔴 II级高血压'; bg = 'bg-red-100'; advice = '中度高血压，建议尽快就医，可能需要药物治疗。';
            } else {
                level = '🚨 III级高血压'; bg = 'bg-red-200'; advice = '重度高血压！请立即就医，需要紧急治疗。';
            }

            const card = document.getElementById('resultCard');
            card.className = `rounded-3xl p-8 mb-6 ${bg}`;
            document.getElementById('rLevel').textContent = level;
            document.getElementById('rRange').textContent = `收缩压 ${sys} / 舒张压 ${dia} mmHg`;
            document.getElementById('rAdvice').textContent = advice;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
