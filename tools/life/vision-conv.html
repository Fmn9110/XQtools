<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>视力度数对照 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">👁️ 视力度数对照表</h1>
            <p class="text-gray-500">视力表数值与近视度数的快速对照换算</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr class="bg-blue-50"><th class="p-3 text-left rounded-tl-xl">标准视力表</th><th class="p-3">小数视力</th><th class="p-3">近视度数(参考)</th><th class="p-3 rounded-tr-xl">程度</th></tr></thead>
                    <tbody id="visionTable"></tbody>
                </table>
            </div>
            <div class="mt-6 bg-yellow-50 rounded-xl p-4 text-sm text-gray-500">
                <p>⚠️ 注意：此对照仅为参考，近视度数与视力并非简单对应关系，实际度数请以医院验光为准。</p>
            </div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>查看标准对数视力表与小数视力的对应关系。</li><li>近视度数为大致参考范围。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">视力和度数一样吗？</div><div class="text-gray-500 text-sm">不一样。视力是眼睛的分辨能力，度数是屈光不正的程度。同样度数的人视力可能不同。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const data = [
            {log:'5.2', dec:'1.5', deg:'无近视', level:'正常','color':'bg-green-50 text-green-600'},
            {log:'5.1', dec:'1.2', deg:'无近视', level:'正常','color':'bg-green-50 text-green-600'},
            {log:'5.0', dec:'1.0', deg:'无近视', level:'正常','color':'bg-green-50 text-green-600'},
            {log:'4.9', dec:'0.8', deg:'~100度', level:'轻度','color':'bg-blue-50 text-blue-600'},
            {log:'4.8', dec:'0.6', deg:'~150度', level:'轻度','color':'bg-blue-50 text-blue-600'},
            {log:'4.7', dec:'0.5', deg:'~200度', level:'轻度','color':'bg-blue-50 text-blue-600'},
            {log:'4.6', dec:'0.4', deg:'~250度', level:'中度','color':'bg-yellow-50 text-yellow-600'},
            {log:'4.5', dec:'0.3', deg:'~300度', level:'中度','color':'bg-yellow-50 text-yellow-600'},
            {log:'4.4', dec:'0.25', deg:'~350度', level:'中度','color':'bg-orange-50 text-orange-600'},
            {log:'4.3', dec:'0.2', deg:'~400度', level:'中度','color':'bg-orange-50 text-orange-600'},
            {log:'4.2', dec:'0.15', deg:'~500度', level:'中高度','color':'bg-orange-50 text-orange-600'},
            {log:'4.1', dec:'0.12', deg:'~550度', level:'高度','color':'bg-red-50 text-red-600'},
            {log:'4.0', dec:'0.1', deg:'~600度', level:'高度','color':'bg-red-50 text-red-600'},
            {log:'3.9', dec:'0.08', deg:'~650度', level:'高度','color':'bg-red-50 text-red-600'},
            {log:'3.7', dec:'0.05', deg:'~800度', level:'超高度','color':'bg-red-100 text-red-700'},
            {log:'3.5', dec:'0.03', deg:'~900度+', level:'超高度','color':'bg-red-100 text-red-700'},
        ];
        let html = '';
        data.forEach(d => {
            html += `<tr class="border-b border-gray-50 hover:bg-gray-50"><td class="p-3 font-bold">${d.log}</td><td class="p-3 text-center">${d.dec}</td><td class="p-3 text-center">${d.deg}</td><td class="p-3 text-center"><span class="px-2 py-1 rounded-full text-xs font-bold ${d.color}">${d.level}</span></td></tr>`;
        });
        document.getElementById('visionTable').innerHTML = html;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
