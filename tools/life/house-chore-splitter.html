<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家务活分配器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-pink-50"><div class="container mx-auto flex justify-between items-center"><div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'"><div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">Q</div><span class="text-2xl font-bold gradient-text">小Q工具箱</span></div><a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a></div></nav>
    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">🧹 家务活分配器</h1>
            <p class="text-gray-500">公平随机分配家务，再也不用争论</p>
        </header>
        <section class="cute-card p-8 mb-12 bg-white">
            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">家庭成员（每行一个名字）</label>
                <textarea id="members" rows="3" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none text-sm" placeholder="每行一个姓名">小明
小红
小花</textarea>
            </div>
            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">家务清单（每行一项）</label>
                <textarea id="chores" rows="5" class="w-full p-4 bg-gray-50 rounded-xl border border-pink-100 outline-none text-sm" placeholder="每行一项家务">扫地拖地
洗碗
做饭
洗衣服
倒垃圾
整理卧室
擦桌子
浇花</textarea>
            </div>
            <button onclick="distribute()" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl text-lg">🎲 随机分配！</button>
            <div id="result" class="hidden mt-8 space-y-4"></div>
        </section>
        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">!</span>使用说明</h2><div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50"><ul class="space-y-4 text-gray-600 list-disc list-inside"><li>输入家庭成员姓名。</li><li>列出所有需要做的家务。</li><li>点击随机分配，每人均分。</li></ul></div></section>
            <section><h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2><div class="space-y-4"><div class="bg-white p-4 rounded-xl border border-pink-50"><div class="font-bold text-gray-700 mb-1">分配公平吗？</div><div class="text-gray-500 text-sm">完全随机，尽量均匀分配。不满意可以重新随机。</div></div></div></section>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const colors = ['bg-blue-50 border-blue-200','bg-pink-50 border-pink-200','bg-green-50 border-green-200','bg-purple-50 border-purple-200','bg-yellow-50 border-yellow-200','bg-orange-50 border-orange-200'];
        const emojis = ['👤','👧','👦','👩','👨','🧑'];

        function distribute() {
            const members = document.getElementById('members').value.split('\n').map(s=>s.trim()).filter(Boolean);
            const chores = document.getElementById('chores').value.split('\n').map(s=>s.trim()).filter(Boolean);
            if (members.length === 0) { alert('请输入至少一个成员'); return; }
            if (chores.length === 0) { alert('请输入至少一项家务'); return; }

            // 随机打乱家务
            const shuffled = chores.sort(() => Math.random() - 0.5);
            // 分配
            const assignments = {};
            members.forEach(m => assignments[m] = []);
            shuffled.forEach((chore, i) => {
                const member = members[i % members.length];
                assignments[member].push(chore);
            });

            let html = '';
            members.forEach((m, i) => {
                const tasks = assignments[m];
                html += `<div class="rounded-2xl p-5 border-2 ${colors[i % colors.length]}">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-2xl">${emojis[i % emojis.length]}</span>
                        <span class="font-bold text-gray-700 text-lg">${m}</span>
                        <span class="text-sm text-gray-400">(${tasks.length}项)</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${tasks.map(t => `<span class="px-3 py-1 bg-white rounded-full text-sm text-gray-600 shadow-sm">✅ ${t}</span>`).join('')}
                    </div>
                </div>`;
            });
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
