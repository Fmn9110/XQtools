<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>假聊天生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">💬 虚拟 <span class="gradient-text">聊天生成</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">模拟社交对话截图。仅供娱乐调侃，请勿用于非法用途哦。✨</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-8 mb-12">
            <!-- Editor -->
            <section class="cute-card p-6 md:p-8 bg-white animate-item" style="animation-delay: 0.2s">
                <h3 class="text-lg font-black text-gray-800 mb-6 flex items-center">
                    <span class="w-6 h-6 bg-pink-100 text-pink-500 rounded flex items-center justify-center mr-2 text-xs">✍️</span>
                    内容配置
                </h3>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2">我方昵称</label>
                        <input type="text" id="myName" value="我" class="w-full p-4 bg-pink-50/30 rounded-xl border-2 border-transparent focus:border-pink-200 outline-none text-sm font-bold text-gray-700 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2">对方昵称</label>
                        <input type="text" id="otherName" value="隔壁小Q" class="w-full p-4 bg-pink-50/30 rounded-xl border-2 border-transparent focus:border-pink-200 outline-none text-sm font-bold text-gray-700 transition-all">
                    </div>
                </div>

                <div class="space-y-4 mb-8">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2">发送消息</label>
                    <div class="flex gap-2">
                        <input type="text" id="msgInput" placeholder="输入有趣的消息内容..." class="flex-1 p-4 bg-pink-50/30 rounded-xl border-2 border-transparent focus:border-pink-200 outline-none text-sm font-bold text-gray-700 transition-all">
                        <select id="sender" class="w-24 p-4 bg-white rounded-xl border-2 border-pink-100 outline-none text-xs font-bold text-pink-500 cursor-pointer">
                            <option value="me">我发</option>
                            <option value="other">对方</option>
                        </select>
                    </div>
                    <button onclick="addMsg()" class="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-xl shadow-lg shadow-pink-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <span class="text-xl">+</span> 向对话中注入灵魂
                    </button>
                </div>

                <div class="flex gap-3">
                    <button onclick="clearChat()" class="flex-1 py-4 bg-gray-50 hover:bg-gray-100 rounded-xl font-bold text-gray-400 transition-all border border-gray-100">🗑️ 重置</button>
                    <button onclick="exportChat()" class="flex-1 py-4 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-100 transition-all">📸 导出截图</button>
                </div>
            </section>

            <!-- Preview (Simulated Phone) -->
            <section class="animate-item flex justify-center" style="animation-delay: 0.3s">
                <div class="relative w-full max-w-[340px] bg-black p-3 rounded-[3rem] shadow-2xl border-[6px] border-gray-800">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-black rounded-b-2xl z-10"></div> <!-- Notch -->
                    <div class="bg-[#f2f2f2] w-full h-[580px] rounded-[2.2rem] overflow-hidden flex flex-col" id="previewContainer">
                        <!-- Chat Header -->
                        <div class="bg-white/80 backdrop-blur-md pt-10 pb-3 px-6 flex justify-between items-center border-b border-gray-100">
                            <span class="text-gray-400 text-xs font-bold">〈 微信</span>
                            <span class="font-black text-gray-800 text-sm" id="chatTitle">隔壁小Q</span>
                            <span class="text-gray-400 font-bold">...</span>
                        </div>
                        <!-- Chat Body -->
                        <div class="flex-1 p-4 space-y-4 overflow-y-auto" id="chatBody">
                            <div class="text-[10px] text-gray-300 text-center py-2 font-bold uppercase tracking-widest">Yesterday 14:20</div>
                        </div>
                        <!-- Chat Footer (Visual Only) -->
                        <div class="bg-white p-4 pb-8 flex gap-3 items-center">
                            <div class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-300">🎙️</div>
                            <div class="flex-1 h-9 bg-gray-50 rounded-lg"></div>
                            <div class="text-xl grayscale opacity-30">😊</div>
                            <div class="text-xl grayscale opacity-30">➕</div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const msgs = [];
        
        function addMsg() {
            const text = document.getElementById('msgInput').value.trim();
            if (!text) {
                Utils.toast('请输入消息内容', 'info');
                return;
            }
            const sender = document.getElementById('sender').value;
            msgs.push({text, sender});
            document.getElementById('msgInput').value = '';
            renderChat();
            
            // Auto scroll preview
            const body = document.getElementById('chatBody');
            setTimeout(() => body.scrollTop = body.scrollHeight, 100);
        }

        function renderChat() {
            const otherName = document.getElementById('otherName').value || '好友';
            document.getElementById('chatTitle').textContent = otherName;
            
            let html = '<div class="text-[10px] text-gray-300 text-center py-2 font-bold uppercase tracking-widest">Today ' + new Date().getHours() + ':' + String(new Date().getMinutes()).padStart(2,'0') + '</div>';
            msgs.forEach(m => {
                if (m.sender === 'me') {
                    html += `
                        <div class="flex justify-end items-start gap-2">
                            <div class="bg-[#95ec69] rounded-xl rounded-tr-none px-4 py-2.5 max-w-[75%] shadow-sm relative">
                                <p class="text-[13px] text-gray-800 leading-snug break-all font-medium">${m.text}</p>
                            </div>
                            <div class="w-8 h-8 bg-pink-100 rounded-lg flex-shrink-0 flex items-center justify-center text-sm shadow-sm border border-white">😊</div>
                        </div>`;
                } else {
                    html += `
                        <div class="flex justify-start items-start gap-2">
                            <div class="w-8 h-8 bg-indigo-100 rounded-lg flex-shrink-0 flex items-center justify-center text-sm shadow-sm border border-white">🐨</div>
                            <div class="bg-white rounded-xl rounded-tl-none px-4 py-2.5 max-w-[75%] shadow-sm relative">
                                <p class="text-[13px] text-gray-800 leading-snug break-all font-medium">${m.text}</p>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('chatBody').innerHTML = html;
        }

        function clearChat() { 
            msgs.length = 0; 
            renderChat(); 
            Utils.toast('对话已清空', 'success');
        }

        function exportChat() {
            if(msgs.length === 0) {
                Utils.toast('添加消息后再导出吧', 'info');
                return;
            }
            // Simple visual warning as real high-quality canvas capture of complex DOM is hard without html2canvas
            Utils.toast('请直接使用手机/电脑截图功能，效果更佳哦！📸', 'success');
        }

        document.getElementById('msgInput').addEventListener('keydown', e => { if(e.key==='Enter') addMsg(); });

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
