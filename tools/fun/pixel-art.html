<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>像素画板 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .grid-cell {
            border: 1px solid #f1f5f9;
            transition: background-color 0.1s;
        }
        .grid-cell:hover {
            border-color: #fce7f3;
        }
        #palette button.active {
            transform: scale(1.2);
            box-shadow: 0 0 0 4px white, 0 0 0 6px #f472b6;
            z-index: 10;
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎮 创意 <span class="gradient-text">像素画板</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">在方格之间搭建你的像素世界。简单，但充满无限可能。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="flex flex-col md:flex-row gap-8 items-start">
                <!-- Sidebar Controls -->
                <div class="w-full md:w-48 space-y-8">
                    <div>
                        <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">Color Palette / 调色盘</p>
                        <div class="grid grid-cols-4 gap-2" id="palette">
                            <!-- JS Inject -->
                        </div>
                        <div class="mt-4 flex items-center gap-3">
                            <input type="color" id="customColor" class="w-10 h-10 rounded-xl cursor-pointer border-2 border-white shadow-sm" onchange="setColor(this.value)">
                            <span class="text-[10px] font-black text-gray-400 uppercase">Custom / 自定义</span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <button onclick="setEraser()" id="eraserBtn" class="w-full py-3 bg-gray-50 hover:bg-white border-2 border-transparent hover:border-pink-200 text-gray-500 font-black rounded-2xl transition-all flex items-center justify-center gap-2 text-sm shadow-inner group">
                            <span class="group-hover:rotate-12 transition-transform">🧼</span> 橡皮擦
                        </button>
                        <button onclick="clearAll()" class="w-full py-3 bg-white border-2 border-rose-50 text-rose-400 hover:bg-rose-50 hover:border-rose-200 font-black rounded-2xl transition-all text-sm flex items-center justify-center gap-2">
                             🗑️ 清空画板
                        </button>
                    </div>

                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4 pt-4 border-t border-gray-50">Tools / 工作</p>
                    <button onclick="download()" class="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-2xl shadow-xl shadow-pink-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                        📥 保存作品
                    </button>
                </div>

                <!-- Main Artboard -->
                <div class="flex-1 w-full bg-gray-50/50 rounded-[3rem] p-4 md:p-8 shadow-inner border-2 border-pink-50/50 flex items-center justify-center overflow-auto">
                    <div class="bg-white p-2 rounded-xl shadow-2xl border border-white">
                        <div class="inline-grid bg-white" id="grid" style="cursor:crosshair;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>像素画（Pixel Art）是一种以像素为基本单位的艺术形式，它在限制中寻求表现力。虽然分辨率很低，但每一个色块都需要精准的考量。祝你在点线面之间，找到儿时玩掌机时的那份单纯快乐。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const SIZE = 24; // Increased size for better experience
        const CELL = 16;
        const colors = ['#000000','#ffffff','#ff4d4d','#ffaf40','#fffa65','#32ff7e','#7efff5','#18dcff','#7d5fff','#ffb8b8','#c7ecee','#95afc0'];
        let currentColor = '#000000';
        let isDrawing = false;
        let isEraser = false;

        // Init Palette
        const pal = document.getElementById('palette');
        colors.forEach(c => {
            const b = document.createElement('button');
            b.className = 'w-full aspect-square rounded-lg border-2 border-white shadow-sm transition-transform hover:scale-110';
            b.style.backgroundColor = c;
            b.onclick = () => setColor(c, b);
            if(c === '#000000') b.classList.add('active');
            pal.appendChild(b);
        });

        // Init Grid
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${SIZE}, ${CELL}px)`;
        const cells = [];
        for (let i = 0; i < SIZE * SIZE; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.style.width = CELL + 'px';
            cell.style.height = CELL + 'px';
            cell.style.backgroundColor = '#ffffff';
            
            cell.addEventListener('mousedown', (e) => { e.preventDefault(); isDrawing=true; paint(cell); });
            cell.addEventListener('mouseenter', () => { if(isDrawing) paint(cell); });
            
            // Touch support
            cell.addEventListener('touchstart', (e) => { e.preventDefault(); paint(cell); });
            
            grid.appendChild(cell);
            cells.push(cell);
        }
        document.addEventListener('mouseup', () => isDrawing = false);

        function setColor(c, btn) {
            currentColor = c;
            isEraser = false;
            document.getElementById('eraserBtn').classList.remove('bg-pink-100', 'border-pink-300', 'text-pink-600');
            document.querySelectorAll('#palette button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            Utils.toast('切换画笔颜色 ✨', 'info');
        }

        function setEraser() {
            isEraser = true;
            document.querySelectorAll('#palette button').forEach(b => b.classList.remove('active'));
            const eBtn = document.getElementById('eraserBtn');
            eBtn.classList.add('bg-pink-100', 'border-pink-300', 'text-pink-600');
            Utils.toast('已开启橡皮擦 🧼', 'info');
        }

        function paint(cell) {
            cell.style.backgroundColor = isEraser ? '#ffffff' : currentColor;
        }

        function clearAll() {
            cells.forEach(c => c.style.backgroundColor = '#ffffff');
            Utils.toast('已重置画布 ✨', 'info');
        }

        function download() {
            const canvas = document.createElement('canvas');
            canvas.width = SIZE;
            canvas.height = SIZE;
            const ctx = canvas.getContext('2d');
            cells.forEach((cell, i) => {
                ctx.fillStyle = cell.style.backgroundColor || '#ffffff';
                ctx.fillRect(i % SIZE, Math.floor(i / SIZE), 1, 1);
            });
            
            // Rescale to 512 for better visibility
            const big = document.createElement('canvas');
            big.width = 512; big.height = 512;
            const bctx = big.getContext('2d');
            bctx.imageSmoothingEnabled = false;
            bctx.drawImage(canvas, 0, 0, 512, 512);

            const link = document.createElement('a');
            link.download = 'my-pixel-art.png';
            link.href = big.toDataURL();
            link.click();
            Utils.toast('作品保存成功 💾', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            if(e.target.closest('#grid') || e.target.closest('#palette')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
