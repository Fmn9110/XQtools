<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>故障艺术文字 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        .glitch-preview {
            text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9;
            filter: contrast(150%);
        }
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: #fdf2f8;
            height: 8px;
            border-radius: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            background: #f472b6;
            border-radius: 50%;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 4px 10px rgba(244, 114, 182, 0.4);
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">👾 故障 <span class="gradient-text">艺术文字</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">用组合变音符号制造“逻辑崩溃”的视觉效果。Cyber-Macaron Style!✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="mb-8 relative">
                <textarea id="inputText" placeholder="输入你想转换的文字..." rows="3" 
                    class="w-full p-6 bg-pink-50/20 rounded-[2rem] border-2 border-transparent focus:border-pink-200 outline-none resize-none text-lg font-bold text-gray-700 transition-all shadow-inner"
                    oninput="convert()"></textarea>
                <div class="absolute bottom-4 right-6 text-[10px] font-black text-pink-200 uppercase tracking-widest pointer-events-none">Input Area / 输入区</div>
            </div>

            <div class="flex flex-col md:flex-row gap-6 mb-10 items-center justify-between bg-pink-50/30 p-6 rounded-2xl">
                <div class="flex-1 w-full">
                    <div class="flex justify-between mb-2 px-1">
                        <label class="text-[10px] font-black text-pink-400 uppercase tracking-widest">Intensity / 混乱强度</label>
                        <span id="intVal" class="text-xs font-black text-pink-500 bg-white px-2 py-0.5 rounded shadow-sm">5</span>
                    </div>
                    <input type="range" id="intensity" min="1" max="10" value="5" class="w-full" oninput="convert(); document.getElementById('intVal').innerText=this.value">
                </div>
                <button onclick="convert()" class="w-full md:w-auto px-10 py-4 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-xl shadow-lg shadow-pink-100 transition-all active:scale-95">⚡ 注入代码</button>
            </div>

            <div class="bg-gray-900 rounded-[2.5rem] p-10 min-h-[140px] flex items-center justify-center text-center mb-6 relative group overflow-hidden border-4 border-pink-100/10">
                <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-pink-500/10 opacity-50"></div>
                <!-- Scanning line effect -->
                <div class="absolute top-0 left-0 w-full h-1 bg-pink-500/20 blur-sm animate-[scan_3s_linear_infinite]"></div>
                
                <p class="text-2xl md:text-3xl text-pink-400 font-mono break-all glitch-preview relative z-10 font-black cursor-default selection:bg-pink-500 selection:text-white" id="glitchOutput">READY_TO_GLITCH</p>
                <div class="absolute top-4 left-6 text-[8px] font-black text-pink-500/40 uppercase tracking-[0.4em]">Zalgo Output Stream</div>
            </div>

            <div class="flex gap-4">
                <button onclick="copyResult()" class="flex-1 py-4 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl font-black shadow-lg shadow-indigo-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                    📋 COPY_RESULT
                </button>
                <button onclick="document.getElementById('inputText').value=''; convert();" class="w-16 h-16 bg-gray-50 hover:bg-pink-50 rounded-xl flex items-center justify-center text-xl text-gray-300 hover:text-pink-400 transition-all border border-gray-100">🗑️</button>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <h2 class="text-xl font-black text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">👾</span>
                什么是 Zalgo？
            </h2>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 text-gray-500 text-sm leading-relaxed">
                <p>这是一种利用 Unicode 组合字符（Combining Marks）堆叠而成的视觉效果。它将原本加在字母上的重音符、波浪号无限堆积，破坏了正常的行高，从而产生一种系统损坏或超现实的恐惧感。在粉色马卡龙的主题下，它更像是一种“赛博甜点”的独特美感。⚡</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const up = ['\u0300','\u0301','\u0302','\u0303','\u0304','\u0305','\u0306','\u0307','\u0308','\u0309','\u030A','\u030B','\u030C','\u030D','\u030E','\u030F','\u0310','\u0311','\u0312'];
        const mid = ['\u0315','\u031B','\u0340','\u0341','\u0358','\u0321','\u0322','\u0327','\u0328','\u0334','\u0335','\u0336','\u0337','\u0338'];
        const down = ['\u0316','\u0317','\u0318','\u0319','\u031C','\u031D','\u031E','\u031F','\u0320','\u0324','\u0325','\u0326','\u0329','\u032A','\u032B','\u032C','\u032D','\u032E','\u032F','\u0330','\u0331','\u0332','\u0333'];

        function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

        function convert() {
            const text = document.getElementById('inputText').value;
            if(!text) {
                document.getElementById('glitchOutput').textContent = 'READY_TO_GLITCH';
                return;
            }
            const intensity = parseInt(document.getElementById('intensity').value);
            let result = '';
            for (const char of text) {
                result += char;
                const n = Math.floor(Math.random() * intensity) + 1;
                for (let i = 0; i < n; i++) {
                    result += pick(up);
                    result += pick(mid);
                    result += pick(down);
                }
            }
            document.getElementById('glitchOutput').textContent = result;
        }

        function copyResult() {
            const content = document.getElementById('glitchOutput').textContent;
            if(content === 'READY_TO_GLITCH') return;
            
            navigator.clipboard.writeText(content).then(() => {
                Utils.toast('GLITCHED_TEXT_COPIED 👾', 'success');
            });
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <style>
        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
    </style>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
