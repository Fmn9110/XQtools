<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吉他调音器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .guitar-string {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .guitar-string::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.05);
            transform: translateY(-50%);
        }
        .guitar-string:active {
            transform: scale(0.98);
        }
        .guitar-string.playing::after {
            background: #f472b6;
            animation: vibrate 0.1s linear infinite;
        }
        @keyframes vibrate {
            0% { transform: translateY(-50%) translateX(0); }
            25% { transform: translateY(-52%) translateX(1px); }
            50% { transform: translateY(-50%) translateX(0); }
            75% { transform: translateY(-48%) translateX(-1px); }
            100% { transform: translateY(-50%) translateX(0); }
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎸 吉他 <span class="gradient-text">调音器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">简单的标准音参考。点击弦名，调准你的心动频率。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="max-w-md mx-auto space-y-4" id="strings">
                <!-- Strings will be injected here -->
            </div>
            <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.3em] mt-10 text-center">Tap to play standard pitch / 点击播放标准音</p>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    调音贴士
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>标准调音下，从最粗的弦（6弦）到最细的弦（1弦）依次为 E, A, D, G, B, E。建议在安静环境下调节。如果相差太远，请先松弦后再慢慢拧紧。</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    关于频率
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>本工具发出的是纯正的正弦波，代表了各个弦的基频。听觉上的音准误差通常在 ±3Hz 以内。调完音后扫一下和弦，感受共振的快乐吧！💖</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const stringsData = [
            {id:1, name:'1弦 High E', freq:329.63, color:'bg-pink-50 border-pink-100 text-pink-500'},
            {id:2, name:'2弦 B', freq:246.94, color:'bg-indigo-50 border-indigo-100 text-indigo-500'},
            {id:3, name:'3弦 G', freq:196.00, color:'bg-violet-50 border-violet-100 text-violet-500'},
            {id:4, name:'4弦 D', freq:146.83, color:'bg-rose-50 border-rose-100 text-rose-500'},
            {id:5, name:'5弦 A', freq:110.00, color:'bg-blue-50 border-blue-100 text-blue-500'},
            {id:6, name:'6弦 Low E', freq:82.41, color:'bg-emerald-50 border-emerald-100 text-emerald-500'}
        ];

        let audioCtx = null;
        let currentOsc = null;
        let currentGain = null;

        function playString(freq, btn) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Stop previous
            if(currentOsc) {
                try {
                    currentGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    currentOsc.stop(audioCtx.currentTime + 0.1);
                } catch(e) {}
            }

            // Remove all playing classes
            document.querySelectorAll('.guitar-string').forEach(el => el.classList.remove('playing'));
            btn.classList.add('playing');

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 3);
            
            currentOsc = osc;
            currentGain = gain;

            setTimeout(() => {
                btn.classList.remove('playing');
            }, 3000);
            
            Utils.toast(`Playing ${freq}Hz`, 'info');
        }

        let html = '';
        stringsData.forEach((s, idx) => {
            html += `
            <button onclick="playString(${s.freq}, this)" 
                class="guitar-string w-full p-5 rounded-2xl border-2 ${s.color} flex justify-between items-center group animate-item"
                style="animation-delay: ${idx*0.05}s">
                <div class="text-left">
                    <p class="text-sm font-black uppercase tracking-widest opacity-80">${s.name}</p>
                    <p class="text-[10px] font-bold opacity-40">${s.freq} Hz</p>
                </div>
                <div class="w-10 h-10 bg-white/50 rounded-full flex items-center justify-center shadow-inner group-hover:scale-110 transition-transform">
                    <span class="text-xl">🔊</span>
                </div>
            </button>`;
        });
        document.getElementById('strings').innerHTML = html;

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
