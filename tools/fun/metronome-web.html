<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>节拍器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .beat-dot { transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #f472b6;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 4px 10px rgba(244, 114, 182, 0.3);
            border: 3px solid white;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #ffe4e6;
            border-radius: 4px;
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🥁 迷你 <span class="gradient-text">节拍器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">精准把握每一个音符的律动。✨</p>
        </header>

        <section class="cute-card p-8 md:p-16 mb-12 bg-white text-center animate-item" style="animation-delay: 0.2s">
            <div class="mb-12">
                <p class="text-[10px] font-black text-pink-300 uppercase tracking-[0.4em] mb-2">Beats Per Minute</p>
                <div class="flex items-baseline justify-center gap-2">
                    <p class="text-7xl md:text-9xl font-black text-pink-500" style="font-family: 'Outfit', sans-serif;" id="bpmVal">120</p>
                    <span class="text-gray-300 font-bold text-xl uppercase tracking-widest">bpm</span>
                </div>
            </div>

            <div class="max-w-md mx-auto mb-16 px-4">
                <input type="range" id="bpm" min="40" max="240" value="120" 
                    class="w-full" 
                    oninput="document.getElementById('bpmVal').textContent=this.value">
                <div class="flex justify-between text-[10px] font-bold text-gray-300 mt-2 uppercase tracking-widest">
                    <span>Largo (40)</span>
                    <span>Presto (240)</span>
                </div>
            </div>

            <div class="flex gap-4 justify-center mb-16" id="beats">
                <div class="w-4 h-4 rounded-full bg-gray-100 beat-dot border-2 border-white shadow-inner"></div>
                <div class="w-4 h-4 rounded-full bg-gray-100 beat-dot border-2 border-white shadow-inner"></div>
                <div class="w-4 h-4 rounded-full bg-gray-100 beat-dot border-2 border-white shadow-inner"></div>
                <div class="w-4 h-4 rounded-full bg-gray-100 beat-dot border-2 border-white shadow-inner"></div>
            </div>

            <div class="relative inline-block">
                <!-- Outer ring animation -->
                <div id="ring" class="absolute -inset-4 border-2 border-pink-100 rounded-full hidden"></div>
                <button onclick="toggle()" id="playBtn" class="w-24 h-24 rounded-full bg-pink-500 hover:bg-pink-600 text-white text-4xl shadow-2xl shadow-pink-100 hover:scale-105 active:scale-95 transition-all flex items-center justify-center relative z-10">
                    <span id="playIcon">▶</span>
                </button>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🎼</span>
                <p>节奏是音乐的骨架。无论是初学者的入门练习，还是资深玩家的灵感推敲，一个稳定的节拍器都是不可或缺的伙伴。建议从较慢的速度开始，逐步挑战更快的律动。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let playing=false,interval=null,beatIdx=0,audioCtx=null;
        
        function click(accent){
            if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
            const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
            osc.type='sine';osc.frequency.setValueAtTime(accent?1000:800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
            osc.connect(gain);gain.connect(audioCtx.destination);
            osc.start();osc.stop(audioCtx.currentTime+0.1);
        }

        function toggle(){
            const btn = document.getElementById('playBtn');
            const icon = document.getElementById('playIcon');
            const ring = document.getElementById('ring');

            if(playing){
                playing=false;
                clearInterval(interval);
                icon.textContent='▶';
                btn.className = 'w-24 h-24 rounded-full bg-pink-500 hover:bg-pink-600 text-white text-4xl shadow-2xl shadow-pink-100 hover:scale-105 active:scale-95 transition-all flex items-center justify-center relative z-10';
                ring.classList.add('hidden');
                Utils.toast('已暂停 🎼', 'info');
                return;
            }

            playing=true;
            beatIdx=0;
            icon.textContent='⏸';
            btn.className = 'w-24 h-24 rounded-full bg-gray-800 text-white text-4xl shadow-2xl shadow-gray-100 hover:scale-105 active:scale-95 transition-all flex items-center justify-center relative z-10';
            ring.classList.remove('hidden');
            Utils.toast('节奏启动 🥁', 'success');

            function tick(){
                const dots=document.querySelectorAll('.beat-dot');
                dots.forEach(d=> {
                    d.className='w-4 h-4 rounded-full bg-gray-100 beat-dot border-2 border-white shadow-inner';
                    d.style.transform = 'scale(1)';
                });
                const current = dots[beatIdx % 4];
                current.className='w-4 h-4 rounded-full bg-pink-400 beat-dot border-2 border-pink-100 shadow-md shadow-pink-100';
                current.style.transform = 'scale(1.4)';
                
                click(beatIdx % 4 === 0);
                beatIdx++;

                // Ring pulse
                ring.style.opacity = '1';
                ring.style.transform = 'scale(1)';
                setTimeout(() => {
                    ring.style.opacity = '0';
                    ring.style.transform = 'scale(1.5)';
                    ring.style.transition = 'all 0.4s ease-out';
                }, 10);
                ring.style.transition = 'none';
            }

            tick();
            
            const scheduleNext = () => {
                const bpm=parseInt(document.getElementById('bpm').value);
                const delay = 60000 / bpm;
                interval = setTimeout(() => {
                    if(!playing) return;
                    tick();
                    scheduleNext();
                }, delay);
            };
            scheduleNext();
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
