<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>和弦生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎵 随机 <span class="gradient-text">和弦生成器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">生成随机和弦进行，开启你的音乐灵感之旅。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="animate-item" style="animation-delay: 0.3s">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-3">KEY / 调性选择</label>
                    <select id="key" class="w-full p-4 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-100 outline-none text-gray-600 font-bold transition-all cursor-pointer">
                        <option>C大调</option><option>G大调</option><option>D大调</option><option>A小调</option><option>E小调</option>
                    </select>
                </div>
                <div class="animate-item" style="animation-delay: 0.4s">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-3">LOG / 和弦数量</label>
                    <select id="count" class="w-full p-4 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-100 outline-none text-gray-600 font-bold transition-all cursor-pointer">
                        <option value="4">4个和弦</option><option value="8">8个和弦</option>
                    </select>
                </div>
            </div>
            
            <button onclick="genChords()" class="theme-download-btn w-full max-w-md mx-auto block py-5 text-xl mb-10">🎶 立即生成进行</button>
            
            <div id="chords" class="flex flex-wrap gap-4 justify-center py-6 min-h-[120px] animate-item" style="animation-delay: 0.5s"></div>
            
            <div id="tipsArea" class="hidden animate-item">
                <div class="mt-8 pt-8 border-t border-pink-50 text-center">
                    <div id="tipsText" class="inline-block px-6 py-3 bg-indigo-50 text-indigo-400 rounded-2xl text-xs font-bold border border-indigo-100/50"></div>
                </div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    练习建议
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 text-sm">
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">1</span> 先在乐器上找到对应的和弦按法。</li>
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">2</span> 尝试使用不同的节奏律动来演练生成的进行。</li>
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">3</span> 如果某个进行听起来很棒，记得记录在灵感本里。</li>
                    </ul>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.7s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">?</span>
                    什么是进行？
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed">
                    <p class="text-gray-500 text-sm">和弦进行是按照一定逻辑排列的和弦序列，它是音乐情感表达的骨架。本工具基于流行音乐中最常见的 1-4-5、1-6-4-5 等黄金法则进行随机组合。</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const keyChords = {
            'C大调':['C','Dm','Em','F','G','Am','Bdim'],
            'G大调':['G','Am','Bm','C','D','Em','F#dim'],
            'D大调':['D','Em','F#m','G','A','Bm','C#dim'],
            'A小调':['Am','Bdim','C','Dm','Em','F','G'],
            'E小调':['Em','F#dim','G','Am','Bm','C','D'],
        };
        const commonPatterns = [
            [0,3,4,0],[0,4,5,3],[0,5,3,4],[5,3,0,4],[0,3,5,4],[0,2,3,4]
        ];

        function genChords() {
            const key = document.getElementById('key').value;
            const count = parseInt(document.getElementById('count').value);
            const pool = keyChords[key];
            const pattern = commonPatterns[Math.floor(Math.random() * commonPatterns.length)];
            let chords = [];
            while (chords.length < count) {
                pattern.forEach(idx => { if (chords.length < count) chords.push(pool[idx]); });
            }
            
            let html = '';
            const themeColors = [
                {bg:'bg-pink-100', text:'text-pink-500'},
                {bg:'bg-indigo-100', text:'text-indigo-500'},
                {bg:'bg-orange-100', text:'text-orange-500'},
                {bg:'bg-purple-100', text:'text-purple-500'},
                {bg:'bg-rose-100', text:'text-rose-500'},
                {bg:'bg-emerald-100', text:'text-emerald-500'}
            ];

            chords.forEach((c, i) => {
                const color = themeColors[i % themeColors.length];
                html += `<div class="w-20 h-20 md:w-24 md:h-24 ${color.bg} ${color.text} rounded-[1.5rem] flex flex-col items-center justify-center shadow-lg transform transition-all hover:scale-105 select-none" style="animation: bounceIn 0.5s ease ${i*0.05}s both;">
                    <span class="text-xl md:text-2xl font-black">${c}</span>
                    <span class="text-[10px] font-black opacity-40 uppercase tracking-widest mt-1">${i+1}</span>
                </div>`;
            });
            document.getElementById('chords').innerHTML = html;
            document.getElementById('tipsArea').classList.remove('hidden');
            document.getElementById('tipsText').innerHTML = `💡 ${key}探索进行：${chords.join(' → ')}`;
            Utils.toast('和弦进行已生成', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            genChords();
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>
    <style>
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(20px); }
            50% { opacity: 0.9; transform: scale(1.1) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
