<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>象形文字转换器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Hieroglyphs';
            src: local('Noto Sans Egyptian Hieroglyphs'), local('Hieroglyphs');
        }
        #output {
            font-family: 'Hieroglyphs', 'Outfit', sans-serif;
            line-height: 1.5;
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">𓀀 象形 <span class="gradient-text">文字转换</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">用古老的符号，传递现代的讯息。让文字跨越千年。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="relative group mb-8 text-center">
                <input type="text" id="inputText" placeholder="输入英文字母或数字..." 
                    class="w-full max-w-lg mx-auto p-5 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-200 outline-none text-center text-xl font-black text-gray-700 transition-all shadow-inner uppercase"
                    oninput="convert()">
                <label class="block text-[10px] font-black text-pink-300 uppercase tracking-[0.3em] mt-3">English Characters / 英文字符</label>
            </div>

            <div class="bg-gradient-to-br from-amber-50/50 to-pink-50/50 rounded-[3rem] p-10 md:p-16 text-center border-2 border-amber-100 shadow-inner group relative overflow-hidden mb-8">
                <div class="absolute -top-10 -left-10 text-9xl text-amber-500/10 opacity-30 group-hover:rotate-12 transition-transform">𓂀</div>
                
                <p class="text-4xl md:text-6xl tracking-widest break-all text-amber-700 drop-shadow-sm min-h-[4rem]" id="output"></p>
                <div class="h-1 w-16 bg-amber-200/50 rounded-full mt-10 mx-auto"></div>
            </div>

            <div class="flex justify-center">
                <button onclick="copyResult()" class="theme-download-btn w-full max-w-md py-5 text-xl">📋 复制神秘符号</button>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">🏺</span>
                    神秘的历史
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>埃及象形文字（Hieroglyphs）是世界上最古老的书写系统之一。它们不仅是语言，更是艺术品。本转换器利用了 Unicode 符号集，让你在现代屏幕上也能感受到远古的震鸣。</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    如何书写？
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>由于 Unicode 的限制，我们采用的是单字母对应法则。这相当于将英文发音通过类似的象形符号进行「拼音化」。它非常适合用来制作个性签名、贴纸或者是神秘的社交媒体动态。💖</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const charMap = {
            'A':'𓄿','B':'𓃀','C':'𓍿','D':'𓂧','E':'𓇋','F':'𓆑','G':'𓎼','H':'𓉔',
            'I':'𓇋','J':'𓆓','K':'𓎡','L':'𓃭','M':'𓅓','N':'𓈖','O':'𓍯','P':'𓊪',
            'Q':'𓈎','R':'𓂋','S':'𓋴','T':'𓏏','U':'𓅱','V':'𓆑','W':'𓅱','X':'𓎝',
            'Y':'𓇌','Z':'𓊃',
            '0':'𓎆','1':'𓏤','2':'𓏮','3':'𓏪','4':'𓏬','5':'𓏭','6':'𓏮','7':'𓏯','8':'𓏰','9':'𓏱',
            ' ':' '
        };

        function convert() {
            const input = document.getElementById('inputText').value.toUpperCase();
            let result = '';
            for (const ch of input) {
                result += charMap[ch] || ch;
            }
            document.getElementById('output').textContent = result;
        }

        function copyResult() {
            const text = document.getElementById('output').textContent;
            if(!text) {
                Utils.toast('先输入点什么吧', 'info');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                Utils.toast('神秘符号已复制 ✨', 'success');
            });
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
