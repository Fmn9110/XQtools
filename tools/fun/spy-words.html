<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>谁是卧底 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .player-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .player-card:hover {
            transform: translateY(-5px);
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🕵️ 谁是 <span class="gradient-text">卧底词库</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">眼神博弈，心理交锋。一键分配关键词，开启你的戏精时刻。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="w-full max-w-md mb-10 space-y-6">
                <div class="relative group">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-widest mb-2 pl-4">Players / 参与人数</label>
                    <input type="number" id="count" value="6" min="3" max="12" 
                        class="w-full p-4 bg-pink-50/20 rounded-2xl border-none outline-none font-black text-pink-500 text-center text-xl shadow-inner appearance-none">
                </div>
                
                <button onclick="start()" class="w-full py-5 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95 text-xl">
                    🎲 派发身份词
                </button>
            </div>

            <div class="w-full">
                <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest text-center mb-8" id="guideText">
                    Wait for generation...
                </p>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="cards">
                    <!-- player cards injected here -->
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>传阅手机时，请确保只有自己看到所属的词语。点击卡片显示词语，看完后再次点击隐藏。这是一场关于描述技巧与察言观色的较量，祝你玩得开心！💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const wordPairs=[
            ['猕猴桃','奇异果'],['西瓜','哈密瓜'],['包子','饺子'],['牛奶','豆浆'],
            ['手机','平板'],['口红','唇膏'],['微信','QQ'],['沙发','椅子'],
            ['拖鞋','凉鞋'],['面包','蛋糕'],['老师','教授'],['公交车','地铁'],
            ['筷子','叉子'],['眼镜','墨镜'],['毛巾','浴巾']
        ];

        function start(){
            const n=parseInt(document.getElementById('count').value)||6;
            const pair=wordPairs[Math.floor(Math.random()*wordPairs.length)];
            const spyIdx=Math.floor(Math.random()*n);
            
            document.getElementById('guideText').innerText = "点击卡片查看/隐藏词语，保持神秘哦！";
            
            let html='';
            for(let i=0;i<n;i++){
                const word=i===spyIdx?pair[1]:pair[0];
                html+=`
                    <div onclick="toggleCard(this)" class="player-card p-6 bg-white border-2 border-indigo-50 rounded-[2rem] cursor-pointer flex flex-col items-center justify-center animate-item shadow-sm hover:border-indigo-200" style="animation-delay: ${i*0.05}s">
                        <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center mb-3">
                            <span class="text-indigo-400 font-black text-sm">${i+1}</span>
                        </div>
                        <div class="text-center">
                            <span class="font-black text-gray-700 text-lg hidden transition-all">${word}</span>
                            <span class="text-gray-300 font-bold text-xs uppercase tracking-widest block mt-1 hover-guide">Tap to reveal</span>
                        </div>
                    </div>
                `;
            }
            document.getElementById('cards').innerHTML=html;
            Utils.toast('身份词派发完毕 ✨', 'success');
        }

        function toggleCard(el) {
            const word = el.querySelector('span:first-child');
            const guide = el.querySelector('.hover-guide');
            const isHidden = word.classList.contains('hidden');
            
            if(isHidden) {
                word.classList.remove('hidden');
                guide.innerText = "Tap to hide";
                el.classList.add('border-pink-300', 'bg-pink-50/20');
            } else {
                word.classList.add('hidden');
                guide.innerText = "Tap to reveal";
                el.classList.remove('border-pink-300', 'bg-pink-50/20');
            }
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy  -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
