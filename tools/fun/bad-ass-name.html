<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中二病名字生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">⚔️ 中二病 <span class="gradient-text">名字生成器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">觉醒你的黑暗之力！生成最霸气、最酷炫的神秘代号。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="bg-gradient-to-br from-gray-900 via-pink-900 to-gray-900 rounded-[2.5rem] p-10 text-center mb-10 shadow-2xl relative overflow-hidden group">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')] opacity-20"></div>
                <p class="text-xs font-black text-pink-300 uppercase tracking-[0.3em] mb-4 relative z-10" id="title">「 封印之名 」</p>
                <p class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-300 via-rose-400 to-purple-400 mb-4 tracking-tighter relative z-10 transition-all duration-700 hover:scale-105" id="name2b">等待觉醒...</p>
                <p class="text-[10px] text-pink-200/40 mt-4 font-mono tracking-widest uppercase relative z-10" id="subtitle">SYSTEM STANDBY</p>
            </div>
            
            <button onclick="gen2b()" class="theme-download-btn w-full max-w-md mx-auto block py-5 text-xl mb-10">🔥 立即觉醒！生成名字</button>

            <div class="pt-8 border-t border-pink-50">
                <p class="text-xs font-black text-gray-300 uppercase tracking-widest mb-6 text-center">觉醒履历</p>
                <div class="flex flex-wrap justify-center gap-2" id="history2b">
                    <div class="text-[10px] text-gray-300 italic">尚未触碰禁忌的力量</div>
                </div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.3s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    角色设定
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <p class="text-gray-600 text-sm leading-relaxed">
                        点击觉醒即可从古老的词库中召唤充满力量的名字。适用于小说创作、游戏改名或社交平台个性昵称。
                    </p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.4s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">?</span>
                    什么是中二病？
                </h2>
                <div class="space-y-4">
                    <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm">
                        <div class="text-gray-500 text-sm leading-relaxed">指追求独特、酷炫风格，充满了对异能、命运和黑暗力量的奇幻想象，是青春期热血性格的极致体现。</div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const prefixes = ['暗黑','血色','不灭','永恒','堕落','终焉','混沌','虚无','灭世','逆天','弑神','焚天','噬魂','裂空','凌霄','破晓','夜叉','修罗'];
        const cores = ['之瞳','圣翼','龙帝','魔神','剑仙','帝皇','冥王','天尊','魔帝','战神','煞星','鬼王','炎帝','雷霆','审判者','支配者','歼灭者'];
        const titles = ['「黑暗中苏醒的古神」','「被封印千年的灵魂」','「命运的反逆者」','「审判日的执行者」','「恒星坍缩的见证者」','「深渊的凝视者」','「时间线的修正者」','「因果律的破坏者」'];
        const subs = ['觉醒度: ███████░░ 78%','封印解除进度: ████████░ 89%','力量等级: SSS+','危险评级: Ω级','存在维度: 第七维','灵魂频率: 不可观测'];

        function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
        const hist = [];
        function gen2b() {
            const name = pick(prefixes) + pick(cores);
            document.getElementById('name2b').textContent = name;
            document.getElementById('title').textContent = pick(titles);
            document.getElementById('subtitle').textContent = pick(subs);
            hist.unshift(name);
            if (hist.length > 10) hist.pop();
            document.getElementById('history2b').innerHTML = hist.map(h => `<div class="px-4 py-1.5 bg-pink-50 text-pink-400 rounded-full text-[10px] font-bold border border-pink-100/50">${h}</div>`).join('');
            Utils.toast('次元壁已突破', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
