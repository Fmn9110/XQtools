<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恐惧指数测试 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">😱 恐惧 <span class="gradient-text">指数测试</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">探索你潜意识里的“阴影面积”。你是胆色过人还是真·小可爱？✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div id="quiz" class="space-y-8 mb-10">
                <!-- Content generated by JS -->
            </div>
            
            <button onclick="calcFear()" class="theme-download-btn w-full py-5 text-xl animate-item" style="animation-delay: 0.4s">😱 揭晓恐惧真相</button>
            
            <div id="fearResult" class="hidden mt-10 animate-item">
                <div class="bg-gradient-to-br from-pink-50/70 to-indigo-50/50 rounded-[2.5rem] p-8 md:p-12 border-2 border-pink-100/50 shadow-inner group flex flex-col items-center">
                    <p class="text-7xl mb-4 group-hover:scale-110 transition-transform" id="fEmoji"></p>
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-[0.5em] mb-2">FEAR INDEX / 恐惧指数</p>
                    <p class="text-3xl md:text-4xl font-black text-gray-800 mb-6" id="fScore">0%</p>
                    
                    <div class="w-full max-w-xs h-3 bg-white/50 rounded-full mb-8 overflow-hidden border border-pink-100">
                        <div id="fProgressBar" class="h-full bg-gradient-to-r from-pink-400 to-indigo-400 transition-all duration-1000" style="width: 0%"></div>
                    </div>

                    <p class="text-xl font-black text-pink-500 mb-2" id="fTitle"></p>
                    <p class="text-gray-500 text-sm leading-relaxed max-w-sm" id="fDesc"></p>
                    
                    <button onclick="location.reload()" class="mt-8 text-xs font-black text-gray-300 hover:text-pink-400 transition-colors uppercase tracking-widest">🔄 重新测试</button>
                </div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    恐惧的本质
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>恐惧起源于杏仁核对未知威胁的预警。它是不安，也是智慧——提醒我们保护自己。通过了解恐惧，我们才能学会如何与之共处。</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    关于结果
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>本测评基于趣味心理学参数设置，结果仅供娱乐。无论结果如何，记得你比自己想象的要勇敢得多！💖</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fears = [
            {q:'你对黑暗的感觉：',opts:['完全不怕','有点不安','相当害怕','超级害怕']},
            {q:'看到蜘蛛/虫子时：',opts:['无感','小声尖叫','立刻逃跑','吓到灵魂出窍']},
            {q:'独自坐电梯：',opts:['完全没事','稍微紧张','心跳加速','宁愿爬楼']},
            {q:'看恐怖片：',opts:['很享受','偶尔会吓到','必须捂眼睛','绝对不会看']},
            {q:'走夜路回家：',opts:['正常走','走快点','小跑','百米冲刺']},
            {q:'听到奇怪的声音：',opts:['好奇去看','假装没听到','心里发毛','已经在报警了']},
        ];

        let html = '';
        fears.forEach((f, i) => {
            html += `
            <div class="animate-item" style="animation-delay: ${0.3 + i*0.05}s">
                <p class="text-lg font-black text-gray-700 mb-4 flex items-center gap-3">
                    <span class="w-6 h-6 bg-pink-400 text-white rounded-full flex items-center justify-center text-[10px]">${String(i+1).padStart(2,'0')}</span>
                    ${f.q}
                </p>
                <div class="grid grid-cols-2 gap-3">
                    ${f.opts.map((o,j) => `
                        <button onclick="pickFear(${i},${j}, this)" 
                            class="fear-${i} p-4 rounded-2xl bg-pink-50/30 border-2 border-transparent text-sm font-bold text-gray-500 hover:bg-pink-50 hover:text-pink-500 transition-all text-center">
                            ${o}
                        </button>
                    `).join('')}
                </div>
            </div>`;
        });
        document.getElementById('quiz').innerHTML = html;

        const answers = {};
        function pickFear(i, val, btn) {
            answers[i] = val;
            document.querySelectorAll(`.fear-${i}`).forEach(b => {
                b.classList.remove('border-pink-300', 'bg-pink-50', 'text-pink-500', 'shadow-md', 'shadow-pink-100');
                b.classList.add('bg-pink-50/30', 'text-gray-500');
            });
            btn.classList.remove('bg-pink-50/30', 'text-gray-500');
            btn.classList.add('border-pink-300', 'bg-pink-50', 'text-pink-500', 'shadow-md', 'shadow-pink-100');
        }

        function calcFear() {
            if (Object.keys(answers).length < fears.length) { 
                Utils.toast('还有问题没回答哦', 'info');
                return; 
            }
            
            let total = 0;
            Object.values(answers).forEach(v => total += v);
            const score = Math.round(total / (fears.length * 3) * 100);
            
            let emoji, title, desc;
            if (score >= 80) { 
                emoji='😱'; title='终极恐惧大师'; desc='你的恐惧感超级强烈！哪怕一点风吹草动都能让你起鸡皮疙瘩。建议多抱抱身边的毛绒玩具，或者是点亮一盏温暖的小夜灯。✨'; 
            } else if (score >= 60) { 
                emoji='😰'; title='敏感型小可爱'; desc='你比较容易被吓到，想象力极其丰富，总能补全恐怖片的后续。但谁不是呢？保持这种敏感度其实也是一种敏锐的感知力。'; 
            } else if (score >= 30) { 
                emoji='😐'; title='理性淡定选手'; desc='你的心理防线相当稳固，大部分所谓的恐怖元素在你眼里也只是“套路”罢了。你更倾向于用逻辑去分析所谓的不安。'; 
            } else { 
                emoji='😎'; title='无畏钢铁勇士'; desc='你简直是天不怕地不怕！恐怖屋对你来说可能只是普通公园。请问你是不是经常被朋友拉去“走在前头”挡枪？'; 
            }
            
            document.getElementById('fEmoji').textContent = emoji;
            document.getElementById('fScore').textContent = score + '%';
            document.getElementById('fTitle').textContent = title;
            document.getElementById('fDesc').textContent = desc;
            
            document.getElementById('fearResult').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('fProgressBar').style.width = score + '%';
                document.getElementById('fearResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
            
            Utils.toast('测评结果已送达', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
