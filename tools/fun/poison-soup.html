<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毒鸡汤 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🥣 觉醒 <span class="gradient-text">毒鸡汤</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">干了这一碗，让我们在现实的冷水中清醒。✨</p>
        </header>

        <section class="cute-card p-6 md:p-16 mb-12 bg-white animate-item text-center" style="animation-delay: 0.2s">
            <div class="bg-gray-900 rounded-[3rem] p-10 md:p-20 mb-12 border-4 border-gray-800 shadow-2xl relative group overflow-hidden">
                <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: linear-gradient(0deg, transparent 24%, rgba(0, 255, 65, .05) 25%, rgba(0, 255, 65, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 65, .05) 75%, rgba(0, 255, 65, .05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 255, 65, .05) 25%, rgba(0, 255, 65, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 65, .05) 75%, rgba(0, 255, 65, .05) 76%, transparent 77%, transparent); background-size: 50px 50px;"></div>
                
                <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.4em] mb-6">Reality Check / 面对现实</p>
                <div class="min-h-[120px] flex items-center justify-center">
                    <p class="text-xl md:text-2xl font-bold text-green-400 leading-relaxed max-w-xl" id="soup">正在为你熬制今日份清醒... 🥣</p>
                </div>
                
                <div class="mt-8 flex justify-center gap-1 opacity-20">
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
                </div>
            </div>

            <div class="flex justify-center">
                <button onclick="nextSoup()" class="w-full max-w-sm py-5 bg-gray-900 hover:bg-black text-white font-black rounded-[2rem] shadow-xl shadow-gray-200 transition-all active:scale-95 text-xl flex items-center justify-center gap-2">
                    🍵 再来一碗清醒
                </button>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>听惯了温室里的花言巧语，偶尔也需要一点带刺的真相。虽然这些话听起来有些扎心，但它们往往比鸡汤更接近生活的本质。看清世界后依然热爱世界，才是真正的英雄主义。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const soups = [
            '努力了不一定会成功，但不努力一定很轻松。',
            '你全力做到最好，可能还不如别人随便搞搞。',
            '如果你很忙，除了你真的很重要以外，更可能的原因是——你很弱。',
            '有时候你不努力一下，就不知道什么叫绝望。',
            '条条大路通罗马，但有些人就住在罗马。',
            '你以为有钱人很快乐吗？他们的快乐你根本想象不到。',
            '又一天过去了，今天过得怎么样？梦想是不是更远了？',
            '失败并不可怕，可怕的是你还相信这句话。',
            '世界上有10%的人理解二进制，剩下的都不理解。',
            '当你觉得自己又丑又穷，一无是处时——不要绝望，因为至少你的判断还是对的。'
        ];
        
        let idx = 0;
        function shuffle() {
            for(let i = soups.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [soups[i], soups[j]] = [soups[j], soups[i]];
            }
        }
        
        shuffle();

        function nextSoup() {
            const out = document.getElementById('soup');
            out.style.opacity = '0';
            out.style.filter = 'blur(10px)';
            
            setTimeout(() => {
                out.textContent = soups[idx % soups.length];
                idx++;
                out.style.opacity = '1';
                out.style.filter = 'blur(0)';
                out.style.transition = 'all 0.4s ease-out';
                Utils.toast('已熬制成功 🍲', 'info');
            }, 300);
        }

        // Initialize
        setTimeout(nextSoup, 200);

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
