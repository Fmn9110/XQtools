<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>左右脑倾向测试 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🧠 左右脑 <span class="gradient-text">倾向测试</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">通过趣味测试，探索你思维世界的无限可能。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div id="quiz" class="space-y-6 mb-10"></div>
            
            <button onclick="calcBrain()" class="theme-download-btn w-full max-w-md mx-auto block py-5 text-xl mb-10">🧠 查看我的脑力分布</button>
            
            <div id="resultArea" class="hidden animate-item">
                <div class="bg-gradient-to-br from-pink-50/50 to-indigo-50/50 rounded-[2.5rem] p-8 md:p-12 border-2 border-pink-100/50 shadow-inner text-center" id="resultCard">
                    <p class="text-6xl md:text-7xl mb-6 drop-shadow-sm" id="rEmoji"></p>
                    <p class="text-2xl md:text-4xl font-black text-gray-800 mb-6 tracking-tight" id="rType"></p>
                    
                    <div class="max-w-md mx-auto mb-8 bg-white/50 p-6 rounded-3xl border border-white/80">
                        <div class="flex justify-between text-[10px] font-black uppercase tracking-widest mb-3">
                            <span class="text-indigo-400">LEFT 逻辑脑</span>
                            <span class="text-pink-400">RIGHT 创意脑</span>
                        </div>
                        <div class="flex items-center gap-1 h-6 w-full rounded-full overflow-hidden bg-gray-100/50 border border-gray-100">
                            <div id="barL" class="h-full bg-indigo-400 transition-all duration-1000 shadow-[0_0_15px_rgba(129,140,248,0.3)]"></div>
                            <div id="barR" class="h-full bg-pink-400 transition-all duration-1000 shadow-[0_0_15px_rgba(244,114,182,0.3)]"></div>
                        </div>
                        <div class="flex justify-between text-lg font-black mt-3">
                            <span class="text-indigo-500" id="lPctText">0%</span>
                            <span class="text-pink-500" id="rPctText">0%</span>
                        </div>
                    </div>
                    
                    <p class="text-gray-600 leading-relaxed text-sm md:text-base italic max-w-xl mx-auto" id="rDesc"></p>
                </div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.3s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    关于测试
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <p class="text-gray-600 text-sm leading-relaxed">
                        大脑分工理论由罗杰·斯佩里提出。左脑通常负责逻辑、语言、数学和秩序；右脑则更擅长想象、直觉、节奏和空间感。了解自己的偏好有助于发挥优势。
                    </p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.4s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">💡</span>
                    温馨提示
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed">
                    <p class="text-gray-500 text-sm">测试结果仅供参考，大脑的潜力是无穷的。通过刻意练习，您可以同时提升逻辑思维与创造力。</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const questions = [
            {q:'当面临重要决策时，你会？',a:'冷静分析利弊，寻找最优解',b:'顺从内心的直觉和第一反应'},
            {q:'在学校或工作中，你更擅长？',a:'处理数字、公式和逻辑难题',b:'构思画面、旋律或创意方案'},
            {q:'开始一项复杂的新任务时？',a:'仔细研读手册，严格按步骤操作',b:'凭感觉直接上手，在实践中摸索'},
            {q:'你理想中的个人空间应该是？',a:'井井有条，每样物品都有其归宿',b:'随性自然，虽然凌乱但充满灵感'},
            {q:'安排假期旅行计划时，你倾向？',a:'制作详细清单，甚至精确到小时',b:'大致定个方向，随遇而安即兴发挥'},
            {q:'你记笔记或整理思路的方式偏向？',a:'清晰的文字摘要和逻辑大纲',b:'思维导图、简笔画或视觉剪贴'},
        ];

        let html = '';
        questions.forEach((q, i) => {
            html += `<div class="bg-pink-50/20 rounded-3xl p-6 md:p-8 animate-item" style="animation-delay: ${0.1 * i}s">
                <p class="font-black text-gray-700 mb-5 flex items-center"><span class="w-6 h-6 bg-pink-400 text-white text-[10px] rounded-full flex items-center justify-center mr-3 font-mono">${i+1}</span> ${q.q}</p>
                <div class="flex flex-col md:flex-row gap-4">
                    <button onclick="pickAns(${i},'L')" class="ans-${i} flex-1 p-4 rounded-2xl bg-white text-indigo-400 text-sm font-bold border-2 border-indigo-50 hover:bg-indigo-50 transition-all" data-val="L">${q.a}</button>
                    <button onclick="pickAns(${i},'R')" class="ans-${i} flex-1 p-4 rounded-2xl bg-white text-pink-400 text-sm font-bold border-2 border-pink-50 hover:bg-pink-50 transition-all" data-val="R">${q.b}</button>
                </div>
            </div>`;
        });
        document.getElementById('quiz').innerHTML = html;

        const answers = {};
        function pickAns(i, val) {
            answers[i] = val;
            document.querySelectorAll(`.ans-${i}`).forEach(b => {
                b.classList.remove('bg-indigo-500', 'text-white', 'border-indigo-500', 'bg-pink-500', 'border-pink-500');
                b.classList.add('bg-white');
            });
            const btn = event.target.closest('button');
            if (val === 'L') {
                btn.classList.add('bg-indigo-500', 'text-white', 'border-indigo-500');
                btn.classList.remove('bg-white');
            } else {
                btn.classList.add('bg-pink-500', 'text-white', 'border-pink-500');
                btn.classList.remove('bg-white');
            }
        }

        function calcBrain() {
            if (Object.keys(answers).length < questions.length) { Utils.toast('请先完成所有题目哦', 'info'); return; }
            let left = 0, right = 0;
            Object.values(answers).forEach(v => { if (v==='L') left++; else right++; });
            const total = left + right;
            const lPct = Math.round(left/total*100);
            const rPct = 100 - lPct;

            let emoji, type, desc;
            if (lPct >= 67) { emoji='🔬';type='逻辑严密型 · 左脑先锋';desc='你拥有卓越的逻辑分析能力，条理清晰、纪律严明。在处理复杂数据和抽象理论时如鱼得水。'; }
            else if (rPct >= 67) { emoji='🎨';type='直觉敏锐型 · 右脑天才';desc='你满脑子都是奇思妙想，直觉极其精准，对艺术和情感有极强的共鸣。你是天生的创意家。'; }
            else { emoji='⚖️';type='平衡博学者 · 双脑共鸣';desc='恭喜！你拥有极其罕见的二元平衡。你既能用逻辑拆解世界，也能用创意重塑未来。'; }

            document.getElementById('rEmoji').textContent = emoji;
            document.getElementById('rType').textContent = type;
            document.getElementById('lPctText').textContent = lPct + '%';
            document.getElementById('rPctText').textContent = rPct + '%';
            document.getElementById('rDesc').textContent = desc;
            document.getElementById('barL').style.width = lPct + '%';
            document.getElementById('barR').style.width = rPct + '%';
            document.getElementById('resultArea').classList.remove('hidden');
            Utils.toast('脑力分析已生成', 'success');
            
            window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 100, behavior: 'smooth' });
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
