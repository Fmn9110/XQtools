<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>谜语盒子 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎁 趣味 <span class="gradient-text">谜语盒子</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">猜字谜、猜物品、猜成语。在文字的捉迷藏中寻找智慧。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="w-full bg-gradient-to-br from-indigo-50/50 to-pink-50/50 rounded-[3rem] p-10 mb-10 border-2 border-indigo-100 min-h-[260px] flex flex-col items-center justify-center relative overflow-hidden group shadow-inner">
                <div class="absolute -top-4 -right-4 text-8xl text-indigo-200/20 rotate-12 transition-transform group-hover:rotate-0">?</div>
                
                <span class="px-4 py-1 bg-white/80 rounded-full text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-6 border border-indigo-50 shadow-sm" id="cat">Category</span>
                
                <p class="text-2xl md:text-3xl font-black text-gray-800 mb-10 text-center leading-relaxed relative z-10" id="riddle">
                    点击下方按钮揭开谜底
                </p>
                
                <div id="ansBox" class="hidden opacity-0 transform translate-y-4 transition-all duration-500 relative z-10">
                    <div class="bg-indigo-500 rounded-2xl px-12 py-4 shadow-xl shadow-indigo-100">
                        <p class="text-white font-black text-xl" id="ans">答案：？</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md">
                <button onclick="showAns()" class="flex-1 py-5 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95 text-lg">
                    💡 揭开真相
                </button>
                <button onclick="next()" class="flex-1 py-5 bg-white border-2 border-indigo-100 text-indigo-500 hover:bg-indigo-50 font-black rounded-2xl shadow-lg transition-all active:scale-95 text-lg">
                    ➡️ 下一个
                </button>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>谜语是中国传统文化中的璀璨明珠。它利用物象的特征、词语的谐音来构建迷局。猜谜不仅能增进知识，还能培养敏锐的操作力。闲暇之余，和朋友一起开启这场心智游戏吧。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const riddles=[
            {cat:'字谜',r:'一口咬掉牛尾巴',ans:'告'},
            {cat:'字谜',r:'一边是红，一边是绿；一边怕风，一边怕雨',ans:'秋'},
            {cat:'物品谜',r:'千条线，万条线，落到水里都不见',ans:'雨'},
            {cat:'物品谜',r:'麻屋子，红帐子，里面住着白胖子',ans:'花生'},
            {cat:'物品谜',r:'有头没有颈，身上冷冰冰，有翅不能飞，无脚也能行',ans:'鱼'},
            {cat:'成语谜',r:'最大的嘴',ans:'气吞山河'},
            {cat:'成语谜',r:'最长的一天',ans:'度日如年'},
            {cat:'成语谜',r:'最短的季节',ans:'一日三秋'},
            {cat:'字谜',r:'七十二小时',ans:'晶'},
            {cat:'物品谜',r:'年纪并不大，胡子一大把，不论遇见谁，总爱喊妈妈',ans:'山羊'},
        ];

        let idx = 0;
        function shuffle(){for(let i=riddles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[riddles[i],riddles[j]]=[riddles[j],riddles[i]];}}
        shuffle();

        const catEl = document.getElementById('cat');
        const riddleEl = document.getElementById('riddle');
        const ansEl = document.getElementById('ans');
        const ansBox = document.getElementById('ansBox');

        function next() {
            riddleEl.style.opacity = '0';
            riddleEl.style.transform = 'translateY(10px)';
            ansBox.classList.add('hidden');
            ansBox.classList.remove('opacity-100', 'translate-y-0');
            ansBox.classList.add('opacity-0', 'translate-y-4');

            setTimeout(() => {
                const r = riddles[idx % riddles.length];
                catEl.innerText = r.cat;
                riddleEl.innerText = r.r;
                ansEl.innerText = '答案：' + r.ans;
                riddleEl.style.opacity = '1';
                riddleEl.style.transform = 'translateY(0)';
                riddleEl.style.transition = 'all 0.4s ease-out';
                idx++;
                Utils.toast('新挑战已就绪 ✨', 'info');
            }, 300);
        }

        function showAns() {
            ansBox.classList.remove('hidden');
            setTimeout(() => {
                ansBox.classList.remove('opacity-0', 'translate-y-4');
                ansBox.classList.add('opacity-100', 'translate-y-0');
            }, 10);
            Utils.toast('原来如此！💡', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            next();
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy  -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
