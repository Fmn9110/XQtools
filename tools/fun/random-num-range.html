<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>区间随机数 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .number-display {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 900;
            background: linear-gradient(45deg, #f472b6, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(244,114,182,0.1);
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎲 极速 <span class="gradient-text">随机数</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">摇号、抽奖、拼运气！设定范围，一键捕获绝对的偶然。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="w-full bg-pink-50/30 rounded-[3rem] border-2 border-pink-100 mb-10 overflow-hidden shadow-inner group">
                <div class="number-display" id="resultNumber">?</div>
            </div>

            <div class="flex items-center gap-4 mb-10 w-full max-w-md">
                <div class="flex-1 relative">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-widest mb-2 pl-4">Min / 最小</label>
                    <input type="number" id="minInput" value="1" 
                        class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-4 focus:ring-pink-100 outline-none text-center text-xl font-black text-gray-600 shadow-inner appearance-none">
                </div>
                <span class="text-pink-200 font-black text-2xl mt-6">~</span>
                <div class="flex-1 relative">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-widest mb-2 pl-4">Max / 最大</label>
                    <input type="number" id="maxInput" value="100" 
                        class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-4 focus:ring-pink-100 outline-none text-center text-xl font-black text-gray-600 shadow-inner appearance-none">
                </div>
            </div>
            
            <button onclick="generateRandom()" id="generateBtn" class="w-full max-w-sm py-5 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-2xl shadow-xl shadow-pink-100 transition-all active:scale-95 text-xl flex items-center justify-center gap-2">
                🎲 点击生成
            </button>

            <!-- History -->
            <div class="mt-12 w-full max-w-md bg-gray-50/50 p-8 rounded-[2rem] border-2 border-pink-50/50 shadow-inner">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">History / 历史序列</span>
                    <button onclick="clearHistory()" class="text-[10px] font-black text-gray-300 hover:text-rose-400 uppercase tracking-widest transition-colors">Clear</button>
                </div>
                <div id="historyBox" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar">
                    <!-- history pills here -->
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>随机数是程序的灵魂，也是公正的底线。本工具基于浏览器内置的安全随机算法生成（Math.random），包含最小值和最大值（闭区间）。希望这个小小的数字，能为你带来今日的好运。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const resultNumber = document.getElementById('resultNumber');
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const generateBtn = document.getElementById('generateBtn');
        const historyBox = document.getElementById('historyBox');
        
        let isGenerating = false;

        function generateRandom() {
            if(isGenerating) return;

            let min = parseInt(minInput.value);
            let max = parseInt(maxInput.value);

            if(isNaN(min) || isNaN(max)) { Utils.toast('请输入有效的数字', 'error'); return; }

            if(min > max) {
                [min, max] = [max, min];
                minInput.value = min;
                maxInput.value = max;
            }

            isGenerating = true;
            generateBtn.classList.add('opacity-50', 'pointer-events-none');
            
            let counter = 0;
            const targetCount = 20;
            const interval = setInterval(() => {
                resultNumber.innerText = Math.floor(Math.random() * (max - min + 1)) + min;
                counter++;
                if(counter >= targetCount) {
                    clearInterval(interval);
                    const finalNum = Math.floor(Math.random() * (max - min + 1)) + min;
                    resultNumber.innerText = finalNum;
                    
                    // Pop effect
                    resultNumber.style.transform = 'scale(1.1)';
                    setTimeout(() => resultNumber.style.transform = 'scale(1)', 150);

                    // Add to history
                    const pill = document.createElement('span');
                    pill.className = "px-4 py-2 bg-white text-gray-600 font-bold rounded-xl border-2 border-pink-50 text-sm animate-item shadow-sm";
                    pill.innerText = finalNum;
                    historyBox.prepend(pill);

                    isGenerating = false;
                    generateBtn.classList.remove('opacity-50', 'pointer-events-none');
                    Utils.toast('已捕获随机数 ✨', 'success');
                }
            }, 50);
        }

        function clearHistory() {
            historyBox.innerHTML = '';
            resultNumber.innerText = '?';
            Utils.toast('历史已清空 ✨', 'info');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
