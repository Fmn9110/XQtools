<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>假新闻标题生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">📰 假新闻 <span class="gradient-text">标题生成</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">生成荒诞又不失逻辑的标题。仅供娱乐，请勿作为真实信息传播。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white text-center animate-item" style="animation-delay: 0.2s">
            <button onclick="gen()" class="theme-download-btn w-full max-w-md mx-auto block py-5 text-xl mb-12">📢 播报最新“假”闻</button>
            
            <div id="newsArea" class="space-y-6 max-w-2xl mx-auto">
                <!-- Content generated by JS -->
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    荒诞美学
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>幽默是生活的避风港。通过对日常元素的错位组合，我们创造出一种荒诞的秩序感。每一个随机生成的标题，都是对平庸现实的一次俏皮解构。</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">⚠️</span>
                    责任声明
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>本工具生成的任何内容均为AI基于词库随机拼接而成，不代表任何事实。请仅在亲友互动的私密场合传播，切勿在公开社交平台散布误导性信息。</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function pick(a){return a[Math.floor(Math.random()*a.length)];}
        const subjects = ['科学家','一只猫','90后程序员','隔壁老王','某小学生','一群鸽子','AI助手','外星人','一条锦鲤','退休大爷','外卖小哥','扫地机器人'];
        const verbs = ['发现了','意外发明了','偷偷研究出','用一周时间开发了','在梦中想到了','靠直觉创造了','误打误撞造出了','居然研发出了','终于掌握了'];
        const objects = ['永动机','时间机器','能让人隐身的药水','读心术耳机','防脱发神器','自动写作业机器人','把水变成可乐的配方','让猫听话的方法','永远不会死机的电脑','无限续杯咖啡杯','瞬间移动拖鞋'];
        const extras = ['震惊全球！','专家表示不敢相信！','网友：我直接好家伙！','相关部门已介入调查！','引发百万人围观！','评论区已沦陷！','甚至惊动了有关单位！','现场画面曝光！'];

        function gen() {
            const headlines = [];
            for (let i = 0; i < 3; i++) {
                headlines.push(`${pick(extras)} ${pick(subjects)}${pick(verbs)}${pick(objects)}！`);
            }
            let html = '';
            headlines.forEach((h, idx) => {
                const colors = ['border-pink-400', 'border-indigo-400', 'border-emerald-400'];
                const bgs = ['bg-pink-50/30', 'bg-indigo-50/30', 'bg-emerald-50/30'];
                html += `
                <div class="${bgs[idx%3]} rounded-[2rem] p-6 text-left border-l-8 ${colors[idx%3]} shadow-sm hover:translate-x-2 transition-transform animate-item" style="animation-delay: ${idx*0.1}s">
                    <p class="font-black text-gray-800 text-lg md:text-xl leading-snug">${h}</p>
                    <div class="flex items-center mt-4 text-[10px] space-x-2">
                        <span class="bg-white/50 px-2 py-0.5 rounded text-gray-400 font-bold">#趣味虚构</span>
                        <span class="text-gray-300">|</span>
                        <span class="text-gray-300 font-bold uppercase tracking-widest">Randomly Generated</span>
                    </div>
                </div>`;
            });
            document.getElementById('newsArea').innerHTML = html;
            Utils.toast('最新情报已更新', 'success');
        }
        
        gen();

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
