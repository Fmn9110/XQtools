<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>节日倒计时 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎉 节日 <span class="gradient-text">倒计时</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">记录每一个期待的瞬间。距离下一次狂欢还有多久？✨</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="holidays">
                <!-- Holidays will be injected here -->
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    仪式感的意义
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>倒计时不仅仅是数字的归零，更是对未来的那份期待与热爱。仪式感让我们在琐碎的生活中，找到闪闪发光的时间锚点。</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    关于更新
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>本列表包含常见的法定节假日与温馨周年庆。如果有您特别在意的日子，欢迎关注我们的后续版本，我们将支持自定义纪念日功能！💖</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function getNextDate(m,d){
            const now = new Date();
            const y = now.getFullYear();
            let dt = new Date(y, m - 1, d);
            if(dt < now) dt = new Date(y + 1, m - 1, d);
            return dt;
        }

        const holidayData = [
            {name:'元旦 / NEW YEAR', date:()=>getNextDate(1,1), emoji:'🎆'},
            {name:'情人节 / VALENTINE', date:()=>getNextDate(2,14), emoji:'💕'},
            {name:'妇女节 / WOMEN', date:()=>getNextDate(3,8), emoji:'🌸'},
            {name:'清明节 / TOMB-SWEEPING', date:()=>getNextDate(4,5), emoji:'🌿'},
            {name:'劳动节 / LABOR DAY', date:()=>getNextDate(5,1), emoji:'💪'},
            {name:'儿童节 / CHILDREN', date:()=>getNextDate(6,1), emoji:'👦'},
            {name:'国庆节 / NATIONAL DAY', date:()=>getNextDate(10,1), emoji:'🇨🇳'},
            {name:'圣诞节 / CHRISTMAS', date:()=>getNextDate(12,25), emoji:'🎅'},
        ];

        const cardStyles = [
            'from-pink-50 to-rose-50 border-pink-100/50 text-pink-500',
            'from-indigo-50 to-blue-50 border-indigo-100/50 text-indigo-500',
            'from-emerald-50 to-teal-50 border-emerald-100/50 text-emerald-500',
            'from-violet-50 to-purple-50 border-violet-100/50 text-violet-500',
            'from-orange-50 to-amber-50 border-orange-100/50 text-orange-500',
            'from-cyan-50 to-sky-50 border-cyan-100/50 text-cyan-500'
        ];

        const now = new Date();
        let html = '';
        holidayData.sort((a,b) => a.date() - b.date());
        
        holidayData.forEach((h, idx) => {
            const diff = Math.ceil((h.date() - now) / (1000 * 60 * 60 * 24));
            const style = cardStyles[idx % cardStyles.length];
            
            html += `
            <div class="bg-gradient-to-br ${style} rounded-[2rem] p-6 border-2 flex justify-between items-center group hover:-translate-y-1 transition-all animate-item" style="animation-delay: ${idx*0.05}s">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/60 rounded-xl flex items-center justify-center text-2xl shadow-inner group-hover:scale-110 transition-transform">
                        ${h.emoji}
                    </div>
                    <div>
                        <p class="font-black text-gray-700 text-sm tracking-tight">${h.name}</p>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${h.date().toLocaleDateString()}</p>
                    </div>
                </div>
                <div class="text-right">
                    <div class="flex items-baseline gap-1">
                        <span class="text-3xl font-black tracking-tighter">${diff}</span>
                        <span class="text-[10px] font-black opacity-40 uppercase">Days</span>
                    </div>
                    <div class="w-16 h-1 bg-white/50 rounded-full mt-2 overflow-hidden">
                        <div class="h-full bg-current opacity-30" style="width: ${Math.max(10, 100 - (diff/3.65))}%"></div>
                    </div>
                </div>
            </div>`;
        });
        
        document.getElementById('holidays').innerHTML = html;

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
