<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文学风格文字 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">✍️ 文学 <span class="gradient-text">风格文字</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">用名家的笔触，书写你的日常。每一句话都能变得不凡。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="relative group mb-8">
                <textarea id="input" rows="3" placeholder="输入你想转换的话，例如：今天天气真好..." 
                    class="w-full p-6 bg-pink-50/30 rounded-[2rem] border-2 border-transparent focus:border-pink-200 outline-none resize-none text-lg font-bold text-gray-700 transition-all shadow-inner"></textarea>
                <div class="absolute bottom-4 right-6 text-[10px] font-black text-pink-200 uppercase tracking-widest pointer-events-none">Drafting Area / 起草区</div>
            </div>

            <div class="flex gap-3 flex-wrap justify-center mb-10">
                <button onclick="convert('鲁迅')" class="px-6 py-3 bg-gray-900 text-white rounded-xl font-black text-xs hover:bg-black transition-all active:scale-95 shadow-lg shadow-gray-100">鲁迅体 👓</button>
                <button onclick="convert('张爱玲')" class="px-6 py-3 bg-pink-500 text-white rounded-xl font-black text-xs hover:bg-pink-600 transition-all active:scale-95 shadow-lg shadow-pink-100">张爱玲体 🌹</button>
                <button onclick="convert('古风')" class="px-6 py-3 bg-amber-500 text-white rounded-xl font-black text-xs hover:bg-amber-600 transition-all active:scale-95 shadow-lg shadow-amber-100">古风雅致 🌿</button>
                <button onclick="convert('网络')" class="px-6 py-3 bg-indigo-500 text-white rounded-xl font-black text-xs hover:bg-indigo-600 transition-all active:scale-95 shadow-lg shadow-indigo-100">火热网络 🚀</button>
            </div>

            <div id="outputBox" class="hidden animate-item">
                <div class="bg-gradient-to-br from-indigo-50/50 to-pink-50/50 rounded-[2.5rem] p-8 md:p-12 text-left border-2 border-pink-100 shadow-inner group relative overflow-hidden">
                    <div class="absolute -top-6 -right-6 text-9xl text-pink-500/10 opacity-30 group-hover:rotate-12 transition-transform">✒️</div>
                    
                    <p class="text-gray-700 leading-relaxed text-lg font-serif whitespace-pre-wrap relative z-10" id="output"></p>
                    
                    <div class="mt-10 pt-8 border-t border-black/5 flex justify-between items-center relative z-10">
                        <span id="styleName" class="text-[10px] font-black text-pink-300 uppercase tracking-widest">Style Preview</span>
                        <button onclick="copyResult()" class="text-[10px] font-black text-pink-500 hover:text-pink-600 transition-colors uppercase tracking-widest flex items-center gap-1">
                            📋 复制全篇
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="emptyTip" class="py-12 flex flex-col items-center opacity-20 select-none">
                <span class="text-6xl mb-4">🖋️</span>
                <p class="text-[10px] font-black uppercase tracking-widest text-center">Words are magic...</p>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">📜</span>
                <p>文字拥有改变现实的力量。通过模拟经典文学风格，我们可以从不同的维度审视平庸的日常生活。希望这些转化能为你带来创作灵感，或者仅仅是一个会心的微笑。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function convert(style){
            const text = document.getElementById('input').value.trim() || '今天天气真好';
            const templates = {
                '鲁迅': `在我的后园，可以看到${text}——但那又怎样呢？我翻开历史一查，歪歪斜斜地每页上都写着${text}。我横竖睡不着，仔细看了半夜，才从字缝里看出字来，满本都写着两个字："吃人"！\n\n我向来是不惮以最坏的恶意来揣测中国人的，然而我还不料，也不信竟会${text}。`,
                '张爱玲': `于千万人之中遇见你所要遇见的人，于千万年之中，时间的无涯的荒野里，没有早一步，也没有晚一步，刚巧赶上了，那也没有别的话可说，唯有轻轻地问一声："噢，你也在这里？"\n\n${text}——就像三十年前的月亮，但隔着三十年的辛苦路望回看，再好的月色也不免带点凄凉。`,
                '古风': `余于暮春之初，登高远眺，见${text}，不胜欢欣。遂赋诗曰：\n\n春风拂面柳初新，${text}入画频。\n莫道人间多苦涩，且将此景赠佳人。\n\n——记于甲辰年春`,
                '网络': `家人们谁懂啊！！！${text}！！这绝对是我今年听到的最离谱的事了好吗😱😱😱\n\n我直接一个大动作——好家伙！${text}这事儿我能吹一年！\n\n#太真实了 #破防了 #笑不活了`,
            };
            
            document.getElementById('output').innerText = templates[style];
            document.getElementById('styleName').textContent = style + '体 | ' + style.toUpperCase() + ' STYLE';
            document.getElementById('outputBox').classList.remove('hidden');
            document.getElementById('emptyTip').classList.add('hidden');
            
            Utils.toast(`已成功转化为 ${style} 笔促 ✨`, 'success');
            
            setTimeout(() => {
                document.getElementById('outputBox').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function copyResult() {
            const content = document.getElementById('output').innerText;
            navigator.clipboard.writeText(content).then(() => {
                Utils.toast('文章副本已归档至剪贴板 ✨', 'success');
            });
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
