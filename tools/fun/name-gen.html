        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            
            <div class="bg-gray-50/50 rounded-[4rem] p-8 md:p-16 mb-12 border-2 border-transparent shadow-inner relative flex flex-col items-center group overflow-hidden">
                <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#fb7185 1px, transparent 1px); background-size: 30px 30px;"></div>
                
                <div class="absolute top-4 right-4 z-20">
                    <button onclick="copyName()" class="w-12 h-12 bg-white/80 backdrop-blur-md rounded-2xl flex items-center justify-center text-pink-400 shadow-sm hover:text-pink-600 hover:scale-110 active:scale-95 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>
                
                <p class="text-5xl mb-6 float-animation">✒️</p>
                <div class="name-display" id="resultName">...</div>
            </div>

            <div class="flex justify-center mb-12">
                <div class="bg-gray-100 rounded-[2rem] p-2 flex gap-2 w-full max-w-sm">
                    <button onclick="setMode('zh', this)" class="zh-btn flex-1 py-3 px-4 rounded-2xl font-black text-xs uppercase tracking-widest bg-white text-pink-500 shadow-sm transition-all">ZH / 华人姓名</button>
                    <button onclick="setMode('en', this)" class="en-btn flex-1 py-3 px-4 rounded-2xl font-black text-xs uppercase tracking-widest text-gray-400 hover:text-pink-400 transition-all">EN / English</button>
                </div>
            </div>
            
            <div class="flex justify-center mb-12">
                <button onclick="generateName()" class="w-full max-w-sm py-5 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-[2rem] shadow-xl shadow-pink-100 transition-all active:scale-95 text-xl">
                    🎲 随机生成姓名
                </button>
            </div>

            <div class="relative">
                <div class="absolute -top-3 left-6 px-4 bg-white text-[10px] font-black text-pink-300 uppercase tracking-widest z-10">Inspiration Trace / 灵感足迹</div>
                <div class="bg-gray-50/50 rounded-3xl p-6 min-h-[80px] flex flex-wrap gap-2 justify-center border-2 border-pink-50/50" id="historyBox">
                    <span class="text-gray-300 font-bold italic">生成的历史记录将出现在这里...</span>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>姓名是父母给孩子的第一份礼物，也是文学创作中角色的灵魂标签。每一个名字背后，都蕴含着对某种特质的期待或对某种意境的向往。希望这些随机碰撞出的名字，能为你带来意想不到的创作灵感。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>

            en_first: ['James', 'Mary', 'John', 'Patricia', 'Robert', 'Jennifer', 'Michael', 'Linda', 'William', 'Elizabeth', 'David', 'Barbara', 'Richard', 'Susan', 'Joseph', 'Jessica', 'Thomas', 'Sarah', 'Charles', 'Karen', 'Christopher', 'Nancy', 'Daniel', 'Lisa', 'Matthew', 'Anthony', 'Margaret', 'Mark', 'Sandra', 'Donald', 'Ashley', 'Steven', 'Kimberly', 'Paul', 'Emily', 'Andrew', 'Donna', 'Joshua', 'Michelle', 'Kenneth', 'Dorothy', 'Kevin', 'Carol', 'Brian', 'Amanda', 'George', 'Melissa', 'Edward', 'Deborah', 'Ronald', 'Stephanie', 'Timothy', 'Rebecca', 'Jason', 'Sharon', 'Jeffrey', 'Laura', 'Ryan', 'Cynthia', 'Jacob', 'Kathleen', 'Gary', 'Amy', 'Nicholas', 'Shirley', 'Eric', 'Angela', 'Jonathan', 'Helen', 'Stephen', 'Anna', 'Larry', 'Brenda', 'Justin', 'Pamela', 'Scott', 'Nicole', 'Brandon', 'Emma', 'Benjamin', 'Samantha', 'Samuel', 'Katherine', 'Gregory', 'Christine', 'Frank', 'Debra', 'Alexander', 'Rachel', 'Raymond', 'Catherine', 'Patrick', 'Carolyn', 'Jack', 'Janet', 'Dennis', 'Ruth', 'Jerry', 'Maria', 'Tyler', 'Heather', 'Aaron', 'Diane', 'Jose', 'Virginia', 'Adam', 'Julie', 'Henry', 'Joyce', 'Nathan', 'Victoria', 'Douglas', 'Olivia', 'Zachary', 'Kelly', 'Peter', 'Christina', 'Kyle', 'Lauren', 'Walter', 'Joan', 'Ethan', 'Evelyn', 'Jeremy', 'Judith', 'Christian', 'Megan', 'Keith', 'Cheryl', 'Roger', 'Andrea', 'Terry', 'Hannah', 'Gerald', 'Martha', 'Sean', 'Jacqueline', 'Arthur', 'Frances', 'Dylan', 'Gloria', 'Carl', 'Ann', 'Albert', 'Teresa', 'Noah', 'Kathryn', 'Lawrence', 'Sara', 'Jesse', 'Janice'],
            en_last: ['Smith', 'Johnson', 'Williams', 'Brown', 'Jones', 'Garcia', 'Miller', 'Davis', 'Rodriguez', 'Martinez', 'Hernandez', 'Lopez', 'Gonzalez', 'Wilson', 'Anderson', 'Thomas', 'Taylor', 'Moore', 'Jackson', 'Martin', 'Lee', 'Perez', 'Thompson', 'White', 'Harris', 'Sanchez', 'Clark', 'Ramirez', 'Lewis', 'Robinson', 'Walker', 'Young', 'Allen', 'King', 'Wright', 'Scott', 'Torres', 'Nguyen', 'Hill', 'Flores', 'Green', 'Adams', 'Nelson', 'Baker', 'Hall', 'Rivera', 'Campbell', 'Mitchell', 'Carter', 'Roberts', 'Gomez', 'Phillips', 'Evans', 'Turner', 'Diaz', 'Parker', 'Cruz', 'Edwards', 'Collins', 'Reyes', 'Stewart', 'Morris', 'Morales', 'Murphy', 'Cook', 'Rogers', 'Gutierrez', 'Ortiz', 'Morgan', 'Cooper', 'Peterson', 'Bailey', 'Reed', 'Kelly', 'Howard', 'Ramos', 'Kim', 'Cox', 'Ward', 'Richardson', 'Watson', 'Brooks', 'Chavez', 'Wood', 'James', 'Bennett', 'Gray', 'Mendoza', 'Ruiz', 'Hughes', 'Price', 'Alvarez', 'Castillo', 'Sanders', 'Patel', 'Myers', 'Long', 'Ross', 'Foster', 'Jimenez', 'Powell']
        };

        let currentMode = 'zh';

        function setMode(mode, btn) {
            currentMode = mode;
            const zhBtn = document.querySelector('.zh-btn');
            const enBtn = document.querySelector('.en-btn');
            
            [zhBtn, enBtn].forEach(b => {
                b.classList.remove('bg-white', 'text-pink-500', 'shadow-sm');
                b.classList.add('text-gray-400', 'hover:text-pink-400');
            });
            
            btn.classList.remove('text-gray-400', 'hover:text-pink-400');
            btn.classList.add('bg-white', 'text-pink-500', 'shadow-sm');
            
            Utils.toast(`切换到：${mode === 'zh' ? '华人姓名' : '英文名'}`, 'info');
            generateName();
        }

        function generateName() {
            const out = document.getElementById('resultName');
            out.style.opacity = '0.3';
            out.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                let name = '';
                if (currentMode === 'zh') {
                    const l = db.zh_last[Math.floor(Math.random() * db.zh_last.length)];
                    const flen = Math.random() > 0.4 ? 2 : 1;
                    let f = '';
                    for(let i=0; i<flen; i++) {
                        f += db.zh_first_char[Math.floor(Math.random() * db.zh_first_char.length)];
                    }
                    name = l + f;
                } else {
                    const f = db.en_first[Math.floor(Math.random() * db.en_first.length)];
                    const l = db.en_last[Math.floor(Math.random() * db.en_last.length)];
                    name = `${f} ${l}`;
                }
                
                out.innerText = name;
                out.style.opacity = '1';
                out.style.transform = 'scale(1)';
                addToHistory(name);
            }, 100);
        }

        function addToHistory(name) {
            const box = document.getElementById('historyBox');
            if(box.querySelector('span.italic')) box.innerHTML = '';
            
            const pill = document.createElement('div');
            pill.className = "px-4 py-2 bg-pink-50 text-pink-400 rounded-xl text-sm font-black shadow-sm cursor-pointer hover:bg-pink-100 transition-all animate-item";
            pill.innerText = name;
            pill.onclick = () => { 
                document.getElementById('resultName').innerText = name; 
                Utils.toast('已选定历史灵感 ✨', 'info');
            };
            
            box.prepend(pill);
            if(box.children.length > 20) box.removeChild(box.lastChild);
        }

        async function copyName() {
            const text = document.getElementById('resultName').innerText;
            if (text === '...') return;
            try {
                await navigator.clipboard.writeText(text);
                Utils.toast('灵感已复制到剪贴板 📋', 'success');
            } catch (err) {
                Utils.toast('复制失败', 'error');
            }
        }

        // Initialize
        setTimeout(generateName, 200);

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>
