<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>睡前故事生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🌙 睡前故事 <span class="gradient-text">生成器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">轻触指尖，编织一段温馨奇幻的睡前绮梦。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="animate-item" style="animation-delay: 0.3s">
                    <label class="block text-xs font-black text-pink-300 uppercase tracking-widest mb-3">🐰 选择主角</label>
                    <select id="hero" class="w-full p-4 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-100 outline-none text-gray-600 font-bold transition-all cursor-pointer">
                        <option>小兔子</option><option>小熊</option><option>小猫咪</option><option>小狐狸</option><option>小鹿</option>
                    </select>
                </div>
                <div class="animate-item" style="animation-delay: 0.4s">
                    <label class="block text-xs font-black text-pink-300 uppercase tracking-widest mb-3">🏡 选择场景</label>
                    <select id="scene" class="w-full p-4 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-100 outline-none text-gray-600 font-bold transition-all cursor-pointer">
                        <option>魔法森林</option><option>星星镇</option><option>云朵城堡</option><option>彩虹湖</option><option>月亮谷</option>
                    </select>
                </div>
                <div class="animate-item" style="animation-delay: 0.5s">
                    <label class="block text-xs font-black text-pink-300 uppercase tracking-widest mb-3">🌟 故事主题</label>
                    <select id="theme" class="w-full p-4 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-100 outline-none text-gray-600 font-bold transition-all cursor-pointer">
                        <option>友谊</option><option>勇气</option><option>善良</option><option>分享</option><option>成长</option>
                    </select>
                </div>
            </div>
            
            <button onclick="genStory()" class="theme-download-btn w-full py-5 text-xl mb-10">📖 立即开启故事</button>
            
            <div id="story" class="hidden animate-item">
                <div class="bg-gradient-to-br from-indigo-50/50 to-purple-50/50 rounded-[2.5rem] p-10 md:p-12 border-2 border-indigo-100/50 shadow-inner relative overflow-hidden group">
                    <div class="absolute top-4 right-6 text-4xl opacity-10 group-hover:rotate-12 transition-transform">⭐</div>
                    <div id="storyText" class="text-gray-700 leading-loose text-lg font-medium whitespace-pre-wrap italic"></div>
                    <div class="mt-8 pt-8 border-t border-indigo-100/50 flex justify-center">
                        <p class="text-xs font-black text-indigo-300 uppercase tracking-[0.3em]">🌟 晚安，好梦 🌟</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    阅读贴士
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50">
                    <ul class="space-y-4 text-gray-600 text-sm">
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">1</span> 选择不同的组合，探索数千种奇妙的可能性。</li>
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">2</span> 配合轻柔的背景音乐，营造更好的睡前氛围。</li>
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">3</span> 鼓励孩子参与主角名称的重新命名，编织专属回忆。</li>
                    </ul>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.7s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">?</span>
                    适合人群
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm">
                    <p class="text-gray-500 text-sm leading-relaxed">这些温馨短小、充满教育意义的故事，专门为3-8岁的小朋友设计。即使是成年人，也能在文字中找到一份纯净与安宁。</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
        const openings = ['从前，在一个遥远的','在那个充满魔法的','很久很久以前，在一个美丽的','传说在一个神奇的'];
        const middles = {
            友谊:['遇到了一个迷路的小伙伴','听说有人需要帮助','发现了一个新朋友','决定举办一场派对邀请所有朋友'],
            勇气:['听说远方有一个可怕的影子','面前出现了一座高高的山','需要穿过一片黑暗的洞穴','遇到了一个看起来很凶的大怪兽'],
            善良:['看到一只受伤的小鸟','发现一朵快要枯萎的花','遇到了一个伤心哭泣的陌生人','看到森林里的小动物们都生病了'],
            分享:['摘到了很多很多甜甜的果子','找到了一大堆闪闪发光的宝石','做了一大锅香喷喷的蘑菇汤','收到了一份巨大的神秘礼物'],
            成长:['决定第一次独自去冒险','想要学会一项新本领','鼓起勇气做了一件从没做过的事','开始了一段全新的旅程']
        };
        const endings = {
            友谊:'它们紧紧拥抱在一起，成为了最好最好的朋友。从此以后，每天都一起分享快乐和烦恼。',
            勇气:'原来一切并没有那么可怕。它发现自己比想象中勇敢得多，心里充满了骄傲和力量。',
            善良:'所有的善良都得到了回报，整个世界变得更加美好。因为它知道，小小的善意也能带来大大的温暖。',
            分享:'分享之后，快乐变成了两倍！大家围坐在一起，度过了最开心的一天。',
            成长:'虽然过程有些辛苦，但它学到了很多很多。晚上躺在床上，它微笑着想：明天一定会更好！'
        };

        function genStory() {
            const hero = document.getElementById('hero').value;
            const scene = document.getElementById('scene').value;
            const theme = document.getElementById('theme').value;
            const story = `${pick(openings)}${scene}里，住着一只可爱的${hero}。\n\n有一天，${hero}${pick(middles[theme])}。虽然心里有些紧张，但${hero}还是勇敢地迈出了脚步。\n\n经历了各种有趣的事情之后，${endings[theme]}\n\n🌟 晚安，做个好梦哦～`;
            document.getElementById('storyText').innerText = story;
            document.getElementById('story').classList.remove('hidden');
            Utils.toast('故事灵感已就绪', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
