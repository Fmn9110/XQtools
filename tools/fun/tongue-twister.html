<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣味绕口令 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">👅 金牌 <span class="gradient-text">绕口令挑战</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">嘴皮子利索吗？换一个挑战，看看你是否能一气呵成。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="w-full bg-gradient-to-br from-indigo-50/50 to-pink-50/50 rounded-[3rem] p-10 mb-10 border-2 border-indigo-100 min-h-[240px] flex flex-col items-center justify-center relative overflow-hidden group shadow-inner">
                <div class="absolute -top-4 -left-4 text-8xl text-indigo-200/20 rotate-12 transition-transform group-hover:rotate-0">💬</div>
                
                <h2 id="text" class="text-2xl md:text-3xl font-black text-gray-800 mb-0 text-center leading-loose relative z-10">
                    八百标兵奔北坡，炮兵并排北边跑。
                </h2>
            </div>

            <button onclick="next()" class="w-full max-w-md py-5 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95 text-xl">
                🚀 下一个挑战
            </button>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>绕口令是语言艺术的精髓，它能锻炼呼吸控制力与发音准确性。尝试由慢到快，逐渐加速，不要让舌头打了结哦。如果在聚会上表演一段，绝对能成为全场的焦点！💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const list = [
            "八百标兵奔北坡，炮兵并排北边跑。",
            "吃葡萄不吐葡萄皮，不吃葡萄倒吐葡萄皮。",
            "扁担宽，板凳长，扁担想绑在板凳上。",
            "牛郎恋刘娘，刘娘念牛郎。",
            "打南边来了个喇叭，手里提拉着五个大喇叭。",
            "门外有四十四只紫色死粉世子。",
            "石室诗士施氏，嗜狮，誓食十狮。",
            "司小四和史小世，四月十四日十四时四十上大市。",
            "红凤凰，黄凤凰，红粉凤凰，花粉凤凰，红粉凤凰，粉红凤凰。"
        ];

        function next() {
            const out = document.getElementById('text');
            out.style.opacity = '0';
            out.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                out.innerText = list[Math.floor(Math.random()*list.length)];
                out.style.opacity = '1';
                out.style.transform = 'translateY(0)';
                out.style.transition = 'all 0.4s ease-out';
                Utils.toast('新挑战已就绪 ✨', 'info');
            }, 300);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy  -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
