<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>团建分组 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">👥 团建 <span class="gradient-text">随机分组</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">告别选择困难。一键将参与者随机打乱并平分到各个小组。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="grid md:grid-cols-3 gap-8 mb-10">
                <div class="md:col-span-2 relative group">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-widest mb-2 pl-4">Participants / 名单 (一行一个)</label>
                    <textarea id="people" rows="6" placeholder="输入名单...&#10;Alice&#10;Bob&#10;Charlie" 
                        class="w-full p-5 bg-pink-50/20 rounded-3xl border-2 border-transparent focus:border-pink-200 outline-none font-bold text-gray-600 transition-all shadow-inner resize-none custom-scrollbar"></textarea>
                </div>
                <div class="relative group">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-widest mb-2 pl-4">Groups / 组数</label>
                    <div class="h-full flex flex-col gap-4">
                        <input type="number" id="groupNum" value="3" min="2" max="20" 
                            class="w-full p-5 bg-indigo-50/20 rounded-3xl border-none outline-none font-black text-indigo-500 text-center text-4xl shadow-inner appearance-none">
                        <button onclick="groupIt()" class="w-full py-5 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-3xl shadow-xl shadow-indigo-100 transition-all active:scale-95 flex-1">
                            🎲 分组
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="result">
                <!-- group results -->
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>公平的分组是团队合作的良好开端。本工具采用 Fisher-Yates 洗牌算法，确保每个人被分配到任何一组的概率都是完全均等的。如果人数无法平分，多出的人员会自动排入前面的小组。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const gColors = [
            'bg-pink-50/50 border-pink-100 text-pink-700',
            'bg-indigo-50/50 border-indigo-100 text-indigo-700',
            'bg-emerald-50/50 border-emerald-100 text-emerald-700',
            'bg-amber-50/50 border-amber-100 text-amber-700',
            'bg-sky-50/50 border-sky-100 text-sky-700'
        ];

        function groupIt(){
            const people = document.getElementById('people').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
            const n = parseInt(document.getElementById('groupNum').value)||3;
            
            if(people.length < n) {
                Utils.toast('参与人数不能少于小组数哦', 'warning');
                return;
            }

            // Shuffle
            for(let i=people.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [people[i], people[j]] = [people[j], people[i]];
            }

            const groups = Array.from({length:n}, ()=>[]);
            people.forEach((p,i) => groups[i%n].push(p));

            let html = '';
            groups.forEach((g, i) => {
                const colorClass = gColors[i % gColors.length];
                html += `
                    <div class="p-6 rounded-[2rem] border-2 ${colorClass} animate-item shadow-sm" style="animation-delay: ${i*0.05}s">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-black text-lg">第 ${i+1} 组</span>
                            <span class="px-2 py-1 bg-white/80 rounded-lg text-[10px] font-black opacity-60">${g.length} PATS</span>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${g.map(p => `<span class="px-3 py-1.5 bg-white rounded-xl text-xs font-bold border border-transparent shadow-sm">${p}</span>`).join('')}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('result').innerHTML = html;
            Utils.toast('分组任务已完成 ✨', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy  -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
