<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>求签问卦 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        .shake-anim {
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🏯 虔诚 <span class="gradient-text">摇签问卦</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">冥想片刻。摇动签筒，在传统的律动中感悟运势的真谛。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="w-full max-w-sm mb-12 text-center">
                <div id="shaker" class="text-8xl mb-10 inline-block transition-transform scale-125">🏺</div>
                <button onclick="shake()" id="shakeBtn" class="w-full py-5 bg-red-600 hover:bg-red-700 text-white font-black rounded-2xl shadow-xl shadow-red-100 transition-all active:scale-95 text-xl flex items-center justify-center gap-2">
                    🏮 虔诚摇签
                </button>
            </div>

            <div id="result" class="hidden w-full max-w-sm bg-gradient-to-b from-red-50 to-orange-50 rounded-[3rem] p-8 border-2 border-red-100 shadow-2xl relative overflow-hidden group">
                <div class="absolute -bottom-6 -right-6 text-8xl text-red-200/20 rotate-12 group-hover:rotate-0 transition-transform font-serif">福</div>
                
                <div class="flex justify-between items-center mb-6">
                    <span class="px-4 py-1 bg-white/80 rounded-full text-[10px] font-black text-red-400 uppercase tracking-widest border border-red-50 shadow-sm" id="signNum">第 1 签</span>
                    <span class="text-xs text-red-300 font-black">LUCKY SIGN</span>
                </div>

                <div class="text-center mb-6">
                    <h2 class="text-4xl font-black mb-4 font-serif" id="signLevel">上上签</h2>
                </div>

                <div class="bg-white/60 backdrop-blur-sm rounded-2xl p-6 border border-white/80 shadow-inner">
                    <p class="text-red-600 font-black text-xs uppercase tracking-widest mb-2">Interpretation / 解读</p>
                    <p class="text-gray-700 leading-relaxed font-serif text-lg" id="signText">
                        鸿运当头，诸事大吉。所求之事皆可成，贵人相助无阻碍。
                    </p>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>签文之意，在于指引。所有的运势都是流动的，好的签文是鼓励，平庸的签文是警示。最重要的依然是当下的初心与脚下的步伐。本工具仅供娱乐，请勿沉迷哦。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const signs=[
            {level:'上上签',text:'鸿运当头，诸事大吉。所求之事皆可成，贵人相助无阻碍。'},
            {level:'上签',text:'柳暗花明又一村，眼前困境将化解。保持耐心，好事将至。'},
            {level:'上签',text:'春风得意马蹄疾，一切顺遂皆如意。把握机会，勇往直前。'},
            {level:'中签',text:'时运平稳，无大起大落。宜静不宜动，安守本分为上策。'},
            {level:'中签',text:'凡事三思而后行，急躁反而误大事。平常心对待一切。'},
            {level:'中签',text:'风雨之后见彩虹，目前需要再忍耐。坚持到底便是赢。'},
            {level:'中下签',text:'谋事在人成事在天，不必过分执着。顺其自然，随缘而定。'},
            {level:'下签',text:'此时不宜冲动行事，退一步海阔天空。蓄势待发，来日方长。'},
        ];

        function shake(){
            const btn = document.getElementById('shakeBtn');
            const shaker = document.getElementById('shaker');
            const resultBox = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerText = "心诚则灵...";
            resultBox.classList.add('hidden');
            shaker.classList.add('shake-anim');
            
            setTimeout(()=>{
                const s = signs[Math.floor(Math.random()*signs.length)];
                const num = Math.floor(Math.random()*99)+1;
                
                document.getElementById('signNum').textContent = '第 '+num+' 签';
                document.getElementById('signLevel').textContent = s.level;
                
                const levelEl = document.getElementById('signLevel');
                levelEl.className = 'text-4xl font-black mb-4 font-serif ' + 
                    (s.level.includes('上') ? 'text-red-500' : s.level.includes('下') ? 'text-gray-500' : 'text-amber-500');
                
                document.getElementById('signText').textContent = s.text;
                
                shaker.classList.remove('shake-anim');
                resultBox.classList.remove('hidden');
                resultBox.classList.add('animate-item');
                
                btn.disabled = false;
                btn.innerText = "🏮 再摇一签";
                Utils.toast('签位已出 ✨', 'success');
            }, 1500);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy  -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
