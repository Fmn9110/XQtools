<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>姓名含义 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🔍 姓名 <span class="gradient-text">意义解读</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">每一个字都是一段故事。发现名字背后的趣味内涵。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="relative mb-8 group">
                <input type="text" id="nameInput" placeholder="请输入想要解读的名字" 
                    class="w-full p-6 bg-amber-50/20 rounded-3xl border-2 border-transparent focus:border-amber-200 outline-none text-center text-xl font-bold text-gray-700 transition-all shadow-inner">
                <label class="block text-[10px] font-black text-amber-300 uppercase tracking-widest mt-3 text-center">Name to Analyze / 待查姓名</label>
            </div>

            <div class="flex justify-center mb-12">
                <button onclick="analyze()" class="w-full max-w-sm py-5 bg-amber-500 hover:bg-amber-600 text-white font-black rounded-2xl shadow-xl shadow-amber-100 transition-all active:scale-95 text-xl flex items-center justify-center gap-2">
                    🔍 开启深度解读
                </button>
            </div>

            <div id="result" class="hidden space-y-4 animate-item">
                <!-- Result items dynamic -->
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>名字是伴随我们一生的符号，虽然本工具的解读基于趣味性算法，旨在为您带来片刻的欢愉和启发。真正的意义不在于字典的解释，而在于你如何书写自己的人生。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const elements = ['金','木','水','火','土'];
        const traits = ['聪慧','坚韧','温柔','勇敢','优雅','灵动','沉稳','活泼','真诚','睿智','包容','乐观','细腻','果断','创新'];
        const colors = ['蔷薇粉','深海蓝','薄荷绿','薰衣草紫','琥珀金','月光银','落日橙','珊瑚色'];
        const animals = ['祥龙','灵凤','猛虎','仙鹤','灵鹿','苍鹰','幻蝶','锦鲤','灵兔','骏马'];

        function hashChar(ch) { return ch.charCodeAt(0); }

        function analyze() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) { 
                Utils.toast('请先输入名字哦', 'info'); 
                return; 
            }
            
            Utils.toast('正在解读中... ✨', 'success');
            
            let html = `
            <div class="bg-gradient-to-br from-amber-50 to-orange-50 rounded-[3rem] p-10 text-center border-2 border-amber-100 shadow-inner mb-8 group">
                <p class="text-[10px] font-black text-amber-400 uppercase tracking-[0.4em] mb-4">Analysis Result / 解读报告</p>
                <p class="text-4xl md:text-5xl font-black text-gray-800 tracking-widest mb-4 group-hover:scale-105 transition-transform">${name}</p>
                <div class="w-12 h-1 bg-amber-200 mx-auto rounded-full"></div>
            </div>`;

            for (const ch of name) {
                const code = hashChar(ch);
                const element = elements[code % 5];
                const trait = traits[code % traits.length];
                const color = colors[code % colors.length];
                const animal = animals[code % animals.length];
                
                html += `
                <div class="bg-white rounded-[2rem] p-6 text-left border border-amber-50 shadow-sm flex flex-col md:flex-row gap-6 items-center animate-item">
                    <div class="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center text-3xl text-white font-black shadow-lg shadow-amber-100">${ch}</div>
                    <div class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
                        <div class="bg-gray-50/50 rounded-2xl p-3 text-center">
                            <p class="text-[10px] font-black text-gray-300 uppercase mb-1">五行</p>
                            <p class="font-bold text-amber-600">${element}</p>
                        </div>
                        <div class="bg-gray-50/50 rounded-2xl p-3 text-center">
                            <p class="text-[10px] font-black text-gray-300 uppercase mb-1">特质</p>
                            <p class="font-bold text-amber-600">${trait}</p>
                        </div>
                        <div class="bg-gray-50/50 rounded-2xl p-3 text-center">
                            <p class="text-[10px] font-black text-gray-300 uppercase mb-1">幸运色</p>
                            <p class="font-bold text-amber-600">${color}</p>
                        </div>
                        <div class="bg-gray-50/50 rounded-2xl p-3 text-center">
                            <p class="text-[10px] font-black text-gray-300 uppercase mb-1">守护</p>
                            <p class="font-bold text-amber-600">${animal}</p>
                        </div>
                    </div>
                </div>`;
            }

            const result = document.getElementById('result');
            result.style.opacity = '0';
            result.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                result.innerHTML = html;
                result.classList.remove('hidden');
                setTimeout(() => {
                    result.style.opacity = '1';
                    result.style.transform = 'translateY(0)';
                    result.style.transition = 'all 0.5s ease-out';
                }, 50);
            }, 300);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
