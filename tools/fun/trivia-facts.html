<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冷知识百科 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🧊 有趣 <span class="gradient-text">冷知识百科</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">探索这个世界奇怪又迷人的另一面。每天一个冷知识，做最酷的博学者。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="w-full bg-gradient-to-br from-sky-50/50 to-indigo-50/50 rounded-[3rem] p-10 mb-10 border-2 border-sky-100 min-h-[220px] flex flex-col items-center justify-center relative overflow-hidden group shadow-inner">
                <div class="absolute -bottom-4 -left-4 text-8xl text-sky-200/20 rotate-12 transition-transform group-hover:rotate-0">🧊</div>
                
                <p class="text-xl md:text-2xl font-black text-gray-800 mb-0 text-center leading-relaxed relative z-10" id="fact">
                    加载中...
                </p>
            </div>

            <button onclick="next()" class="w-full max-w-md py-5 bg-sky-500 hover:bg-sky-600 text-white font-black rounded-2xl shadow-xl shadow-sky-100 transition-all active:scale-95 text-xl flex items-center justify-center gap-2">
                🧊 换一份“冷饮”
            </button>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>冷知识往往在不经意间展示了自然的奇妙。从章鱼的心脏到极美的极光，这些碎片信息构成了我们对宇宙的多元认知。好奇心，是我们与世界沟通最美的语言。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const facts=[
            '蜗牛有超过25000颗牙齿，分布在舌头上。','蜂蜜是唯一永远不会变质的食物，3000年前的蜂蜜仍可食用。','人一生中平均要走大约16万公里，相当于绕地球4圈。','章鱼有3颗心脏，其中2颗负责泵送血液到鳃部。','香蕉其实是一种浆果，而草莓不是。','地球上蚂蚁的总重量大约等于所有人类的总重量。','每年被自动贩卖机砸死的人比被鲨鱼咬死的人多。','"OK"是全世界最通用的词汇。','猫不能尝出甜味。','你每天脱落的皮肤细胞大约有3万到4万个。','北极熊的皮肤其实是黑色的，毛是透明的。','一片云的平均重量大约是50万公斤。',
            '海豚在睡觉时会睁着一只眼睛。', '大象是唯一不能跳跃的哺乳动物。', '考拉每天要睡20个小时。', '雨水里含有维生素B12。', '鳄鱼为了潜得更深，会吞下石头。'
        ];
        
        let idx=0;
        function shuffle(){for(let i=facts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[facts[i],facts[j]]=[facts[j],facts[i]];}}
        shuffle();

        function next(){
            const out = document.getElementById('fact');
            out.style.opacity = '0';
            out.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                out.textContent = facts[idx % facts.length];
                out.style.opacity = '1';
                out.style.transform = 'translateY(0)';
                out.style.transition = 'all 0.4s ease-out';
                idx++;
                Utils.toast('知识点增加了 ✨', 'success');
            }, 300);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            next();
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy  -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
