<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歌词拼接器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎤 歌词 <span class="gradient-text">拼接器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">打破旋律的边界。创造属于你的混搭金曲。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white text-center animate-item" style="animation-delay: 0.2s">
            <div class="flex justify-center mb-10">
                <button onclick="genLyric()" class="w-full max-w-md py-5 bg-gradient-to-r from-purple-400 to-indigo-400 hover:from-purple-500 hover:to-indigo-500 text-white font-black rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-95 text-xl flex justify-center items-center gap-2 group">
                    <span class="text-2xl group-hover:rotate-12 transition-transform">🎵</span> 创作混搭歌词
                </button>
            </div>

            <div id="lyricBox" class="bg-gradient-to-br from-purple-50/50 to-indigo-50/50 rounded-[3rem] p-10 md:p-14 border-2 border-purple-100 shadow-inner group relative overflow-hidden min-h-[300px] flex items-center">
                <div class="absolute -top-10 -left-10 text-9xl text-purple-500/10 opacity-30 group-hover:scale-110 transition-transform">🎧</div>
                
                <div class="space-y-6 text-xl md:text-2xl text-gray-700 font-bold leading-relaxed relative z-10 w-full text-left md:text-center" id="lyrics"></div>
            </div>
            
            <div class="mt-10 flex justify-center">
                <button onclick="copyResult()" class="text-[10px] font-black text-gray-300 hover:text-purple-500 transition-colors uppercase tracking-[0.4em]">
                    Tap button to shuffle / 点击按钮随机创作
                </button>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🎼</span>
                <p>歌词拼接是一种趣味艺术。当不相关的文案交织在一起，往往能产生出奇不意的荒诞感或凄美感。我们内置了近百句经典华语歌词，快来发现属于你的神来之笔吧！💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function pick(a){return a[Math.floor(Math.random()*a.length)];}
        const lines = [
            '我曾经跨过山和大海', '也穿过人山人海', '我曾经拥有着的一切', '转眼都飘散如烟',
            '多么痛的领悟', '你曾是我的全部', '长大后一个人的旅途', '风起的日子学会依赖',
            '我能想到最浪漫的事', '就是和你一起慢慢变老', '直到我们老得哪儿也去不了', '你还依然把我当成手心里的宝',
            '月亮代表我的心', '你问我爱你有多深', '轻轻地一个吻',
            '如果这都不算爱', '我有什么好悲哀', '只是不想太快从梦中醒来', '现实总是太无奈',
            '天青色等烟雨而我在等你', '炊烟袅袅升起隔江千万里', '在瓶底书汉隶仿前朝的飘逸', '就当我为遇见你伏笔',
            '你笑起来真好看', '像春天的花一样', '把所有的烦恼忧愁统统都吹散', '这一路上走走停停',
            '顺着少年漂流的痕迹', '迈出车站的前一刻', '竟有些犹豫',
            '后来我总算学会了如何去爱', '可惜你早已远去消失在人海', '后来终于在眼泪中明白', '有些人一旦错过就不再',
            '我的天空里没有太阳', '总是黑夜但并不暗', '因为有东西代替了太阳', '虽然没有太阳那么明亮',
            '也许放弃 才能靠近你', '不再见你 你才会把我记起', '有些梦虽然遥远 却依然坚信', '那是我们最后的回忆'
        ];

        function genLyric() {
            const el = document.getElementById('lyrics');
            el.style.opacity = '0';
            el.style.transform = 'scale(0.98)';
            
            setTimeout(() => {
                const shuffled = [...lines].sort(() => Math.random() - 0.5);
                const selected = shuffled.slice(0, 4);
                let html = '';
                selected.forEach((l, idx) => {
                    html += `<p class="border-l-4 border-purple-200 pl-6 mb-4 md:mb-6 animate-item" style="animation-delay: ${idx*0.1}s">"${l}"</p>`;
                });
                el.innerHTML = html;
                el.style.opacity = '1';
                el.style.transform = 'scale(1)';
                Utils.toast('新章节已谱写 ✨', 'success');
            }, 300);
        }

        function copyResult() {
            const content = Array.from(document.querySelectorAll('#lyrics p')).map(p => p.innerText).join('\n');
            if(!content) return;
            navigator.clipboard.writeText(content).then(() => {
                Utils.toast('金曲歌词已收纳 ✨', 'success');
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', genLyric);

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
