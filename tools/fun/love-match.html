<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恋爱匹配度 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">💘 恋爱 <span class="gradient-text">匹配度测试</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">探索名字背后的缘分。在爱的小屋里，每一个跳动都有意义。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white text-center animate-item" style="animation-delay: 0.2s">
            <div class="flex flex-col md:flex-row gap-6 max-w-2xl mx-auto mb-10">
                <div class="flex-1 relative group">
                    <input type="text" id="nameA" placeholder="你的名字" 
                        class="w-full p-6 bg-pink-50/30 rounded-3xl border-2 border-transparent focus:border-pink-200 outline-none text-center text-xl font-black text-gray-700 transition-all shadow-inner">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mt-3">Lover A / 你的名字</label>
                </div>
                <div class="flex items-center justify-center text-3xl text-pink-200 animate-pulse">❤️</div>
                <div class="flex-1 relative group">
                    <input type="text" id="nameB" placeholder="TA的名字" 
                        class="w-full p-6 bg-pink-50/30 rounded-3xl border-2 border-transparent focus:border-pink-200 outline-none text-center text-xl font-black text-gray-700 transition-all shadow-inner">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mt-3">Lover B / TA的名字</label>
                </div>
            </div>

            <div class="flex justify-center mb-12">
                <button onclick="match()" id="matchBtn" class="w-full max-w-md py-5 bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white font-black rounded-2xl shadow-lg shadow-rose-100 transition-all active:scale-95 text-xl flex items-center justify-center gap-2">
                    💕 开启缘分匹配
                </button>
            </div>

            <div id="matchResult" class="hidden animate-item">
                <div class="bg-gradient-to-br from-pink-50/50 to-rose-50/50 rounded-[3rem] p-10 md:p-16 border-2 border-pink-100 shadow-inner group relative overflow-hidden">
                    <div class="absolute -top-10 -left-10 text-9xl text-pink-500/10 opacity-30 group-hover:rotate-12 transition-transform">💘</div>
                    
                    <div class="relative z-10">
                        <p class="text-7xl md:text-8xl font-black text-pink-500 mb-6 drop-shadow-sm" id="matchPct"></p>
                        
                        <div class="w-full max-w-md mx-auto bg-white/50 p-1 rounded-full border border-pink-100 mb-8">
                            <div id="matchBar" class="bg-gradient-to-r from-pink-300 to-rose-400 h-6 rounded-full transition-all duration-1500 w-0"></div>
                        </div>
                        
                        <p class="text-2xl md:text-3xl font-black text-gray-800 mb-2 tracking-tighter" id="matchTitle"></p>
                        <div class="h-1 w-12 bg-rose-200 rounded-full mx-auto mb-6 opacity-40"></div>
                        
                        <div class="bg-white/60 backdrop-blur-md rounded-2xl p-6 border border-pink-100 inline-block max-w-md">
                            <p class="text-gray-600 font-bold text-sm md:text-base leading-relaxed" id="matchDesc"></p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="emptyTip" class="py-20 flex flex-col items-center opacity-20 select-none">
                <span class="text-6xl mb-4">🏠</span>
                <p class="text-xs font-black uppercase tracking-widest">Awaiting two souls...</p>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🍭</span>
                <p>友情提示：匹配结果基于名字的能量振动（由我们的神秘算法生成）。爱情最美妙的地方在于，即便匹配度只有1%，也要用99%的努力去相爱。在这个快节奏的时代，愿你找到唯一的偏爱。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function hashPair(a,b){
            let h=0;
            const s=a<b?a+b:b+a;
            const seed = new Date().toDateString(); // Optional: shift results daily
            const combined = s + seed;
            for(let i=0;i<combined.length;i++){
                h=((h<<5)-h)+combined.charCodeAt(i);
                h|=0;
            }
            return Math.abs(h);
        }

        const levels = [
            {min:92,title:'天生一对',desc:'你们是命中注定的缘分！哪怕隔着人山人海，命运也会把你们推向彼此。💕',emoji:'💘'},
            {min:80,title:'心有灵犀',desc:'你们的默契度非常惊人，仿佛在上辈子就曾共饮一坛美酒。💖',emoji:'💓'},
            {min:65,title:'情深意切',desc:'你们有很多共同的频率，彼此互补，是一段非常有生命力的关系。✨',emoji:'💗'},
            {min:45,title:'仍需磨合',desc:'虽然有些差异，但这就是相遇的惊喜。给彼此多一点耐心，爱会发芽。💪',emoji:'💛'},
            {min:0,title:'欢喜冤家',desc:'虽然看起来不太对频道，但谁说打打闹闹不是另一种深沉的浪漫呢？😂',emoji:'🤝'},
        ];

        function match() {
            const a = document.getElementById('nameA').value.trim();
            const b = document.getElementById('nameB').value.trim();
            if (!a || !b) {
                Utils.toast('请输入两个人的名字哦', 'info');
                return;
            }
            
            const btn = document.getElementById('matchBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-ping">💗</span> 捕获缘分中...';
            
            Utils.toast('正在采集姓名波动...', 'info');
            
            setTimeout(() => {
                const pct = 45 + (hashPair(a, b) % 56); // 45-100
                const level = levels.find(l => pct >= l.min);
                
                document.getElementById('matchPct').textContent = pct + '%';
                document.getElementById('matchTitle').textContent = `${level.emoji} ${level.title}`;
                document.getElementById('matchDesc').textContent = level.desc;
                
                document.getElementById('matchResult').classList.remove('hidden');
                document.getElementById('emptyTip').classList.add('hidden');
                
                // Trigger bar animation after reveal
                setTimeout(() => {
                    document.getElementById('matchBar').style.width = pct + '%';
                }, 100);
                
                btn.disabled = false;
                btn.innerHTML = '💕 开启缘分匹配';
                Utils.toast('匹配完成 ✨', 'success');
                
                setTimeout(() => {
                    document.getElementById('matchResult').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }, 1500);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
