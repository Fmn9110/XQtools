<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣味心理测试 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .test-wrapper {
            background-image: radial-gradient(circle at top left, #fdf4ff, transparent 50%),
                              radial-gradient(circle at bottom right, #fce7f3, transparent 50%);
        }
        .option-btn {
            transition: all 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .option-btn:hover {
            transform: translateX(10px);
            box-shadow: -5px 5px 15px rgba(244, 114, 182, 0.15);
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-3xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🔮 潜意识 <span class="gradient-text">人格图鉴</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">测测你内心深处的精神动物到底是谁？（纯属娱乐，请勿当真）✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center test-wrapper shadow-2xl animate-item" style="animation-delay: 0.2s">
            
            <div id="quizSection" class="w-full">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-pink-400 font-black text-xs uppercase tracking-widest" id="qCounter">Question 01</span>
                    <div class="w-32 h-2 bg-pink-50 rounded-full overflow-hidden shadow-inner">
                        <div class="h-full bg-pink-400 transition-all duration-500" id="qProgress" style="width: 33%;"></div>
                    </div>
                </div>

                <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-10 leading-relaxed" id="qText">
                    正在加载测试题目...
                </h2>

                <div class="space-y-4" id="optionsContainer">
                    <!-- options injected -->
                </div>
            </div>

            <div id="resultSection" class="w-full hidden text-center pb-4">
                <p class="text-[10px] font-black text-pink-300 uppercase tracking-[0.4em] mb-4">Your Spirit Animal / 精神动物</p>
                <div class="text-8xl mb-6 float-animation" id="rIcon">🐱</div>
                <h3 class="text-3xl font-black text-gray-800 mb-6" id="rTitle">高冷优雅的波斯猫</h3>
                
                <div class="bg-gradient-to-br from-pink-50/50 to-white p-8 rounded-[2.5rem] border-2 border-pink-100 text-left shadow-inner mb-10 relative group">
                    <div class="absolute -top-4 -left-4 text-5xl text-pink-200 opacity-20 transition-transform group-hover:scale-125">"</div>
                    <p class="text-gray-600 leading-[1.8] relative z-10 font-medium" id="rDesc">
                        你外表可能看起来不好接近，但内心极其渴望被理解...
                    </p>
                </div>
                
                <button onclick="startQuiz()" class="w-full max-w-sm py-5 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-2xl shadow-xl shadow-pink-100 transition-all active:scale-95 text-xl flex items-center justify-center gap-2">
                    🔄 开启新轮回
                </button>
            </div>

        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>人的内心像一片深不可测的森林，心理测试只是帮你在林间透进一丝微弱的光。测试结果仅作为一种自我觉察的参考，真正的你，远比任何标签都要丰富和立体。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const quizData = [
            {
                q: "如果你在一片森林里迷路了，突然面前出现了一座建筑，你希望那是：",
                options: [
                    { t: "一座古老神秘的魔法塔", score: "A" },
                    { t: "一间温馨透着暖光的小木屋", score: "B" },
                    { t: "一座被遗弃的华丽城堡", score: "C" },
                    { t: "一个充满未来科技感的观测站", score: "D" }
                ]
            },
            {
                q: "在探索建筑时，你发现了一个宝箱，你第一反应觉得里面装的是：",
                options: [
                    { t: "无数的金银财宝和古代硬币", score: "C" },
                    { t: "一本记载着禁忌知识的书", score: "D" },
                    { t: "一件能带你回家的神奇法器", score: "B" },
                    { t: "一只已经睡着了的小精灵", score: "A" }
                ]
            },
            {
                q: "突然，建筑的主人回来了。它的真实身份竟然是：",
                options: [
                    { t: "一位面容慈祥的隐居老奶奶", score: "B" },
                    { t: "一只会说话且穿着燕尾服的兔子", score: "A" },
                    { t: "一个失去记忆但很友善的机器人", score: "D" },
                    { t: "传说中拥有毁灭力量的巨龙", score: "C" }
                ]
            }
        ];

        const resultsData = {
            "A": { icon: "🦄", title: "无拘无束的独角兽", desc: "你拥有极强的想象力和创造力，内心永远住着一个长不大的小孩。你不喜欢世俗的条条框框，脑子里总有新奇的点子，是朋友眼中的开心果和创意大师。" },
            "B": { icon: "🐶", title: "温暖可靠的柴犬", desc: "你是个非常重感情的人，家庭和朋友是你生命中最看重的部分。你随和、善良、极具同理心，总是能敏锐察觉到别人的情绪并给予安慰，是大家都想拥有的治愈系伴侣。" },
            "C": { icon: "🦁", title: "傲娇霸气的狮子", desc: "你天生自带光环，拥有极强的领导力和掌控欲。你不甘平庸，追求卓越和品质生活。虽然偶尔显得有些强势，但其实非常有担当，愿意保护属于自己的人。" },
            "D": { icon: "🦉", title: "深思熟虑的猫头鹰", desc: "你是理性和智慧的化身，喜欢思考事物的本质。在人群中你可能不是最吵闹的那个，但往往看得最透彻。你喜欢吸收知识，拥有超越同龄人的成熟与冷静。" }
        };

        let currentQ = 0;
        let scores = { A:0, B:0, C:0, D:0 };

        function startQuiz() {
            currentQ = 0;
            scores = { A:0, B:0, C:0, D:0 };
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('quizSection').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const data = quizData[currentQ];
            document.getElementById('qCounter').innerText = `Question 0${currentQ + 1} / 03`;
            document.getElementById('qProgress').style.width = `${((currentQ + 1) / 3) * 100}%`;
            
            const qEl = document.getElementById('qText');
            qEl.style.opacity = '0';
            qEl.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                qEl.innerText = data.q;
                qEl.style.opacity = '1';
                qEl.style.transform = 'translateY(0)';
                qEl.style.transition = 'all 0.4s ease-out';
                
                const ctn = document.getElementById('optionsContainer');
                ctn.innerHTML = '';
                data.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left p-6 rounded-2xl bg-white border-2 border-pink-50 text-gray-700 font-bold hover:bg-pink-50/50 hover:border-pink-200 focus:outline-none focus:ring-4 focus:ring-pink-100 text-lg transition-all animate-item shadow-sm";
                    btn.style.animationDelay = `${idx * 0.1}s`;
                    btn.innerText = opt.t;
                    btn.onclick = () => answer(opt.score);
                    ctn.appendChild(btn);
                });
            }, 300);
        }

        function answer(scoreType) {
            scores[scoreType]++;
            currentQ++;
            if(currentQ >= quizData.length) {
                showResult();
            } else {
                renderQ();
            }
        }

        function showResult() {
            let maxScore = -1, winType = "A";
            Object.keys(scores).forEach(k => {
                if(scores[k] > maxScore) { maxScore = scores[k]; winType = k; }
            });

            const res = resultsData[winType];
            const section = document.getElementById('resultSection');
            
            section.style.opacity = '0';
            section.style.transform = 'scale(0.95)';
            
            document.getElementById('rIcon').innerText = res.icon;
            document.getElementById('rTitle').innerText = res.title;
            document.getElementById('rDesc').innerText = res.desc;

            document.getElementById('quizSection').classList.add('hidden');
            section.classList.remove('hidden');
            
            setTimeout(() => {
                section.style.opacity = '1';
                section.style.transform = 'scale(1)';
                section.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                Utils.toast('报告解读完成 ✨', 'success');
            }, 50);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            startQuiz();
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
