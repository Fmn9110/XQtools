<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>废话文学生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🗣️ 废话文学 <span class="gradient-text">生成器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">这番话听君一席话，如听一席话。生成充满艺术感的废话。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="relative mb-6 group">
                <input type="text" id="input" placeholder="输入一句话（如：今天很热）" 
                    class="w-full p-6 bg-purple-50/20 rounded-3xl border-2 border-transparent focus:border-purple-200 outline-none font-bold text-gray-700 transition-all shadow-inner">
                <label class="block text-[10px] font-black text-purple-300 uppercase tracking-widest mt-3">Initial Text / 基础文案</label>
            </div>

            <button onclick="gen()" class="w-full py-5 bg-purple-500 hover:bg-purple-600 text-white font-black rounded-3xl shadow-lg shadow-purple-100 transition-all active:scale-95 text-lg mb-8">
                🗣️ 生成艺术废话
            </button>

            <div class="relative group">
                <div class="bg-gradient-to-br from-purple-50/50 to-pink-50/50 rounded-3xl p-8 min-h-[140px] text-gray-700 font-black text-xl leading-relaxed shadow-inner border-2 border-purple-100 transition-all flex items-center justify-center text-center italic" id="output">
                    等伱輸兦...
                </div>
                <div class="absolute -top-3 -right-3 w-10 h-10 bg-white border-2 border-purple-100 rounded-full flex items-center justify-center text-xl shadow-sm rotate-12">💡</div>
            </div>

            <div class="mt-10 flex justify-center">
                <button onclick="copyResult()" id="copyBtn" class="hidden w-full max-w-sm py-4 bg-white border-2 border-purple-100 text-purple-500 hover:bg-purple-50 font-black rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2">
                    📋 复制这段金句
                </button>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>所谓废话文学，本质上是一种用语言的冗余来消解严肃对话的幽默方式。它不追求逻辑的推进，而是追求在原地踏步中产生的奇妙节奏感。如果一段话读完让你觉得白读了，那它就大获成功了。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function pick(a){return a[Math.floor(Math.random()*a.length)];}
        
        function gen(){
            const w=document.getElementById('input').value.trim()||'今天很热';
            const templates=[
                `${w}，换句话说就是${w}。虽然听起来好像一样，但其实就是一样的。`,
                `当我说"${w}"的时候，我想表达的就是${w}这个意思。不多不少，恰好如此。`,
                `有人问我${w}吗？我只能说，${w}。为什么？因为${w}啊。`,
                `关于${w}这件事，我的看法是：${w}。毕竟，${w}就是${w}，这是无法改变的事实。`,
                `每次一到这种时候，我都觉得${w}。你问我为什么？因为事实就是${w}。这不是我说的，是${w}本身告诉我的。`,
                `说真的，${w}。但如果不这么说的话，那该怎么说呢？答案就是——${w}。没错，就是这样。`,
            ];
            
            const out = document.getElementById('output');
            out.style.opacity = '0';
            out.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                out.innerText=pick(templates);
                out.style.opacity = '1';
                out.style.transform = 'translateY(0)';
                document.getElementById('copyBtn').classList.remove('hidden');
                Utils.toast('已生成废话 ✨', 'success');
            }, 200);
        }

        function copyResult() {
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text).then(() => {
                Utils.toast('已复制到剪贴板 📋', 'success');
            });
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
