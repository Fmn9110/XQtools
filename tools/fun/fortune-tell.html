<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI算命先生 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🔮 AI <span class="gradient-text">算命先生</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">融合东方玄学与数字算法。想知道明天的风往哪儿吹吗？✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white text-center animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-lg mx-auto mb-10 animate-item" style="animation-delay: 0.3s">
                <div class="relative group">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2 text-left ml-2">姓名 / NAME</label>
                    <input type="text" id="ftName" placeholder="你的名字" class="w-full p-4 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-200 outline-none text-sm font-bold text-gray-700 transition-all text-center">
                </div>
                <div class="relative group">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2 text-left ml-2">寿辰 / BIRTHDAY</label>
                    <input type="date" id="ftBirth" class="w-full p-4 bg-pink-50/30 rounded-2xl border-2 border-transparent focus:border-pink-200 outline-none text-sm font-bold text-gray-700 transition-all">
                </div>
            </div>
            
            <button onclick="divine()" class="theme-download-btn w-full max-w-md py-5 text-xl animate-item" style="animation-delay: 0.4s">
                🎴 窥探天机
            </button>

            <div id="fortuneResult" class="hidden mt-12 animate-item">
                <div class="bg-gradient-to-br from-indigo-50/50 to-pink-50/50 rounded-[2.5rem] p-8 md:p-12 border-2 border-pink-100/50 shadow-inner group">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10" id="fortuneCards">
                        <!-- Cards added by JS -->
                    </div>
                    
                    <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-6 border border-white relative overflow-hidden">
                        <div class="absolute -top-4 -right-4 text-6xl opacity-10 group-hover:rotate-12 transition-transform">🔮</div>
                        <p class="text-gray-700 text-base md:text-lg leading-relaxed font-black" id="fortuneText"></p>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📜</span>
                    测算声明
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>人生如戏，全靠运气？不，更靠努力。本算命算法由趣味逻辑驱动，并非真实的超自然力量。请将结果作为茶余饭后的谈资，积极生活才是王道。</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    今日贴士
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>当您感到幸运在流失时，不妨深呼吸五次。宇宙的能量流转始终处于动态平衡。今天最好的运气，就是能够面带微笑地面对每一个瞬间。💖</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
        function pick(a,seed){return a[(seed||Math.floor(Math.random()*a.length))%a.length];}

        const aspects = [
            {label:'财运 / WEALTH',levels:['大放异彩','小财不断','平稳聚福','持盈守成','谨慎开支'],colors:['text-pink-500','text-indigo-500','text-gray-400','text-orange-400','text-pink-300']},
            {label:'爱情 / LOVE',levels:['桃花缠身','遇见心动','甜蜜如初','静待缘分','沟通至上'],colors:['text-pink-500','text-indigo-500','text-gray-400','text-orange-400','text-pink-300']},
            {label:'事业 / WORK',levels:['突飞猛进','贵人指路','稳扎稳打','修整期','等待时机'],colors:['text-pink-500','text-indigo-500','text-gray-400','text-orange-400','text-pink-300']},
            {label:'状态 / STATE',levels:['元气满满','灵感爆发','不急不躁','需要充电','多喝热水'],colors:['text-pink-500','text-indigo-500','text-gray-400','text-orange-400','text-pink-300']},
        ];
        const advices = [
            '今天适合穿粉色系，会大幅提升亲和力。','记得给生活留一点空白，哪怕只是发呆五分钟。','好消息可能正在快递路上，请耐心等待。',
            '今天不适合由于社交而烦恼，推掉那个不必要的聚会吧。','早睡早起，身体里的多巴胺会感谢你的。','尝试一种从未吃过的新味道。',
            '出门往东走，空气中可能藏着小惊喜。','今天的幸运数字是 7，可以留意出现在身边。','适合学习新技能，此刻你的吸收力是满分的！',
        ];

        function divine() {
            const name = document.getElementById('ftName').value.trim();
            const birth = document.getElementById('ftBirth').value;
            if (!name) { 
                Utils.toast('还不知道阁下的尊姓大名呢', 'info');
                return; 
            }
            
            const seed = hashStr(name + birth + new Date().toDateString());
            let cardsHtml = '';
            aspects.forEach((a, i) => {
                const idx = (seed + i * 7) % a.levels.length;
                cardsHtml += `
                <div class="bg-white/90 rounded-2xl p-4 text-center shadow-md animate-item" style="animation-delay: ${0.1 * i}s">
                    <p class="text-[9px] font-black text-gray-300 uppercase tracking-widest mb-2">${a.label}</p>
                    <p class="text-sm md:text-base font-black ${a.colors[idx]} tracking-tighter">${a.levels[idx]}</p>
                </div>`;
            });
            
            document.getElementById('fortuneCards').innerHTML = cardsHtml;
            document.getElementById('fortuneText').textContent = `🔮 ${name}，为你求得的一签：${pick(advices, seed+13)}`;
            document.getElementById('fortuneResult').classList.remove('hidden');
            
            Utils.toast('天机已显现', 'success');
            
            setTimeout(() => {
                document.getElementById('fortuneResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
