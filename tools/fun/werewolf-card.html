<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>狼人杀身份卡 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .card-container {
            perspective: 1000px;
        }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2rem;
        }
        .card-back {
            transform: rotateY(180deg);
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🐺 狼人 <span class="gradient-text">身份派发</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">天黑请闭眼。为你的线下桌游快速、公平地分配角色。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 mb-10 bg-gray-50/50 p-6 rounded-[2.5rem] border border-gray-100 shadow-inner">
                <div class="flex flex-col gap-1"><label class="text-[10px] font-black text-gray-300 uppercase tracking-widest pl-2">Total / 人数</label><input type="number" id="total" value="8" min="6" max="18" class="w-full p-3 bg-white rounded-xl border-none font-black text-indigo-500 text-center shadow-sm appearance-none outline-none focus:ring-2 ring-pink-200 transition-all"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] font-black text-gray-300 uppercase tracking-widest pl-2">Wolf / 狼</label><input type="number" id="wolf" value="2" min="1" max="6" class="w-full p-3 bg-white rounded-xl border-none font-black text-rose-500 text-center shadow-sm appearance-none outline-none focus:ring-2 ring-rose-200 transition-all"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] font-black text-gray-300 uppercase tracking-widest pl-2">Seer / 预</label><input type="number" id="seer" value="1" min="0" max="1" class="w-full p-3 bg-white rounded-xl border-none font-black text-blue-500 text-center shadow-sm appearance-none outline-none focus:ring-2 ring-blue-200 transition-all"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] font-black text-gray-300 uppercase tracking-widest pl-2">Witch / 女</label><input type="number" id="witch" value="1" min="0" max="1" class="w-full p-3 bg-white rounded-xl border-none font-black text-purple-500 text-center shadow-sm appearance-none outline-none focus:ring-2 ring-purple-200 transition-all"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] font-black text-gray-300 uppercase tracking-widest pl-2">Hunter / 猎</label><input type="number" id="hunter" value="1" min="0" max="1" class="w-full p-3 bg-white rounded-xl border-none font-black text-emerald-500 text-center shadow-sm appearance-none outline-none focus:ring-2 ring-emerald-200 transition-all"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] font-black text-gray-300 uppercase tracking-widest pl-2">Guard / 守</label><input type="number" id="guard" value="0" min="0" max="1" class="w-full p-3 bg-white rounded-xl border-none font-black text-amber-500 text-center shadow-sm appearance-none outline-none focus:ring-2 ring-amber-200 transition-all"></div>
            </div>

            <button onclick="deal()" class="w-full py-5 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95 text-xl mb-12">
                🃏 魔法洗牌且派发
            </button>

            <div class="text-center mb-8">
                <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest" id="guideText">
                    Waiting for game start...
                </p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="cards">
                <!-- werewolf cards injected here -->
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>点击卡片查看身份，再次点击翻回。本工具仅负责公正的角色派送，真正的精彩在于夜晚之后的辩论。让谎言织成网，让逻辑化为剑。祝你在今夜的村庄里活到最后！💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const roleInfo={
            '🐺 狼人':{color:'bg-rose-50 border-rose-200 text-rose-600',desc:'深夜出没，吞噬村民'},
            '🔮 预言家':{color:'bg-blue-50 border-blue-200 text-blue-600',desc:'勘破迷雾，查验身份'},
            '🧙 女巫':{color:'bg-purple-50 border-purple-200 text-purple-600',desc:'手握灵药，亦有剧毒'},
            '🏹 猎人':{color:'bg-emerald-50 border-emerald-200 text-emerald-600',desc:'死亡一击，带走黑暗'},
            '🛡️ 守卫':{color:'bg-amber-50 border-amber-200 text-amber-600',desc:'忠诚守护，抵御侵害'},
            '👤 村民':{color:'bg-gray-50 border-gray-200 text-gray-600',desc:'逻辑推理，投票驱逐'}
        };

        function deal(){
            const total=parseInt(document.getElementById('total').value)||8;
            const wolf=parseInt(document.getElementById('wolf').value)||2;
            const seer=parseInt(document.getElementById('seer').value)||0;
            const witch=parseInt(document.getElementById('witch').value)||0;
            const hunter=parseInt(document.getElementById('hunter').value)||0;
            const guard=parseInt(document.getElementById('guard').value)||0;
            
            const special=wolf+seer+witch+hunter+guard;
            if(special>total){
                Utils.toast('这不合理...特殊角色太多啦', 'warning');
                return;
            }

            const roles=[];
            for(let i=0;i<wolf;i++)roles.push('🐺 狼人');
            for(let i=0;i<seer;i++)roles.push('🔮 预言家');
            for(let i=0;i<witch;i++)roles.push('🧙 女巫');
            for(let i=0;i<hunter;i++)roles.push('🏹 猎人');
            for(let i=0;i<guard;i++)roles.push('🛡️ 守卫');
            for(let i=0;i<total-special;i++)roles.push('👤 村民');

            // Shuffle
            for(let i=roles.length-1;i>0;i--){
                const j=Math.floor(Math.random()*(i+1));
                [roles[i],roles[j]]=[roles[j],roles[i]];
            }

            document.getElementById('guideText').innerText = "TAP TO REVEAL YOUR DESTINY / 点击查看";
            
            let html='';
            roles.forEach((role,i)=>{
                const info=roleInfo[role];
                html+=`
                    <div class="card-container h-44 cursor-pointer" onclick="this.classList.toggle('flipped')">
                        <div class="card-inner relative w-full h-full shadow-lg">
                            <div class="card-front bg-gray-800 border-2 border-gray-700">
                                <p class="text-4xl mb-2">🃏</p>
                                <p class="text-white font-black text-sm">PLAYER ${i+1}</p>
                            </div>
                            <div class="card-back border-2 ${info.color}">
                                <p class="text-lg font-black mb-1">${role}</p>
                                <p class="text-[8px] font-black uppercase tracking-tighter opacity-40 mb-2">Internal Role</p>
                                <p class="text-[10px] text-center px-4 font-bold opacity-60 leading-tight">${info.desc}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cards').innerHTML=html;
            Utils.toast('发牌完成，祝在座好运 ✨', 'success');
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy  -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
