<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日星座运势 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">⭐ 每日 <span class="gradient-text">星座运势</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">查看星象的谕示。每一颗星的闪烁，都藏着给你的惊喜。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-3 md:grid-cols-6 gap-4 mb-10" id="signs">
                <!-- Signs injected here -->
            </div>

            <div id="horoResult" class="hidden bg-gradient-to-br from-pink-50/50 to-indigo-50/50 rounded-[2.5rem] p-8 md:p-12 text-center border-2 border-pink-100 shadow-inner group relative overflow-hidden animate-item">
                <div class="absolute -top-10 -right-10 text-9xl text-pink-500/10 opacity-30 group-hover:scale-110 transition-transform">✨</div>
                
                <p class="text-5xl md:text-6xl mb-4 drop-shadow-sm" id="hEmoji"></p>
                <p class="text-2xl md:text-3xl font-black text-gray-800 mb-8" id="hName"></p>
                
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="hStars">
                    <!-- Stars injected here -->
                </div>
                
                <div class="bg-white/80 backdrop-blur-md rounded-2xl p-6 border border-pink-100/50 max-w-2xl mx-auto">
                    <p class="text-gray-600 leading-relaxed font-bold text-sm md:text-base" id="hAdvice"></p>
                </div>
            </div>
            
            <div id="emptyTip" class="py-20 flex flex-col items-center opacity-20 select-none">
                <span class="text-6xl mb-4">🔮</span>
                <p class="text-xs font-black uppercase tracking-widest">Select your destiny...</p>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    关于星象
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>星空的运转蕴含着自然的节奏。星座运势并非固定的脚本，而是一种建议与提醒。在每一个充满不确定性的时刻，给自己一点正向的心理引导。💖</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    今日贴士
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>运势虽然重要，但决定一天的依然是你的心情。穿上喜欢的衣服，吃一顿美味的午餐，你就是自己命运的主角。加油，今天也会很棒！🌈</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const signsData = [
            {name:'白羊座', emoji:'♈', date:'3/21-4/19'},
            {name:'金牛座', emoji:'♉', date:'4/20-5/20'},
            {name:'双子座', emoji:'♊', date:'5/21-6/21'},
            {name:'巨蟹座', emoji:'♋', date:'6/22-7/22'},
            {name:'狮子座', emoji:'♌', date:'7/23-8/22'},
            {name:'处女座', emoji:'♍', date:'8/23-9/22'},
            {name:'天秤座', emoji:'♎', date:'9/23-10/23'},
            {name:'天蝎座', emoji:'♏', date:'10/24-11/22'},
            {name:'射手座', emoji:'♐', date:'11/23-12/21'},
            {name:'摩羯座', emoji:' Capricorn', emoji:'♑', date:'12/22-1/19'},
            {name:'水瓶座', emoji:'♒', date:'1/20-2/18'},
            {name:'双鱼座', emoji:'♓', date:'2/19-3/20'},
        ];
        
        const aspects = ['综合运势','爱情指数','事业学业','财富运势'];
        const advices = [
            '今天适合尝试新事物，大胆行动吧！',
            '保持耐心，最好的结果总是值得等待。',
            '今天的人际关系非常和谐，多去社交吧。',
            '注意理财，理性的消费会带给你安全感。',
            '工作/学业上会有新机会，敏锐地抓住它！',
            '今天适合独处充电，静心学习能提升自我。',
            '感情方面可能会有小巧合或小确幸出现哦。',
            '注意身体平衡，早睡早起是最好的护肤品。',
            '今天直觉很准，可以大胆相信你的第一判断。',
            '可能会收到许久未见的惊喜，保持乐观心态。',
            '适合整理思绪或房间，清新的环境带来好运。',
            '今天的运气就像彩虹一样，试着发现生活的美吧。',
        ];

        function hashDay(s) {
            let h = 0;
            const d = new Date().toDateString();
            const combined = s + d;
            for(let i = 0; i < combined.length; i++) {
                h = ((h << 5) - h) + combined.charCodeAt(i);
                h |= 0;
            }
            return Math.abs(h);
        }

        function renderSigns() {
            let html = '';
            signsData.forEach((s, idx) => {
                html += `
                <button onclick="showHoro('${s.name}','${s.emoji}')" class="p-4 bg-pink-50/20 rounded-2xl border-2 border-transparent hover:border-pink-200 hover:bg-white transition-all group animate-item" style="animation-delay: ${idx*0.05}s">
                    <span class="text-3xl block mb-2 group-hover:scale-110 transition-transform">${s.emoji}</span>
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">${s.name}</p>
                </button>`;
            });
            document.getElementById('signs').innerHTML = html;
        }

        function showHoro(name, emoji) {
            const seed = hashDay(name);
            document.getElementById('hEmoji').textContent = emoji;
            document.getElementById('hName').textContent = name;
            
            let starsHtml = '';
            aspects.forEach((a, i) => {
                const stars = ((seed + i * 7) % 3) + 3; // 3-5 stars
                starsHtml += `
                <div class="bg-white/60 p-4 rounded-xl border border-pink-50">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2">${a}</p>
                    <p class="text-xl text-pink-400 tracking-tighter">${'★'.repeat(stars)}${'☆'.repeat(5-stars)}</p>
                </div>`;
            });
            
            document.getElementById('hStars').innerHTML = starsHtml;
            document.getElementById('hAdvice').textContent = '💡 ' + advices[seed % advices.length];
            
            document.getElementById('horoResult').classList.remove('hidden');
            document.getElementById('emptyTip').classList.add('hidden');
            
            Utils.toast(`正在读取 ${name} 的星象... ✨`, 'success');
            
            setTimeout(() => {
                document.getElementById('horoResult').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        renderSigns();

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
