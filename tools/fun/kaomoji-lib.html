<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>颜文字大全 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">( ´▽` )ﾉ 颜文字 <span class="gradient-text">大全</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">情绪的微缩景观。点击即可收集你的心情符号。✨</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="flex gap-2 flex-wrap justify-center mb-10 pb-6 border-b border-pink-50" id="cats">
                <!-- Categories injected here -->
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="list">
                <!-- Items injected here -->
            </div>
            
            <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em] mt-12 text-center">Tap to copy to clipboard / 点击复制到剪贴板</p>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100 text-indigo-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-3 shadow-sm">
                <span class="text-lg">🍱</span>
                <p>Kaomoji（颜文字）起源于早期的网络交流，它们利用各种标点符号拼凑出丰富的表情。在这一方天地里，简洁即是力量。愿这份收藏能让你的聊天更有趣！💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const kaomojiData = {
            '开心': ['(｡◕‿◕｡)','(◕ᴗ◕✿)','ヽ(>∀<☆)ﾉ','(ﾉ◕ヮ◕)ﾉ*:・ﾟ✧','(✧ω✧)','(≧▽≦)','(☆▽☆)','٩(◕‿◕｡)۶','(^▽^)','(o^∀^o)'],
            '悲伤': ['(╥_╥)','(;´д`)','(ಥ_ಥ)','(T_T)','。゚(゚´ω`゚)゚。','(´;ω;`)','(｡•́︿•̀｡)','(╯﹏╰)','o(╥﹏╥)o'],
            '愤怒': ['(╯°□°)╯︵ ┻━┻','(ノ°Д°)ノ','(｀Д´)','(ᗒᗣᗕ)','(#`Д´)','(￣^￣)ゞ','(怒｀Д´怒)','ヽ( `д´*)ノ'],
            '可爱': ['(=^·^=)','(◕‿◕)','(⁀ᗢ⁀)','(｡♥‿♥｡)','(✿◠‿◠)','ʕ•ᴥ•ʔ','(⌒_⌒)','(●♡∀♡)','(๑•́ ₃ •̀๑)'],
            '无语': ['(╯_╰)','(¬_¬)','¯\\_(ツ)_/¯','(눈_눈)','(；一_一)','(ー_ー)!!','(￣ー￣)','╮(￣▽￣)╭'],
            '庆祝': ['ヽ(^o^)ﾉ','★~(◡‿◡✿)','(ﾉ´ヮ`)ﾉ*: ・ﾟ✧','(ᵔᴥᵔ)','\\(^o^)/','╰(*°▽°*)╯','ヾ(≧▽≦*)o','(✿◕‿◕)'],
        };

        let currentCat = Object.keys(kaomojiData)[0];

        function render() {
            const catBox = document.getElementById('cats');
            const listBox = document.getElementById('list');
            
            catBox.innerHTML = Object.keys(kaomojiData).map(c => `
                <button onclick="currentCat='${c}'; render()" 
                    class="px-6 py-2 rounded-full font-black text-xs transition-all ${c === currentCat ? 'bg-pink-500 text-white shadow-lg shadow-pink-100' : 'bg-pink-50 text-pink-300 hover:bg-pink-100'}">
                    ${c}
                </button>
            `).join('');
            
            listBox.innerHTML = kaomojiData[currentCat].map((k, idx) => `
                <button onclick="copyKaomoji('${k.replace(/'/g, "\\'")}')" 
                    class="p-4 bg-white border-2 border-pink-50 rounded-2xl text-gray-700 font-bold hover:border-pink-400 hover:text-pink-500 hover:bg-pink-50/50 transition-all active:scale-95 shadow-sm animate-item"
                    style="animation-delay: ${idx*0.02}s">
                    ${k}
                </button>
            `).join('');
        }

        function copyKaomoji(k) {
            navigator.clipboard.writeText(k).then(() => {
                Utils.toast('已复制 '+k+' ✨', 'success');
            });
        }

        render();

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
