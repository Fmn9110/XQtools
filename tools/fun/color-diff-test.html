<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>色彩辨别力测试 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">🎨 色彩 <span class="gradient-text">辨别力测试</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">找出那个生命中的异类。挑战你的视觉极限。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white text-center animate-item" style="animation-delay: 0.2s">
            <div class="mb-8 flex justify-between items-center max-w-md mx-auto bg-pink-50/50 p-4 rounded-2xl border border-pink-100/50 animate-item" style="animation-delay: 0.3s">
                <div class="text-center px-4">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest">LEVEL</p>
                    <p class="text-xl font-black text-pink-500" id="level">1</p>
                </div>
                <div class="w-px h-8 bg-pink-100"></div>
                <div class="text-center px-4">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest">SCORE</p>
                    <p class="text-xl font-black text-pink-500" id="score">0</p>
                </div>
                <div class="w-px h-8 bg-pink-100"></div>
                <div class="text-center px-4">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest">LIVES</p>
                    <p class="text-xl font-black text-rose-500 flex gap-1 justify-center" id="lives">❤️ ❤️ ❤️</p>
                </div>
            </div>

            <div id="grid" class="grid gap-2 max-w-sm md:max-w-md mx-auto mb-10 aspect-square animate-item" style="animation-delay: 0.4s"></div>
            
            <div id="gameOver" class="hidden animate-item">
                <div class="bg-gradient-to-br from-pink-50 to-orange-50 rounded-[2.5rem] p-10 mb-8 border-2 border-pink-100/50 shadow-inner">
                    <p class="text-6xl mb-6 drop-shadow-sm">🏆</p>
                    <p class="text-2xl font-black text-gray-800 mb-2 tracking-tight">GAME OVER / 挑战结束</p>
                    <div class="inline-block px-6 py-2 bg-pink-500 text-white rounded-full text-lg font-black mt-4 shadow-lg shadow-pink-200">
                        最终得分: <span id="finalScore">0</span>
                    </div>
                </div>
                <button onclick="startGame()" class="theme-download-btn px-10 py-5 text-xl">🔄 重新开始挑战</button>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">🎮</span>
                    游戏规则
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed">
                    <ul class="space-y-4 text-gray-600 text-sm">
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">1</span> 点击颜色与众不同的那个方块。</li>
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">2</span> 随着关卡增加，格子会变多且色差会逐渐减小。</li>
                        <li class="flex items-center gap-3"><span class="w-5 h-5 rounded-full bg-pink-50 text-pink-400 flex items-center justify-center text-[10px] font-bold">3</span> 共有 3 次点错机会，全部用完游戏即结束。</li>
                    </ul>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    关于色觉
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed">
                    <p class="text-gray-500 text-sm">环境光线和屏幕显示亮度会影响您的测试结果。建议在柔和的光线下并将屏幕亮度调至舒适水平进行测试。</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let level = 1, score = 0, lives = 3;

        function startGame() {
            level = 1; score = 0; lives = 3;
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('grid').classList.remove('hidden');
            nextLevel();
        }

        function nextLevel() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            const liveHtml = '❤️'.repeat(lives);
            document.getElementById('lives').textContent = liveHtml;

            const gridSize = Math.min(8, 2 + Math.floor(level / 3));
            const diff = Math.max(4, 45 - level * 2.5);

            const r = Math.floor(Math.random() * 180) + 40;
            const g = Math.floor(Math.random() * 180) + 40;
            const b = Math.floor(Math.random() * 180) + 40;
            const baseColor = `rgb(${r},${g},${b})`;

            const channel = Math.floor(Math.random() * 3);
            const sign = Math.random() > 0.5 ? 1 : -1;
            const dr = channel===0 ? diff*sign : 0;
            const dg = channel===1 ? diff*sign : 0;
            const db = channel===2 ? diff*sign : 0;
            const diffColor = `rgb(${Math.min(255,Math.max(0,r+dr))},${Math.min(255,Math.max(0,g+dg))},${Math.min(255,Math.max(0,b+db))})`;

            const target = Math.floor(Math.random() * gridSize * gridSize);
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            let html = '';
            for (let i = 0; i < gridSize * gridSize; i++) {
                const color = i === target ? diffColor : baseColor;
                html += `<div onclick="pick(${i},${target})" class="aspect-square rounded-[20%] cursor-pointer hover:scale-90 transition-transform shadow-sm border-2 border-white/20" style="background:${color}"></div>`;
            }
            grid.innerHTML = html;
        }

        function pick(i, target) {
            if (i === target) {
                score += level * 10;
                level++;
                nextLevel();
                Utils.toast('Level Up! 🌟', 'success');
            } else {
                lives--;
                document.getElementById('lives').textContent = '❤️'.repeat(lives);
                if (lives <= 0) {
                    document.getElementById('finalScore').textContent = score;
                    document.getElementById('gameOver').classList.remove('hidden');
                    document.getElementById('grid').classList.add('hidden');
                    Utils.toast('挑战结束', 'info');
                } else {
                    Utils.toast('点错啦，小心哦', 'info');
                }
            }
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            startGame();
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
