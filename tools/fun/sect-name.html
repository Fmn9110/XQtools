<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>武侠门派名 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">⚔️ 绝世 <span class="gradient-text">武林门派</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">开宗立派，威震江湖。一键开启你的武侠传奇。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white flex flex-col items-center animate-item shadow-2xl" style="animation-delay: 0.2s">
            
            <button onclick="gen()" class="w-full max-w-sm py-5 bg-amber-800 hover:bg-amber-900 text-white font-black rounded-2xl shadow-xl shadow-amber-100 transition-all active:scale-95 text-xl mb-12 flex items-center justify-center gap-2 group">
                🗡️ <span class="group-hover:translate-x-1 transition-transform">创立江湖宗门</span>
            </button>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full" id="sects">
                <!-- sects injected here -->
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🕯️</span>
                <p>江湖之大，名字是你在武林的脸面。一个响亮的门派名字往往蕴含着深厚的文化底蕴与武学哲学。点击卡片即可复制到剪贴板，开启你的掌门之路。💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const p1=['天','云','龙','凤','玄','灵','苍','幽','紫','碧','血','明','暗','圣','神','冰','火','雷','风','影'];
        const p2=['山','水','剑','刀','拳','掌','月','阳','阴','鹤','鹰','虎','狼','花','竹','松','雪','霜','烟','雾'];
        const p3=['派','门','宫','殿','阁','堂','庄','教','帮','盟','谷','岛','坞','寨','院','府'];

        function pick(a){return a[Math.floor(Math.random()*a.length)];}
        
        function gen() {
            const ctn = document.getElementById('sects');
            ctn.style.opacity = '0';
            
            setTimeout(() => {
                let html = '';
                for (let i = 0; i < 9; i++) {
                    const name = pick(p1) + pick(p2) + pick(p3);
                    html += `
                        <div onclick="copyText('${name}')" class="group p-5 bg-white border-2 border-amber-50 rounded-2xl hover:border-amber-300 hover:shadow-lg transition-all cursor-pointer flex flex-col items-center justify-center animate-item" style="animation-delay: ${i*0.05}s">
                            <span class="text-xl font-black text-amber-900 font-serif">${name}</span>
                            <span class="text-amber-200 opacity-0 group-hover:opacity-100 transition-opacity text-[10px] font-black uppercase tracking-widest mt-2">Copy Name</span>
                        </div>
                    `;
                }
                ctn.innerHTML = html;
                ctn.style.opacity = '1';
                ctn.style.transition = 'all 0.4s ease-out';
                Utils.toast('新宗门已入世 ✨', 'success');
            }, 300);
        }

        function copyText(val) {
            navigator.clipboard.writeText(val).then(() => {
                Utils.toast(`已记录掌门密旨: ${val} ✨`, 'success');
            });
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            gen();
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
