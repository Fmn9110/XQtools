<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>表情包生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">😂 表情包 <span class="gradient-text">编辑器</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">用幽默点亮对话。简单几步自制专属表情包。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-4 md:grid-cols-8 gap-3 mb-8">
                <button onclick="setEmoji('😂')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">😂</button>
                <button onclick="setEmoji('😭')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">😭</button>
                <button onclick="setEmoji('🤔')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">🤔</button>
                <button onclick="setEmoji('😱')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">😱</button>
                <button onclick="setEmoji('🥺')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">🥺</button>
                <button onclick="setEmoji('😎')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">😎</button>
                <button onclick="setEmoji('🤡')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">🤡</button>
                <button onclick="setEmoji('💀')" class="text-3xl p-4 bg-gray-50 rounded-2xl hover:bg-yellow-50 hover:scale-110 active:scale-95 transition-all shadow-sm">💀</button>
            </div>

            <div class="relative mb-8 group">
                <input type="text" id="memeText" placeholder="想要配上什么文字？" 
                    class="w-full p-6 bg-pink-50/20 rounded-[2rem] border-2 border-transparent focus:border-pink-200 outline-none text-center text-xl font-bold text-gray-700 transition-all shadow-inner" 
                    oninput="render()">
                <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mt-3 text-center">Caption / 底部文案</label>
            </div>

            <div class="relative inline-block w-full max-w-[320px] mb-10 group">
                <div class="absolute inset-0 bg-pink-400/5 rounded-2xl -m-2 blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <canvas id="memeCanvas" width="300" height="300" class="relative z-10 mx-auto rounded-2xl shadow-2xl border-4 border-white w-full h-auto bg-white transition-transform group-hover:scale-[1.02]"></canvas>
            </div>

            <div class="flex justify-center">
                <button onclick="download()" class="w-full max-w-sm py-4 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-2xl shadow-lg shadow-pink-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                    📥 立即保存图片
                </button>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.4s">
            <div class="bg-white p-6 rounded-2xl border border-pink-50 text-gray-400 text-xs leading-relaxed max-w-2xl mx-auto flex items-start gap-4 shadow-inner shadow-gray-50/50">
                <span class="text-lg">🎭</span>
                <p>表情包是表达情绪的最高礼仪。在这个万物皆可表情包的时代，亲手制作的乐趣不仅在于成品，更在于那一瞬间的脑洞大开。快去创作你的独家神图吧！💖</p>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs shadow-none">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const canvas=document.getElementById('memeCanvas'),ctx=canvas.getContext('2d');
        let emoji='😂';

        function setEmoji(e){
            emoji=e;
            render();
            Utils.toast('已选择模版 ✨', 'info');
        }

        function render(){
            // Clear and draw white background
            ctx.fillStyle='#fff';
            ctx.fillRect(0,0,300,300);
            
            // Draw emoji
            ctx.font='120px sans-serif';
            ctx.textAlign='center';
            ctx.textBaseline='middle';
            ctx.fillText(emoji, 150, 140);
            
            // Draw text
            const text=document.getElementById('memeText').value;
            if(text){
                ctx.fillStyle='#000';
                ctx.font='black 28px "Outfit", sans-serif';
                ctx.strokeStyle='#fff';
                ctx.lineWidth=6;
                ctx.strokeText(text, 150, 260);
                ctx.fillText(text, 150, 260);
            }
        }

        function download(){
            const a=document.createElement('a');
            a.download=`q-meme-${Date.now()}.png`;
            a.href=canvas.toDataURL();
            a.click();
            Utils.toast('下载请求已发送 📥', 'success');
        }

        // Initialize
        render();

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
