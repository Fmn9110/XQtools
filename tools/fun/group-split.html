<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随机分组工具 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fafafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">👥 随机 <span class="gradient-text">分组工具</span></h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">公平、快速、有趣。把大家打散，开启新的碰撞！✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="relative group mb-8">
                <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2 ml-2">名单列表 / NAMES LIST</label>
                <textarea id="names" placeholder="每行输入一个名字，例如：&#10;隔壁小Q&#10;工具猫&#10;马卡龙队长" rows="6" class="w-full p-6 bg-pink-50/30 rounded-[2rem] border-2 border-transparent focus:border-pink-200 outline-none resize-none text-sm font-bold text-gray-700 transition-all shadow-inner"></textarea>
                <div class="absolute bottom-4 right-6 text-[10px] font-black text-pink-200 uppercase tracking-widest pointer-events-none">Support CSV / 支持换行</div>
            </div>

            <div class="flex flex-col md:flex-row gap-6 mb-10 items-end bg-pink-50/20 p-6 rounded-3xl">
                <div class="flex-1 w-full">
                    <label class="block text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2 ml-2">分组数量 / GROUPS</label>
                    <input type="number" id="groupCount" value="2" min="2" max="20" class="w-full p-4 bg-white rounded-2xl border-2 border-pink-100 outline-none text-sm font-bold text-gray-600 focus:border-pink-400 transition-all">
                </div>
                <button onclick="splitGroups()" class="w-full md:w-auto px-10 py-4 bg-pink-500 hover:bg-pink-600 text-white font-black rounded-2xl shadow-lg shadow-pink-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="text-lg">🔀</span> 命运之轮
                </button>
            </div>

            <div id="groups" class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-item">
                <!-- Groups generated here -->
            </div>
            
            <div id="emptyTip" class="py-20 flex flex-col items-center opacity-20 select-none">
                <span class="text-6xl mb-4">👥</span>
                <p class="text-xs font-black uppercase tracking-widest">Awaiting participation...</p>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <section class="animate-item" style="animation-delay: 0.5s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">📖</span>
                    算法正义
                </h2>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-pink-50 leading-relaxed text-gray-600 text-sm">
                    <p>采用现代洗牌算法（Fisher-Yates），确保每一名参与者被分配到任何组的概率都是严格均等的。在这个工具里，运气是唯一的指挥棒。</p>
                </div>
            </section>
            <section class="animate-item" style="animation-delay: 0.6s">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-lg flex items-center justify-center mr-3 text-lg font-bold">✨</span>
                    使用场景
                </h2>
                <div class="bg-white p-6 rounded-2xl border border-pink-50 shadow-sm leading-relaxed text-gray-500 text-sm">
                    <p>无论是桌游组队、团建破冰，还是课堂讨论，随机分组都能有效打破圈层。不再拘泥于熟悉的面孔，让惊喜在未知的组合中发生。💖</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-300 text-xs text-xs">© 2026 小Q工具箱 · 纯前端离线实验室</footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const groupColors = [
            'from-pink-50 to-rose-50 border-pink-100',
            'from-indigo-50 to-blue-50 border-indigo-100',
            'from-emerald-50 to-teal-50 border-emerald-100',
            'from-violet-50 to-purple-50 border-violet-100',
            'from-orange-50 to-amber-50 border-orange-100',
            'from-cyan-50 to-sky-50 border-cyan-100'
        ];

        function splitGroups() {
            const text = document.getElementById('names').value.trim();
            if (!text) { 
                Utils.toast('请输入名字列表哦', 'info');
                return; 
            }
            
            const names = text.split('\n').map(n=>n.trim()).filter(Boolean);
            if (names.length < 2) {
                Utils.toast('至少需要两个人才能分组哦', 'info');
                return;
            }

            const count = Math.min(names.length, Math.max(2, parseInt(document.getElementById('groupCount').value) || 2));
            
            // Fisher-Yates Shuffle
            for (let i = names.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [names[i], names[j]] = [names[j], names[i]];
            }
            
            const groups = Array.from({length: count}, () => []);
            names.forEach((name, i) => groups[i % count].push(name));

            let html = '';
            groups.forEach((g, i) => {
                const style = groupColors[i % groupColors.length];
                html += `
                <div class="bg-gradient-to-br ${style} rounded-[2rem] p-6 border-2 shadow-sm animate-item" style="animation-delay: ${i*0.1}s">
                    <div class="flex justify-between items-center mb-6">
                        <p class="text-sm font-black text-gray-700">Team ${String(i+1).padStart(2,'0')}</p>
                        <span class="bg-white/50 px-3 py-1 rounded-full text-[10px] font-black text-gray-400 uppercase tracking-tighter">${g.length} Members</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${g.map(n => `<span class="px-4 py-2 bg-white rounded-xl text-xs font-bold text-gray-600 shadow-sm border border-black/5">${n}</span>`).join('')}
                    </div>
                </div>`;
            });
            
            document.getElementById('groups').innerHTML = html;
            document.getElementById('emptyTip').classList.add('hidden');
            Utils.toast('分组任务已完成 ✨', 'success');
            
            setTimeout(() => {
                document.getElementById('groups').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        // --- 加载与点击特效 ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
