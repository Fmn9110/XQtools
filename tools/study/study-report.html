<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学情报告 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .subject-row { transition: all 0.2s ease; }
        .subject-row:hover { transform: translateX(5px); }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        @media print { .no-print { display: none !important; } .cute-card { box-shadow: none !important; border: 1px solid #eee !important; } }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14 no-print">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">全維度学术感知报告</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">数据驱动成长。可视化你的学科优势，洞察潜能，精准出击。📊</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="max-w-2xl mx-auto space-y-4 mb-10 no-print" id="subjects">
                <!-- Subjects dynamic -->
            </div>

            <div class="flex flex-col md:flex-row gap-5 mb-14 no-print">
                <button onclick="addSubject()" class="flex-1 py-5 bg-slate-50 text-slate-400 font-black rounded-3xl hover:bg-slate-100 transition-all border-2 border-dashed border-slate-200 text-sm uppercase tracking-widest">
                    ➕ 添加分析科目 (ADD)
                </button>
                <button onclick="generate()" class="flex-[2] py-5 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3">
                    📊 深度数据透视 (ANALYZE)
                </button>
            </div>

            <div id="reportBox" class="hidden animate-fade-in space-y-12">
                <!-- High-End Charts Section -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="p-8 bg-slate-50/50 rounded-[3rem] border border-slate-100 flex flex-col items-center">
                        <p class="text-[9px] text-slate-300 font-black uppercase tracking-[0.4em] mb-6">Vertical Growth Bar</p>
                        <canvas id="chartBar" width="600" height="400" class="w-full h-auto"></canvas>
                    </div>
                    <div class="p-8 bg-slate-50/50 rounded-[3rem] border border-slate-100 flex flex-col items-center">
                        <p class="text-[9px] text-slate-300 font-black uppercase tracking-[0.4em] mb-6">Subject Competency Radar</p>
                        <canvas id="chartRadar" width="600" height="400" class="w-full h-auto"></canvas>
                    </div>
                </div>

                <!-- Analysis Insights -->
                <div id="analysis" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
                    <!-- Cards injected here -->
                </div>
                
                <button onclick="window.print()" class="no-print py-4 px-10 bg-slate-800 text-white font-black rounded-full hover:bg-black transition-all text-xs uppercase tracking-widest shadow-lg">
                    💾 Export PDF Report
                </button>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            Advanced Academic Performance Analytics Infrastructure
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const defaultSubjects = ['语文', '数学', '英语', '物理', '生物'];
        const barColors = ['#f472b6', '#60a5fa', '#fbbf24', '#34d399', '#a78bfa', '#f87171', '#4ade80','#fca5a5'];

        function addSubject(name = '', score = '') {
            const div = document.createElement('div');
            div.className = 'subject-row grid grid-cols-12 gap-4 p-3 bg-slate-50 rounded-3xl border border-transparent hover:border-pink-100 group transition-all';
            div.innerHTML = `
                <div class="col-span-12 md:col-span-8 flex items-center gap-3 bg-white p-4 rounded-2xl shadow-sm">
                    <span class="w-8 h-8 rounded-lg bg-pink-50 text-pink-400 flex items-center justify-center font-black">S</span>
                    <input type="text" value="${name}" placeholder="科目名称" class="flex-1 outline-none text-sm font-bold text-slate-700">
                </div>
                <div class="col-span-12 md:col-span-4 flex gap-3">
                    <input type="number" value="${score}" placeholder="分数" max="150" class="flex-1 p-4 bg-white rounded-2xl outline-none text-sm font-black text-pink-400 shadow-sm focus:ring-4 ring-pink-50 text-center tabular-nums">
                    <button onclick="this.parentElement.parentElement.remove()" class="w-14 h-14 flex items-center justify-center bg-white rounded-2xl text-slate-300 hover:text-rose-500 hover:bg-rose-50 transition-all shadow-sm">🗑️</button>
                </div>
            `;
            document.getElementById('subjects').appendChild(div);
        }

        defaultSubjects.forEach(s => addSubject(s, Math.floor(Math.random()*40) + 80));

        function generate() {
            const rows = document.getElementById('subjects').children;
            const data = [];
            Array.from(rows).forEach(row => {
                const inputs = row.querySelectorAll('input');
                const name = inputs[0].value.trim() || '未知';
                const score = parseFloat(inputs[1].value) || 0;
                data.push({ name, score });
            });

            if (!data.length) {
                Utils.toast('请添加至少一个科目数据 📊', 'warning');
                return;
            }

            drawBarChart(data);
            drawRadarChart(data);

            const reportBox = document.getElementById('reportBox');
            reportBox.classList.remove('hidden');
            
            // Analysis
            const avg = (data.reduce((s, d) => s + d.score, 0) / data.length).toFixed(1);
            const sorted = [...data].sort((a,b) => b.score - a.score);
            const peak = sorted[0];
            const bottom = sorted[sorted.length-1];

            document.getElementById('analysis').innerHTML = `
                <div class="p-8 bg-blue-50/40 rounded-[2.5rem] border border-blue-100 flex flex-col items-center">
                    <p class="text-[9px] font-black text-blue-300 uppercase tracking-widest mb-1">Average Performance</p>
                    <p class="text-3xl font-black text-blue-500 tabular-nums">${avg}<span class="text-xs ml-1">分</span></p>
                </div>
                <div class="p-8 bg-pink-50 rounded-[2.5rem] border border-pink-100 flex flex-col items-center shadow-sm">
                    <p class="text-[9px] font-black text-pink-300 uppercase tracking-widest mb-1">Elite Subject</p>
                    <p class="text-3xl font-black text-pink-500">${peak.name}</p>
                    <span class="text-[10px] text-pink-300 font-bold mt-1">Score: ${peak.score}</span>
                </div>
                <div class="p-8 bg-slate-50/80 rounded-[3rem] border border-slate-100 text-left md:col-span-1">
                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-2">Expert Strategy</p>
                    <p class="text-[11px] font-bold text-slate-500 leading-relaxed">
                        您的 <span class="text-pink-400 font-black">${peak.name}</span> 表现最为夺目！<br>
                        下一步建议重点攻克 <span class="text-sky-400 font-black">${bottom.name}</span> 的弱项，拉平木桶短板。🚀
                    </p>
                </div>
            `;
            
            Utils.toast('深度学术报告分析完毕 ✨', 'success');
        }

        function drawBarChart(data) {
            const canvas = document.getElementById('chartBar'), ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = 600 * dpr; canvas.height = 400 * dpr; ctx.scale(dpr, dpr);

            const max = Math.max(...data.map(d => d.score), 100);
            const barW = Math.min(50, 480 / data.length);
            const gap = 20;
            const startX = (600 - data.length * (barW + gap)) / 2;

            ctx.clearRect(0, 0, 600, 400);
            data.forEach((d, i) => {
                const h = (d.score / max) * 280;
                const x = startX + i * (barW + gap);
                const y = 320 - h;
                
                const grad = ctx.createLinearGradient(x, y, x, 320);
                grad.addColorStop(0, barColors[i % barColors.length]);
                grad.addColorStop(1, barColors[i % barColors.length] + '20');

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x, y, barW, h, [15, 15, 5, 5]);
                ctx.fill();

                ctx.fillStyle = '#1e293b'; ctx.font = 'black 14px Outfit'; ctx.textAlign = 'center';
                ctx.fillText(d.score, x + barW / 2, y - 10);
                ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 12px sans-serif';
                ctx.fillText(d.name, x + barW / 2, 350);
            });
        }

        function drawRadarChart(data) {
            const canvas = document.getElementById('chartRadar'), ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = 600 * dpr; canvas.height = 400 * dpr; ctx.scale(dpr, dpr);

            const center = { x: 300, y: 200 }, radius = 140, count = data.length;
            const max = 150;

            ctx.clearRect(0, 0, 600, 400);
            
            // Draw Webs
            ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1;
            for(let j=1; j<=5; j++){
                ctx.beginPath();
                for(let i=0; i<count; i++){
                    const ang = (Math.PI * 2 / count) * i - Math.PI/2;
                    const x = center.x + Math.cos(ang) * (radius * j/5);
                    const y = center.y + Math.sin(ang) * (radius * j/5);
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            }

            // Draw Data
            ctx.fillStyle = 'rgba(244, 114, 182, 0.2)';
            ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 4;
            ctx.beginPath();
            data.forEach((d, i) => {
                const ang = (Math.PI * 2 / count) * i - Math.PI/2;
                const r = (d.score / max) * radius;
                const x = center.x + Math.cos(ang) * r;
                const y = center.y + Math.sin(ang) * r;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.closePath(); ctx.fill(); ctx.stroke();

            // Labels
            ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 12px sans-serif';
            data.forEach((d, i) => {
                const ang = (Math.PI * 2 / count) * i - Math.PI/2;
                const x = center.x + Math.cos(ang) * (radius + 25);
                const y = center.y + Math.sin(ang) * (radius + 25);
                ctx.textAlign = 'center';
                ctx.fillText(d.name, x, y);
            });
        }

        // Init
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // Click effects
        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('input')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
