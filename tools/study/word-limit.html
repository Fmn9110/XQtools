<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阅读字数工作台 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        .counter-pill { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .limit-input:focus { transform: scale(1.05); }
        .gauge-bar { transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1), background-color 0.4s; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">文本透析：字数统计</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">每一枚字符，皆是思维的颗粒。在精准约束下平衡表达。⌨️</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="grid md:grid-cols-2 gap-6 mb-10 no-print">
                <div class="p-8 bg-slate-50 rounded-[2.5rem] border-2 border-transparent focus-within:border-pink-50 transition-all text-left group">
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] mb-3 pl-2">Minimum Threshold (最小限制)</p>
                    <input type="number" id="min" value="100" class="limit-input w-full bg-transparent outline-none font-black text-3xl text-slate-700 transition-transform" oninput="update()">
                </div>
                <div class="p-8 bg-slate-50 rounded-[2.5rem] border-2 border-transparent focus-within:border-pink-50 transition-all text-left group">
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] mb-3 pl-2">Maximum Ceiling (最大限制)</p>
                    <input type="number" id="max" value="500" class="limit-input w-full bg-transparent outline-none font-black text-3xl text-slate-700 transition-transform" oninput="update()">
                </div>
            </div>

            <div class="relative group mb-10">
                <textarea id="textInput" rows="12" placeholder="在此粘贴长篇文本进行实时语言透析..." class="w-full p-10 bg-slate-50 rounded-[3rem] border-2 border-transparent focus:border-pink-50 outline-none focus:bg-white focus:shadow-2xl transition-all font-bold text-slate-700 placeholder:text-slate-200 resize-none shadow-inner" oninput="update()"></textarea>
                <div class="absolute right-10 top-10 flex gap-2 no-print">
                    <button onclick="clearText()" class="w-10 h-10 bg-white/80 rounded-xl flex items-center justify-center text-slate-300 hover:text-rose-400 transition-colors shadow-sm border border-slate-100">🗑️</button>
                    <button onclick="copyStats()" class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white shadow-lg hover:bg-pink-500 transition-all transform active:scale-95">📋</button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
                <div class="counter-pill p-8 bg-indigo-50/50 rounded-[2.5rem] border border-indigo-100/30">
                    <p id="wordCount" class="text-4xl font-black text-indigo-500 font-mono tracking-tighter">0</p>
                    <p class="text-[8px] font-black text-indigo-300 uppercase tracking-[0.4em] mt-2">Lexical Words</p>
                </div>
                <div class="counter-pill p-8 bg-pink-50/50 rounded-[2.5rem] border border-pink-100/30">
                    <p id="charCount" class="text-4xl font-black text-pink-400 font-mono tracking-tighter">0</p>
                    <p class="text-[8px] font-black text-pink-300 uppercase tracking-[0.4em] mt-2">Visual Units</p>
                </div>
                <div class="counter-pill p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100">
                    <p id="lineCount" class="text-4xl font-black text-slate-400 font-mono tracking-tighter">0</p>
                    <p class="text-[8px] font-black text-slate-300 uppercase tracking-[0.4em] mt-2">Structural Lines</p>
                </div>
                <div class="counter-pill p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100 overflow-hidden relative">
                    <div id="gauge" class="gauge-bar absolute bottom-0 left-0 h-1 bg-pink-400" style="width: 0%"></div>
                    <p id="progress" class="text-4xl font-black text-slate-700 font-mono tracking-tighter">0%</p>
                    <p class="text-[8px] font-black text-slate-300 uppercase tracking-[0.4em] mt-2">Goal Sync</p>
                </div>
            </div>

            <div id="status" class="p-8 rounded-[2rem] font-black text-xs uppercase tracking-[0.5em] transition-all flex items-center justify-center gap-4 bg-slate-50 text-slate-300">
                Ready to Process Analysis
            </div>
        </section>
        
        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.5em] pb-12 animate-item">
            Linguistic Quantification & Metric Synthesis Pipeline
        </p>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function update() {
            const text = document.getElementById('textInput').value;
            const min = parseInt(document.getElementById('min').value) || 0;
            const max = parseInt(document.getElementById('max').value) || Infinity;

            // Character Metrics (Traditional Length)
            const chars = text.length;
            document.getElementById('charCount').textContent = chars;

            // Lexical Metrics (Approximate words for EN/CN)
            // Regex handles mixed ASCII and CJK words
            const wordMatch = text.match(/[\u4e00-\u9fa5]|[\w']+/g);
            const words = wordMatch ? wordMatch.length : 0;
            document.getElementById('wordCount').textContent = words;

            // Structural Metrics
            const lines = text.trim() ? text.split('\n').length : 0;
            document.getElementById('lineCount').textContent = lines;

            // Goal Alignment
            const prog = document.getElementById('progress');
            const gauge = document.getElementById('gauge');
            if(max !== Infinity && max > 0) {
                const p = Math.min(Math.round((words / max) * 100), 100);
                prog.textContent = p + '%';
                gauge.style.width = p + '%';
                gauge.style.backgroundColor = words > max ? '#f43f5e' : (words < min ? '#cbd5e1' : '#10b981');
            } else {
                prog.textContent = '-';
                gauge.style.width = '0%';
            }

            // Logic Status
            const status = document.getElementById('status');
            if (!text.trim()) {
                status.textContent = "Ready to Process Analysis";
                status.className = "p-8 rounded-[2rem] font-black text-xs uppercase tracking-[0.5em] bg-slate-50 text-slate-300";
            } else if (words < min) {
                status.textContent = `🚫 字数不足 (距离最小限制还差 ${min - words} 字)`;
                status.className = "p-8 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] bg-amber-50 text-amber-500 border border-amber-100";
            } else if (words > max) {
                status.textContent = `⚠️ 警告：字数已溢出 (超出 ${words - max} 字)`;
                status.className = "p-8 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] bg-rose-50 text-rose-500 border border-rose-100";
            } else {
                status.textContent = "✅ 完美区间：字数符合要求";
                status.className = "p-8 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] bg-emerald-50 text-emerald-500 border border-emerald-100";
            }
        }

        function clearText() {
            document.getElementById('textInput').value = '';
            update();
        }

        function copyStats() {
            const words = document.getElementById('wordCount').textContent;
            const chars = document.getElementById('charCount').textContent;
            const lines = document.getElementById('lineCount').textContent;
            const stats = `Text Statistics:\n- Words: ${words}\n- Chars: ${chars}\n- Lines: ${lines}`;
            navigator.clipboard.writeText(stats);
            Utils.toast('统计数据已复制 📋', 'success');
        }

        // Init
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            update();
        });

        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('textarea') || e.target.closest('input')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
