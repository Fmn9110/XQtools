<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音阶练习 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">乐理基础音阶实验室</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">轻触指尖，开启一段美妙的音乐启蒙之旅。</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-full flex justify-center mb-10 overflow-x-auto pb-10 scrollbar-thin scrollbar-thumb-pink-100">
                <div id="piano-container" class="relative flex min-w-max p-6 bg-pink-50/20 rounded-[3.5rem] border-2 border-pink-50 shadow-inner">
                     <!-- Keys generated via JS -->
                </div>
            </div>

            <div class="p-10 bg-gradient-to-br from-pink-400 to-rose-400 rounded-[3rem] text-white shadow-xl w-full max-w-md transition-all transform hover:scale-105 group relative overflow-hidden" id="note-display">
                <div class="absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12 group-hover:rotate-0 transition-transform">🎵</div>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 mb-3">Auditory Feedback 听觉反馈</p>
                <div class="flex items-end gap-3">
                    <p id="note" class="text-4xl font-black">Ready...</p>
                    <p id="freq" class="text-xs font-mono opacity-60 mb-1">--- Hz</p>
                </div>
            </div>
            
            <div class="mt-10 flex items-center gap-6 text-[10px] font-black text-gray-300 uppercase tracking-widest">
                <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-pink-300"></span> Oscillator</span>
                <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-rose-300"></span> Interactive</span>
                <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-amber-300"></span> Educational</span>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const notes = [
            {name:'C',  freq:261.63, label:'Do'},
            {name:'D',  freq:293.66, label:'Re'},
            {name:'E',  freq:329.63, label:'Mi'},
            {name:'F',  freq:349.23, label:'Fa'},
            {name:'G',  freq:392.00, label:'Sol'},
            {name:'A',  freq:440.00, label:'La'},
            {name:'B',  freq:493.88, label:'Si'},
            {name:'C5', freq:523.25, label:'Do (High)'}
        ];
        
        const blacks = [
            {name:'C#', freq:277.18, pos:1},
            {name:'D#', freq:311.13, pos:2},
            {name:'F#', freq:369.99, pos:4},
            {name:'G#', freq:415.30, pos:5},
            {name:'A#', freq:466.16, pos:6}
        ];

        let audioCtx = null;

        function playNote(freq, label){
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = freq;
            osc.type = 'triangle'; // Smoother than sine, richer than square
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.3);
            
            document.getElementById('note').textContent = label;
            document.getElementById('freq').textContent = `${freq} Hz`;
            Utils.toast(`Playing: ${label} ✨`);
        }

        function initPiano() {
            const container = document.getElementById('piano-container');
            container.innerHTML = "";
            const whiteKeysContainer = document.createElement('div');
            whiteKeysContainer.className = 'flex';
            
            notes.forEach((n, i) => {
                const key = document.createElement('button');
                key.className = 'w-14 h-52 bg-white border-x border-pink-50 rounded-b-3xl shadow-sm hover:bg-pink-50 flex flex-col justify-end items-center pb-8 text-sm text-pink-300 font-black transition-all active:translate-y-2 active:shadow-inner relative z-0 group';
                key.innerHTML = `<span class="opacity-40 group-hover:opacity-100 transition-opacity">${n.label}</span>`;
                key.onclick = () => playNote(n.freq, n.label);
                whiteKeysContainer.appendChild(key);
            });
            container.appendChild(whiteKeysContainer);

            blacks.forEach(b => {
                const bk = document.createElement('button');
                bk.className = 'absolute w-9 h-32 bg-slate-800 rounded-b-2xl hover:bg-slate-700 z-10 text-[10px] text-white/20 flex flex-col justify-end items-center pb-5 active:h-34 transition-all shadow-xl border-x border-slate-900';
                bk.style.left = (b.pos * 56 + 28) + 'px'; // Adjusted for 14 width keys
                bk.style.top = '24px';
                bk.textContent = '#';
                bk.onclick = () => playNote(b.freq, b.name);
                container.appendChild(bk);
            });
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    initPiano();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
