<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作文提纲生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">作文提纲生成</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">灵感枯竭？输入题目，一键生成结构化的写作灵感。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="space-y-4 mb-6">
                <input type="text" id="topic" placeholder="✍️ 作文题目 (例如: 难忘的一件事)" class="w-full p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all text-base md:text-lg shadow-inner font-bold">
                <div class="flex flex-col md:flex-row gap-3">
                    <select id="genre" class="flex-1 p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 text-sm font-bold text-slate-600 shadow-inner">
                        <option value="议论">🧐 议论</option>
                        <option value="记叙">📖 记叙</option>
                        <option value="说明">🔍 说明</option>
                        <option value="读后感">💭 读后感</option>
                    </select>
                    <select id="words" class="flex-1 p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 text-sm font-bold text-slate-600 shadow-inner">
                        <option>600字左右</option>
                        <option>800字左右</option>
                        <option>1000字以上</option>
                    </select>
                </div>
            </div>
            <button onclick="generate()" class="w-full py-4 bg-pink-400 text-white font-black rounded-2xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 mb-6">
                ✨ 生成结构化提纲
            </button>
            <div id="outline" class="hidden space-y-4 animate-fade-in"></div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const templates = {
            '议论': [
                {part: '开头 (引入论点)', tips: ['以名言/故事引入', '提出中心论点', '阐明论题背景']},
                {part: '论据一 (事实论证)', tips: ['举具体事实', '结合社会现象', '数据或案例支撑']},
                {part: '论据二 (道理论证)', tips: ['引用名人名言', '从逻辑层面分析', '对比反面例证']},
                {part: '论据三 (深化论点)', tips: ['联系现实生活', '提出解决方案', '辩证分析']},
                {part: '结尾 (总结升华)', tips: ['呼应开头', '重申论点', '提出展望/号召']}
            ],
            '记叙': [
                {part: '开头 (环境/背景)', tips: ['设置时间地点', '描写环境氛围', '引出主要人物']},
                {part: '发展 (情节展开)', tips: ['事件经过详述', '人物对话描写', '细节刻画']},
                {part: '高潮 (核心事件)', tips: ['矛盾冲突点', '转折或感悟', '情感高潮']},
                {part: '结尾 (感悟升华)', tips: ['总结事件意义', '表达内心感受', '照应题目主题']}
            ],
            '说明': [
                {part: '引言 (说明对象)', tips: ['介绍说明对象', '引起读者兴趣', '总述特征']},
                {part: '主体一 (特征说明)', tips: ['分类说明', '数字说明', '举例说明']},
                {part: '主体二 (原理/过程)', tips: ['按时间/空间顺序', '因果关系', '比较说明']},
                {part: '总结', tips: ['概括要点', '展望发展', '呼吁关注']}
            ],
            '读后感': [
                {part: '简介 (原文概括)', tips: ['简述主要内容', '提到作者和背景', '引出感受']},
                {part: '感受一 (深刻印象)', tips: ['哪个情节打动了你', '引用原文片段', '个人理解']},
                {part: '感受二 (联系实际)', tips: ['联系自身经历', '联系社会现象', '对比思考']},
                {part: '总结 (收获与思考)', tips: ['总结主要感受', '提出自我期望', '升华主题']}
            ]
        };

        function generate() {
            const topic = document.getElementById('topic').value.trim() || '我的感悟';
            const genre = document.getElementById('genre').value;
            const words = document.getElementById('words').value;
            const tmpl = templates[genre];
            
            let html = `
                <div class="p-6 bg-pink-50/50 rounded-3xl border border-pink-100 text-center mb-6">
                    <p class="font-black text-pink-600 text-lg md:text-xl mb-1">《${topic}》</p>
                    <p class="text-[10px] font-bold text-pink-400 tracking-widest uppercase">${genre} · ${words}</p>
                </div>
            `;
            
            tmpl.forEach((section, i) => {
                const tip = section.tips[Math.floor(Math.random() * section.tips.length)];
                html += `
                    <div class="p-5 bg-white rounded-2xl border border-pink-50 shadow-sm hover:shadow-md transition-shadow group">
                        <div class="flex gap-4">
                            <div class="w-8 h-8 rounded-full bg-pink-100 text-pink-500 flex items-center justify-center font-black shrink-0 text-sm group-hover:bg-pink-400 group-hover:text-white transition-colors">${i + 1}</div>
                            <div>
                                <p class="font-black text-slate-700 mb-1">${section.part}</p>
                                <p class="text-sm text-gray-500 leading-relaxed font-semibold">💡 写作思路: ${tip}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            const outline = document.getElementById('outline');
            outline.innerHTML = html;
            outline.classList.remove('hidden');
            Utils.toast('生成成功！加油写吧');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
