<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>思维导图列表版 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">思维层级大纲版</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">轻量级逻辑梳理工具，用文字定义你的思想维度。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item flex flex-col md:flex-row gap-8" style="animation-delay: 0.2s">
             <!-- Input Logic -->
             <div class="w-full md:w-1/3 space-y-4 flex flex-col">
                <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest pl-2">Input Logic 逻辑输入</p>
                <textarea id="mapInput" class="w-full h-[400px] p-6 bg-slate-50 border-2 border-slate-50 rounded-[2.5rem] outline-none focus:border-pink-100 text-xs font-mono leading-relaxed shadow-inner resize-none custom-scrollbar" placeholder="中心主题&#10;  一级分支&#10;    二级内容">核心逻辑框架&#10;  技术栈 (Tech)&#10;    React 18&#10;    Tailwind CSS&#10;  设计理念&#10;    Minimal&#10;    Premium&#10;  目标用户&#10;    效率达人</textarea>
                <div class="space-y-4">
                     <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-50 text-[11px] text-gray-400 font-medium italic leading-relaxed">
                        💡 提示：使用 2 个空格作为缩进（Indent），系统将自动识别层级并实时渲染右侧节点。
                    </div>
                    <button onclick="render()" class="w-full py-4 bg-pink-400 text-white font-black rounded-2xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95">
                        🔄 强制重新渲染
                    </button>
                </div>
             </div>
             
             <!-- Render Board -->
             <div class="flex-1 flex flex-col min-h-[500px]">
                <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-4 pl-2">Logic Board 画布</p>
                <div id="canvas" class="flex-1 bg-pink-50/20 rounded-[3rem] border-2 border-dashed border-pink-100 p-8 md:p-12 text-left space-y-4 overflow-auto custom-scrollbar">
                    <!-- Nodes will be injected here -->
                </div>
             </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('mapInput');
        const canvas = document.getElementById('canvas');

        function render() {
            const lines = input.value.split('\n');
            canvas.innerHTML = "";
            let nodeCount = 0;

            lines.forEach((line, index) => {
                const indent = line.search(/\S/);
                if(indent === -1) return;
                
                const text = line.trim();
                const div = document.createElement('div');
                
                // Styling based on depth
                const depth = Math.floor(indent / 2);
                const themes = [
                    'bg-pink-400 text-white font-bold ring-8 ring-pink-50 shadow-xl', // Zero
                    'bg-pink-100 text-pink-500 font-bold border-2 border-pink-200 shadow-md', // One
                    'bg-white text-slate-500 border-2 border-pink-50 shadow-sm font-medium', // Two+
                    'bg-slate-50 text-slate-400 border border-slate-100 shadow-sm text-[10px] font-normal' // Three+
                ];
                
                const themeClass = themes[Math.min(depth, themes.length - 1)];
                const animDelay = (nodeCount * 0.05).toFixed(2);
                
                div.className = `py-3 px-6 rounded-3xl ${themeClass} inline-block align-top mr-3 mb-3 transition-all hover:scale-110 animate-fade-in cursor-default`;
                div.style.marginLeft = (indent * 12) + "px";
                div.style.animationDelay = `${animDelay}s`;
                div.innerHTML = `<span class="text-xs uppercase tracking-wider select-none">${text}</span>`;
                
                canvas.appendChild(div);
                canvas.appendChild(document.createElement('br'));
                nodeCount++;
            });

            if (nodeCount === 0) {
                canvas.innerHTML = `<div class="w-full h-full flex items-center justify-center text-gray-300 font-black italic">Waiting for Input...</div>`;
            }
        }

        // Auto render on input
        input.oninput = render;

        // Load animation
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    render();
                }, 500);
            }
        });

        // Click effect
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
