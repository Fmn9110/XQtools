<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>待办清单 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .todo-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .todo-item:hover { transform: scale(1.02); background: white; box-shadow: 0 15px 40px -10px rgba(0,0,0,0.06); }
        .todo-item.done { opacity: 0.5; filter: grayscale(1); }
        .priority-dot { width: 8px; height: 8px; border-radius: 50%; }
        .p-high { background: #fb7185; box-shadow: 0 0 10px rgba(251, 113, 133, 0.4); }
        .p-med { background: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .p-low { background: #34d399; box-shadow: 0 0 10px rgba(52, 211, 153, 0.4); }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-3xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">高效引擎：任务清单</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">拆解目标，逐个击破。让每一次打勾都充满成就感。✅</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="flex flex-col md:flex-row gap-4 mb-12 no-print">
                 <div class="flex-1 relative group">
                    <input type="text" id="todoInput" placeholder="输入下一步行动... (Next Action)" class="w-full p-6 bg-slate-50 rounded-[2rem] outline-none focus:bg-white border-2 border-transparent focus:border-pink-50 transition-all font-black text-slate-700 placeholder:text-slate-300 shadow-sm">
                    <div class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-200 pointer-events-none text-2xl group-focus-within:text-pink-200 transition-colors">🖋️</div>
                 </div>
                 <select id="priority" class="bg-slate-50 text-slate-400 font-bold px-6 py-4 rounded-[1.8rem] border-2 border-transparent focus:border-pink-50 outline-none cursor-pointer">
                    <option value="high">🔴 高优先级</option>
                    <option value="med" selected>🟡 中优先级</option>
                    <option value="low">🟢 低优先级</option>
                 </select>
                 <button onclick="add()" class="bg-pink-400 text-white px-10 py-5 rounded-[2rem] font-black shadow-2xl shadow-pink-100 hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-lg">
                    存档任务
                 </button>
            </div>

            <div id="todoList" class="space-y-4 text-left min-h-[100px]">
                 <!-- List dynamic -->
            </div>
            
            <div id="emptyState" class="py-20 text-center opacity-20 select-none hidden">
                <p class="text-6xl mb-6">🎐</p>
                <p class="text-[10px] font-black uppercase tracking-[0.5em] text-slate-400">Zen Horizon: No active tasks</p>
            </div>

            <div class="mt-14 pt-10 border-t border-slate-50 flex justify-between items-center no-print">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest" id="stats">Completed: 0 / 0</p>
                <button onclick="clearDone()" class="text-[10px] font-black text-slate-300 hover:text-rose-400 uppercase tracking-widest transition-colors">
                    🧹 Clear Completed
                </button>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            High-Performance Productivity & Academic Workflow Infrastructure
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('todoInput');
        const priorityEl = document.getElementById('priority');
        const list = document.getElementById('todoList');
        const emptyState = document.getElementById('emptyState');
        let todos = JSON.parse(localStorage.getItem('qTodoList') || '[]');

        function save() {
            localStorage.setItem('qTodoList', JSON.stringify(todos));
            emptyState.classList.toggle('hidden', todos.length > 0);
            updateStats();
        }

        function updateStats() {
            const done = todos.filter(t => t.done).length;
            document.getElementById('stats').textContent = `Completed: ${done} / ${todos.length}`;
        }

        function render() {
            list.innerHTML = '';
            // Sort by priority then by done status
            const sorted = [...todos].sort((a,b) => {
                if(a.done !== b.done) return a.done ? 1 : -1;
                const pMap = { high: 0, med: 1, low: 2 };
                return pMap[a.priority] - pMap[b.priority];
            });

            sorted.forEach(todo => {
                const item = document.createElement('div');
                item.className = `todo-item flex items-center gap-6 p-6 md:p-8 rounded-[2.5rem] group transition-all border-2 
                    ${todo.done ? 'done bg-slate-50/50 border-transparent shadow-none' : 'bg-white border-slate-50/50 shadow-sm hover:border-pink-50'}`;
                
                item.innerHTML = `
                    <div class="relative cursor-pointer flex-shrink-0">
                        <input type="checkbox" ${todo.done ? 'checked' : ''} class="peer sr-only">
                        <div class="w-8 h-8 border-2 border-slate-200 rounded-full group-hover:border-pink-300 peer-checked:bg-pink-400 peer-checked:border-pink-400 transition-all flex items-center justify-center text-white">
                            <span class="text-xs transition-transform transform ${todo.done ? 'scale-100' : 'scale-0'}">✓</span>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col gap-1 overflow-hidden">
                        <div class="flex items-center gap-2">
                             <span class="priority-dot p-${todo.priority}"></span>
                             <span class="text-slate-800 font-extrabold tracking-tight text-lg truncate transition-all ${todo.done ? 'line-through text-slate-300' : ''}">${todo.text}</span>
                        </div>
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic leading-none pl-4">${todo.priority} Priority</span>
                    </div>
                    <button onclick="remove(${todo.id})" class="w-10 h-10 rounded-2xl flex items-center justify-center text-slate-200 hover:bg-rose-50 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100 flex-shrink-0">🗑️</button>
                `;

                item.querySelector('.relative').onclick = () => toggle(todo.id);
                list.appendChild(item);
            });
            save();
        }

        function add() {
            const val = input.value.trim();
            if (!val) {
                Utils.toast('输入有效的任务描述 🖋️', 'warning');
                return;
            }
            todos.unshift({ id: Date.now(), text: val, done: false, priority: priorityEl.value });
            input.value = "";
            render();
            Utils.toast('任务已成功捕捉 ✨', 'success');
        }

        function toggle(id) {
            const todo = todos.find(t => t.id === id);
            todo.done = !todo.done;
            if(todo.done) {
                 // Confetti effect or something?
            }
            render();
        }

        function remove(id) {
            if(!confirm('确定要移除这项任务吗？')) return;
            todos = todos.filter(t => t.id !== id);
            render();
            Utils.toast('任务已移除 🗑️', 'info');
        }

        function clearDone() {
            if(todos.filter(t => t.done).length === 0) return;
            if(!confirm('清空所有已完成任务？')) return;
            todos = todos.filter(t => !t.done);
            render();
            Utils.toast('清单已深度清理 🧹', 'success');
        }

        input.onkeypress = (e) => { if (e.key === 'Enter') add(); };

        // Init
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    render();
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
