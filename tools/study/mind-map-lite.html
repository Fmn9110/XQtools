<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-6xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">文本驱动思维导图</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">用层级缩进文本，瞬间构建可视化知识图谱。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full">
                <!-- Left Control Panel -->
                <div class="lg:col-span-4 space-y-6 flex flex-col h-full">
                    <div class="flex-1 space-y-2">
                        <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest pl-2">Structure Text 缩进文本</p>
                        <textarea id="input" class="w-full h-[400px] p-6 bg-slate-50 border-2 border-slate-50 rounded-[2rem] outline-none focus:border-pink-100 font-mono text-xs leading-relaxed shadow-inner resize-none custom-scrollbar" placeholder="用缩进表示层级：&#10;主题&#10;  分支一&#10;    子项1&#10;    子项2&#10;  分支二"></textarea>
                    </div>
                    <div class="space-y-3">
                        <button onclick="render()" class="w-full py-4 bg-pink-400 text-white font-black rounded-2xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-lg">
                            🎨 重新生成导图
                        </button>
                        <button onclick="dl()" class="w-full py-4 bg-white border-2 border-pink-50 text-pink-400 font-black rounded-2xl shadow-sm hover:border-pink-100 hover:text-pink-500 transition-all text-sm">
                            📥 下载图片 (PNG)
                        </button>
                    </div>
                </div>

                <!-- Right Canvas Area -->
                <div class="lg:col-span-8 flex flex-col h-full min-h-[500px]">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-3 pl-2">Live Preview 实时预览</p>
                    <div id="canvas-container" class="flex-1 bg-pink-50/20 rounded-[3rem] border-2 border-dashed border-pink-100 relative overflow-hidden group">
                        <canvas id="canvas" width="2000" height="1500" class="w-full h-full cursor-grab active:cursor-grabbing transition-transform duration-200 origin-center"></canvas>
                        
                        <!-- Zoom & Pan Controls -->
                        <div class="absolute bottom-6 right-6 flex flex-col gap-2">
                             <button onclick="adjustScale(0.1)" class="w-10 h-10 bg-white shadow-xl rounded-full text-pink-400 font-black hover:bg-pink-50 transition-all border border-pink-50 flex items-center justify-center text-xl">＋</button>
                             <button onclick="adjustScale(-0.1)" class="w-10 h-10 bg-white shadow-xl rounded-full text-pink-400 font-black hover:bg-pink-50 transition-all border border-pink-50 flex items-center justify-center text-xl">－</button>
                             <button onclick="resetScale()" class="w-10 h-10 bg-white shadow-xl rounded-full text-pink-400 font-black hover:bg-pink-50 transition-all border border-pink-50 flex items-center justify-center text-xs">Reset</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="cute-card p-6 bg-pink-50/30 border border-pink-50/50 text-left animate-item" style="animation-delay: 0.3s">
            <h2 class="text-xs font-black text-pink-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-pink-400 animate-ping"></span> 智能解析说明 (How it works)
            </h2>
            <ul class="text-[12px] text-gray-400 space-y-1 font-medium">
                <li>• 使用空格或 Tab 进行缩进，代表层级关系。</li>
                <li>• 第一行通常作为“中心主题”。</li>
                <li>• 支持中英文混合，画布大小随内容自动适配。</li>
            </ul>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const colors = ['#fca5a5','#fbcfe8','#fcd34d','#c084fc','#86efac','#93c5fd','#f472b6','#fdba74'];
        let currentTree = null;
        let scale = 1.0;
        let offsetX = 0, offsetY = 0;

        function parse(text){
            const lines = text.split('\n').filter(l => l.trim());
            const root = {text: '', children: [], level: -1};
            const stack = [root];
            lines.forEach(line => {
                const indent = line.search(/\S/);
                const level = Math.floor(indent / 2);
                const node = {text: line.trim(), children: [], level};
                while(stack.length > 1 && stack[stack.length - 1].level >= level) stack.pop();
                stack[stack.length - 1].children.push(node);
                stack.push(node);
            });
            return root.children.length === 1 ? root.children[0] : (root.children.length ? {text: '中心主题', children: root.children, level: 0} : {text: '心智图', children: [], level: 0});
        }

        function countLeaves(node) {
            return node.children.length ? node.children.reduce((s, c) => s + countLeaves(c), 0) : 1;
        }

        function render(){
            const text = document.getElementById('input').value;
            currentTree = parse(text);
            draw();
            Utils.toast('导图已重新生成 ✨');
        }

        function adjustScale(delta) {
            scale = Math.max(0.2, Math.min(3, scale + delta));
            draw();
        }

        function resetScale() {
            scale = 1.0;
            draw();
        }

        function draw(){
            if(!currentTree) return;
            const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.scale(scale, scale);
            
            // Initial positioning
            const startX = 200;
            const startY = canvas.height / 2 / scale;
            drawNode(ctx, currentTree, startX, startY, 0, canvas.height / scale, 0);
        }

        function drawNode(ctx, node, x, y, yStart, yEnd, depth){
            const color = colors[depth % colors.length];
            const w = depth === 0 ? 200 : 150;
            const h = depth === 0 ? 60 : 45;
            
            // Draw connection line back to parent if not root
            // (Handled by parent for its children)

            // Draw current node bubble
            ctx.shadowBlur = 20;
            ctx.shadowColor = `rgba(0,0,0,0.08)`;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x - w / 2, y - h / 2, w, h, h / 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw text
            ctx.fillStyle = '#fff';
            ctx.font = `${depth === 0 ? 'bold 18' : '14'}px Outfit, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.text.length > 15 ? node.text.slice(0, 13) + '..' : node.text, x, y);
            
            if(!node.children.length) return;

            const total = countLeaves(node);
            let yCursor = yStart;
            const childX = x + w + 120; // Distance between layers
            
            node.children.forEach((child, i) => {
                const leaves = countLeaves(child);
                const sliceH = (yEnd - yStart) * (leaves / total);
                const childY = yCursor + sliceH / 2;
                
                // Draw bezier curve
                ctx.strokeStyle = colors[(depth + 1) % colors.length];
                ctx.lineWidth = depth === 0 ? 5 : 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x + w / 2, y);
                ctx.bezierCurveTo(x + w / 2 + 60, y, childX - w / 2 - 60, childY, childX - w / 2, childY);
                ctx.stroke();
                
                drawNode(ctx, child, childX, childY, yCursor, yCursor + sliceH, depth + 1);
                yCursor += sliceH;
            });
        }

        function dl(){
            const canvas = document.getElementById('canvas');
            const dataUrl = canvas.toDataURL('image/png', 1.0);
            const a = document.createElement('a');
            a.download = 'q-mindmap.png';
            a.href = dataUrl;
            a.click();
            Utils.toast('思维导图下载中.. 📦');
        }

        // Initialize with default content
        document.getElementById('input').value = '学习路线图\n  前端基础\n    HTML5 / CSS3\n    JavaScript ES6+\n  核心框架\n    React.js\n    Vue.js\n  进阶技能\n    TypeScript\n    Node.js\n  职场规划\n    项目实践\n    建立个人品牌';

        // Load animation
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    render();
                }, 500);
            }
        });

        // Click effect
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>

</body>
</html>
