<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣味记忆翻牌 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">趣味记忆翻牌挑战</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">考验你的瞬时记忆力，在最少的步数内配对所有卡片！</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div id="stats" class="mb-10 flex gap-10 items-center justify-center w-full">
                <div class="text-center group">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest group-hover:text-pink-400 transition-colors">Matched 配对</p>
                    <p id="match-count" class="text-3xl font-black text-pink-400">0 / 8</p>
                </div>
                <div class="text-center group">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest group-hover:text-pink-400 transition-colors">Moves 步数</p>
                    <p id="move-count" class="text-3xl font-black text-slate-400">0</p>
                </div>
            </div>

            <div id="grid" class="grid grid-cols-4 gap-3 md:gap-5 max-w-md mx-auto mb-12 no-select">
                 <!-- Card elements injected here -->
            </div>

            <button onclick="restart()" class="w-full max-w-xs py-5 bg-pink-400 text-white font-black rounded-3xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-lg">
                🔄 重新开启游戏 (Reset)
            </button>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const symbols = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        let cards = [];
        let flipped = [];
        let matchedCount = 0;
        let moveCount = 0;
        let isLocked = false;

        function restart() {
            cards = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            matchedCount = 0;
            moveCount = 0;
            flipped = [];
            isLocked = false;
            document.getElementById('match-count').innerText = "0 / 8";
            document.getElementById('move-count').innerText = "0";
            
            cards.forEach((symbol, i) => {
                const card = document.createElement('div');
                card.className = "w-full aspect-square bg-pink-50/50 rounded-2xl flex items-center justify-center text-3xl cursor-pointer hover:bg-pink-100/50 transition-all border-2 border-dashed border-pink-100 shadow-sm relative group active:scale-95 overflow-hidden";
                
                const front = document.createElement('div');
                front.className = "absolute inset-0 flex items-center justify-center text-pink-300 font-black text-2xl opacity-100 transition-all group-hover:scale-110";
                front.textContent = "?";
                
                const back = document.createElement('div');
                back.className = "absolute inset-0 flex items-center justify-center opacity-0 transition-all scale-150 rotate-y-180";
                back.textContent = symbol;
                
                card.appendChild(front);
                card.appendChild(back);
                
                card.dataset.symbol = symbol;
                card.onclick = () => handleCardClick(card, front, back);
                grid.appendChild(card);
            });
            Utils.toast('游戏已重新加载！🎮');
        }

        function handleCardClick(card, front, back) {
            if(isLocked || card.classList.contains('matched') || flipped.includes(card)) return;

            // Flip visual effect
            front.classList.add('opacity-0', 'scale-50');
            back.classList.remove('opacity-0', 'scale-150', 'rotate-y-180');
            back.classList.add('opacity-100', 'scale-100');
            card.classList.add('bg-white', 'shadow-xl', 'border-pink-200', 'border-solid');
            card.classList.remove('border-dashed');

            flipped.push(card);

            if(flipped.length === 2) {
                isLocked = true;
                moveCount++;
                document.getElementById('move-count').innerText = moveCount;
                
                const card1 = flipped[0];
                const card2 = flipped[1];

                if(card1.dataset.symbol === card2.dataset.symbol) {
                    // Match
                    matchedCount++;
                    document.getElementById('match-count').innerText = `${matchedCount} / 8`;
                    card1.classList.add('matched', 'ring-4', 'ring-green-100');
                    card2.classList.add('matched', 'ring-4', 'ring-green-100');
                    flipped = [];
                    isLocked = false;
                    
                    if(matchedCount === 8) {
                        setTimeout(() => {
                            Utils.toast('🎉 记忆大师！恭喜通关！✨', 'success');
                        }, 500);
                    }
                } else {
                    // Not match, flip back
                    setTimeout(() => {
                        flipped.forEach(c => {
                            const f = c.querySelector('div:first-child');
                            const b = c.querySelector('div:last-child');
                            f.classList.remove('opacity-0', 'scale-50');
                            b.classList.add('opacity-0', 'scale-150', 'rotate-y-180');
                            b.classList.remove('opacity-100', 'scale-100');
                            c.classList.remove('bg-white', 'shadow-xl', 'border-pink-200', 'border-solid');
                            c.classList.add('border-dashed');
                        });
                        flipped = [];
                        isLocked = false;
                    }, 800);
                }
            }
        }
        
        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    restart();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <style>
        .rotate-y-180 { transform: rotateY(180deg); }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
