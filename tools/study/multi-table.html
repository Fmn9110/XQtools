<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九九乘法表 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            nav, .cute-loader-overlay, .print-btn { display: none !important; }
            body { background: white !important; }
            .cute-card { box-shadow: none !important; border: 1px solid #eee !important; }
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">交互九九乘法表</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">探索乘法之美，让数学基础稳固且充满趣味。</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-full overflow-x-auto pb-4 custom-scrollbar">
                <table class="w-full border-separate border-spacing-2 md:border-spacing-3 text-center" id="table">
                    <!-- Tables generated via JS -->
                </table>
            </div>
            
            <div class="mt-12 flex flex-col md:flex-row items-center gap-8 w-full justify-center">
                <div class="p-8 bg-pink-50/50 rounded-[2.5rem] border-2 border-dashed border-pink-100 min-w-[280px] transition-all transform hover:scale-105 opacity-0 scale-95" id="detail-box">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-2 leading-none">Detailed Breakdown 详细逻辑</p>
                    <p class="text-3xl font-black text-pink-500 font-mono" id="detail">0 × 0 = 0</p>
                </div>

                <div class="space-y-4">
                     <button onclick="window.print()" class="print-btn px-10 py-4 bg-white border-2 border-pink-100 text-pink-400 font-black rounded-2xl hover:bg-pink-50 hover:border-pink-200 transition-all flex items-center gap-3 shadow-sm group">
                        🖨️ <span class="group-hover:tracking-wider transition-all">打印练习表 (Print)</span>
                    </button>
                    <p class="text-[10px] text-gray-300 font-medium italic">点击表格单元格，查看详细计算逻辑</p>
                </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-bold tracking-[0.2em] animate-item" style="animation-delay: 0.3s">
            Mathematical Enlightenment & Logic Studio
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function initTable() {
            const el = document.getElementById('table');
            let html = '<thead><tr><th class="w-12 h-12 md:w-16 md:h-16 bg-pink-400 text-white rounded-2xl text-lg font-black shadow-lg ring-4 ring-pink-50">×</th>';
            
            for(let i=1; i<=9; i++) {
                html += `<th class="w-12 h-12 md:w-16 md:h-16 bg-pink-50/50 text-pink-500 rounded-2xl text-lg font-black border border-pink-100 transition-colors shadow-sm tracking-tighter italic">${i}</th>`;
            }
            html += '</tr></thead><tbody>';
            
            for(let r=1; r<=9; r++){
                html += `<tr><th class="w-12 h-12 md:w-16 md:h-16 bg-pink-50/50 text-pink-500 rounded-2xl text-lg font-black border border-pink-100 shadow-sm italic">${r}</th>`;
                for(let c=1; c<=9; c++){
                    const val = r * c;
                    const isActive = c <= r;
                    const isDiagonal = r === c;
                    
                    html += `
                        <td onclick="showDetail(${r}, ${c}, ${val})" 
                            class="w-12 h-12 md:w-16 md:h-16 border rounded-2xl text-center text-sm md:text-lg cursor-pointer transition-all active:scale-95 overflow-hidden relative group
                            ${isActive ? 'bg-white border-pink-50 shadow-sm font-black text-slate-700 hover:bg-pink-100 hover:border-pink-200 hover:-translate-y-1' : 'bg-gray-50/30 border-transparent text-gray-100 select-none'}
                            ${isDiagonal ? 'ring-4 ring-pink-100 z-10' : ''}">
                            ${isActive ? val : ''}
                        </td>`;
                }
                html += '</tr>';
            }
            html += '</tbody>';
            el.innerHTML = html;
        }

        function showDetail(r, c, val) {
            if(c > r) return;
            const box = document.getElementById('detail-box');
            const detailText = document.getElementById('detail');
            box.classList.remove('opacity-0', 'scale-95');
            box.classList.add('opacity-100', 'scale-100');
            detailText.textContent = `${r} × ${c} = ${val}`;
            
            // Animation reset
            box.style.animation = 'none';
            box.offsetHeight; /* trigger reflow */
            box.style.animation = null;
            
            Utils.toast(`${r} 乘以 ${c} 等于 ${val} ✨`);
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    initTable();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
