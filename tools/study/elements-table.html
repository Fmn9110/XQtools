<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>元素周期表 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">元素周期表速查表</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">探索化学世界的奥秘，点击元素查看更详尽信息。</p>
        </header>

        <section class="cute-card p-4 md:p-8 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="mb-6 relative">
                <input type="text" id="search" placeholder="搜索元素 (如: H, 1, 氢)" class="w-full p-4 pl-12 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all text-sm shadow-inner" oninput="filterElements()">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300">🔍</span>
            </div>

            <div class="overflow-x-auto pb-4 custom-scrollbar">
                <div class="grid gap-1 min-w-[800px] md:min-w-full" style="grid-template-columns: repeat(18, 1fr)" id="table">
                    <!-- Table generated by JS -->
                </div>
            </div>

            <div id="detail" class="hidden mt-8 p-6 bg-pink-50/30 rounded-3xl border border-pink-100 animate-fade-in shadow-sm">
                <!-- Detail generated by JS -->
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const elements = [
            {z:1,sym:'H',name:'氢',mass:1.008,cat:'nonmetal',row:1,col:1},
            {z:2,sym:'He',name:'氦',mass:4.003,cat:'noble',row:1,col:18},
            {z:3,sym:'Li',name:'锂',mass:6.941,cat:'alkali',row:2,col:1},
            {z:4,sym:'Be',name:'铍',mass:9.012,cat:'alkaline',row:2,col:2},
            {z:5,sym:'B',name:'硼',mass:10.81,cat:'metalloid',row:2,col:13},
            {z:6,sym:'C',name:'碳',mass:12.01,cat:'nonmetal',row:2,col:14},
            {z:7,sym:'N',name:'氮',mass:14.01,cat:'nonmetal',row:2,col:15},
            {z:8,sym:'O',name:'氧',mass:16.00,cat:'nonmetal',row:2,col:16},
            {z:9,sym:'F',name:'氟',mass:19.00,cat:'halogen',row:2,col:17},
            {z:10,sym:'Ne',name:'氖',mass:20.18,cat:'noble',row:2,col:18},
            {z:11,sym:'Na',name:'钠',mass:22.99,cat:'alkali',row:3,col:1},
            {z:12,sym:'Mg',name:'镁',mass:24.31,cat:'alkaline',row:3,col:2},
            {z:13,sym:'Al',name:'铝',mass:26.98,cat:'metal',row:3,col:13},
            {z:14,sym:'Si',name:'硅',mass:28.09,cat:'metalloid',row:3,col:14},
            {z:15,sym:'P',name:'磷',mass:30.97,cat:'nonmetal',row:3,col:15},
            {z:16,sym:'S',name:'硫',mass:32.07,cat:'nonmetal',row:3,col:16},
            {z:17,sym:'Cl',name:'氯',mass:35.45,cat:'halogen',row:3,col:17},
            {z:18,sym:'Ar',name:'氩',mass:39.95,cat:'noble',row:3,col:18},
            {z:19,sym:'K',name:'钾',mass:39.10,cat:'alkali',row:4,col:1},
            {z:20,sym:'Ca',name:'钙',mass:40.08,cat:'alkaline',row:4,col:2},
            {z:21,sym:'Sc',name:'钪',mass:44.96,cat:'metal',row:4,col:3},
            {z:22,sym:'Ti',name:'钛',mass:47.87,cat:'metal',row:4,col:4},
            {z:23,sym:'V',name:'钒',mass:50.94,cat:'metal',row:4,col:5},
            {z:24,sym:'Cr',name:'铬',mass:52.00,cat:'metal',row:4,col:6},
            {z:25,sym:'Mn',name:'锰',mass:54.94,cat:'metal',row:4,col:7},
            {z:26,sym:'Fe',name:'铁',mass:55.85,cat:'metal',row:4,col:8},
            {z:27,sym:'Co',name:'钴',mass:58.93,cat:'metal',row:4,col:9},
            {z:28,sym:'Ni',name:'镍',mass:58.69,cat:'metal',row:4,col:10},
            {z:29,sym:'Cu',name:'铜',mass:63.55,cat:'metal',row:4,col:11},
            {z:30,sym:'Zn',name:'锌',mass:65.38,cat:'metal',row:4,col:12},
            {z:31,sym:'Ga',name:'镓',mass:69.72,cat:'metal',row:4,col:13},
            {z:32,sym:'Ge',name:'锗',mass:72.63,cat:'metalloid',row:4,col:14},
            {z:33,sym:'As',name:'砷',mass:74.92,cat:'metalloid',row:4,col:15},
            {z:34,sym:'Se',name:'硒',mass:78.96,cat:'nonmetal',row:4,col:16},
            {z:35,sym:'Br',name:'溴',mass:79.90,cat:'halogen',row:4,col:17},
            {z:36,sym:'Kr',name:'氪',mass:83.80,cat:'noble',row:4,col:18}
        ];

        const catColors = {
            alkali: 'bg-red-50 border-red-100 text-red-600',
            alkaline: 'bg-orange-50 border-orange-100 text-orange-600',
            metal: 'bg-blue-50 border-blue-100 text-blue-600',
            metalloid: 'bg-teal-50 border-teal-100 text-teal-600',
            nonmetal: 'bg-green-50 border-green-100 text-green-600',
            halogen: 'bg-yellow-50 border-yellow-100 text-yellow-600',
            noble: 'bg-purple-50 border-purple-100 text-purple-600'
        };

        function renderTable(filter = '') {
            const table = document.getElementById('table');
            let html = '';
            for (let r = 1; r <= 4; r++) {
                for (let c = 1; c <= 18; c++) {
                    const el = elements.find(e => e.row === r && e.col === c);
                    if (el) {
                        const match = !filter || el.name.includes(filter) || el.sym.toLowerCase().includes(filter.toLowerCase()) || String(el.z).includes(filter);
                        const opacity = match ? 'opacity-100' : 'opacity-20 grayscale';
                        html += `
                            <button onclick="showDetail(${el.z})" class="p-1 aspect-square rounded-lg border-2 ${catColors[el.cat]} ${opacity} text-center flex flex-col justify-center items-center hover:scale-105 transition-all shadow-sm" style="grid-row:${r};grid-column:${c}">
                                <span class="text-[8px] font-bold block leading-none">${el.z}</span>
                                <span class="font-black text-xs md:text-sm block py-0.5">${el.sym}</span>
                                <span class="text-[7px] font-bold hidden md:block opacity-60">${el.name}</span>
                            </button>`;
                    }
                }
            }
            table.innerHTML = html;
        }

        function showDetail(z) {
            const el = elements.find(e => e.z === z);
            if (!el) return;
            const detail = document.getElementById('detail');
            detail.innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 md:w-24 md:h-24 ${catColors[el.cat]} rounded-3xl flex flex-col items-center justify-center border-4 shadow-lg animate-fade-in">
                        <span class="text-xs font-bold opacity-60 mb-1">${el.z}</span>
                        <span class="text-3xl md:text-4xl font-black">${el.sym}</span>
                    </div>
                    <div class="flex-1">
                        <p class="text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-1">${el.cat}</p>
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800 mb-2">${el.name} <span class="text-lg font-normal text-gray-400 opacity-60 ml-2">${el.sym}</span></h2>
                        <div class="flex flex-wrap gap-4 text-xs md:text-sm text-gray-500 font-bold">
                            <span class="px-3 py-1 bg-white/50 rounded-full">原子量: ${el.mass}</span>
                            <span class="px-3 py-1 bg-white/50 rounded-full">周期: ${el.row}</span>
                            <span class="px-3 py-1 bg-white/50 rounded-full">族: ${el.col}</span>
                        </div>
                    </div>
                </div>
            `;
            detail.classList.remove('hidden');
            Utils.toast(`查到元素: ${el.name}`);
        }

        function filterElements() {
            renderTable(document.getElementById('search').value.trim());
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    renderTable();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
