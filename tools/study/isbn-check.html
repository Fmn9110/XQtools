<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISBN校验 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">图书 ISBN 校验码计算</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">快速验证书籍的 ISBN-10 或 ISBN-13 编码是否合法。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-8 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="relative group mb-6">
                <input type="text" id="isbn" placeholder="输入 ISBN (如: 978-7-115-512...)" class="w-full p-6 bg-pink-50/20 rounded-[2rem] border-2 border-pink-50 outline-none focus:border-pink-200 transition-all text-center text-xl font-black text-slate-700 shadow-inner" maxlength="17" oninput="check()">
                <div class="absolute inset-0 rounded-[2rem] border-2 border-pink-100/50 pointer-events-none group-focus-within:border-pink-300 transition-all scale-[1.02] opacity-0 group-focus-within:opacity-100"></div>
            </div>
            <div id="result" class="animate-fade-in"></div>
        </section>

        <section class="cute-card p-6 bg-white/80 border border-pink-50/50 text-left animate-item" style="animation-delay: 0.3s">
            <h2 class="text-xs font-black text-pink-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-pink-400"></span> 知识百科 (Encyclopedia)
            </h2>
            <p class="text-[13px] text-gray-400 leading-relaxed font-medium">
                ISBN 是国际标准书号。ISBN-10 使用模 11 校验（最后一位可能是 X），ISBN-13 使用模 10 校验。本工具支持带连字符或空格的输入格式。
            </p>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function check(){
            const raw = document.getElementById('isbn').value.replace(/[-\s]/g,'');
            if(!raw){ document.getElementById('result').innerHTML=''; return; }
            
            let valid = false, type = '';
            if(raw.length === 10){
                type = 'ISBN-10';
                let sum = 0;
                for(let i=0; i<9; i++){
                    const d = parseInt(raw[i]);
                    if(isNaN(d)){
                        document.getElementById('result').innerHTML = '<p class="text-pink-300 font-bold p-4">⚠️ 这里应该只能输入数字哦</p>';
                        return;
                    }
                    sum += d * (10 - i);
                }
                const lastChar = raw[9].toUpperCase();
                const lastVal = lastChar === 'X' ? 10 : parseInt(lastChar);
                if(isNaN(lastVal) && lastChar !== 'X'){
                    document.getElementById('result').innerHTML = '<p class="text-pink-300 font-bold p-4">⚠️ 最后一位应该是数字或 X 哦</p>';
                    return;
                }
                sum += lastVal;
                valid = sum % 11 === 0;
            } else if(raw.length === 13){
                type = 'ISBN-13';
                let sum = 0;
                for(let i=0; i<13; i++){
                    const d = parseInt(raw[i]);
                    if(isNaN(d)){
                        document.getElementById('result').innerHTML = '<p class="text-pink-300 font-bold p-4">⚠️ 这里应该只能输入数字哦</p>';
                        return;
                    }
                    sum += d * (i % 2 === 0 ? 1 : 3);
                }
                valid = sum % 10 === 0;
            } else {
                document.getElementById('result').innerHTML = '<p class="text-[10px] text-pink-200 font-black uppercase tracking-widest p-4">请输入 10 位或 13 位数字</p>';
                return;
            }
            
            const colorClass = valid ? 'bg-green-50 border-green-100 text-green-500' : 'bg-pink-50 border-pink-100 text-pink-500';
            const icon = valid ? '✅' : '🍭';
            
            document.getElementById('result').innerHTML = `
                <div class="p-8 ${colorClass} rounded-[2rem] border-2 border-dashed animate-fade-in group">
                    <p class="text-2xl font-black mb-2">${valid ? '✅ 有效编码' : '❌ 编码无效'} - ${type}</p>
                    <p class="text-[10px] opacity-60 font-black uppercase tracking-[0.2em]">Validated Result ${icon}</p>
                </div>
            `;
            if(valid) Utils.toast('校验成功啦！');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
