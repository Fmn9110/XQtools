<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>物理换算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">全能物理单位换算</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">精准可靠的度量衡转换，支持长度、质量、温度等多维度。 </p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <!-- Category Switcher -->
            <div class="flex justify-center flex-wrap gap-3 mb-12">
                <button onclick="changeCat('length')" class="cat-btn active px-6 py-2 rounded-2xl text-xs font-black transition-all">📏 长度</button>
                <button onclick="changeCat('mass')" class="cat-btn px-6 py-2 rounded-2xl text-xs font-black transition-all">⚖️ 质量</button>
                <button onclick="changeCat('temp')" class="cat-btn px-6 py-2 rounded-2xl text-xs font-black transition-all">🌡️ 温度</button>
                <button onclick="changeCat('pressure')" class="cat-btn px-6 py-2 rounded-2xl text-xs font-black transition-all">🌬️ 压强</button>
            </div>

            <div class="flex flex-col md:flex-row gap-6 mb-10 items-center">
                <div class="flex-1 w-full relative">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest absolute -top-5 left-4">Input Value 输入值</p>
                    <input type="number" id="v1" value="1" class="w-full p-6 bg-pink-50/20 rounded-[2.5rem] text-4xl font-black text-pink-500 text-center outline-none border-2 border-transparent focus:border-pink-200 transition-all shadow-inner">
                </div>
                <div class="w-full md:w-1/3">
                    <select id="u1" class="w-full p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-50 focus:border-pink-100 outline-none font-bold text-slate-600 appearance-none text-center cursor-pointer"></select>
                </div>
            </div>
            
            <div class="text-4xl text-pink-100 mb-10 animate-bounce">⬇️</div>

            <div class="flex flex-col md:flex-row gap-6 items-center">
                <div class="flex-1 w-full relative">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest absolute -top-5 left-4">Result 换算结果</p>
                    <div id="v2" class="w-full p-6 bg-white rounded-[2.5rem] text-4xl font-black text-slate-700 text-center border-2 border-pink-50 shadow-sm min-h-[6rem] flex items-center justify-center">1</div>
                </div>
                <div class="w-full md:w-1/3">
                    <select id="u2" class="w-full p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-50 focus:border-pink-100 outline-none font-bold text-slate-600 appearance-none text-center cursor-pointer"></select>
                </div>
            </div>
            
            <div class="mt-12 p-8 bg-pink-50/30 rounded-[3rem] border border-pink-50/50">
                <p class="text-xs text-gray-400 font-bold flex items-center justify-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-pink-400 animate-pulse"></span>
                    输入数值并选择单位，系统将实时计算并输出结果。
                </p>
            </div>
        </section>

        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.4em] pb-12 animate-item" style="animation-delay: 0.3s">
            Physics Calculation & Analysis Core
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const UNITS = {
            length: {
                units: { '米 (m)': 1, '千米 (km)': 1000, '分米 (dm)': 0.1, '厘米 (cm)': 0.01, '毫米 (mm)': 0.001, '英里 (mi)': 1609.34, '英尺 (ft)': 0.3048, '英寸 (in)': 0.0254, '码 (yd)': 0.9144 },
                default: ['米 (m)', '千米 (km)']
            },
            mass: {
                units: { '千克 (kg)': 1, '克 (g)': 0.001, '毫克 (mg)': 0.000001, '吨 (t)': 1000, '磅 (lb)': 0.453592, '盎司 (oz)': 0.0283495 },
                default: ['千克 (kg)', '克 (g)']
            },
            pressure: {
                units: { '帕斯卡 (Pa)': 1, '标准大气压 (atm)': 101325, '巴 (bar)': 100000, '毫米汞柱 (mmHg)': 133.322 },
                default: ['帕斯卡 (Pa)', '标准大气压 (atm)']
            },
            temp: {
                type: 'special',
                units: { '摄氏度 (°C)': 'C', '华氏度 (°F)': 'F', '开尔文 (K)': 'K' },
                default: ['摄氏度 (°C)', '华氏度 (°F)']
            }
        };

        let currentCat = 'length';

        function changeCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active', 'bg-pink-400', 'text-white'));
            const activeBtn = Array.from(document.querySelectorAll('.cat-btn')).find(b => b.innerText.includes(cat === 'length' ? '长度' : cat === 'mass' ? '质量' : cat === 'temp' ? '温度' : '压强'));
            if(activeBtn) activeBtn.classList.add('active', 'bg-pink-400', 'text-white');
            
            const u1 = document.getElementById('u1');
            const u2 = document.getElementById('u2');
            u1.innerHTML = u2.innerHTML = Object.keys(UNITS[cat].units).map(u => `<option value="${u}">${u}</option>`).join('');
            
            u1.value = UNITS[cat].default[0];
            u2.value = UNITS[cat].default[1];
            update();
        }

        function update() {
            const v1 = document.getElementById('v1');
            const v2 = document.getElementById('v2');
            const u1 = document.getElementById('u1').value;
            const u2 = document.getElementById('u2').value;
            const val = parseFloat(v1.value);
            
            if (isNaN(val)) { v2.innerText = '---'; return; }
            
            let result;
            if (UNITS[currentCat].type === 'special') {
                // Temperature logic
                let tempInC;
                if (u1 === '摄氏度 (°C)') tempInC = val;
                else if (u1 === '华氏度 (°F)') tempInC = (val - 32) * 5 / 9;
                else tempInC = val - 273.15;

                if (u2 === '摄氏度 (°C)') result = tempInC;
                else if (u2 === '华氏度 (°F)') result = tempInC * 9 / 5 + 32;
                else result = tempInC + 273.15;
            } else {
                const ratio1 = UNITS[currentCat].units[u1];
                const ratio2 = UNITS[currentCat].units[u2];
                result = (val * ratio1) / ratio2;
            }
            
            v2.innerText = result % 1 === 0 ? result : result.toFixed(6).replace(/\.?0+$/, '');
        }

        [document.getElementById('v1'), document.getElementById('u1'), document.getElementById('u2')].forEach(el => el.oninput = update);

        window.addEventListener('load', () => {
             const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    changeCat('length');
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <style>
        .cat-btn { background: #fdf2f4; color: #f472b6; border: 2px solid transparent; }
        .cat-btn.active { border-color: #fbcfe8; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23f472b6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>'); background-repeat: no-repeat; background-position: right 1.5rem center; }
    </style>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
