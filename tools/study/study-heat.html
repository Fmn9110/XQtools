<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习热力图 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .heat-cell { cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .heat-cell:hover { transform: scale(1.3); z-index: 10; border-radius: 4px; box-shadow: 0 4px 12px rgba(244, 114, 182, 0.2); }
        .tooltip { pointer-events: none; transition: opacity 0.2s; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-6xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">年度学术生命力坐标</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">可视化你的努力轨迹，让每一刻专注都熠熠生辉。🔥</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <!-- Heatmap Visualization Grid -->
            <div id="heatmap-container" class="w-full relative py-10 overflow-x-auto scrollbar-hide">
                <div id="heatmap" class="grid grid-flow-col grid-rows-7 gap-1.5 md:gap-2 min-w-[900px]">
                     <!-- 371 cells (53 weeks * 7 days) -->
                </div>
                
                <!-- Weekday Labels -->
                <div class="absolute top-10 -left-1 text-[8px] font-black text-slate-300 flex flex-col gap-4 pointer-events-none uppercase tracking-widest leading-none">
                    <span>Mon</span><span>Wed</span><span>Fri</span><span>Sun</span>
                </div>
            </div>
            
            <!-- Legend and Info -->
            <div class="flex flex-col sm:flex-row items-center justify-between w-full mt-10 border-t border-pink-50 pt-10 gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-pink-50 rounded-2xl flex items-center justify-center text-pink-400 shadow-sm">📈</div>
                    <div class="flex flex-col text-left">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Total Effort</p>
                        <p class="text-lg font-black text-slate-800 leading-tight">186 Active Days</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 px-8 py-3 bg-slate-50 rounded-full border border-slate-100">
                     <span class="text-[9px] font-black text-gray-300 uppercase tracking-[0.2em]">Less</span>
                     <div class="flex gap-1.5">
                         <div class="w-4 h-4 rounded-md bg-white border border-slate-200"></div>
                         <div class="w-4 h-4 rounded-md bg-pink-100/50"></div>
                         <div class="w-4 h-4 rounded-md bg-pink-200/60"></div>
                         <div class="w-4 h-4 rounded-md bg-pink-300/80"></div>
                         <div class="w-4 h-4 rounded-md bg-pink-400 shadow-sm shadow-pink-100"></div>
                     </div>
                     <span class="text-[9px] font-black text-pink-300 uppercase tracking-[0.2em]">More</span>
                </div>
            </div>
        </section>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16 animate-item" style="animation-delay: 0.3s">
            <div class="p-10 bg-white rounded-[3rem] border border-pink-50 text-left flex items-start gap-6 hover:shadow-xl transition-all">
                <div class="w-16 h-16 bg-pink-50 rounded-[1.5rem] flex items-center justify-center text-3xl flex-shrink-0">🧊</div>
                <div>
                    <h3 class="text-slate-800 font-black mb-2 tracking-tighter text-xl">如何统计？</h3>
                    <p class="text-xs text-slate-400 leading-loose font-medium opacity-80">热力图基于您在小Q工具箱的使用频率与打卡记录动态渲染。每一格色彩的律动，都代表了一个充满意义的专注昼夜。💎</p>
                </div>
            </div>
            <div class="p-10 bg-white rounded-[3rem] border border-pink-50 text-left flex items-start gap-6 hover:shadow-xl transition-all">
                <div class="w-16 h-16 bg-blue-50 rounded-[1.5rem] flex items-center justify-center text-3xl flex-shrink-0">🔥</div>
                <div>
                    <h3 class="text-slate-800 font-black mb-2 tracking-tighter text-xl">进阶挑战</h3>
                    <p class="text-xs text-slate-400 leading-loose font-medium opacity-80">尝试在接下来的三周内填满画板！让你的年度图景从淡雅粉色演变为深邃瑰紫，这就是意志力可视化的最美篇章。🚀</p>
                </div>
            </div>
        </div>

        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.4em] pb-12">Dynamic Performance Heatmap & Effort Visualization Hub</p>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const heatmap = document.getElementById('heatmap');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        
        function initHeatmap() {
            heatmap.innerHTML = '';
            // Generate 371 cells (53 weeks * 7 days)
            for(let i=0; i<371; i++) {
                const day = document.createElement('div');
                day.className = "heat-cell w-3.5 h-3.5 md:w-5 md:h-5 rounded-[4px] relative group";
                
                const level = Math.random();
                let colorClass = '';
                let label = 'No Activity';

                if(level < 0.6) {
                    colorClass = 'bg-white border border-slate-100';
                } else if(level < 0.8) {
                    colorClass = 'bg-pink-100/40';
                    label = 'Low Intensity';
                } else if(level < 0.9) {
                    colorClass = 'bg-pink-200/60';
                    label = 'Focused';
                } else if(level < 0.97) {
                    colorClass = 'bg-pink-300/80';
                    label = 'High Productivity';
                } else {
                    colorClass = 'bg-pink-400 shadow-sm shadow-pink-100';
                    label = 'Legendary Status';
                }
                
                day.className += ' ' + colorClass;
                
                // Tooltip mock
                const tooltip = document.createElement('div');
                tooltip.className = "absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 bg-slate-800 text-white text-[8px] font-black rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-20 pointer-events-none shadow-xl";
                tooltip.innerText = `Day ${i} : ${label}`;
                day.appendChild(tooltip);

                heatmap.appendChild(day);
            }
        }

        // 加载动画 & 初始化
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    initHeatmap();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('.heat-cell')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
