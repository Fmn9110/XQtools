<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学科笔记 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .note-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.08); }
        .tab-button { transition: all 0.2s ease; }
        .tab-button.active { background: #f472b6; color: white; transform: translateY(-2px); box-shadow: 0 8px 15px -5px rgba(244, 114, 182, 0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">知行合一：学术笔记</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">分类沉淀知识，让每一刻的灵感都有迹可循。✒️</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item text-left" style="animation-delay: 0.2s">
            <div class="mb-12">
                <div class="flex items-center justify-between mb-6">
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Knowledge Repository Partition</p>
                    <div class="relative w-48 no-print">
                        <input type="text" id="search" oninput="renderNotes()" placeholder="搜索笔记..." class="w-full pl-8 pr-4 py-2 bg-slate-50 rounded-full text-[11px] font-bold text-slate-500 outline-none focus:ring-2 ring-pink-100 transition-all border border-slate-100">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] grayscale">🔍</span>
                    </div>
                </div>
                <div class="flex gap-3 overflow-x-auto scrollbar-hide pb-4 px-1" id="tabs">
                    <!-- Tabs dynamic -->
                </div>
            </div>

            <div class="bg-slate-50/50 p-8 md:p-10 rounded-[3rem] border border-slate-100 mb-12 focus-within:ring-8 ring-pink-50/50 focus-within:bg-white focus-within:shadow-2xl transition-all no-print">
                <input type="text" id="noteTitle" placeholder="🗒️ 笔记标题 (Topic Title)" class="w-full bg-transparent border-none outline-none font-black text-slate-800 placeholder:text-slate-300 text-xl mb-5">
                <textarea id="noteContent" rows="5" placeholder="在此输入深度的见解或关键知识点... (Insight Content)" class="w-full bg-transparent border-none outline-none font-medium text-slate-500 placeholder:text-slate-200 text-sm md:text-base resize-none mb-8 leading-relaxed"></textarea>
                <div class="flex justify-end">
                    <button onclick="addNote()" class="px-10 py-5 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center gap-3 text-lg">
                        ➕ 存档笔记 (ARCHIVE)
                    </button>
                </div>
            </div>

            <div class="space-y-6" id="notes">
                <!-- Notes list dynamic -->
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            High-Resolution Academic Knowledge & Notebook Infrastructure
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const subjects = ['语文', '数学', '英语', '物理', '化学', '生物', '地理', '历史', '全部'];
        let activeSubject = '全部';
        let notes = JSON.parse(localStorage.getItem('qSubjectNotes') || '[]');

        function save() {
            localStorage.setItem('qSubjectNotes', JSON.stringify(notes));
        }

        function renderTabs() {
            document.getElementById('tabs').innerHTML = subjects.map(s => `
                <button onclick="activeSubject='${s}';renderTabs();renderNotes()" 
                    class="tab-btn whitespace-nowrap px-8 py-3 rounded-2xl font-black text-xs transition-all uppercase tracking-widest 
                    ${activeSubject === s ? 'active' : 'bg-white text-slate-400 hover:text-pink-400 border border-slate-100'}">
                    ${s}
                </button>
            `).join('');
        }

        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            if (!title) {
                Utils.toast('笔记标题不能为空 🗒️', 'warning');
                return;
            }
            notes.unshift({
                title,
                content,
                subject: activeSubject === '全部' ? '默认' : activeSubject,
                date: new Date().toLocaleDateString(),
                id: Date.now()
            });
            save();
            renderNotes();
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            Utils.toast('知识已成功存入本地大脑 ✨', 'success');
        }

        function removeNote(id) {
            if(!confirm('确定要删除这条珍贵的笔记吗？')) return;
            notes = notes.filter(n => n.id !== id);
            save();
            renderNotes();
            Utils.toast('笔记已移除 🗑️', 'info');
        }

        function renderNotes() {
            const container = document.getElementById('notes');
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = notes.filter(n => {
                const matchesSubject = activeSubject === '全部' || n.subject === activeSubject;
                const matchesQuery = n.title.toLowerCase().includes(query) || n.content.toLowerCase().includes(query);
                return matchesSubject && matchesQuery;
            });
            
            if (!filtered.length) {
                container.innerHTML = `
                    <div class="py-20 text-center text-slate-200">
                        <p class="text-6xl mb-6">🏜️</p>
                        <p class="text-[10px] font-black uppercase tracking-[0.4em] italic text-slate-300">Nothing archived in this sector</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(n => `
                <div class="note-card p-8 bg-slate-50/50 rounded-[2.5rem] border border-slate-100 hover:bg-white group animate-fade-in relative overflow-hidden flex flex-col items-start">
                    <div class="flex justify-between items-start w-full mb-4">
                        <div class="flex flex-col">
                            <span class="text-[8px] font-black text-pink-300 uppercase tracking-widest mb-1 italic">Knowledge Fragment</span>
                            <h4 class="font-black text-slate-800 text-lg group-hover:text-pink-400 transition-colors">${n.title}</h4>
                        </div>
                        <div class="flex gap-2 no-print">
                            <button onclick="Utils.copy('${n.title}\\n\\n${n.content.replace(/'/g, "\\'")}')" class="w-10 h-10 rounded-2xl flex items-center justify-center text-slate-300 hover:bg-pink-50 hover:text-pink-500 transition-all">📋</button>
                            <button onclick="removeNote(${n.id})" class="w-10 h-10 rounded-2xl flex items-center justify-center text-slate-300 hover:bg-rose-50 hover:text-rose-500 transition-all">🗑️</button>
                        </div>
                    </div>
                    <p class="text-sm md:text-base text-slate-500 leading-relaxed font-medium whitespace-pre-line mb-8">${n.content}</p>
                    
                    <div class="mt-auto w-full flex justify-between items-center pt-5 border-t border-slate-100/60">
                        <div class="flex items-center gap-2">
                             <span class="w-1.5 h-1.5 bg-slate-200 rounded-full"></span>
                             <span class="text-[9px] font-black text-slate-300 uppercase tracking-[0.2em]">Archived: ${n.date}</span>
                        </div>
                        <span class="px-4 py-1.5 bg-white text-pink-300 rounded-full border border-pink-50 text-[9px] font-black uppercase tracking-widest shadow-sm">${n.subject}</span>
                    </div>
                    <div class="absolute left-0 top-0 w-1.5 h-full bg-pink-100 opacity-0 group-hover:opacity-100 transition-all"></div>
                </div>
            `).join('');
        }

        // Init Sequence
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    renderTabs();
                    renderNotes();
                }, 500);
            }
        });

        // Click Aesthetics
        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('input') || e.target.closest('textarea')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
