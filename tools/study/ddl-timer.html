<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作业倒计时 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">作业 / DDL 倒计时</h1>
            <p class="text-gray-500 italic text-sm md:text-base animate-item" style="animation-delay: 0.1s">拒绝拖延症爆发，合理安排每一分钟。</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-2xl mb-12 animate-item" style="animation-delay: 0.2s">
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                 <input type="text" id="taskName" placeholder="任务名称 (如: 读书报告)" class="flex-1 p-4 md:p-6 bg-gray-50 rounded-2xl md:rounded-3xl outline-none border border-pink-50 focus:border-pink-200 focus:bg-white transition-all text-sm">
                 <input type="datetime-local" id="taskTime" class="p-4 md:p-6 bg-gray-50 rounded-2xl md:rounded-3xl outline-none border border-pink-50 focus:border-pink-200 focus:bg-white transition-all text-sm">
                 <button onclick="addTask()" class="cute-button bg-pink-400 hover:bg-pink-500 text-white px-10 py-4 md:py-6 rounded-2xl md:rounded-3xl font-black shadow-lg">添加任务</button>
            </div>

            <div id="taskList" class="space-y-4 md:space-y-6 text-left">
                 <!-- Tasks will be added here -->
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const list = document.getElementById('taskList');
        function addTask() {
            const name = document.getElementById('taskName').value.trim();
            const time = document.getElementById('taskTime').value;
            if(!name || !time) {
                Utils.toast('输入不完整哦', 'warning');
                return;
            }

            const card = document.createElement('div');
            card.className = "p-6 md:p-8 bg-white border border-pink-50 rounded-3xl shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center group hover:bg-pink-50/30 transition-all animate-fade-in";
            card.innerHTML = `
                <div class="mb-4 md:mb-0">
                    <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-1">${name}</h3>
                    <p class="text-[10px] md:text-xs text-pink-300 font-mono font-bold uppercase tracking-wider">${new Date(time).toLocaleString()}</p>
                </div>
                <div class="w-full md:w-auto text-left md:text-right">
                    <p class="countdown text-2xl md:text-3xl font-black text-pink-500 tabular-nums">计算中...</p>
                </div>
            `;
            list.prepend(card);

            const counter = card.querySelector('.countdown');
            const target = new Date(time).getTime();

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const dist = target - now;
                if(dist < 0) {
                    counter.innerText = "已过期";
                    counter.classList.replace('text-pink-500', 'text-gray-300');
                    clearInterval(interval);
                    return;
                }
                const d = Math.floor(dist / (1000 * 60 * 60 * 24));
                const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((dist % (1000 * 60)) / 1000);
                counter.innerText = `${d}d ${h}h ${m}m ${s}s`;
            }, 1000);

            Utils.toast('DDL 已锁定', 'success');
            document.getElementById('taskName').value = '';
            document.getElementById('taskTime').value = '';
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
