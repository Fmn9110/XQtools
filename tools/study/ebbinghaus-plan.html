<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艾宾浩斯排期 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>
    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-8 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">艾宾浩斯遗忘曲线排期器</h1>
            <p class="text-gray-500 italic text-sm md:text-base animate-item" style="animation-delay: 0.1s">科学复习节点计算，锁死你的记忆仓库。</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-2xl mb-12 animate-item" style="animation-delay: 0.2s">
            <div class="flex flex-col md:flex-row gap-4 mb-8 md:mb-10">
                 <input type="date" id="startDate" class="flex-1 p-4 md:p-6 bg-gray-50 rounded-2xl md:rounded-3xl outline-none focus:bg-white border focus:border-pink-200 transition-all text-center md:text-left">
                 <button onclick="calc()" class="cute-button bg-pink-400 hover:bg-pink-500 text-white px-8 md:px-12 py-4 rounded-xl font-bold shadow-lg min-w-[200px]">生成复习计划</button>
            </div>

            <div id="res" class="hidden grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 text-left">
                 <!-- Nodes will be generated here -->
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const offsets = [0, 1, 2, 4, 7, 15, 30]; // Days
        function calc() {
            const start = document.getElementById('startDate').value;
            if(!start) {
                Utils.toast('请选择起始日期', 'warning');
                return;
            }
            const res = document.getElementById('res');
            res.innerHTML = "";
            res.classList.remove('hidden');

            const date = new Date(start);
            offsets.forEach((o, i) => {
                const node = new Date(date);
                node.setDate(date.getDate() + o);
                res.innerHTML += `
                    <div class="p-3 md:p-4 bg-gray-50 rounded-2xl border border-pink-50/50 hover:border-pink-200 transition-colors animate-fade-in shadow-sm" style="animation-delay: ${0.1 * i}s">
                        <p class="text-[9px] md:text-[10px] text-pink-300 font-bold uppercase mb-1">第 ${i + 1} 次复习</p>
                        <p class="text-xs md:text-sm font-bold text-slate-700">${node.toLocaleDateString()}</p>
                    </div>
                `;
            });
            Utils.toast('记住了，要按时复习哦', 'success');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
