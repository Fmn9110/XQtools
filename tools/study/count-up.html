<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习秒表 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">学习正向计时器</h1>
            <p class="text-gray-500 italic text-sm md:text-base animate-item" style="animation-delay: 0.1s">记录每一次沉浸学习的足迹，见证点滴进步。</p>
        </header>

        <section class="cute-card p-8 md:p-12 bg-white shadow-2xl mb-12 flex flex-col items-center animate-item" style="animation-delay: 0.2s">
            <div id="timeDisplay" class="text-6xl md:text-[100px] font-black text-slate-800 mb-8 md:mb-12 tabular-nums tracking-tighter">00:00:00</div>
            
            <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                 <button id="startBtn" class="cute-button bg-pink-400 hover:bg-pink-500 text-white px-12 py-4 rounded-2xl font-bold shadow-lg min-w-[160px]">开始计时</button>
                 <button id="resetBtn" class="theme-secondary-btn px-12 py-4 rounded-2xl font-bold min-w-[160px]">重置</button>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let seconds = 0;
        let timer = null;
        const display = document.getElementById('timeDisplay');
        const startBtn = document.getElementById('startBtn');

        function updateDisplay() {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        startBtn.onclick = () => {
            if(timer) {
                clearInterval(timer);
                timer = null;
                startBtn.innerText = "继续计时";
                Utils.toast('计时暂停');
            } else {
                timer = setInterval(() => {
                    seconds++;
                    updateDisplay();
                }, 1000);
                startBtn.innerText = "暂停计时";
                Utils.toast('开始计时', 'success');
            }
        };

        document.getElementById('resetBtn').onclick = () => {
            clearInterval(timer);
            timer = null;
            seconds = 0;
            updateDisplay();
            startBtn.innerText = "开始计时";
            Utils.toast('重置成功');
        };

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
