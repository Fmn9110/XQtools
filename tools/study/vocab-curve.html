<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>单词记忆曲线 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        .grid-bg { background-image: radial-gradient(#fce7f3 1px, transparent 1px); background-size: 20px 20px; }
        .node-active { filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.4)); transition: all 0.3s ease; }
        .schedule-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .schedule-item:hover { transform: translateX(10px); }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">认知引擎：艾宾浩斯曲线</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">科学对抗遗忘，重塑记忆格局。基于认知神经科学的复习排程。📅</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-full max-w-3xl mb-12 text-left">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em] mb-4 pl-4">Dataset Entry (输入记忆项)</p>
                <div class="relative group">
                    <textarea id="wordInput" rows="5" placeholder="在此输入要记忆的单词或知识点 (每行一个)...&#10;例: Philosophy&#10;Quantum Physics" class="w-full p-8 bg-slate-50 rounded-[3rem] border-2 border-transparent focus:border-pink-50 outline-none focus:bg-white focus:shadow-inner transition-all font-black text-slate-700 placeholder:text-slate-200 resize-none"></textarea>
                    <div class="absolute right-8 bottom-8 text-2xl opacity-20 group-focus-within:opacity-100 transition-opacity pointer-events-none">🖊️</div>
                </div>
            </div>

            <button onclick="plan()" class="w-full max-w-3xl py-6 bg-pink-400 text-white font-black rounded-[2.5rem] shadow-2xl shadow-pink-100 hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-4 mb-16 no-print">
                🧪 启动记忆算法 (GENERATE SCHEDULER)
            </button>

            <!-- Visualization Area -->
            <div id="vizContainer" class="hidden w-full max-w-4xl mb-16">
                <div class="bg-slate-900 rounded-[4rem] p-8 md:p-14 border-4 border-slate-800 relative overflow-hidden grid-bg shadow-2xl">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-10 text-center">Memory Decay Analysis (遗忘拟合曲线)</p>
                    <div class="relative h-64 md:h-80 w-full flex items-end justify-between px-4" id="decayChart">
                        <!-- Points injected here -->
                    </div>
                    <div class="absolute bottom-6 right-10 text-[8px] font-black text-slate-700 uppercase tracking-widest">Ebbinghaus Retention Model (log)</div>
                </div>
            </div>

            <div class="w-full max-w-3xl text-left" id="planOutput">
                <!-- Schedule dynamic -->
            </div>
        </section>
        
        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.5em] pb-12 animate-item">
            Neuro-Cognitive Study Optimization & Schedule Synthesis Framework
        </p>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const reviewDays = [0.5, 1, 2, 4, 7, 15, 30]; // Scientific scale

        function plan() {
            const raw = document.getElementById('wordInput').value.trim();
            const words = raw.split('\n').filter(Boolean);
            if (!words.length) { Utils.toast('请输入记忆内容 📝', 'warning'); return; }

            document.getElementById('vizContainer').classList.remove('hidden');
            renderChart();
            renderList(words);
            
            Utils.toast('自适应复习计划已生成 ✨', 'success');
            document.getElementById('planOutput').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderChart() {
            const chart = document.getElementById('decayChart');
            chart.innerHTML = '';
            
            // Generate visual "decay" steps
            reviewDays.forEach((d, i) => {
                const height = Math.pow(0.8, i) * 100; // Visual logic
                const bar = document.createElement('div');
                bar.className = 'w-10 md:w-16 flex flex-col items-center gap-4 node-active';
                bar.innerHTML = `
                    <p class="text-[8px] font-black text-pink-400 uppercase tracking-tighter tabular-nums">${height.toFixed(0)}%</p>
                    <div class="w-full bg-pink-400/20 rounded-t-2xl relative" style="height: ${height}%">
                        <div class="absolute -top-1 left-0 w-full h-1 bg-pink-400 rounded-full"></div>
                    </div>
                    <p class="text-[9px] font-black text-slate-500 uppercase tabular-nums">D${d}</p>
                `;
                chart.appendChild(bar);
            });
        }

        function renderList(words) {
            const today = new Date();
            let html = `
                <div class="flex justify-between items-end mb-10 px-4">
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Integrated Schedule (复合排程表)</p>
                    <span class="px-5 py-2 bg-pink-50 text-pink-500 rounded-full text-[9px] font-black italic shadow-sm tracking-widest">${words.length} TARGETS</span>
                </div>
                <div class="space-y-4">
            `;

            reviewDays.forEach((d, i) => {
                const date = new Date(today);
                date.setHours(date.getHours() + (d * 24));
                const isUrgent = i < 3;
                
                html += `
                    <div class="schedule-item p-6 md:p-8 bg-slate-50/50 rounded-[2.5rem] border border-slate-50/50 flex items-center justify-between group hover:bg-white hover:shadow-2xl hover:border-pink-50 transition-all">
                        <div class="flex items-center gap-6">
                            <div class="w-14 h-14 bg-white rounded-2xl flex flex-col items-center justify-center text-pink-400 shadow-sm border border-slate-50 transition-transform group-hover:-rotate-3">
                                <span class="text-[8px] font-black uppercase text-slate-200 leading-none mb-1">Pass</span>
                                <span class="text-xl font-black tabular-nums leading-none">${i + 1}</span>
                            </div>
                            <div>
                                <p class="text-[11px] font-black text-slate-800 uppercase tracking-widest leading-none mb-1.5 flex items-center gap-2">
                                    ${isUrgent ? '🔥' : '⏳'} 第 ${d} 天巩固
                                    ${isUrgent ? '<span class="text-[8px] bg-rose-50 text-rose-400 px-2 py-0.5 rounded-full">CRITICAL</span>' : ''}
                                </p>
                                <p class="text-xs font-bold text-slate-400 lowercase italic tracking-tight italic">
                                    ${date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' })}
                                </p>
                            </div>
                        </div>
                        <div class="hidden md:flex items-center gap-1 opacity-20 group-hover:opacity-100 transition-opacity">
                            <div class="w-2 h-2 rounded-full bg-pink-400"></div>
                            <div class="w-10 h-0.5 bg-pink-100"></div>
                            <div class="w-2 h-2 border-2 border-pink-400 rounded-full"></div>
                        </div>
                        <button class="text-[9px] font-black text-slate-300 group-hover:text-pink-400 uppercase tracking-widest transition-colors px-4 py-2 border border-transparent group-hover:border-pink-50 rounded-full">Confirm Slot</button>
                    </div>
                `;
            });

            html += `
                </div>
                <div class="mt-14 p-10 bg-indigo-900 rounded-[3rem] shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-800/50 rounded-bl-[4rem] -z-0"></div>
                    <p class="text-[9px] font-black text-indigo-400 uppercase tracking-[0.5em] mb-6 relative z-10">Consolidated Knowledge Base (任务归档)</p>
                    <div class="flex flex-wrap gap-2 relative z-10">
                        ${words.map(w => `<span class="px-5 py-2.5 bg-indigo-800/50 text-indigo-100 rounded-2xl text-sm font-bold border border-indigo-700/50 hover:bg-indigo-700 transition-colors cursor-default">${w}</span>`).join('')}
                    </div>
                </div>
            `;
            
            document.getElementById('planOutput').innerHTML = html;
        }

        // Init
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('textarea')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
