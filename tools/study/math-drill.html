<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口算训练 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">随机四则运算出题机</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">自定义题型与难度，助你打下坚实的数学基础。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest pl-2">Operation 运算类型</p>
                    <div class="relative">
                        <select id="ops" class="w-full p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all font-bold text-slate-700 shadow-inner appearance-none cursor-pointer">
                            <option value="+-">➕➖ 加减混合 (A & S)</option>
                            <option value="×÷">✖️➗ 乘除混合 (M & D)</option>
                            <option value="+-×÷">🔢 四则混合 (Mixed)</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-pink-300">▼</div>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest pl-2">Range 数据范围</p>
                    <div class="relative">
                        <select id="range" class="w-full p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all font-bold text-slate-700 shadow-inner appearance-none cursor-pointer">
                            <option value="20">20 以内 (Junior)</option>
                            <option value="100">100 以内 (Pro)</option>
                            <option value="1000">1000 以内 (Master)</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-pink-300">▼</div>
                    </div>
                </div>

                <div class="space-y-2 sm:col-span-2 lg:col-span-1">
                    <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest pl-2">Questions 题目数量</p>
                    <div class="relative">
                        <select id="qcount" class="w-full p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all font-bold text-slate-700 shadow-inner appearance-none cursor-pointer">
                            <option value="10">10 道题 (Quick)</option>
                            <option value="20">20 道题 (Standard)</option>
                            <option value="50">50 道题 (Full Set)</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-pink-300">▼</div>
                    </div>
                </div>
            </div>

            <button onclick="gen()" class="w-full py-5 bg-pink-400 text-white font-black rounded-2xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 mb-10 text-lg">
                📝 立即生成训练题单
            </button>

            <div id="sheet" class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in opacity-0 scale-95 transition-all duration-500">
                <!-- Questions generated here -->
            </div>

            <button onclick="printSheet()" id="printBtn" class="hidden w-full py-4 bg-white border-2 border-pink-50 rounded-2xl font-black text-pink-400 hover:text-pink-500 hover:border-pink-100 transition-all mt-10 shadow-sm">
                🖨️ 打印题目列表 (Print)
            </button>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function gen(){
            const ops=document.getElementById('ops').value;
            const range=parseInt(document.getElementById('range').value);
            const count=parseInt(document.getElementById('qcount').value);
            const questions=[];
            
            for(let i=0;i<count;i++){
                const op=ops[Math.floor(Math.random()*ops.length)];
                let a, b, ans;
                if(op==='+'||op==='-'){
                    a=Math.floor(Math.random()*range)+1;
                    b=Math.floor(Math.random()*range)+1;
                    if(op==='-'&&a<b)[a,b]=[b,a];
                    ans=op==='+'?a+b:a-b;
                } else if(op==='×'){
                    a=Math.floor(Math.random()*Math.min(range, 20))+2;
                    b=Math.floor(Math.random()*Math.min(range, 15))+2;
                    ans=a*b;
                } else {
                    b=Math.floor(Math.random()*11)+2;
                    ans=Math.floor(Math.random()*Math.min(range, 12))+1;
                    a=b*ans;
                }
                questions.push({text:`${a} ${op} ${b} = `, ans: ans});
            }

            const sheet = document.getElementById('sheet');
            sheet.innerHTML = questions.map((q, i) => `
                <div class="p-4 bg-pink-50/20 rounded-2xl flex items-center justify-between border border-pink-50/50 group hover:bg-white hover:shadow-md transition-all">
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-bold text-pink-200">${ (i+1).toString().padStart(2, '0') }</span>
                        <span class="font-black text-slate-700 text-lg">${q.text}</span>
                    </div>
                    <input type="number" class="w-full text-center py-5 bg-white border-2 border-pink-50 rounded-3xl font-black text-slate-700 outline-none focus:border-pink-400 shadow-inner transition-all text-xl" 
                           data-ans="${q.ans}" oninput="checkAns(this)">
                </div>
            `).join('');
            
            sheet.classList.remove('opacity-0', 'scale-95');
            document.getElementById('printBtn').classList.remove('hidden');
            Utils.toast('题目已准备完成！✨');
        }

        function checkAns(el) {
            const correct = parseInt(el.getAttribute('data-ans'));
            const val = parseInt(el.value);
            if (isNaN(val)) {
                el.style.backgroundColor = 'white';
                el.style.borderColor = '#fdf2f2';
                return;
            }
            if (val === correct) {
                el.style.backgroundColor = '#f0fdf4';
                el.style.borderColor = '#bbf7d0';
            } else {
                el.style.backgroundColor = '#fef2f2';
                el.style.borderColor = '#fecaca';
            }
        }

        function printSheet(){ window.print(); }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
