<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>历史时间轴 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">历史年代纪事时间轴</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">中国历史朝代及重要事件速查，铭记历史长河。</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="relative mb-8">
                <input type="text" id="search" placeholder="搜索事件、朝代或年份..." class="w-full p-4 pl-12 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all text-sm shadow-inner font-bold text-slate-600" oninput="filter()">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300">🔍</div>
            </div>

            <div class="space-y-0" id="timeline">
                <!-- Timeline items will be generated here -->
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const events = [
            {year:'约前2070', era:'夏朝', event:'禹建立夏朝', color:'bg-yellow-400'},
            {year:'约前1600', era:'商朝', event:'商汤灭夏', color:'bg-orange-400'},
            {year:'前1046', era:'西周', event:'武王伐纣，西周建立', color:'bg-rose-400'},
            {year:'前770', era:'东周', event:'平王东迁，春秋时期开始', color:'bg-rose-300'},
            {year:'前221', era:'秦朝', event:'秦始皇统一六国', color:'bg-purple-400'},
            {year:'前202', era:'西汉', event:'刘邦建立西汉', color:'bg-blue-400'},
            {year:'25', era:'东汉', event:'光武帝刘秀建立东汉', color:'bg-blue-300'},
            {year:'220', era:'三国', event:'曹丕称帝，三国鼎立', color:'bg-green-400'},
            {year:'581', era:'隋朝', event:'杨坚建隋', color:'bg-teal-400'},
            {year:'618', era:'唐朝', event:'李渊建唐', color:'bg-amber-400'},
            {year:'960', era:'北宋', event:'赵匡胤建立北宋', color:'bg-cyan-400'},
            {year:'1271', era:'元朝', event:'忽必烈建立元朝', color:'bg-blue-500'},
            {year:'1368', era:'明朝', event:'朱元璋建立明朝', color:'bg-red-500'},
            {year:'1644', era:'清朝', event:'清军入关', color:'bg-indigo-400'},
            {year:'1840', era:'近代', event:'鸦片战争', color:'bg-gray-500'},
            {year:'1911', era:'近代', event:'辛亥革命', color:'bg-emerald-500'},
            {year:'1949', era:'现代', event:'中华人民共和国成立', color:'bg-red-600'},
            {year:'1978', era:'现代', event:'改革开放', color:'bg-pink-500'},
        ];

        function filter(){
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = q ? events.filter(e => e.event.toLowerCase().includes(q) || e.era.toLowerCase().includes(q) || e.year.toString().includes(q)) : events;
            
            document.getElementById('timeline').innerHTML = filtered.map((e, index) => `
                <div class="flex items-start gap-4 pb-6 group animate-fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="flex flex-col items-center">
                        <div class="w-4 h-4 ${e.color} rounded-full z-10 shadow-sm transition-transform group-hover:scale-125"></div>
                        <div class="w-[2px] h-full bg-pink-50 flex-1 -mt-1 group-last:hidden"></div>
                    </div>
                    <div class="flex-1 pb-4 border-b border-pink-50/50 group-last:border-none">
                        <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-1">${e.year}</p>
                        <p class="font-bold text-gray-700 text-sm flex items-center gap-2">
                            <span class="px-2 py-0.5 ${e.color} bg-opacity-20 rounded-lg text-[10px] font-black text-gray-600">${e.era}</span>
                            ${e.event}
                        </p>
                    </div>
                </div>
            `).join('');
        }
        
        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    filter();
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
