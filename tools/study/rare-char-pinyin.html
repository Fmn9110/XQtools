<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生僻字注音速查 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">文言生僻字注音速查</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">探索汉字之美，精准掌握那些容易读错的“叠罗汉”汉字。 </p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="relative w-full max-w-xl mx-auto mb-14">
                <input type="text" id="search" placeholder="输入生僻字、拼音或含义过滤..." class="w-full p-6 pl-16 bg-slate-50 rounded-[2.5rem] border-2 border-slate-50 outline-none focus:border-pink-200 focus:bg-white transition-all text-sm font-bold shadow-inner" oninput="filter()">
                <div class="absolute left-6 top-1/2 -translate-y-1/2 text-2xl opacity-20 transition-opacity">🔍</div>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 w-full" id="list">
                <!-- Data loaded via JS -->
            </div>

            <div id="no-res" class="hidden p-12 text-center">
                <p class="text-4xl mb-4">🏮</p>
                <p class="text-gray-400 font-black text-sm uppercase tracking-widest leading-none">Not Found 未找到相关汉字</p>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.4em] pb-12 animate-item" style="animation-delay: 0.3s">
            Etymology & Phonetic Database Lab
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const chars = [
            {ch:'龘', py:'dá', mean:'群龙騰飞的样子。'},
            {ch:'靐', py:'bìng', mean:'雷声，极大的声响。'},
            {ch:'淼', py:'miǎo', mean:'水大的样子，同“渺”。'},
            {ch:'焱', py:'yàn', mean:'火花，火焰，也形容火烈。'},
            {ch:'垚', py:'yáo', mean:'山高。多用于人名。'},
            {ch:'犇', py:'bēn', mean:'同“奔”，引申为强健。'},
            {ch:'羴', py:'shān', mean:'同“膻”，羊燥气。'},
            {ch:'猋', py:'biāo', mean:'犬跑的样子，引申为迅速。'},
            {ch:'贔', py:'bì', mean:'赑屃，巨大的力量。'},
            {ch:'鑫', py:'xīn', mean:'指金多，兴旺。多用于名。'},
            {ch:'鱻', py:'xiān', mean:'同“鲜”。'},
            {ch:'麤', py:'cū', mean:'同“粗”，粗糙。'},
            {ch:'灥', py:'xún', mean:'三泉，泉声。'},
            {ch:'叒', py:'ruò', mean:'古同“若”，意为顺。'},
            {ch:'厵', py:'yuán', mean:'同“源”。'},
            {ch:'惢', py:'suǒ', mean:'心疑，也同“锁”。'},
            {ch:'掱', py:'pá', mean:'掱手，指小偷，扒手。'},
            {ch:'毳', py:'cuì', mean:'鸟兽的长毛，寒毳。'},
            {ch:'尛', py:'mó', mean:'古同“小”。'},
            {ch:'嚞', py:'zhé', mean:'古同“哲”。'},
            {ch:'舙', py:'huà', mean:'古同“话”，引申为梦话。'},
            {ch:'飍', py:'xiū', mean:'风声。'},
            {ch:'𦏱', py:'mǐ', mean:'羊叫声，通“咩”。'},
            {ch:'彧', py:'yù', mean:'有文采，文雅的样子。'},
            {ch:'翊', py:'yì', mean:'辅佐，飞翔的样子。'},
            {ch:'昱', py:'yù', mean:'日光，明亮，光明。'},
            {ch:'珩', py:'héng', mean:'佩玉上的横玉。'},
            {ch:'璟', py:'jǐng', mean:'玉的光彩。'},
            {ch:'頔', py:'dí', mean:'美好，也多用于人名。'},
            {ch:'翛', py:'xiāo', mean:'无拘无束的样子，翛然。'},
            {ch:'恣', py:'zì', mean:'放纵，无节制。'}
        ];

        function filter(){
            const q = document.getElementById('search').value.toLowerCase().trim();
            const f = q ? chars.filter(c => c.ch.includes(q) || c.py.includes(q) || c.mean.includes(q)) : chars;
            
            const listEl = document.getElementById('list');
            const noRes = document.getElementById('no-res');
            
            if(f.length === 0) {
                listEl.classList.add('hidden');
                noRes.classList.remove('hidden');
            } else {
                listEl.classList.remove('hidden');
                noRes.classList.add('hidden');
                listEl.innerHTML = f.map((c, i) => `
                    <div onclick="copyChar('${c.ch}')" class="group p-8 bg-white border border-pink-50 rounded-[3rem] text-center hover:bg-pink-50/30 hover:border-pink-200 transition-all cursor-pointer shadow-sm hover:shadow-xl hover:-translate-y-2 animate-fade-in relative overflow-hidden" style="animation-delay: ${i * 0.05}s">
                        <div class="absolute -right-4 -top-4 text-xs font-black text-pink-50 opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-tighter">CLICK COPY</div>
                        <p class="text-5xl font-black text-slate-800 mb-4 group-hover:text-pink-500 transition-colors font-serif italic">${c.ch}</p>
                        <p class="text-pink-400 font-black text-sm mb-2 shadow-text">[${c.py}]</p>
                        <hr class="w-8 mx-auto border-pink-100 mb-3 opacity-30 group-hover:w-16 transition-all">
                        <p class="text-[10px] text-gray-400 font-bold leading-relaxed line-clamp-2 px-2">${c.mean}</p>
                    </div>
                `).join('');
            }
        }
        
        async function copyChar(c) {
            try {
                await navigator.clipboard.writeText(c);
                Utils.toast(`已复制汉字: [${c}] 📎`, 'success');
            } catch(e) {}
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    filter();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('.group')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
