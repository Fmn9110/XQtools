<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡片配对记忆 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">记忆力翻牌训练</h1>
            <p class="text-gray-500 italic text-sm md:text-base animate-item" style="animation-delay: 0.1s">锻炼你的短期视觉记忆。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="flex justify-between items-center mb-6 px-2">
                <div class="bg-pink-50 px-4 py-2 rounded-full border border-pink-100 shadow-sm">
                    <p class="text-xs md:text-sm text-pink-500 font-bold">步数: <span id="steps" class="text-lg">0</span></p>
                </div>
                <button onclick="init()" class="cute-button px-5 py-2 bg-pink-400 hover:bg-pink-500 text-white rounded-full text-xs md:text-sm font-bold shadow-md">🔄 重新开始</button>
            </div>
            
            <div class="grid grid-cols-4 gap-3 md:gap-4 max-w-md mx-auto" id="board"></div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const emojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑'];
        let cards = [], flipped = [], matched = [], steps = 0, locked = false;

        function init() {
            const pairs = [...emojis, ...emojis];
            // Fisher-Yates洗牌
            for (let i = pairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
            }
            cards = pairs; flipped = []; matched = []; steps = 0; locked = false;
            document.getElementById('steps').textContent = 0;
            render();
            Utils.toast('新游戏已开始', 'info');
        }

        function render() {
            document.getElementById('board').innerHTML = cards.map((c, i) => {
                const isFlipped = flipped.includes(i) || matched.includes(i);
                return `
                <button onclick="flip(${i})" class="aspect-square rounded-2xl md:rounded-3xl text-3xl md:text-4xl font-bold select-none transition-all duration-300 transform ${isFlipped ? 'bg-white border-4 border-pink-200 shadow-inner rotate-0' : 'bg-pink-400 hover:bg-pink-500 text-transparent shadow-lg rotate-180'}" ${matched.includes(i) ? 'disabled' : ''}>
                    ${isFlipped ? c : '❓'}
                </button>`;
            }).join('');
        }

        function flip(i) {
            if (locked || flipped.includes(i) || matched.includes(i)) return;
            flipped.push(i); render();
            if (flipped.length === 2) {
                steps++; document.getElementById('steps').textContent = steps;
                locked = true;
                const [a, b] = flipped;
                if (cards[a] === cards[b]) {
                    matched.push(a, b); flipped = []; locked = false; render();
                    if (matched.length === cards.length) {
                        setTimeout(() => {
                            Utils.toast(`🎉 挑战成功！用了 ${steps} 步`, 'success');
                        }, 300);
                    }
                } else {
                    setTimeout(() => { flipped = []; locked = false; render(); }, 800);
                }
            }
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });

        init();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
