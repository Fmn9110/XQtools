<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>单词拼写挑战 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        .input-active { transform: scale(1.02); box-shadow: 0 30px 60px -12px rgba(244, 114, 182, 0.2); }
        .hint-char { border-bottom: 2px solid #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .stat-card { background: linear-gradient(135deg, #ffffff 0%, #fdf2f8 100%); }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">拼写之王：词律挑战</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">在字母的律动中重拾语感。每一个拼音，都是对认知的深度唤醒。⚡</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="flex justify-between items-center mb-10 px-4">
                <div class="flex gap-6">
                    <div class="stat-card p-4 rounded-2xl border border-pink-50 flex items-center gap-3 shadow-sm">
                        <span class="text-2xl">🔥</span>
                        <div class="text-left">
                            <p class="text-[8px] font-black text-rose-300 uppercase tracking-widest">Accuracy</p>
                            <p class="text-sm font-black text-slate-700 tabular-nums"><span id="score">0</span> / <span id="total">0</span></p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="next()" class="px-8 py-4 bg-slate-900 text-white text-[10px] font-black rounded-2xl hover:bg-black transition-all active:scale-95 shadow-xl uppercase tracking-widest">跳过 (Next)</button>
                </div>
            </div>

            <div class="bg-slate-50 rounded-[4rem] p-12 md:p-20 mb-10 border-2 border-slate-100 flex flex-col items-center justify-center relative overflow-hidden group">
                <div class="absolute -right-10 -bottom-10 opacity-5 rotate-12 transition-transform group-hover:rotate-0">
                    <span class="text-[12rem]">🖊️</span>
                </div>
                <p id="hintLabel" class="text-[10px] font-black text-indigo-300 uppercase tracking-[0.5em] mb-6">Semantic Bridge (语义关联)</p>
                <h2 id="chinese" class="text-5xl md:text-7xl font-black text-slate-800 mb-8 tracking-tight">--</h2>
                <div id="display" class="flex gap-2 mb-4">
                    <!-- Dynamic chars -->
                </div>
            </div>

            <div class="relative max-w-2xl mx-auto mb-8">
                <input type="text" id="answer" autocomplete="off" placeholder="在此输入英文拼写..." class="w-full p-8 bg-slate-50 rounded-[3rem] border-2 border-transparent focus:border-pink-100 outline-none focus:bg-white transition-all font-black text-4xl text-center text-slate-700 placeholder:text-slate-100 shadow-inner" onkeydown="if(event.key==='Enter')check()" autofocus>
                <div class="absolute right-6 top-1/2 -translate-y-1/2 flex gap-2">
                    <button onclick="document.getElementById('answer').value=''; updateHint();" class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-300 hover:text-rose-500 transition-colors shadow-sm border border-slate-100">🗑️</button>
                    <button onclick="check()" class="w-14 h-14 bg-pink-400 text-white rounded-2xl shadow-lg hover:bg-pink-500 transition-all flex items-center justify-center text-2xl">✨</button>
                </div>
            </div>

            <div id="feedback" class="min-h-[100px] flex flex-col items-center justify-center gap-2">
                <!-- Feedback dynamic -->
            </div>
        </section>
        
        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.5em] pb-12 animate-item">
            Orthographic Recall & Lexical Precision Proficiency Trainer
        </p>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const words = [
            {en:'apple',zh:'苹果'},{en:'banana',zh:'香蕉'},{en:'computer',zh:'电脑'},
            {en:'beautiful',zh:'美丽'},{en:'important',zh:'重要'},{en:'education',zh:'教育'},
            {en:'knowledge',zh:'知识'},{en:'language',zh:'语言'},{en:'science',zh:'科学'},
            {en:'history',zh:'历史'},{en:'geography',zh:'地理'},{en:'mathematics',zh:'数学'},
            {en:'environment',zh:'环境'},{en:'technology',zh:'技术'},{en:'library',zh:'图书馆'},
            {en:'dictionary',zh:'字典'},{en:'practice',zh:'练习'},{en:'exercise',zh:'运动/练习'},
            {en:'different',zh:'不同'},{en:'wonderful',zh:'精彩'}
        ];
        let qi = -1, score = 0, totalCount = 0;

        function next() {
            qi = Math.floor(Math.random() * words.length);
            const w = words[qi];
            document.getElementById('chinese').textContent = w.zh;
            updateHint();
            document.getElementById('answer').value = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('answer').focus();
        }

        function updateHint() {
            const w = words[qi];
            const display = document.getElementById('display');
            display.innerHTML = '';
            [...w.en].forEach((c, i) => {
                const span = document.createElement('span');
                span.className = 'w-6 h-10 flex items-center justify-center font-black text-xl text-slate-200 border-b-2 border-slate-100 mx-0.5 font-mono';
                span.textContent = i === 0 ? c.toUpperCase() : '_';
                display.appendChild(span);
            });
        }

        function check() {
            if(qi < 0) return;
            const w = words[qi];
            const ans = document.getElementById('answer').value.trim().toLowerCase();
            totalCount++;
            const fb = document.getElementById('feedback');
            
            if (ans === w.en.toLowerCase()) {
                score++;
                fb.innerHTML = `
                    <div class="px-8 py-3 bg-emerald-50 text-emerald-500 rounded-full font-black text-[10px] uppercase tracking-widest animate-bounce">
                        Perfect Spell ✨ +1 Score
                    </div>
                `;
                Utils.toast('拼写正确 ✨', 'success');
                setTimeout(next, 1200);
            } else {
                fb.innerHTML = `
                    <div class="text-slate-300 font-bold flex flex-col items-center">
                        <p class="text-[9px] uppercase tracking-[0.4em] opacity-40 mb-2">Lexical Correction</p>
                        <p class="text-4xl font-black text-rose-500 font-mono tracking-tight group cursor-pointer" onclick="next()">${w.en}</p>
                    </div>
                `;
                Utils.toast('拼写有误 ❌', 'error');
            }
            document.getElementById('score').textContent = score;
            document.getElementById('total').textContent = totalCount;
        }

        // Init
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    next();
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('input')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
