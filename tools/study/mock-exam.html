<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全真模拟考场 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">全真模拟考场系统</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">本模块已深度整合升级，为您提供更专业的模拟体验。⚔️</p>
        </header>

        <section class="cute-card p-10 md:p-16 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-24 h-24 bg-pink-50 rounded-full flex items-center justify-center text-5xl mb-8 animate-bounce">📋</div>
            <h2 class="text-2xl font-black text-slate-700 mb-6 tracking-tight">服务功能整合通知</h2>
            <div class="bg-pink-50/30 p-8 rounded-[2.5rem] border-2 border-dashed border-pink-100 mb-10 text-left max-w-lg">
                <p class="text-sm text-gray-500 leading-relaxed">
                    为了统一学习流程与沉浸式体验，<span class="text-pink-400 font-bold">全真模拟</span> 相关核心功能已被深度整合至以下专门模块：
                </p>
                <ul class="mt-6 space-y-4">
                    <li class="flex items-center gap-3 text-sm font-black text-pink-500 bg-white/50 p-3 rounded-2xl border border-pink-50">
                        <span class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></span> 🍅 番茄专注同步计时系统
                    </li>
                    <li class="flex items-center gap-3 text-sm font-black text-pink-500 bg-white/50 p-3 rounded-2xl border border-pink-50">
                        <span class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></span> 📝 自动化题目生成核心引擎
                    </li>
                    <li class="flex items-center gap-3 text-sm font-black text-pink-500 bg-white/50 p-3 rounded-2xl border border-pink-50">
                        <span class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></span> 📊 学习进度追踪与统计面板
                    </li>
                </ul>
            </div>
            
            <button onclick="location.href='./pomodoro-tool.html'" class="group w-full max-w-xs py-5 bg-pink-400 text-white font-black rounded-3xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-2">
                🚀 前往 沉浸考场中心
                <span class="group-hover:translate-x-1 transition-transform">→</span>
            </button>
            
            <p class="mt-8 text-[11px] text-gray-300 font-medium italic">点击按钮即可自动跳转至最新的沉浸式考场工具</p>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
