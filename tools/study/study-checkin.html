<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习打卡 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .calendar-grid div { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .checked-dot { width: 4px; height: 4px; background: white; border-radius: 50%; margin-top: 2px; }
        .day-active:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(244, 114, 182, 0.1); }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14 no-print">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">晨钟暮鼓：自律打卡</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">记录每一次克制的胜利，见证水滴穿石的力量。📌</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <!-- Stats Dashboard -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 w-full mb-12">
                <div class="p-8 bg-sky-50/40 rounded-[2.5rem] flex flex-col items-center border border-sky-50">
                    <span class="text-4xl font-black text-sky-400 mb-2 tabular-nums" id="streak">0</span>
                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] leading-none">Consecutive Days</span>
                </div>
                <div class="p-8 bg-pink-50 rounded-[2.5rem] flex flex-col items-center border border-pink-50 shadow-sm">
                    <span class="text-4xl font-black text-pink-400 mb-2 tabular-nums" id="totalDays">0</span>
                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] leading-none">Total Milestones</span>
                </div>
                <div class="p-8 bg-slate-50/50 rounded-[2.5rem] flex flex-col items-center border border-slate-100">
                    <span class="text-4xl font-black text-slate-800 mb-2 tabular-nums" id="monthCount">0</span>
                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] leading-none">Monthly Progress</span>
                </div>
            </div>

            <!-- Action Area -->
            <button onclick="checkin()" id="checkinBtn" class="w-full max-w-md py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-4 mb-14">
                📌 <span id="btnText">立即签署打卡 (STAMP)</span>
            </button>

            <!-- Calendar Visualization -->
            <div class="w-full bg-slate-50 shadow-inner rounded-[3.5rem] p-8 md:p-12 relative overflow-hidden group">
                <div class="calendar-grid grid grid-cols-7 gap-3 md:gap-4 mb-6 relative z-10" id="calendar">
                    <!-- Dynamic Days -->
                </div>
                
                <div id="quoteArea" class="mt-8 pt-6 border-t border-slate-200/50 text-slate-400 text-xs italic font-medium">
                     "凡事预则立，不预则废。"
                </div>
                
                <div class="absolute top-0 right-0 w-64 h-64 bg-pink-100/10 rounded-full blur-3xl pointer-events-none"></div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.4em] pb-12 animate-item no-print" style="animation-delay: 0.3s">
            Continuous Self-Improvement & Habit Consistency Tracker
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let records = JSON.parse(localStorage.getItem('qStudyCheckin') || '[]');
        const today = new Date().toISOString().slice(0, 10);
        const quotes = [
            "每一项伟大的事业，都有一个微不足道的开始。",
            "自律是解决人生问题的首要工具。",
            "当你的才华还撑不起你的野心时，那你就应该静下心来学习。",
            "哪怕只有微小的进步，也比原地踏步要强得多。",
            "所谓天才，不过是把别人喝咖啡的功夫都用在工作上。"
        ];

        function save() { localStorage.setItem('qStudyCheckin', JSON.stringify(records)); }

        function checkin() {
            if (records.includes(today)) {
                Utils.toast('今天已经打过卡啦，明天再来哦 ✨', 'info');
                return;
            }
            records.push(today);
            save();
            render();
            Utils.toast('打卡成功！为你骄傲 🎉', 'success');
            
            // Interaction celebration
            const btn = document.getElementById('checkinBtn');
            btn.style.animation = 'success-pop 0.5s ease-out';
            setTimeout(() => btn.style.animation = '', 500);
        }

        function calcStreak() {
            let streak = 0;
            const d = new Date();
            while (true) {
                const ds = d.toISOString().slice(0, 10);
                if (records.includes(ds)) { streak++; d.setDate(d.getDate() - 1); }
                else break;
            }
            return streak;
        }

        function render() {
            document.getElementById('streak').textContent = calcStreak();
            document.getElementById('totalDays').textContent = records.length;
            const monthStr = today.slice(0, 7);
            document.getElementById('monthCount').textContent = records.filter(r => r.startsWith(monthStr)).length;
            
            const btn = document.getElementById('checkinBtn');
            const btnText = document.getElementById('btnText');
            if (records.includes(today)) {
                btnText.textContent = '✅ 今日打卡已达成';
                btn.classList.replace('bg-pink-400', 'bg-slate-100');
                btn.classList.replace('text-white', 'text-slate-400');
                btn.classList.remove('hover:bg-pink-500', 'transform', 'hover:-translate-y-1', 'active:scale-95');
                btn.style.cursor = 'default';
                btn.onclick = null;
            }

            // Calendar Logic
            const now = new Date();
            const year = now.getFullYear(), month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let cal = `<div class="col-span-1 text-slate-300 font-black cursor-pointer hover:text-pink-400 transition-colors" onclick="changeMonth(-1)">‹</div>
                       <div class="col-span-5 text-xs font-black text-slate-500 uppercase tracking-[0.3em] mb-4">
                            ${now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' })}
                       </div>
                       <div class="col-span-1 text-slate-300 font-black cursor-pointer hover:text-pink-400 transition-colors" onclick="changeMonth(1)">›</div>`;
            
            ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => cal += `<div class="text-[9px] font-black text-slate-300 mb-2">${d}</div>`);
            
            for (let i = 0; i < firstDay; i++) cal += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const checked = records.includes(ds);
                const isToday = ds === today;
                
                cal += `<div class="day-active aspect-square flex flex-col items-center justify-center rounded-2xl text-[11px] font-bold transition-all ${
                    checked ? 'bg-pink-400 text-white shadow-lg shadow-pink-100 scale-110 z-10' : 
                    isToday ? 'bg-pink-50 text-pink-400 border border-pink-100' : 'text-slate-400 hover:bg-white hover:shadow-sm'
                }">
                    ${d}
                    ${checked ? '<div class="checked-dot"></div>' : ''}
                </div>`;
            }
            document.getElementById('calendar').innerHTML = cal;
            document.getElementById('quoteArea').innerText = '"' + quotes[Math.floor(Math.random() * quotes.length)] + '"';
        }

        function changeMonth(delta) {
            Utils.toast('切换月份功能在离线模式仅供演示 ✨', 'info');
        }

        // 加载动画 & 初始化
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    render();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('.day-active')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
