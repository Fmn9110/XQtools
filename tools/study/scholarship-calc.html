<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奖学金计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">卓越学术奖项评估</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">量化你的每一步跨越，洞悉奖学金评定概率。🏆</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 text-left">
                <div class="group">
                    <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Academic GPA (Max 4.0)</label>
                    <input type="number" id="gpa" placeholder="例如：3.85" step="0.01" max="4.0" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all font-bold shadow-inner text-slate-700">
                </div>
                <div class="group">
                    <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Numerical Rank 年级排名</label>
                    <input type="number" id="rank" placeholder="例如：5" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all font-bold shadow-inner text-slate-700">
                </div>
                <div class="group">
                    <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Total Population 年级总人数</label>
                    <input type="number" id="total" placeholder="例如：300" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all font-bold shadow-inner text-slate-700">
                </div>
                <div class="group">
                    <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Bonus Score 竞赛/科研加分</label>
                    <input type="number" id="bonus" placeholder="可选，例如：2" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all font-bold shadow-inner text-slate-700">
                </div>
            </div>
            
            <button onclick="calc()" class="w-full py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl mb-12 flex items-center justify-center gap-3">
                🎯 开启奖项评估 (ANALYZE)
            </button>

            <!-- Enhanced Result Dashboard -->
            <div id="result" class="hidden w-full text-left animate-fade-in group space-y-8">
                <!-- Data injection here -->
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            Academic Performance Analysis & Scholarship Hub
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc(){
            const gpa = parseFloat(document.getElementById('gpa').value) || 0;
            const rank = parseInt(document.getElementById('rank').value) || 1;
            const total = parseInt(document.getElementById('total').value) || 100;
            const bonus = parseFloat(document.getElementById('bonus').value) || 0;
            
            if(!gpa || !total) {
                Utils.toast('请填写必要的GPA和总人数哦 📊', 'warning');
                return;
            }

            const pct = (rank / total) * 100;
            let level = '', color = '', amount = '', icon = '', sub = '';
            
            if(pct <= 2 && gpa >= 3.85){
                level = '国家级特等奖学金'; color = 'text-amber-500'; amount = '¥10,000+'; icon = '👑'; sub = '卓越至上，学术巅峰';
            } else if(pct <= 5 && gpa >= 3.7){
                level = '校级一等奖学金'; color = 'text-pink-500'; amount = '¥5,000 - ¥8,000'; icon = '💎'; sub = '出类拔萃，优中选优';
            } else if(pct <= 15 && gpa >= 3.4){
                level = '校级二等奖学金'; color = 'text-blue-500'; amount = '¥3,000 - ¥5,000'; icon = '🎗️'; sub = '稳扎稳打，实力非凡';
            } else if(pct <= 30 && gpa >= 3.0){
                level = '校级三等奖学金'; color = 'text-emerald-500'; amount = '¥1,000 - ¥2,000'; icon = '🌟'; sub = '继续努力，未来可期';
            } else {
                level = '学术进步奖 (潜力榜)'; color = 'text-slate-400'; amount = '精神嘉奖'; icon = '🌱'; sub = '厚积薄发，静待花开';
            }
            
            const resultBox = document.getElementById('result');
            resultBox.innerHTML = `
                <div class="p-10 md:p-16 bg-pink-50/10 rounded-[4rem] border-2 border-dashed border-pink-50 text-center relative overflow-hidden transition-transform hover:scale-[1.01]">
                    <div class="absolute -right-8 -bottom-8 text-9xl opacity-5 pointer-events-none rotate-12">${icon}</div>
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-[0.4em] mb-4">Assessment Result</p>
                    <p class="text-4xl md:text-5xl font-black ${color} transition-colors mb-3 tracking-tighter">${level}</p>
                    <p class="text-sm font-black text-slate-400 uppercase tracking-widest mb-6 opacity-60">${sub}</p>
                    <div class="inline-block px-8 py-3 bg-white/60 backdrop-blur-sm rounded-full border border-pink-100 shadow-sm">
                        <p class="text-xl font-black text-slate-800">${amount}</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="p-6 bg-slate-50/50 rounded-[2.5rem] border border-slate-100 flex justify-between items-center px-8 shadow-sm">
                        <div class="flex flex-col">
                             <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">GPA Percent</span>
                             <span class="text-lg font-black text-slate-700 tracking-tight">${gpa.toFixed(2)} / 4.0</span>
                        </div>
                        <span class="text-2xl opacity-20">📊</span>
                    </div>
                    <div class="p-6 bg-slate-50/50 rounded-[2.5rem] border border-slate-100 flex justify-between items-center px-8 shadow-sm">
                        <div class="flex flex-col">
                             <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Rank Tier</span>
                             <span class="text-lg font-black text-pink-400 tracking-tight">Top ${pct.toFixed(2)}%</span>
                        </div>
                        <span class="text-2xl opacity-20">📈</span>
                    </div>
                </div>

                <div class="p-6 bg-white border border-pink-50 rounded-[2rem] flex items-start gap-4 shadow-sm">
                    <span class="text-xl mt-1">⚠️</span>
                    <p class="text-[10px] md:text-xs text-slate-400 font-medium leading-relaxed">
                        <b>免责声明：</b>评估结果基于通用奖学金评定模型。实际评选标准（如德育分数、科研加分权重等）由各高校评选委员会根据当年实际情况与综合评价指标决定。
                    </p>
                </div>
            `;
            
            resultBox.classList.remove('hidden');
            Utils.toast('评估完成，愿你学业有成！✨', 'success');
        }

        // 加载与点击特效
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
