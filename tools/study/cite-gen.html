<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>参考文献生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">参考文献格式自动生成(APA/MLA)</h1>
            <p class="text-gray-500 italic text-sm md:text-base animate-item" style="animation-delay: 0.1s">自动生成 APA、MLA、GB/T 7714 标准格式引文。</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-2xl mb-12 animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                 <input type="text" id="author" placeholder="作者 (如: 张三)" class="p-4 bg-gray-50 rounded-2xl outline-none border border-pink-50 focus:border-pink-300 transition-all">
                 <input type="text" id="year" placeholder="年份 (如: 2023)" class="p-4 bg-gray-50 rounded-2xl outline-none border border-pink-50 focus:border-pink-300 transition-all">
            </div>
            <input type="text" id="title" placeholder="文章或著作的完整标题" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-pink-50 mb-8 focus:border-pink-300 transition-all">
            
            <div class="flex flex-col md:flex-row gap-3 mb-10">
                 <button onclick="gen('GB')" class="flex-1 py-3 bg-pink-50 text-pink-500 rounded-xl font-bold hover:bg-pink-100 transition-all text-sm border border-pink-100">GB/T 7714</button>
                 <button onclick="gen('APA')" class="flex-1 py-3 bg-pink-50 text-pink-500 rounded-xl font-bold hover:bg-pink-100 transition-all text-sm border border-pink-100">APA 格式</button>
                 <button onclick="gen('MLA')" class="flex-1 py-3 bg-pink-50 text-pink-500 rounded-xl font-bold hover:bg-pink-100 transition-all text-sm border border-pink-100">MLA 格式</button>
            </div>

            <div id="resBox" class="p-6 md:p-8 bg-pink-50/20 border border-dashed border-pink-100 rounded-2xl md:rounded-3xl text-sm font-mono text-slate-600 min-h-[100px] break-all flex items-center justify-center text-center">
                点击上方按钮生成格式化引文...
            </div>
            <button onclick="copyRes()" class="cute-button w-full mt-6 py-3 bg-pink-400 text-white rounded-xl font-bold hidden" id="copyBtn">复制结果</button>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const author = document.getElementById('author');
        const year = document.getElementById('year');
        const title = document.getElementById('title');
        const res = document.getElementById('resBox');
        const copyBtn = document.getElementById('copyBtn');

        function gen(type) {
            const a = author.value || "[作者]";
            const y = year.value || "[年份]";
            const t = title.value || "[标题]";
            
            let val = "";
            if(type === 'GB') val = `${a}. ${t}[J]. ${y}.`;
            if(type === 'APA') val = `${a} (${y}). ${t}.`;
            if(type === 'MLA') val = `${a}. "${t}." ${y}.`;
            
            res.innerText = val;
            res.classList.remove('text-center');
            copyBtn.classList.remove('hidden');
            Utils.toast('引文已生成', 'success');
        }

        function copyRes() {
            Utils.copyText(res.innerText);
            Utils.toast('已复制到剪贴板', 'success');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
