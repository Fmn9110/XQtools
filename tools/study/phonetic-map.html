<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音标速查 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">国际音标 (IPA) 学习对照表</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">48个国际音标标准对照，点击卡片聆听地道美式/英式发音演练。</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item text-left" style="animation-delay: 0.2s">
            <!-- Vowels Section -->
            <div class="mb-16">
                <div class="flex items-center gap-3 mb-6 pl-2">
                    <span class="w-1.5 h-6 bg-pink-400 rounded-full"></span>
                    <h2 class="text-xs font-black text-pink-400 uppercase tracking-[0.2em]">Vowel Sounds (元音 20)</h2>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4" id="vowels">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <!-- Consonants Section -->
            <div>
                <div class="flex items-center gap-3 mb-6 pl-2">
                    <span class="w-1.5 h-6 bg-pink-300 rounded-full"></span>
                    <h2 class="text-xs font-black text-pink-300 uppercase tracking-[0.2em]">Consonant Sounds (辅音 28)</h2>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-3" id="consonants">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.4em] pb-12 animate-item" style="animation-delay: 0.3s">
            Linguistic Foundation & Phonetic Engine
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const vowels = [
            {ipa:'/iː/', ex:'see'}, {ipa:'/ɪ/',  ex:'sit'}, {ipa:'/e/',  ex:'bed'}, {ipa:'/æ/',  ex:'cat'},
            {ipa:'/ɑː/', ex:'car'}, {ipa:'/ɒ/',  ex:'hot'}, {ipa:'/ɔː/', ex:'four'},{ipa:'/ʊ/',  ex:'book'},
            {ipa:'/uː/', ex:'food'},{ipa:'/ʌ/',  ex:'cup'}, {ipa:'/ɜː/', ex:'bird'},{ipa:'/ə/',  ex:'ago'},
            {ipa:'/eɪ/', ex:'day'}, {ipa:'/aɪ/', ex:'my'},  {ipa:'/ɔɪ/', ex:'boy'}, {ipa:'/aʊ/', ex:'how'},
            {ipa:'/əʊ/', ex:'go'},  {ipa:'/ɪə/', ex:'ear'}, {ipa:'/eə/', ex:'air'}, {ipa:'/ʊə/', ex:'tour'},
        ];
        const consonants = [
            {ipa:'/p/', ex:'pen'}, {ipa:'/b/', ex:'bad'},  {ipa:'/t/', ex:'tea'}, {ipa:'/d/', ex:'did'},
            {ipa:'/k/', ex:'cat'}, {ipa:'/g/', ex:'get'},  {ipa:'/f/', ex:'fall'}, {ipa:'/v/', ex:'van'},
            {ipa:'/θ/', ex:'thin'},{ipa:'/ð/', ex:'this'}, {ipa:'/s/', ex:'see'}, {ipa:'/z/', ex:'zoo'},
            {ipa:'/ʃ/', ex:'she'}, {ipa:'/ʒ/', ex:'vision'},{ipa:'/h/', ex:'he'},  {ipa:'/m/', ex:'man'},
            {ipa:'/n/', ex:'no'},  {ipa:'/ŋ/', ex:'sing'}, {ipa:'/l/', ex:'let'}, {ipa:'/r/', ex:'red'},
            {ipa:'/j/', ex:'yes'}, {ipa:'/w/', ex:'we'},   {ipa:'/tʃ/',ex:'chin'},{ipa:'/dʒ/',ex:'job'},
            {ipa:'/ts/',ex:'cats'},{ipa:'/dz/',ex:'beds'}, {ipa:'/tr/',ex:'tree'},{ipa:'/dr/',ex:'drive'},
        ];

        function speak(word){
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(word);
            u.lang = 'en-US';
            u.rate = 0.85;
            u.pitch = 1.0;
            window.speechSynthesis.speak(u);
            Utils.toast(`Pronouncing: "${word}" 🔊`);
        }

        function init() {
            document.getElementById('vowels').innerHTML = vowels.map(v => `
                <button onclick="speak('${v.ex}')" class="p-5 bg-pink-50/50 border-2 border-transparent rounded-[2.2rem] text-center group transition-all hover:bg-white hover:border-pink-100 hover:shadow-xl hover:-translate-y-1 active:scale-95">
                    <p class="font-black text-2xl text-pink-500 mb-1 group-hover:scale-110 transition-transform">${v.ipa}</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest leading-none">${v.ex}</p>
                </button>
            `).join('');

            document.getElementById('consonants').innerHTML = consonants.map(c => `
                <button onclick="speak('${c.ex}')" class="p-4 bg-white border border-pink-50 rounded-[1.8rem] text-center group transition-all hover:bg-pink-50 hover:border-pink-100 hover:shadow-md active:scale-95 shadow-sm">
                    <p class="font-black text-base text-slate-700 mb-0.5">${c.ipa}</p>
                    <p class="text-[9px] text-pink-300 font-bold uppercase tracking-tight leading-none">${c.ex}</p>
                </button>
            `).join('');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    init();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
