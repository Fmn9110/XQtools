<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>康奈尔笔记 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            nav, .cute-button, .cute-loader-overlay, #webmeji-buddy-container { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .cute-card { border: 2px solid #eee !important; box-shadow: none !important; transform: none !important; margin: 0 !important; border-radius: 0 !important; }
            main { padding: 0 !important; }
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">康奈尔笔记生成模板</h1>
            <p class="text-gray-500 italic text-sm md:text-base animate-item" style="animation-delay: 0.1s">5R 笔记法标准结构，线索、笔记、总结三位一体。</p>
        </header>

        <section class="cute-card p-6 md:p-8 bg-white shadow-2xl mb-12 flex flex-col gap-4 text-left animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 h-auto md:min-h-[600px]">
                 <!-- Cue Column -->
                 <div class="md:col-span-3 bg-gray-50 rounded-2xl p-6 border border-dashed border-gray-200 min-h-[150px]" contenteditable="true">
                      <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-4">线索 / 关键词</p>
                      <p class="text-gray-400 text-sm">点击输入线索...</p>
                 </div>
                 <!-- Note Column -->
                 <div class="md:col-span-9 bg-white rounded-2xl p-6 border border-dashed border-gray-200 min-h-[300px]" contenteditable="true">
                      <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-4">课程笔记主体</p>
                      <p class="text-gray-400 text-sm">记录在这里...</p>
                 </div>
            </div>
            <!-- Summary -->
            <div class="bg-pink-50/20 rounded-2xl p-6 border border-dashed border-pink-100" contenteditable="true">
                 <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-4">内容总结 (Summary)</p>
                 <p class="text-gray-400 text-sm">写下这页笔记的核心总结...</p>
            </div>
            
            <button onclick="window.print()" class="cute-button bg-pink-400 hover:bg-pink-500 text-white px-12 py-4 rounded-xl font-bold shadow-lg w-full mt-4">另存为 PDF / 打印笔记</button>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
