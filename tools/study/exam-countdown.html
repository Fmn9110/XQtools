<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>考试倒计时 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">考试倒计时</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">记录每一个重要时刻，离梦想更近一步。加油！</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="grid md:grid-cols-2 gap-4 mb-6">
                <input type="text" id="examName" placeholder="📝 考试 / 事件名称" class="p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 shadow-inner font-bold text-slate-600">
                <input type="date" id="examDate" class="p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 shadow-inner font-bold text-slate-600">
            </div>
            <button onclick="addExam()" class="w-full py-4 bg-pink-400 text-white font-black rounded-2xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 mb-10">
                ✨ 添加新提醒
            </button>
            
            <div class="space-y-4" id="examList">
                <!-- Exam list items added here -->
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let exams = JSON.parse(localStorage.getItem('qExamCountdown') || '[]');
        
        function save() { localStorage.setItem('qExamCountdown', JSON.stringify(exams)); }
        
        function addExam() {
            const name = document.getElementById('examName').value.trim();
            const date = document.getElementById('examDate').value;
            if (!name || !date) {
                Utils.toast('请填写完整信息哦', 'warning');
                return;
            }
            exams.push({ name, date, id: Date.now() });
            exams.sort((a, b) => new Date(a.date) - new Date(b.date));
            save();
            render();
            document.getElementById('examName').value = '';
            Utils.toast('已添加！努力备考哦 💪');
        }

        function removeExam(id) {
            exams = exams.filter(e => e.id !== id);
            save();
            render();
        }

        function render() {
            const now = new Date();
            const list = document.getElementById('examList');
            if (exams.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-300 font-bold italic">暂无倒计时，快添加一个吧 ~</div>`;
                return;
            }
            list.innerHTML = exams.map(e => {
                const target = new Date(e.date + 'T00:00:00');
                const diff = target - now;
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                const passed = days < 0;
                let statusColor = passed ? 'bg-gray-50 text-gray-400' : (days <= 7 ? 'bg-pink-50 text-pink-500 border-pink-100' : 'bg-pink-50/30 text-slate-600 border-pink-50');
                let dayText = passed ? '已结束' : `<span class="text-3xl font-black">${days}</span> <span class="text-sm">天</span>`;
                
                return `
                    <div class="p-6 rounded-3xl border ${statusColor} flex items-center justify-between group hover:shadow-md transition-all animate-fade-in relative overflow-hidden">
                        ${!passed && days <= 7 ? '<div class="absolute top-0 right-0 px-3 py-1 bg-pink-400 text-white text-[8px] font-black italic rounded-bl-xl">UPCOMING!</div>' : ''}
                        <div class="flex flex-col">
                            <p class="font-black text-slate-700 text-lg mb-1">${e.name}</p>
                            <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">${e.date}</p>>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="text-right">${dayText}</div>
                            <button onclick="removeExam(${e.id})" class="text-gray-300 hover:text-pink-500 transition-colors">🗑️</button>
                        </div>
                    </div>`;
            }).join('');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    render();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
        
        setInterval(render, 3600000); // 每小时更新一次
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
