<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全真模拟考场 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .timer-warning { animation: timer-shake 0.5s ease-in-out infinite; color: #ef4444 !important; }
        @keyframes timer-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        .fullscreen-overlay { background: rgba(255, 255, 255, 0.98); }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14 no-print">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">全真沉浸式模拟考场</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">屏蔽干扰，模拟压力。在实战前经历最真实的演练。🎯</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <!-- Setup Section -->
            <div id="setup" class="w-full">
                <div class="mb-10 text-left">
                    <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Examination Subject 考试项目</label>
                    <input type="text" id="examName" placeholder="例如：2026年终总结测试" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all text-center text-xl font-black shadow-inner text-slate-700">
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-12">
                    <button onclick="setTime(30)" class="group p-8 bg-pink-50/30 text-pink-500 rounded-[2.5rem] font-black hover:bg-pink-100 transition-all flex flex-col items-center">
                        <span class="text-3xl group-hover:scale-110 transition-transform">30</span>
                        <span class="text-[10px] uppercase mt-2 opacity-60">Minutes</span>
                    </button>
                    <button onclick="setTime(60)" class="group p-8 bg-pink-50/30 text-pink-500 rounded-[2.5rem] font-black hover:bg-pink-100 transition-all flex flex-col items-center">
                        <span class="text-3xl group-hover:scale-110 transition-transform">60</span>
                        <span class="text-[10px] uppercase mt-2 opacity-60">Minutes</span>
                    </button>
                    <button onclick="setTime(90)" class="group p-8 bg-pink-50/30 text-pink-500 rounded-[2.5rem] font-black hover:bg-pink-100 transition-all flex flex-col items-center">
                        <span class="text-3xl group-hover:scale-110 transition-transform">90</span>
                        <span class="text-[10px] uppercase mt-2 opacity-60">Minutes</span>
                    </button>
                    <button onclick="setTime(120)" class="group p-8 bg-slate-50 text-slate-500 rounded-[2.5rem] font-black hover:bg-pink-100 hover:text-pink-500 transition-all flex flex-col items-center">
                        <span class="text-3xl group-hover:scale-110 transition-transform">120</span>
                        <span class="text-[10px] uppercase mt-2 opacity-60">Minutes</span>
                    </button>
                    <button onclick="setTime(150)" class="group p-8 bg-slate-50 text-slate-500 rounded-[2.5rem] font-black hover:bg-pink-100 hover:text-pink-500 transition-all flex flex-col items-center">
                        <span class="text-3xl group-hover:scale-110 transition-transform">150</span>
                        <span class="text-[10px] uppercase mt-2 opacity-60">Minutes</span>
                    </button>
                    <div class="relative group">
                        <input type="number" id="custom" placeholder="自定义" class="w-full h-full p-8 bg-slate-50 border-2 border-transparent rounded-[2.5rem] text-center font-black text-slate-600 outline-none focus:border-pink-100 text-2xl">
                        <button onclick="setTime(parseInt(document.getElementById('custom').value))" class="absolute inset-y-3 right-3 px-6 bg-pink-400 text-white rounded-[1.5rem] text-[10px] font-black hover:bg-pink-500 transition-all opacity-0 group-focus-within:opacity-100">START</button>
                    </div>
                </div>
                
                <div class="p-6 bg-slate-50 border border-slate-100 rounded-[2rem] text-left">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-[0.2em] mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span> Best Practice 建议
                    </p>
                    <p class="text-xs text-slate-500 leading-relaxed font-bold">建议开启浏览器全屏模式（f11），并开启设备勿扰状态。保持专注，不要频繁切换标签页，以获得最专业的全真考场反馈体验。🚀</p>
                </div>
            </div>

            <!-- Active Exam Section -->
            <div id="exam" class="hidden w-full flex flex-col items-center animate-fade-in">
                <div class="mb-10">
                     <p class="text-[10px] font-black text-pink-300 uppercase tracking-[0.4em] mb-2 leading-none">Examination Process</p>
                     <p class="text-3xl font-black text-slate-800 tracking-tight" id="examTitle">---</p>
                </div>

                <div class="relative w-72 h-72 md:w-96 md:h-96 flex flex-col items-center justify-center mb-12">
                    <svg class="w-full h-full transform -rotate-90 filter drop-shadow-sm">
                        <circle cx="50%" cy="50%" r="44%" stroke="#fff1f2" stroke-width="8" fill="none" />
                        <circle id="progress" cx="50%" cy="50%" r="44%" stroke="#ffb7c5" stroke-width="8" fill="none" stroke-dasharray="1000" stroke-dashoffset="0" stroke-linecap="round" class="transition-all duration-1000" />
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <p id="timer" class="text-7xl md:text-8xl font-black text-slate-800 tracking-tighter font-mono">00:00</p>
                        <div class="mt-4 px-6 py-2 bg-white/60 backdrop-blur-sm rounded-full border border-pink-100 shadow-sm flex items-center gap-3">
                             <div id="dot" class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></div>
                             <p id="time-label" class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em]">Time Remaining</p>
                        </div>
                    </div>
                </div>

                <div class="w-full flex flex-col sm:flex-row gap-4 max-w-md">
                    <button onclick="togglePause()" id="pauseBtn" class="flex-[2] py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3">
                        ⏸️ <span id="pauseText">暂停 (PAUSE)</span>
                    </button>
                    <button onclick="confirmEnd()" class="flex-1 py-6 bg-slate-50 text-slate-400 font-bold rounded-3xl hover:bg-rose-50 hover:text-rose-400 transition-all shadow-sm text-sm uppercase tracking-widest">
                        End Now
                    </button>
                </div>
            </div>

            <!-- Result Section -->
            <div id="result" class="hidden w-full flex flex-col items-center animate-fade-in">
                <!-- Data injected here -->
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.4em] pb-12 animate-item no-print" style="animation-delay: 0.3s">
            Full-Spectrum Exam Experience Simulation Hub
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let totalSec = 0, remaining = 0, interval, paused = false;
        const DASH_ARRAY = 1000;

        function fmt(s){const m = Math.floor(s/60), sec = s%60; return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

        function setTime(min){
            if(!min || min <= 0){
                Utils.toast('请输入合理的时间哦 ⏱️', 'warning');
                return;
            }
            totalSec = min * 60;
            remaining = totalSec;
            paused = false;

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('exam').classList.remove('hidden');
            document.getElementById('examTitle').textContent = document.getElementById('examName').value.trim() || '全真模拟考试 (Session)';
            
            updateUI();
            interval = setInterval(tick, 1000);
            Utils.toast('考试已启动，祝笔耕不辍，考试顺利！✨', 'success');
        }

        function tick(){
            if(paused) return;
            remaining--;
            updateUI();
            
            if(remaining === 300) { // 5 minutes warning
                 Utils.toast('⚠️ 注意：考试仅剩最后 5 分钟！', 'warning');
                 document.getElementById('timer').classList.add('timer-warning');
            }

            if(remaining <= 0){
                clearInterval(interval);
                Utils.toast('🚨 考试时间到！请立即停止答题。', 'error');
                endExam();
            }
        }

        function updateUI() {
            document.getElementById('timer').textContent = fmt(remaining);
            const offset = DASH_ARRAY - (remaining / totalSec) * DASH_ARRAY;
            document.getElementById('progress').style.strokeDashoffset = isNaN(offset) ? 0 : offset;
        }

        function togglePause(){
            paused = !paused;
            const btn = document.getElementById('pauseBtn');
            const text = document.getElementById('pauseText');
            const dot = document.getElementById('dot');

            text.innerText = paused ? '继续 (RESUME)' : '暂停 (PAUSE)';
            btn.classList.toggle('bg-pink-400');
            btn.classList.toggle('bg-amber-400');
            dot.classList.toggle('animate-pulse');
            dot.classList.toggle('bg-amber-400');
            dot.classList.toggle('bg-pink-400');
            Utils.toast(paused ? '考试已暂停' : '考试继续');
        }

        function confirmEnd() {
            if(confirm('确定要提前结束本次模拟考试吗？')) {
                endExam();
            }
        }

        function endExam(){
            clearInterval(interval);
            const used = totalSec - remaining;
            const exam = document.getElementById('exam');
            const result = document.getElementById('result');
            
            exam.classList.add('hidden');
            result.classList.remove('hidden');
            
            const grade = used < totalSec * 0.5 ? "速战速决！⚡" : "从容不迫！💎";

            result.innerHTML = `
                <div class="p-12 md:p-16 bg-pink-50/10 rounded-[4rem] border-2 border-dashed border-pink-100 flex flex-col items-center mb-10 w-full relative overflow-hidden group">
                    <div class="absolute -right-8 -bottom-8 text-9xl opacity-5 pointer-events-none rotate-12">🏁</div>
                    <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center text-6xl mb-8 shadow-sm">🏁</div>
                    <h3 class="text-3xl md:text-5xl font-black text-pink-400 mb-2 tracking-tight">考试已结束</h3>
                    <p class="text-sm font-black text-slate-400 uppercase tracking-widest leading-loose mb-10">祝你在正式考试中取得佳绩！✨</p>
                    
                    <div class="w-full grid grid-cols-2 gap-6 max-w-lg">
                        <div class="p-6 bg-white/60 backdrop-blur-sm rounded-[2.5rem] border border-pink-50 shadow-sm flex flex-col items-center">
                             <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest mb-1">Time Used</span>
                             <span class="text-3xl font-black text-slate-800 font-mono italic">${fmt(used)}</span>
                        </div>
                        <div class="p-6 bg-white/60 backdrop-blur-sm rounded-[2.5rem] border border-pink-50 shadow-sm flex flex-col items-center">
                             <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest mb-1">Session Total</span>
                             <span class="text-3xl font-black text-slate-800 font-mono italic">${fmt(totalSec)}</span>
                        </div>
                    </div>
                </div>
                
                <div class="w-full p-8 bg-slate-50 border border-slate-100 rounded-[3rem] text-center mb-10">
                    <p class="text-xl font-bold text-slate-600">“${grade}”</p>
                </div>

                <button onclick="location.reload()" class="w-full max-w-sm py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3">
                    🔄 开启新模拟场次
                 </button>`;
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
