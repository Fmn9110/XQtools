<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫雷逻辑训练 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">扫雷逻辑强化训练</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">通过扫雷逻辑，锻炼你的分析能力与决策连贯性。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-full flex justify-between items-center mb-8 px-2 max-w-md">
                <div class="flex flex-col items-start">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest">Mines Remaining</p>
                    <p class="text-3xl font-black text-pink-400" id="mineCount">10</p>
                </div>
                <button onclick="init()" class="px-8 py-3 bg-pink-50 text-pink-500 rounded-3xl text-sm font-black border border-pink-100 hover:bg-pink-400 hover:text-white hover:shadow-lg transition-all transform active:scale-95">
                    🔄 NEW GAME
                </button>
                <div class="flex flex-col items-end">
                    <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest">Game Status</p>
                    <p id="status" class="text-3xl font-black transition-all">😊</p>
                </div>
            </div>

            <div class="bg-pink-50/20 p-5 md:p-8 rounded-[3rem] border-2 border-pink-50 shadow-inner group">
                <div id="board" class="inline-grid gap-1.5 md:gap-2 auto-cols-auto"></div>
            </div>
            
            <div class="mt-8 space-y-2">
                <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest flex items-center justify-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-pink-400 animate-pulse"></span>
                    Right click to flag 🚩 | Left click to reveal 💣
                </p>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const ROWS=9, COLS=9, MINES_TOTAL=10;
        let board, revealed, flagged, gameOver;

        function init(){
            board=[]; revealed=[]; flagged=[]; gameOver=false;
            document.getElementById('status').textContent='😊';
            document.getElementById('status').classList.remove('scale-150', 'rotate-12');
            document.getElementById('mineCount').textContent=MINES_TOTAL;
            
            for(let r=0;r<ROWS;r++){
                board[r]=[]; revealed[r]=[]; flagged[r]=[];
                for(let c=0;c<COLS;c++){board[r][c]=0; revealed[r][c]=false; flagged[r][c]=false;}
            }

            let placed=0;
            while(placed<MINES_TOTAL){
                const r=Math.floor(Math.random()*ROWS), c=Math.floor(Math.random()*COLS);
                if(board[r][c]!==-1){board[r][c]=-1; placed++;}
            }

            for(let r=0;r<ROWS;r++) {
                for(let c=0;c<COLS;c++) {
                    if(board[r][c]===-1) continue;
                    let cnt=0;
                    for(let dr=-1;dr<=1;dr++) {
                        for(let dc=-1;dc<=1;dc++) {
                            const nr=r+dr, nc=c+dc;
                            if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===-1) cnt++;
                        }
                    }
                    board[r][c]=cnt;
                }
            }
            render();
            Utils.toast('新挑战已就绪！💣');
        }

        const numColors=['', 'text-blue-500', 'text-green-500', 'text-rose-500', 'text-purple-600', 'text-amber-600', 'text-teal-600', 'text-slate-800', 'text-gray-500'];

        function render(){
            const el=document.getElementById('board');
            el.style.gridTemplateColumns=`repeat(${COLS}, minmax(0, 1fr))`;
            el.innerHTML='';
            for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
                const btn=document.createElement('button');
                btn.className='w-9 h-9 md:w-11 md:h-11 text-base md:text-lg font-black rounded-xl select-none transition-all duration-300 flex items-center justify-center shadow-sm border-2 ';
                
                if(revealed[r][c]){
                    if(board[r][c]===-1){
                        btn.className+='bg-rose-100 text-rose-500 border-rose-200 animate-bounce cursor-default';
                        btn.textContent='💣';
                    } else {
                        btn.className+='bg-white border-pink-50 ' + (numColors[board[r][c]] || 'text-slate-300');
                        btn.textContent=board[r][c] || '';
                    }
                } else if(flagged[r][c]){
                    btn.className+='bg-pink-400 text-white border-pink-500 shadow-md';
                    btn.textContent='🚩';
                } else {
                    btn.className+='bg-pink-50 border-pink-100 hover:bg-white hover:border-pink-200 cursor-pointer active:scale-90';
                }
                
                btn.onclick=()=>reveal(r,c);
                btn.oncontextmenu=e=>{e.preventDefault(); flag(r,c);};
                el.appendChild(btn);
            }
        }

        function reveal(r,c){
            if(gameOver||revealed[r][c]||flagged[r][c])return;
            revealed[r][c]=true;
            if(board[r][c]===-1){
                gameOver=true;
                document.getElementById('status').textContent='💀';
                document.getElementById('status').classList.add('scale-150');
                for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(board[rr][cc]===-1)revealed[rr][cc]=true;
                render();
                Utils.toast('Boom! 任务失败 💣', 'warning');
                return;
            }
            if(board[r][c]===0) {
                for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
                    const nr=r+dr,nc=c+dc;
                    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)reveal(nr,nc);
                }
            }
            render();
            checkWin();
        }

        function flag(r,c){
            if(gameOver||revealed[r][c])return;
            flagged[r][c]=!flagged[r][c];
            const cnt=flagged.flat().filter(Boolean).length;
            document.getElementById('mineCount').textContent=MINES_TOTAL-cnt;
            render();
        }

        function checkWin(){
            let unrevealedCount=0;
            for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!revealed[r][c])unrevealedCount++;
            if(unrevealedCount===MINES_TOTAL){
                gameOver=true;
                document.getElementById('status').textContent='🎉';
                document.getElementById('status').classList.add('scale-150', 'rotate-12');
                Utils.toast('完美通关！你是逻辑天才！✨', 'success');
            }
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    init();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
