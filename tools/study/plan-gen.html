<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习计划生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            nav, .cute-loader-overlay, .gen-btn, .input-section { display: none !important; }
            body { background: white !important; }
            .cute-card { box-shadow: none !important; border: 1px solid #eee !important; }
            #output { display: block !important; padding: 0 !important; border: none !important; background: transparent !important; }
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">AI 学习计划自动生成表</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">自定义复习周期与科目，一键生成属于你的提分清单。</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="input-section">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 text-left">
                    <div>
                        <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Plan Name 计划名称</label>
                        <input type="text" id="planName" value="期末冲刺挑战计划" class="w-full p-5 bg-slate-50 rounded-3xl border-2 border-slate-50 outline-none focus:border-pink-200 text-base font-bold shadow-inner text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Review Cycle 复习周期 (天)</label>
                        <input type="number" id="days" value="7" class="w-full p-5 bg-slate-50 rounded-3xl border-2 border-slate-50 outline-none focus:border-pink-200 text-base font-bold shadow-inner text-slate-700">
                    </div>
                </div>

                <div class="mb-10 text-left">
                    <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Subjects / Tasks 待攻克科目 (每行一个)</label>
                    <textarea id="subjects" class="w-full h-44 p-8 bg-slate-50 border-2 border-slate-50 rounded-[2.5rem] outline-none focus:border-pink-200 text-sm leading-relaxed shadow-inner resize-none font-medium" placeholder="英语语法&#10;数学解析几何&#10;物理力学复习&#10;语文古诗文"></textarea>
                </div>
                
                <button onclick="generate()" class="gen-btn w-full py-6 bg-pink-400 text-white font-black rounded-[2rem] shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl mb-12 flex items-center justify-center gap-3 group">
                    🚀 <span class="group-hover:tracking-widest transition-all">GENERATE MY PLAN</span>
                </button>
            </div>

            <!-- Output Section -->
            <div id="output" class="hidden text-left bg-pink-50/20 p-8 md:p-12 rounded-[3.5rem] border-2 border-dashed border-pink-100 animate-fade-in shadow-inner relative overflow-hidden">
                 <div class="absolute -right-16 -top-16 w-64 h-64 bg-white/40 rounded-full blur-3xl -z-10"></div>
                 
                 <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12 pb-6 border-b border-pink-100/50">
                    <div>
                        <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-1 leading-none">Curated Schedule</p>
                        <h2 id="outTitle" class="text-3xl font-black text-pink-500 tracking-tight">---</h2>
                    </div>
                    <button onclick="window.print()" class="px-8 py-3 bg-white text-pink-400 font-black rounded-2xl border-2 border-pink-100 shadow-sm hover:bg-pink-50 transition-all flex items-center gap-2 text-xs">🖨️ PRINT PLAN</button>
                 </div>

                 <div id="table" class="space-y-5">
                    <!-- Cards injected here -->
                 </div>

                 <div class="mt-12 text-center">
                    <p class="text-[10px] text-gray-300 font-black uppercase tracking-[0.4em]">Consistency is the key to mastery</p>
                 </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            Personal AI Productivity Suite
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function generate() {
            const subsText = document.getElementById('subjects').value.trim();
            if(!subsText) return Utils.toast('请输入至少一个科目哦 📚', 'warning');
            const subs = subsText.split('\n').filter(s => s.trim());
            const days = parseInt(document.getElementById('days').value);
            const name = document.getElementById('planName').value;

            if(isNaN(days) || days <= 0) return Utils.toast('请输入有效的复习周期 (天)', 'warning');

            const out = document.getElementById('output');
            const table = document.getElementById('table');
            const title = document.getElementById('outTitle');

            title.innerHTML = `📅 ${name}`;
            table.innerHTML = "";
            
            for(let i=1; i<=days; i++) {
                const sub = subs[(i-1) % subs.length];
                const delay = (i * 0.05).toFixed(2);
                
                table.innerHTML += `
                    <div class="flex items-center gap-6 p-6 bg-white rounded-[2rem] shadow-sm border border-pink-50 group hover:shadow-md hover:-translate-x-1 transition-all animate-fade-in" style="animation-delay: ${delay}s">
                         <div class="w-16 h-16 bg-pink-50/50 rounded-2xl flex flex-col items-center justify-center group-hover:bg-pink-400 transition-all duration-500 ring-2 ring-transparent group-hover:ring-pink-100">
                            <span class="text-[9px] font-black text-pink-300 uppercase leading-none mb-1 group-hover:text-white/60">Day</span>
                            <span class="text-2xl font-black text-pink-500 leading-none group-hover:text-white tracking-tighter">${i.toString().padStart(2, '0')}</span>
                         </div>
                         <div class="flex-1 min-w-0">
                            <h4 class="font-black text-slate-700 text-lg group-hover:text-pink-500 transition-colors uppercase truncate">${sub}</h4>
                            <div class="flex items-center gap-3 mt-1 opacity-40 group-hover:opacity-100 transition-opacity">
                                <span class="w-2 h-2 rounded-full bg-pink-300"></span>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Target Objective</p>
                            </div>
                         </div>
                         <div onclick="this.classList.toggle('bg-pink-400'); this.classList.toggle('border-pink-400')" class="w-8 h-8 border-2 border-pink-100 rounded-xl flex items-center justify-center text-white text-base hover:border-pink-300 transition-all cursor-pointer shadow-inner">✓</div>
                    </div>
                `;
            }

            out.classList.remove('hidden');
            Utils.toast('计划生成完成！加油哦！✨', 'success');
            
            // Scroll to output
            setTimeout(() => out.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('.w-8.h-8')) return; // Avoid double effect on interactive
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
