<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地理距离计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">经纬度距离计算器</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">输入两点的经纬度，精准计算它们之间的直线距离。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="space-y-6">
                <div>
                    <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-pink-400 animate-pulse"></span> 地点 A (起点)
                    </p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <input type="number" id="lat1" placeholder="纬度 (Lat)" step="0.0001" class="w-full p-4 pl-10 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all text-sm shadow-inner font-bold text-slate-600">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 text-xs font-bold">φ</span>
                        </div>
                        <div class="relative">
                            <input type="number" id="lng1" placeholder="经度 (Lng)" step="0.0001" class="w-full p-4 pl-10 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all text-sm shadow-inner font-bold text-slate-600">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 text-xs font-bold">λ</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center py-2">
                    <div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-pink-300 text-lg shadow-inner">📍</div>
                </div>

                <div>
                    <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-pink-400"></span> 地点 B (终点)
                    </p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <input type="number" id="lat2" placeholder="纬度 (Lat)" step="0.0001" class="w-full p-4 pl-10 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all text-sm shadow-inner font-bold text-slate-600">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 text-xs font-bold">φ</span>
                        </div>
                        <div class="relative">
                            <input type="number" id="lng2" placeholder="经度 (Lng)" step="0.0001" class="w-full p-4 pl-10 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 transition-all text-sm shadow-inner font-bold text-slate-600">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 text-xs font-bold">λ</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex flex-wrap gap-2 justify-center">
                <button onclick="fill(39.9042,116.4074,31.2304,121.4737)" class="px-4 py-2 bg-pink-50 text-pink-400 rounded-xl text-xs font-bold hover:bg-pink-100 transition-all border border-pink-100">北京 ↔ 上海</button>
                <button onclick="fill(39.9042,116.4074,35.6762,139.6503)" class="px-4 py-2 bg-pink-50 text-pink-400 rounded-xl text-xs font-bold hover:bg-pink-100 transition-all border border-pink-100">北京 ↔ 东京</button>
                <button onclick="fill(31.2304,121.4737,40.7128,-74.0060)" class="px-4 py-2 bg-pink-50 text-pink-400 rounded-xl text-xs font-bold hover:bg-pink-100 transition-all border border-pink-100">上海 ↔ 纽约</button>
            </div>

            <button onclick="calc()" class="w-full py-4 mt-8 bg-pink-400 text-white font-black rounded-2xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95">
                📏 立即计算距离
            </button>

            <div id="result" class="hidden mt-8 p-8 bg-pink-50/30 rounded-3xl border-2 border-dashed border-pink-100 text-center animate-fade-in">
                <p id="dist" class="text-4xl md:text-5xl font-black text-pink-500 mb-3 tracking-tighter"></p>
                <div id="detail" class="flex flex-wrap justify-center gap-4 text-[10px] font-black text-gray-400 uppercase tracking-widest opacity-60">
                    <!-- Conversion details -->
                </div>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function fill(a,b,c,d){
            document.getElementById('lat1').value=a;
            document.getElementById('lng1').value=b;
            document.getElementById('lat2').value=c;
            document.getElementById('lng2').value=d;
            Utils.toast('已加载预设坐标');
        }

        function calc(){
            const lat1=parseFloat(document.getElementById('lat1').value);
            const lng1=parseFloat(document.getElementById('lng1').value);
            const lat2=parseFloat(document.getElementById('lat2').value);
            const lng2=parseFloat(document.getElementById('lng2').value);
            
            if([lat1,lng1,lat2,lng2].some(isNaN)){
                Utils.toast('请填写完整的经纬度哦', 'warning');
                return;
            }

            const R=6371; // Earth radius in km
            const toRad=d=>d*Math.PI/180;
            const dLat=toRad(lat2-lat1);
            const dLng=toRad(lng2-lng1);
            const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
            const c2=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
            const dist=R*c2;

            document.getElementById('dist').textContent = dist.toFixed(2) + ' KM';
            document.getElementById('detail').innerHTML = `
                <span>≈ ${(dist*0.621371).toFixed(2)} ML (英里)</span>
                <span class="hidden md:inline">|</span>
                <span>≈ ${(dist/1.852).toFixed(2)} NM (海里)</span>
            `;
            document.getElementById('result').classList.remove('hidden');
            Utils.toast('计算完成', 'success');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
