<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>单位换算速查 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .unit-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .unit-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(244, 114, 182, 0.1); }
        .formula-line { font-family: 'JetBrains Mono', monospace; }
        .search-container:focus-within { transform: scale(1.02); }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">数理天平：单位换算工坊</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">物理参量，瞬间同步。在繁杂的度量衡中寻找秩序。📏</p>
        </header>

        <section class="max-w-xl mx-auto mb-16 px-4 no-print">
            <div class="search-container relative transition-all duration-500 animate-item" style="animation-delay: 0.2s">
                <input type="text" id="search" placeholder="检索单位... (如: 千米 / Pound / 升)" oninput="filter()" class="w-full p-6 pl-14 bg-white rounded-[2.5rem] shadow-xl shadow-pink-50/50 outline-none border-2 border-transparent focus:border-pink-50 font-black text-slate-700 placeholder:text-slate-300">
                <div class="absolute left-6 top-1/2 -translate-y-1/2 text-xl pointer-events-none">🔍</div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12" id="unitGrid">
            <!-- Dynamic Category Cards -->
        </section>
        
        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.5em] pb-12 animate-item">
            Metrological Precision & Dimensional Analysis Reference Suite
        </p>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const units = [
            { cat: '长度 (Length)', icon: '📏', color: 'pink', items: ['1 km = 1000 m', '1 m = 100 cm', '1 mile ≈ 1.609 km', '1 ft = 30.48 cm', '1 inch = 2.54 cm', '1 nmi = 1.852 km'] },
            { cat: '质量 (Mass)', icon: '⚖️', color: 'indigo', items: ['1 kg = 1000 g', '1 ton = 1000 kg', '1 lb ≈ 453.6 g', '1 oz ≈ 28.35 g', '1 斤 = 500 g', '1 kg ≈ 2.205 lb'] },
            { cat: '面积 (Area)', icon: '📐', color: 'rose', items: ['1 km² = 100 ha', '1 ha = 10,000 m²', '1 亩 ≈ 666.67 m²', '1 ft² ≈ 0.0929 m²', '1 acre ≈ 4046.8 m²'] },
            { cat: '体积 (Volume)', icon: '🧪', color: 'sky', items: ['1 L = 1000 mL', '1 m³ = 1000 L', '1 gal(美) ≈ 3.785 L', '1 gal(英) ≈ 4.546 L', '1 cup ≈ 236 mL'] },
            { cat: '温度 (Temp)', icon: '🌡️', color: 'orange', items: ['℃ = (℉-32) × 5/9', '℉ = ℃ × 9/5 + 32', 'K = ℃ + 273.15', '100℃ = 212℉ (沸点)', '0℃ = 32℉ (冰点)'] },
            { cat: '时间 (Time)', icon: '⏳', color: 'slate', items: ['1 day = 24 h', '1 h = 60 min = 3600 s', '1 yr ≈ 365.25 days', '1 wk = 168 hours', '1 fortnight = 14 days'] },
            { cat: '速度 (Speed)', icon: '🏎️', color: 'emerald', items: ['1 m/s = 3.6 km/h', '1 mph ≈ 1.609 km/h', '1 knot ≈ 1.852 km/h', 'Mach 1 ≈ 1225 km/h'] },
            { cat: '数据 (Data)', icon: '💾', color: 'blue', items: ['1 KB = 1024 B', '1 MB = 1024 KB', '1 GB = 1024 MB', '1 TB = 1024 GB', '1 Petabyte = 1024 TB'] }
        ];

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('unitGrid');
            const filtered = q ? units.map(u => ({
                ...u,
                items: u.items.filter(i => i.toLowerCase().includes(q) || u.cat.toLowerCase().includes(q))
            })).filter(u => u.items.length) : units;

            grid.innerHTML = filtered.map(u => `
                <div class="unit-card p-10 bg-white rounded-[3rem] border border-slate-50 text-left flex flex-col group animate-fade-in shadow-sm">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-14 h-14 bg-${u.color}-50 rounded-2xl flex items-center justify-center text-2xl shadow-sm rotate-3 group-hover:rotate-0 transition-transform">${u.icon}</div>
                        <div>
                            <h3 class="text-${u.color}-400 font-extrabold text-sm uppercase tracking-widest leading-none">${u.cat}</h3>
                            <p class="text-[9px] text-slate-300 font-black uppercase mt-1 tracking-tight">Dimensional Alignment</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${u.items.map(i => `
                            <div class="formula-line p-4 bg-slate-50/50 rounded-2xl border border-transparent hover:border-${u.color}-100 hover:bg-white transition-all text-[11px] font-bold text-slate-600 flex justify-between items-center group-line cursor-default">
                                <span>${i}</span>
                                <span class="opacity-0 group-hover-line:opacity-100 transition-opacity text-[8px] text-${u.color}-300">#METRIC</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Init
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    filter();
                }, 500);
            }
        });

        document.addEventListener('click', (e) => {
            if(e.target.closest('input')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
