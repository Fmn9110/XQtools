<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>基础概率统计 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">基础概率与统计分析</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">快速计算均值、标准差、中位数等统计指标，助力科研与学习。</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="mb-8 text-left relative group">
                <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Digital Dataset 输入数据集 (空格或逗号分隔)</label>
                <textarea id="data" class="w-full h-44 p-8 bg-slate-50 border-2 border-slate-50 rounded-[2.5rem] outline-none focus:border-pink-200 focus:bg-white transition-all text-lg font-bold shadow-inner resize-none text-slate-700 font-mono" placeholder="例如 23, 45, 12, 67, 34..."></textarea>
                <button onclick="document.getElementById('data').value=''" class="absolute right-6 top-12 text-[10px] font-black text-gray-300 hover:text-rose-400 transition-colors uppercase tracking-widest bg-white/50 px-3 py-1 rounded-full opacity-0 group-hover:opacity-100">Clear</button>
            </div>
            
            <button onclick="calc()" class="w-full py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl mb-14 flex items-center justify-center gap-3">
                🚀 开始统计分析 (ANALYZE)
            </button>

            <!-- Major Results -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-left mb-10" id="results">
                 <div class="p-8 bg-pink-50/20 border border-pink-50 rounded-[2.5rem] shadow-sm group hover:bg-white transition-all hover:shadow-md relative overflow-hidden">
                     <div class="absolute -right-4 -top-4 text-4xl opacity-5 group-hover:opacity-10 transition-opacity">📈</div>
                     <p class="text-[10px] text-pink-300 font-black uppercase tracking-widest mb-2 leading-none">平均数 Avg</p>
                     <p id="avg" class="text-3xl font-black text-slate-800 tracking-tighter">-</p>
                 </div>
                 <div class="p-8 bg-white border border-pink-50 rounded-[2.5rem] shadow-sm transform transition-all hover:scale-105 hover:z-10 relative overflow-hidden group">
                     <div class="absolute -right-4 -top-4 text-4xl opacity-5">🔝</div>
                     <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-2 leading-none">最大值 Max</p>
                     <p id="max" class="text-3xl font-black text-slate-800 tracking-tighter">-</p>
                 </div>
                 <div class="p-8 bg-white border border-pink-50 rounded-[2.5rem] shadow-sm transform transition-all hover:scale-105 hover:z-10 relative overflow-hidden group">
                     <div class="absolute -right-4 -top-4 text-4xl opacity-5">⬇️</div>
                     <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-2 leading-none">最小值 Min</p>
                     <p id="min" class="text-3xl font-black text-slate-800 tracking-tighter">-</p>
                 </div>
                 <div class="p-8 bg-pink-50/40 border border-pink-100/50 rounded-[2.5rem] shadow-sm group hover:bg-white transition-all hover:shadow-md relative overflow-hidden">
                     <div class="absolute -right-4 -top-4 text-4xl opacity-5 group-hover:opacity-10 transition-opacity">📊</div>
                     <p class="text-[10px] text-pink-300 font-black uppercase tracking-widest mb-2 leading-none">标准差 Std</p>
                     <p id="std" class="text-3xl font-black text-slate-800 tracking-tighter">-</p>
                 </div>
            </div>
            
            <div id="extended-results" class="hidden mt-8 p-10 bg-slate-50/50 rounded-[3.5rem] border border-slate-100 grid grid-cols-2 md:grid-cols-3 gap-8 text-left animate-fade-in relative">
                 <div class="absolute -right-4 top-1/2 -translate-y-1/2 text-5xl opacity-5 pointer-events-none">🔢</div>
                <div>
                     <p class="text-[10px] text-slate-300 font-black uppercase tracking-widest mb-1">中位数 Median</p>
                     <p id="median" class="text-xl font-black text-slate-600">-</p>
                </div>
                <div>
                     <p class="text-[10px] text-slate-300 font-black uppercase tracking-widest mb-1">样本量 Count (N)</p>
                     <p id="count" class="text-xl font-black text-slate-600">-</p>
                </div>
                <div class="col-span-2 md:col-span-1">
                     <p class="text-[10px] text-slate-300 font-black uppercase tracking-widest mb-1">极差 Range</p>
                     <p id="range" class="text-xl font-black text-slate-600">-</p>
                </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            Computational Statistics & Insight Hub
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function calc() {
            const raw = document.getElementById('data').value;
            const nums = raw.split(/[\s,，]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
            
            if(nums.length === 0) {
                Utils.toast('请输入有效数值哦 🔢', 'warning');
                return;
            }

            // Statistics logic
            const count = nums.length;
            const sorted = [...nums].sort((a, b) => a - b);
            const sum = nums.reduce((a, b) => a + b, 0);
            const avg = sum / count;
            const max = sorted[count - 1];
            const min = sorted[0];
            const range = max - min;
            
            // Standard deviation
            const sqDiffs = nums.map(n => Math.pow(n - avg, 2));
            const avgSqDiff = sqDiffs.reduce((a, b) => a + b, 0) / count;
            const std = Math.sqrt(avgSqDiff);
            
            // Median
            const middle = Math.floor(count / 2);
            const median = count % 2 !== 0 ? sorted[middle] : (sorted[middle - 1] + sorted[middle]) / 2;

            // Update UI
            animateTo('avg', avg);
            animateTo('std', std);
            document.getElementById('max').innerText = max % 1 === 0 ? max : max.toFixed(4).replace(/\.?0+$/, '');
            document.getElementById('min').innerText = min % 1 === 0 ? min : min.toFixed(4).replace(/\.?0+$/, '');
            document.getElementById('median').innerText = median % 1 === 0 ? median : median.toFixed(4).replace(/\.?0+$/, '');
            document.getElementById('count').innerText = count;
            document.getElementById('range').innerText = range % 1 === 0 ? range : range.toFixed(4).replace(/\.?0+$/, '');

            document.getElementById('extended-results').classList.remove('hidden');
            Utils.toast('统计分析完成 ✨', 'success');
        }

        function animateTo(id, val) {
             const el = document.getElementById(id);
             const target = parseFloat(val);
             let current = 0;
             const step = target / 20;
             const inv = setInterval(() => {
                 current += step;
                 if(current >= target) {
                     el.innerText = target % 1 === 0 ? target : target.toFixed(4).replace(/\.?0+$/, '');
                     clearInterval(inv);
                 } else {
                     el.innerText = current.toFixed(2);
                 }
             }, 20);
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
