<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阅读计时 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .timer-spin { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .timer-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">深度阅读时长观测台</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">沉浸于书海，记录每一段心流时刻。📖</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-full mb-10 text-left relative group">
                <label class="block text-[10px] font-black text-pink-300 mb-3 uppercase tracking-[0.2em] pl-4">Reading Object 正在阅读的书目</label>
                <input type="text" id="bookName" placeholder="例如：白夜行" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all text-center font-bold shadow-inner text-slate-700">
            </div>

            <div class="relative w-72 h-72 md:w-85 md:h-85 flex flex-col items-center justify-center mb-12 group">
                <!-- Decorative Spinning Border -->
                <div id="spinner" class="absolute inset-0 bg-pink-50/10 rounded-full border-2 border-dashed border-pink-100 opacity-0 transition-opacity duration-700 pointer-events-none"></div>
                <div class="absolute inset-4 bg-white rounded-full shadow-inner border border-slate-50"></div>
                
                <div class="relative z-10 flex flex-col items-center">
                    <p id="display" class="text-6xl md:text-7xl font-black text-slate-800 tracking-tighter font-mono">00:00:00</p>
                    <div id="statusWrap" class="mt-4 px-4 py-1.5 bg-slate-50 rounded-full border border-slate-100 flex items-center gap-2 opacity-60">
                         <span id="dot" class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span>
                         <p id="status" class="text-[10px] text-slate-300 font-black uppercase tracking-[0.3em]">Session Inactive</p>
                    </div>
                </div>
            </div>

            <div class="w-full flex flex-col sm:flex-row gap-4 mb-10">
                 <button id="toggleBtn" onclick="toggle()" class="flex-[3] py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3">
                    ▶️ <span id="toggleText">开始计时 (START)</span>
                 </button>
                 <button onclick="reset()" class="flex-1 py-6 bg-slate-100 text-slate-400 font-black rounded-3xl hover:bg-slate-200 transition-all shadow-sm text-2xl flex items-center justify-center" title="重置">
                    🔄
                 </button>
            </div>

            <button onclick="saveRecord()" class="w-full max-w-sm py-5 bg-white border-2 border-pink-50 text-pink-400 font-black rounded-3xl hover:bg-pink-50 hover:border-pink-100 transition-all shadow-sm text-sm uppercase tracking-[0.2em] mb-14">
                💾 保存本节录入 (SAVE SESSION)
            </button>

            <!-- History Section -->
            <div class="text-left w-full pt-10 border-t border-slate-50">
                <div class="flex items-center justify-between mb-8">
                    <h3 id="stats-header" class="text-[10px] font-black text-pink-300 uppercase tracking-[0.4em] flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span> Reading Logs
                    </h3>
                    <button onclick="clearHistory()" class="text-[9px] font-black text-slate-300 hover:text-rose-400 transition-colors uppercase tracking-widest pl-2">Reset History</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="records">
                    <!-- History items -->
                </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            Continuous Learning & Mindfulness Tracker
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let elapsed = 0, running = false, interval;
        let records = JSON.parse(localStorage.getItem('qReadingTimer') || '[]');

        function fmt(s){
            const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = s % 60;
            return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
        }

        function toggle(){
            const btn = document.getElementById('toggleBtn');
            const text = document.getElementById('toggleText');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');
            const dot = document.getElementById('dot');
            const wrap = document.getElementById('statusWrap');

            if(running){
                clearInterval(interval);
                running = false;
                text.innerText = '继续阅读 (RESUME)';
                btn.classList.replace('bg-rose-400', 'bg-pink-400');
                spinner.classList.replace('opacity-100', 'opacity-0');
                spinner.classList.remove('timer-spin');
                status.innerText = 'Session Paused';
                dot.classList.remove('animate-pulse', 'bg-pink-400');
                dot.classList.add('bg-slate-300');
                wrap.classList.add('opacity-60');
            } else {
                interval = setInterval(() => {
                    elapsed++;
                    document.getElementById('display').textContent = fmt(elapsed);
                }, 1000);
                running = true;
                text.innerText = '暂停阅读 (PAUSE)';
                btn.classList.replace('bg-pink-400', 'bg-rose-400');
                spinner.classList.replace('opacity-0', 'opacity-100');
                spinner.classList.add('timer-spin');
                status.innerText = 'Now Reading...';
                dot.classList.add('animate-pulse', 'bg-pink-400');
                dot.classList.remove('bg-slate-300');
                wrap.classList.remove('opacity-60');
            }
        }

        function reset(){
            if(elapsed > 0 && !confirm('确定要放弃当前计时吗？')) return;
            clearInterval(interval);
            running = false;
            elapsed = 0;
            document.getElementById('display').textContent = '00:00:00';
            const btn = document.getElementById('toggleBtn');
            const text = document.getElementById('toggleText');
            text.innerText = '开始计时 (START)';
            btn.classList.replace('bg-rose-400', 'bg-pink-400');
            document.getElementById('spinner').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('spinner').classList.remove('timer-spin');
            document.getElementById('status').innerText = 'Session Inactive';
            document.getElementById('statusWrap').classList.add('opacity-60');
            document.getElementById('dot').classList.remove('animate-pulse', 'bg-pink-400');
        }

        function saveRecord(){
            if(!elapsed) {
                Utils.toast('计时尚未开始哦 ⏱️', 'warning');
                return;
            }
            const book = document.getElementById('bookName').value.trim() || '未命名书籍';
            records.unshift({
                book, 
                duration: elapsed, 
                time: fmt(elapsed), 
                date: new Date().toLocaleDateString(),
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            localStorage.setItem('qReadingTimer', JSON.stringify(records));
            Utils.toast('阅读记录已同步 ✨', 'success');
            renderRecords();
            reset();
        }

        function renderRecords(){
            const totalSec = records.reduce((s, r) => s + r.duration, 0);
            const statsHeader = document.getElementById('stats-header');
            if(records.length > 0) {
                statsHeader.innerHTML = `Reading Logs <span class="ml-2 px-2 py-0.5 bg-pink-50 text-pink-300 rounded text-[8px] font-black">TOTAL: ${fmt(totalSec)}</span>`;
            }

            const recEl = document.getElementById('records');
            if(records.length === 0) {
                recEl.innerHTML = '<div class="col-span-2 p-10 bg-slate-50/50 rounded-3xl text-center text-gray-300 italic text-sm border border-dashed border-slate-100">还没有记录哦，开始你的深度阅读之旅吧 📖</div>';
                return;
            }

            recEl.innerHTML = records.slice(0, 6).map(r => `
                <div class="p-6 bg-white border border-pink-50 rounded-[2.5rem] flex justify-between items-center animate-fade-in group hover:bg-pink-50/20 transition-all shadow-sm border-l-4 border-l-pink-100 hover:border-l-pink-400">
                    <div class="flex flex-col gap-1">
                        <p class="font-black text-slate-700 text-sm tracking-tight truncate max-w-[140px]">📖 ${r.book}</p>
                        <p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest leading-none">${r.date} · ${r.timestamp}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-pink-400 tracking-tighter leading-none mb-1">${r.time}</p>
                        <span class="text-[7px] font-black text-pink-200 uppercase tracking-widest pl-1">Duration</span>
                    </div>
                </div>
            `).join('');
        }
        
        function clearHistory() {
            if(confirm('确定要清空所有阅读记录吗？')) {
                records = [];
                localStorage.removeItem('qReadingTimer');
                renderRecords();
                Utils.toast('记录已清空 📎');
            }
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    renderRecords();
                }, 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
