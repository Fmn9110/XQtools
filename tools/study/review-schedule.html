<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艾宾浩斯复习计划 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @media print { .no-print { display: none; } body { background: white; } .cute-card { box-shadow: none; border: 1px solid #eee; } }
        .timeline-line::before { content: ''; position: absolute; left: 1.25rem; top: 0; bottom: 0; width: 2px; background: #fff1f2; z-index: 0; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12 no-print">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">艾宾浩斯科学复习规划</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic">对抗遗忘，建立稳固的长期记忆。基于 1, 2, 4, 7, 15, 30 天遗忘规律优化。</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-10 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 text-left no-print">
                <div class="relative group">
                    <label class="block text-[10px] font-black text-pink-300 mb-2 uppercase tracking-[0.2em] pl-4">Subject 主题名称</label>
                    <input type="text" id="content" placeholder="例如：考研词汇 Unit 1" class="w-full p-4 bg-slate-50 rounded-[1.5rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white text-sm font-bold shadow-inner text-slate-700 transition-all">
                </div>
                <div class="relative group">
                    <label class="block text-[10px] font-black text-pink-300 mb-2 uppercase tracking-[0.2em] pl-4">Initial Date 学习日期</label>
                    <input type="date" id="startDate" class="w-full p-4 bg-slate-50 rounded-[1.5rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white text-sm font-bold shadow-inner text-slate-700 transition-all cursor-pointer">
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 mb-12 no-print">
                 <button onclick="generate()" class="flex-[3] py-5 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3">
                    📅 生成复习计划 (GENERATE)
                 </button>
                 <button onclick="window.print()" class="flex-1 py-5 bg-white border-2 border-pink-50 text-pink-400 font-black rounded-3xl hover:bg-pink-50 transition-all shadow-sm text-sm uppercase tracking-widest">
                    Print 🖨️
                 </button>
            </div>

            <!-- Dynamic Timline -->
            <div class="text-left relative py-4">
                <div id="schedule" class="space-y-6 timeline-line relative">
                    <!-- Schedule items -->
                </div>
            </div>
        </section>
        
        <section class="cute-card p-8 mb-12 bg-pink-50/10 border-2 border-dashed border-pink-50 animate-item no-print" style="animation-delay: 0.3s">
            <h2 class="text-[10px] font-black text-pink-300 uppercase tracking-[0.4em] mb-6 flex items-center gap-2">
                <span class="w-3 h-3 bg-pink-400 rounded-full"></span> Memory Intervals (艾宾浩斯核心周期)
            </h2>
            <div class="flex flex-wrap items-center gap-2 md:gap-4 overflow-x-auto pb-4 no-scrollbar">
                 <div class="flex items-center gap-2">
                    <span class="px-4 py-2 bg-white border border-pink-100 rounded-2xl text-[10px] font-black text-slate-600 shadow-sm">当天</span>
                    <span class="text-pink-200">➡️</span>
                 </div>
                 <div class="flex items-center gap-2">
                    <span class="px-4 py-2 bg-white border border-pink-100 rounded-2xl text-[10px] font-black text-slate-600 shadow-sm">1天后</span>
                    <span class="text-pink-200">➡️</span>
                 </div>
                 <div class="flex items-center gap-2">
                    <span class="px-4 py-2 bg-white border border-pink-100 rounded-2xl text-[10px] font-black text-slate-600 shadow-sm">2天后</span>
                    <span class="text-pink-200">➡️</span>
                 </div>
                 <div class="flex items-center gap-2">
                    <span class="px-4 py-2 bg-white border border-pink-100 rounded-2xl text-[10px] font-black text-slate-600 shadow-sm">4天后</span>
                    <span class="text-pink-200">➡️</span>
                 </div>
                 <div class="flex items-center gap-2">
                    <span class="px-4 py-2 bg-white border border-pink-100 rounded-2xl text-[10px] font-black text-slate-600 shadow-sm">7天后</span>
                    <span class="text-pink-200">➡️</span>
                 </div>
                 <div class="flex items-center gap-2">
                    <span class="px-4 py-2 bg-white border border-pink-100 rounded-2xl text-[10px] font-black text-slate-600 shadow-sm">15天后</span>
                    <span class="text-pink-200">➡️</span>
                 </div>
                 <div class="flex items-center gap-2">
                    <span class="px-4 py-2 bg-white border border-pink-100 rounded-2xl text-[10px] font-black text-slate-600 shadow-sm">30天后</span>
                 </div>
            </div>
        </section>

        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item no-print" style="animation-delay: 0.4s">
            Cognitive Science & Memory Optimization Hub
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const intervals = [0, 1, 2, 4, 7, 15, 30];
        const labels = [
            '阶段一：[学习当天] 录入信息',
            '阶段二：[24小时后] 初次加固',
            '阶段三：[2天后] 建立关联',
            '阶段四：[4天后] 深度融合',
            '阶段五：[7天后] 潜意识整合',
            '阶段六：[15天后] 长期记忆形成',
            '阶段七：[30天后] 永恒印记建立'
        ];
        
        function generate(){
            const content = document.getElementById('content').value.trim() || '未命名计划主题';
            const start = document.getElementById('startDate').value;
            if(!start){
                Utils.toast('请选择一个开始日期哦 📅', 'warning');
                return;
            }
            
            const base = new Date(start + 'T00:00:00');
            const today = new Date(); today.setHours(0,0,0,0);
            
            let html = `<div class="mb-10 pl-14">
                <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest leading-none mb-2">Selected Subject</p>
                <h4 class="text-2xl font-black text-slate-800 tracking-tight">“${content}”</h4>
            </div>`;
            
            intervals.forEach((d, i) => {
                const date = new Date(base); date.setDate(date.getDate() + d);
                const dateStr = date.toLocaleDateString('zh-CN', {month: 'long', day: 'numeric', weekday: 'short'});
                const isPast = date < today; 
                const isToday = date.toDateString() === today.toDateString();
                
                html += `
                <div class="p-6 ${isToday ? 'bg-pink-100/30 border-l-8 border-pink-400 shadow-lg scale-[1.03]' : 'bg-slate-50/50 border-l-4 border-slate-100'} rounded-r-[2rem] rounded-l-lg flex justify-between items-center transition-all animate-fade-in group relative z-10 hover:bg-white hover:shadow-md">
                    <div class="flex items-center gap-6">
                         <div class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-black ${isPast ? 'bg-green-100 text-green-500' : 'bg-white text-pink-400'} shadow-sm border border-pink-50 shrink-0">${i + 1}</div>
                         <div class="flex flex-col gap-1">
                             <span class="text-base font-black ${isToday ? 'text-pink-600' : 'text-slate-700'} ${isPast ? 'line-through opacity-30 select-none' : ''} transition-colors tracking-tight">${labels[i]}</span>
                             <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest opacity-60">Scheduled Date:</span>
                                <p class="text-[10px] font-bold text-gray-400 leading-none">${dateStr}</p>
                             </div>
                         </div>
                    </div>
                    <div class="shrink-0 ml-4">
                         ${isToday ? '<span class="px-5 py-2 bg-pink-500 text-white text-[9px] font-black rounded-full shadow-lg border border-pink-400 animate-pulse uppercase tracking-widest">📌 Today Mission</span>' : 
                           isPast ? '<span class="flex items-center gap-1.5 text-[9px] font-black text-green-400 uppercase tracking-widest"><span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span> ✅ 已完成</span>' : 
                           '<span class="px-4 py-2 bg-slate-200 text-slate-500 text-[9px] font-black rounded-full opacity-50 uppercase tracking-widest">Pending</span>'}
                    </div>
                </div>`;
            });
            
            document.getElementById('schedule').innerHTML = html;
            Utils.toast('科学复习计划已生成 ✨', 'success');
        }

        document.getElementById('startDate').value = new Date().toISOString().slice(0, 10);

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
