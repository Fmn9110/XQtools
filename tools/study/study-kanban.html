<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>任务看板 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .portal-pulse { animation: portal-pulse 3s infinite; }
        @keyframes portal-pulse { 0% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(244, 114, 182, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); } }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-xl text-center min-h-[80vh] flex flex-col items-center justify-center">
        <section class="cute-card p-12 md:p-16 bg-white shadow-2xl animate-item flex flex-col items-center relative overflow-hidden">
            <!-- Background Decoration -->
            <div class="absolute -top-12 -right-12 w-40 h-40 bg-pink-50 rounded-full blur-3xl opacity-50"></div>
            
            <div class="w-24 h-24 bg-pink-50 rounded-[2.5rem] flex items-center justify-center text-5xl mb-10 shadow-sm relative z-10 portal-pulse">
                📋
            </div>
            
            <h1 class="text-3xl md:text-4xl font-black text-gray-800 mb-6 tracking-tight relative z-10">任务看板控制台</h1>
            
            <div class="p-8 bg-slate-50/50 rounded-[2.5rem] border border-slate-100 mb-10 text-left relative z-10">
                <p class="text-[10px] font-black text-pink-300 uppercase tracking-[0.2em] mb-3">System Intelligence Update</p>
                <p class="text-sm text-slate-500 font-bold leading-relaxed">
                    为了提供更卓越的生产力管理体验，系统已将看板功能深度集成至<br>
                    <span class="inline-block px-3 py-1 bg-pink-100 text-pink-500 rounded-full mt-2 font-black">“全能待办清单” 控制中心</span>
                </p>
            </div>
            
            <button onclick="location.href='./todo-list.html'" class="w-full py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3 relative z-10">
                前往待办中心 (GO CENTER) 🚀
            </button>
            
            <div class="mt-8 flex items-center gap-2 opacity-40">
                <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">Module Redirection Protocol Active</p>
            </div>
        </section>
        
        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.4em] pb-12 mt-12 animate-item" style="animation-delay: 0.2s">
            Integrated Productivity Dashboard & Flow Control Engine
        </p>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        // Initial setup
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
