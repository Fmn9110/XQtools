<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自律契约 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        .parchment { background: radial-gradient(circle, #fffdf9 0%, #fffbf0 100%); position: relative; }
        .red-seal { 
            position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px;
            border: 4px solid #f43f5e; color: #f43f5e; border-radius: 12px;
            transform: rotate(-15deg); font-family: 'ZCOOL XiaoWei', serif;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; opacity: 0.6; pointer-events: none;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.1);
        }
        @media print { .no-print { display: none !important; } .cute-card { box-shadow: none !important; padding: 0 !important; } }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-12 no-print">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">自律承诺协议生成系统</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">以文字之重，镌刻自强之心。让仪式感助你攻克拖延。📜</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item flex flex-col items-center" style="animation-delay: 0.2s">
            <div class="w-full space-y-8 mb-10 text-left no-print">
                <div class="group">
                    <label class="block text-[10px] font-black text-pink-300 mb-2 uppercase tracking-[0.2em] pl-4">Contractor Name 立约人姓名</label>
                    <input type="text" id="name" placeholder="请输入你的姓名" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all font-bold shadow-inner text-slate-700">
                </div>
                <div class="group">
                    <label class="block text-[10px] font-black text-pink-300 mb-2 uppercase tracking-[0.2em] pl-4">Sacred Goals 自律核心目标</label>
                    <textarea id="goals" rows="4" placeholder="我的坚守目标（一行一个）&#10;1. 每日深度专注至少 4 小时&#10;2. 严格遵循 23:00 熄灯准则&#10;3. 每周完成两次总结反思" class="w-full p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all font-bold shadow-inner text-slate-700 resize-none leading-relaxed"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="group">
                        <label class="block text-[10px] font-black text-pink-300 mb-2 uppercase tracking-[0.2em] pl-4">Duration (Days) 誓约周期</label>
                        <input type="number" id="days" placeholder="坚持天数" value="30" class="w-full p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-50 outline-none focus:border-pink-100 focus:bg-white transition-all font-bold shadow-inner text-slate-700">
                    </div>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-4 w-full justify-center mb-12 no-print">
                 <button onclick="gen()" class="flex-1 min-w-[200px] py-6 bg-pink-400 text-white font-black rounded-3xl shadow-xl hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3">
                    📜 生成正式契约 (GENERATE)
                 </button>
                 <button onclick="document.getElementById('goals').value=''; document.getElementById('name').value=''" class="px-8 py-6 bg-slate-50 text-slate-400 font-bold rounded-3xl hover:bg-slate-100 transition-all text-sm uppercase tracking-widest">Clear</button>
            </div>

            <div id="contractWrap" class="hidden w-full animate-fade-in relative group">
                <div id="contract" class="p-10 md:p-20 parchment border-[12px] border-double border-pink-100 rounded-[4rem] shadow-xl text-left relative overflow-hidden" style="font-family: 'ZCOOL XiaoWei', serif;">
                    <!-- Content injected here -->
                </div>
                
                <div class="mt-8 flex flex-col sm:flex-row gap-4 no-print">
                    <button onclick="window.print()" class="flex-1 py-5 bg-pink-400 text-white font-black rounded-2xl shadow-lg hover:bg-pink-500 transition-all transform hover:-translate-y-1 active:scale-95 text-lg flex items-center justify-center gap-3">
                        🖨️ 打印契约书 (PRINT)
                    </button>
                    <button onclick="Utils.toast('长按页面或右键另存为图片即可保存 ✨', 'info')" class="flex-1 py-5 bg-white border-2 border-pink-50 text-pink-400 font-black rounded-2xl hover:bg-pink-50 transition-all text-lg">
                        📸 保存为截图 (SAVE)
                    </button>
                </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.4em] pb-12 animate-item no-print" style="animation-delay: 0.3s">
            Personal Sovereignty & Behavioral Integrity System
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function gen(){
            const name = document.getElementById('name').value.trim() || '佚名';
            const goals = document.getElementById('goals').value.split('\n').filter(Boolean);
            const days = parseInt(document.getElementById('days').value) || 30;
            
            if(!goals.length){
                Utils.toast('请至少写下一个目标哦 ✍️', 'warning');
                return;
            }
            
            const start = new Date();
            const startStr = start.toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'});
            const end = new Date(Date.now() + days * 86400000);
            const endStr = end.toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'});
            
            const contract = document.getElementById('contract');
            contract.innerHTML=`
                <div class="contract-inner-wrap relative">
                    <div class="absolute top-0 right-0 w-48 h-48 bg-pink-100/10 rounded-full -mr-24 -mt-24 pointer-events-none"></div>
                    <div class="absolute bottom-0 left-0 w-32 h-32 bg-pink-50/20 rounded-full -ml-16 -mb-16 pointer-events-none"></div>
                    
                    <h2 class="text-center text-4xl md:text-5xl font-black text-pink-500 mb-12 tracking-[0.5em] border-b-2 border-pink-50 pb-8 uppercase">自律承诺契约</h2>
                    
                    <div class="space-y-8 text-slate-700 text-xl md:text-2xl leading-[2.5]">
                        <p>
                            兹有立约人 <b class="text-slate-900 border-b-2 border-pink-200 px-4">${name}</b>，心怀高远之志，有感于时光之重，愿以此约自律；
                        </p>
                        
                        <p>
                            余自愿从 <b class="text-slate-800">${startStr}</b> 起，横跨 <b class="text-pink-500">${days}</b> 昼夜（至 <b class="text-slate-800">${endStr}</b>），秉持孤勇，笃行如下目标：
                        </p>
                        
                        <div class="py-10 px-8 bg-white/40 rounded-[3rem] border border-pink-50/50 shadow-inner">
                            <ul class="space-y-8">
                                ${goals.map(g => `<li class="flex items-start gap-4"><span class="text-pink-400 mt-2 shrink-0">✦</span> <span class="text-slate-800">${g}</span></li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="pt-8 border-t-2 border-dashed border-pink-50/50">
                            <p class="text-slate-400 text-base italic leading-relaxed">
                                “夫学须志也，才须学也。非学无以广才，非志无以成学。若违此约，愿受自我反省之责，以此为戒，砥砺前行。”
                            </p>
                        </div>
                    </div>
                    
                    <div class="mt-20 flex flex-col items-end relative">
                        <div class="text-right z-10">
                            <p class="text-[10px] text-slate-300 font-bold uppercase tracking-[0.4em] mb-2">Signature & Seal</p>
                            <span class="text-5xl font-black text-slate-800 italic drop-shadow-sm tracking-tight pr-4">${name}</span>
                            <p class="text-slate-400 text-xs mt-4 font-mono font-bold tracking-widest leading-none">${new Date().toISOString().split('T')[0]}</p>
                        </div>
                        <!-- Red Seal Effect -->
                        <div class="red-seal p-4 rotate-[-12deg] mr-2 text-xl border-dashed border-2 flex flex-col leading-none">
                            <span>自律</span>
                            <span>印章</span>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('contractWrap').classList.remove('hidden');
            Utils.toast('正式契约已拟定 ✨', 'success');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            if(e.target.closest('button')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
