<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加权成绩计算器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        .input-row { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-row:focus-within { transform: translateX(5px); }
        .score-pill { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .gauge-container { background: radial-gradient(circle at center, rgba(99, 102, 241, 0.05) 0%, transparent 70%); }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">绩点罗盘：加权成绩计算</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">多维评分机制，精准模型推演。掌控你的每一份学业产出。📊</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div class="mb-10 flex justify-between items-end px-4">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Assessment Portfolio (测评矩阵)</p>
                <div id="weightSummary" class="text-[10px] font-black text-slate-300 uppercase tracking-widest px-4 py-1.5 rounded-full bg-slate-50 transition-colors">
                    Weight: 0% / 100%
                </div>
            </div>

            <div id="items" class="space-y-4 mb-10">
                <div class="flex gap-4 items-center px-4 font-black text-[9px] text-slate-300 uppercase tracking-widest mb-2 no-print">
                    <div class="w-1/2 text-left">Module / Component</div>
                    <div class="w-1/4">Score</div>
                    <div class="w-1/4">Weight %</div>
                    <div class="w-10"></div>
                </div>
                <!-- Rows injected here -->
            </div>
            
            <button onclick="addItem()" class="w-full py-5 bg-slate-50 rounded-3xl text-slate-400 font-extrabold hover:bg-white hover:shadow-xl transition-all border-2 border-dashed border-slate-100 hover:border-pink-50 flex items-center justify-center gap-2 mb-14 no-print group">
                <span class="text-2xl group-hover:rotate-90 transition-transform">➕</span> 添加评估阶段 (ADD NEW COMPONENT)
            </button>

            <div class="relative bg-slate-900 rounded-[4rem] p-10 md:p-16 text-white shadow-2xl overflow-hidden group gauge-container">
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-indigo-500/20 rounded-full blur-[100px] transition-transform group-hover:scale-150"></div>
                <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-12">
                    <div class="text-center md:text-left">
                        <p class="text-[10px] font-black text-indigo-300 uppercase tracking-[0.4em] mb-4">Cumulative Weighted GPA (总计)</p>
                        <div class="flex items-baseline justify-center md:justify-start gap-4">
                            <p id="totalScore" class="text-7xl md:text-9xl font-black font-mono tracking-tighter score-pill">0.00</p>
                            <span class="text-xl font-bold text-slate-600">/ 100</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-4 w-full md:w-auto no-print">
                        <button onclick="calc()" class="bg-indigo-500 text-white px-14 py-6 rounded-[2.5rem] font-black shadow-xl hover:bg-indigo-400 transition-all transform active:scale-95 text-xl">
                            🚀 立即推演 (SYNC)
                        </button>
                    </div>
                </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            Professional Academic Performance & Grade Synthesis Pipeline
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let itemCount = 0;

        function addItem(name = '', score = '', weight = '') {
            const list = document.getElementById('items');
            const row = document.createElement('div');
            row.className = "input-row flex gap-4 items-center group animate-fade-in";
            row.innerHTML = `
                <input type="text" placeholder="测评项 (如: 期末)" value="${name}" class="name-in w-1/2 p-6 bg-slate-50/50 rounded-3xl border-2 border-transparent focus:border-pink-50 focus:bg-white outline-none transition-all font-black text-slate-700 placeholder:text-slate-200">
                <input type="number" placeholder="0" value="${score}" class="score-in w-1/4 p-6 bg-slate-50/50 rounded-3xl border-2 border-transparent focus:border-pink-50 focus:bg-white outline-none transition-all font-mono font-black text-center text-slate-800 placeholder:text-slate-200">
                <input type="number" placeholder="0" value="${weight}" class="weight-in w-1/4 p-6 bg-slate-50/50 rounded-3xl border-2 border-transparent focus:border-indigo-50 focus:bg-white outline-none transition-all font-mono font-black text-center text-indigo-400 placeholder:text-slate-200">
                <button onclick="this.parentElement.remove(); updateVisuals();" class="w-10 h-10 flex items-center justify-center text-slate-200 hover:text-rose-500 transition-colors no-print">🗑️</button>
            `;
            list.appendChild(row);
            updateVisuals();
        }

        function updateVisuals() {
            const weights = document.querySelectorAll('.weight-in');
            let sum = 0;
            weights.forEach(w => {
                const v = parseFloat(w.value);
                if(!isNaN(v)) sum += v;
            });

            const summary = document.getElementById('weightSummary');
            summary.textContent = `Weight: ${sum}% / 100%`;
            if(sum === 100) {
                summary.className = "text-[10px] font-black text-emerald-400 bg-emerald-50 px-4 py-1.5 rounded-full tracking-widest transition-all";
            } else if(sum > 100) {
                 summary.className = "text-[10px] font-black text-rose-400 bg-rose-50 px-4 py-1.5 rounded-full tracking-widest animate-pulse";
            } else {
                 summary.className = "text-[10px] font-black text-slate-300 bg-slate-50 px-4 py-1.5 rounded-full tracking-widest transition-all";
            }
        }

        document.addEventListener('input', (e) => {
            if(e.target.classList.contains('weight-in')) updateVisuals();
        });

        function calc() {
            const names = document.querySelectorAll('.name-in');
            const scores = document.querySelectorAll('.score-in');
            const weights = document.querySelectorAll('.weight-in');
            
            let total = 0;
            let sumW = 0;
            let valid = true;

            scores.forEach((s, i) => {
                const sv = parseFloat(s.value);
                const wv = parseFloat(weights[i].value);
                if(!isNaN(sv) && !isNaN(wv)) {
                    total += sv * (wv / 100);
                    sumW += wv;
                }
            });

            if(sumW === 0) {
                Utils.toast('请提供有效的权重分配 📋', 'warning');
                return;
            }

            const totalEl = document.getElementById('totalScore');
            totalEl.style.transform = 'scale(1.1)';
            setTimeout(() => totalEl.style.transform = 'scale(1)', 300);

            // Animate number
            let curr = parseFloat(totalEl.textContent);
            let target = total;
            let frames = 0;
            let interval = setInterval(() => {
                curr += (target - curr) / 5;
                totalEl.textContent = curr.toFixed(2);
                frames++;
                if(frames > 20) {
                    clearInterval(interval);
                    totalEl.textContent = target.toFixed(2);
                }
            }, 30);

            if(sumW !== 100) {
                Utils.toast(`警告：总权重为 ${sumW}% (非100%)`, 'info');
            } else {
                Utils.toast('加权核算已同步 ✨', 'success');
            }
        }

        // Init with default rows
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            addItem('期末考试', '85', '40');
            addItem('平时成绩', '92', '30');
            addItem('小组展示', '88', '30');
        });

        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('input')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
