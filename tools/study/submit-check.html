<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>论文自检 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .check-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .check-item:hover { transform: translateX(8px); background: white; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .check-item.done { opacity: 0.6; background: #fdf2f8; border-color: #fce7f3; }
        .progress-ring { transition: stroke-dashoffset 0.5s ease; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-pink-100 py-3 px-6 shadow-sm no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-10 md:mb-14">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4 animate-item">学术终审：提交自检</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s italic italic">最后一步逻辑闭环，杜绝低级错误。🚀</p>
        </header>

        <section class="cute-card p-6 md:p-14 mb-12 bg-white shadow-2xl animate-item text-left" style="animation-delay: 0.2s">
            <div class="mb-10 flex flex-col md:flex-row items-center justify-between gap-6 bg-slate-50/50 p-8 rounded-[3rem] border border-slate-100">
                <div class="flex items-center gap-6">
                    <div class="relative w-20 h-20">
                        <svg class="w-full h-full -rotate-90">
                            <circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-200"></circle>
                            <circle id="progressCircle" cx="40" cy="40" r="36" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="226" stroke-dashoffset="226" class="text-pink-400 progress-ring" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center text-xs font-black text-slate-400" id="percentText">0%</div>
                    </div>
                    <div>
                        <h2 class="text-lg font-black text-slate-800 mb-1">审核进度 (Audit Progress)</h2>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Quality Assurance Pipeline</p>
                    </div>
                </div>
                <div class="flex gap-3 no-print">
                    <button onclick="resetChecks()" class="px-6 py-3 bg-white text-slate-400 font-black rounded-2xl hover:text-rose-500 border border-slate-200 transition-all text-[10px] uppercase tracking-widest">
                        🔄 Reset All
                    </button>
                    <button onclick="window.print()" class="px-6 py-3 bg-slate-800 text-white font-black rounded-2xl hover:bg-black transition-all text-[10px] uppercase tracking-widest">
                        🖨️ Export Log
                    </button>
                </div>
            </div>

            <div class="space-y-4" id="checklist">
                <!-- Checklist dynamic -->
            </div>

            <div class="mt-14 p-10 bg-indigo-50/30 rounded-[3rem] border border-indigo-50/50 flex flex-col md:flex-row items-center gap-8 no-print">
                <div class="w-16 h-16 bg-white rounded-[1.5rem] shadow-sm flex items-center justify-center text-3xl">🎓</div>
                <div class="flex-1 text-center md:text-left">
                    <p class="text-slate-700 font-black text-lg mb-1 italic">准备好惊艳评审了吗？</p>
                    <p class="text-xs text-slate-400 leading-relaxed font-bold uppercase tracking-tighter">Ensure every critical vector is validated before the final sync. Success awaits!</p>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-1">Integrity Score</span>
                    <span id="scoreText" class="text-3xl font-black text-indigo-500 tabular-nums">00</span>
                </div>
            </div>
        </section>
        
        <footer class="text-gray-300 text-[10px] uppercase font-black tracking-[0.5em] pb-12 animate-item" style="animation-delay: 0.3s">
            Professional Academic Quality Assurance & Submission Pipeline
        </footer>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const items = [
            { title: '标题精准度 (Title Precision)', desc: '标题是否简洁明了，包含研究的核心关键词？', category: 'General' },
            { title: '摘要概括力 (Abstract Logic)', desc: '摘要是否准确概括了背景、方法、结果和结论？', category: 'General' },
            { title: '引用格式规范 (Citation Protocol)', desc: '参考文献的格式、排序是否完全符合目标期刊的规范？', category: 'Technical' },
            { title: '图表高分辨率 (Visual Integrity)', desc: '所有图片是否有高分辨率？图例、标注是否清晰准确？', category: 'Visual' },
            { title: '多维文字校对 (Text Proofing)', desc: '是否已通过拼写检查？是否存在明显的语法错误或中式英语？', category: 'Technical' },
            { title: '逻辑深度验证 (Logical Flow)', desc: '每一章节的衔接是否自然？论点是否有足够的数据支撑？', category: 'Core' },
            { title: '重复率安全阈值 (Originality)', desc: '查重率是否在安全范围内？是否已正确引用他人成果？', category: 'Ethics' },
            { title: '盲审信息脱敏 (Anonymization)', desc: '如果采用双盲评审，是否已删除正文中的作者名片或个人信息？', category: 'Ethics' }
        ];

        function render() {
            const container = document.getElementById('checklist');
            const savedState = JSON.parse(localStorage.getItem('qSubmitCheck') || '[]');
            
            container.innerHTML = items.map((item, idx) => {
                const checked = savedState.includes(idx);
                return `
                    <label class="check-item group flex items-start gap-6 p-8 rounded-[2.5rem] cursor-pointer border border-transparent 
                        ${checked ? 'done bg-pink-50/30' : 'bg-slate-50/50 hover:border-pink-50'}">
                        <div class="relative mt-1">
                            <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggle(${idx})" class="peer sr-only">
                            <div class="w-7 h-7 border-2 border-slate-200 rounded-xl group-hover:border-pink-300 peer-checked:bg-pink-400 peer-checked:border-pink-400 transition-all flex items-center justify-center text-white">
                                <span class="text-xs transition-transform ${checked ? 'scale-100' : 'scale-0'}">✓</span>
                            </div>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="text-[8px] font-black ${checked ? 'text-slate-300' : 'text-pink-300'} uppercase tracking-widest italic leading-none">${item.category}</span>
                                <p class="font-black text-slate-800 tracking-tight transition-colors ${checked ? 'line-through text-slate-400' : 'group-hover:text-pink-400'}">${item.title}</p>
                            </div>
                            <p class="text-xs text-slate-400 leading-relaxed font-medium">${item.desc}</p>
                        </div>
                    </label>
                `;
            }).join('');
            
            const progress = (savedState.length / items.length);
            const offset = 226 - (progress * 226);
            document.getElementById('progressCircle').style.strokeDashoffset = offset;
            document.getElementById('percentText').textContent = Math.round(progress * 100) + '%';
            document.getElementById('scoreText').textContent = Math.round(progress * 100).toString().padStart(2, '0');
        }

        function toggle(idx) {
            let savedState = JSON.parse(localStorage.getItem('qSubmitCheck') || '[]');
            if (savedState.includes(idx)) {
                savedState = savedState.filter(i => i !== idx);
            } else {
                savedState.push(idx);
                Utils.toast('检查项完成 ✨', 'success');
            }
            localStorage.setItem('qSubmitCheck', JSON.stringify(savedState));
            render();
            
            if (savedState.length === items.length) {
                setTimeout(() => Utils.toast('🎉 完美！所有项均已完成自检！', 'success'), 300);
            }
        }

        function resetChecks() {
            if(!confirm('确定要重置所有检查项吗？ 🔄')) return;
            localStorage.removeItem('qSubmitCheck');
            render();
            Utils.toast('清单已重置', 'info');
        }

        // Init Phase
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    render();
                }, 500);
            }
        });

        // Click Aesthetics
        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('input')) return;
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
