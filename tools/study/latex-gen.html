<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaTeX公式预览 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">LaTeX 公式生成器</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">实时渲染精美数学公式，支持标准 LaTeX 语法格式。</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-2xl mb-12 animate-item" style="animation-delay: 0.2s">
            <div class="group relative mb-8">
                <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-3">Input LaTeX Code 输入代码</p>
                <textarea id="latexIn" class="w-full h-40 p-6 bg-gray-50 border-2 border-pink-50 rounded-3xl outline-none focus:border-pink-200 text-lg font-mono mb-4 transition-all shadow-inner resize-none font-bold text-slate-700" placeholder="输入 LaTeX 代码，如: \frac{a}{b} = c">E = mc^2</textarea>
                <div class="absolute -bottom-2 right-6 px-4 py-1 bg-pink-100/50 rounded-full text-[10px] font-black text-pink-400 uppercase tracking-widest opacity-0 group-focus-within:opacity-100 transition-opacity">Real-time Rendering Enabled</div>
            </div>
            
            <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-3 text-center">Preview Output 预览输出</p>
            <div id="output" class="p-8 md:p-16 bg-pink-50/10 rounded-[2.5rem] border-2 border-dashed border-pink-100 min-h-[220px] flex items-center justify-center text-3xl md:text-4xl shadow-inner scroll-auto overflow-x-auto text-slate-700">
                 \[ E = mc^2 \]
            </div>
        </section>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-item" style="animation-delay: 0.3s">
            <button onclick="insert('\\\\frac{a}{b}')" class="p-4 bg-white border border-pink-50 rounded-2xl font-mono text-xs font-bold text-pink-400 hover:border-pink-200 hover:bg-pink-50 transition-all shadow-sm">分数 \frac{a}{b}</button>
            <button onclick="insert('x^2')" class="p-4 bg-white border border-pink-50 rounded-2xl font-mono text-xs font-bold text-pink-400 hover:border-pink-200 hover:bg-pink-50 transition-all shadow-sm">平方 x^2</button>
            <button onclick="insert('\\\\sqrt{x}')" class="p-4 bg-white border border-pink-50 rounded-2xl font-mono text-xs font-bold text-pink-400 hover:border-pink-200 hover:bg-pink-50 transition-all shadow-sm">根号 \sqrt{x}</button>
            <button onclick="insert('\\\\sum_{i=1}^{n} i')" class="p-4 bg-white border border-pink-50 rounded-2xl font-mono text-xs font-bold text-pink-400 hover:border-pink-200 hover:bg-pink-50 transition-all shadow-sm">求和 \sum</button>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('latexIn');
        const output = document.getElementById('output');

        input.oninput = () => {
             const val = input.value.trim();
             if(!val) {
                 output.innerHTML = '<span class="text-gray-200 text-sm font-black uppercase tracking-widest italic animate-pulse">Waiting for input... 等待输入</span>';
                 return;
             }
             output.innerHTML = `\\[ ${val} \\]`;
             if(window.MathJax) {
                 MathJax.typesetPromise([output]).catch(e => console.log(e));
             }
        };

        function insert(text) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const current = input.value;
            input.value = current.substring(0, start) + text + current.substring(end);
            input.focus();
            input.setSelectionRange(start + text.length, start + text.length);
            input.oninput();
            Utils.toast('已插入符号 ✨');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
