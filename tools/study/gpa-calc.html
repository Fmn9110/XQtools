<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPA计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-4">
            <button onclick="location.href='../../index.html'" class="w-10 h-10 bg-pink-50 text-pink-500 rounded-xl flex items-center justify-center hover:bg-pink-100 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                    <span class="font-black">Q</span>
                </div>
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
            </div>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">GPA 综合计算器</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">支持 4.0 分制映射，科学计算你的学业成果。</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white shadow-2xl animate-item" style="animation-delay: 0.2s">
            <div id="courseList" class="space-y-4 mb-8 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                <div class="flex flex-col md:flex-row gap-4 items-center group bg-gray-50/50 p-4 rounded-[1.8rem] border border-pink-50/30">
                    <input type="text" placeholder="课程名称 (可选)" class="w-full md:flex-1 p-4 bg-white rounded-2xl outline-none border-2 border-transparent focus:border-pink-200 transition-all text-sm shadow-sm font-bold text-slate-600">
                    <div class="flex gap-3 w-full md:w-auto">
                        <input type="number" placeholder="学分" class="flex-1 md:w-24 p-4 bg-white rounded-2xl outline-none border-2 border-transparent focus:border-pink-200 transition-all text-sm shadow-sm font-bold text-slate-600 credit-input">
                        <input type="number" placeholder="成绩 (0-100)" class="flex-1 md:w-32 p-4 bg-white rounded-2xl outline-none border-2 border-transparent focus:border-pink-200 transition-all text-sm shadow-sm font-bold text-slate-600 grade-input">
                    </div>
                    <button onclick="if(document.querySelectorAll('.credit-input').length > 1) this.parentElement.remove(); else Utils.toast('至少保留一门课程哦', 'warning')" class="text-pink-100 hover:text-pink-400 transition-colors p-2 text-xl md:opacity-0 group-hover:opacity-100">🗑️</button>
                </div>
            </div>
            
            <button onclick="addCourse()" class="w-full py-4 border-2 border-dashed border-pink-100 rounded-2xl text-pink-300 font-bold hover:bg-pink-50 hover:text-pink-400 mb-10 transition-all transform active:scale-[0.98]">
                + 添加一门新的课程
            </button>

            <div class="flex flex-col sm:flex-row items-center justify-between p-10 bg-gradient-to-br from-pink-400 to-rose-400 rounded-[3rem] text-white shadow-xl gap-8 relative overflow-hidden group">
                 <div class="absolute top-0 right-0 p-8 opacity-10 scale-150 rotate-12 transition-transform group-hover:rotate-0">🎓</div>
                 <div class="text-center sm:text-left relative z-10">
                     <p class="text-[10px] font-black opacity-80 uppercase tracking-[0.3em] mb-2">Total Grade Average (4.0 Scale)</p>
                     <p id="resGPA" class="text-7xl font-black drop-shadow-md tracking-tighter">0.00 <span class="text-xl opacity-60 font-normal">pts</span></p>
                 </div>
                 <button onclick="calculate()" class="w-full sm:w-auto bg-white text-pink-500 px-14 py-5 rounded-[1.5rem] font-black shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-1 active:scale-95 text-xl flex items-center justify-center gap-3 no-cute">
                    <span>🚀 计算结果</span>
                 </button>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        function addCourse() {
            const list = document.getElementById('courseList');
            const row = document.createElement('div');
            row.className = "flex flex-col md:flex-row gap-4 items-center group bg-gray-50/50 p-4 rounded-[1.8rem] border border-pink-50/30 animate-fade-in";
            row.innerHTML = `
                <input type="text" placeholder="课程名称 (可选)" class="w-full md:flex-1 p-4 bg-white rounded-2xl outline-none border-2 border-transparent focus:border-pink-200 transition-all text-sm shadow-sm font-bold text-slate-600">
                <div class="flex gap-3 w-full md:w-auto">
                    <input type="number" placeholder="学分" class="flex-1 md:w-24 p-4 bg-white rounded-2xl outline-none border-2 border-transparent focus:border-pink-200 transition-all text-sm shadow-sm font-bold text-slate-600 credit-input">
                    <input type="number" placeholder="成绩 (0-100)" class="flex-1 md:w-32 p-4 bg-white rounded-2xl outline-none border-2 border-transparent focus:border-pink-200 transition-all text-sm shadow-sm font-bold text-slate-600 grade-input">
                </div>
                <button onclick="this.parentElement.remove()" class="text-pink-100 hover:text-pink-400 transition-colors p-2 text-xl md:opacity-0 group-hover:opacity-100">🗑️</button>
            `;
            list.appendChild(row);
            list.scrollTop = list.scrollHeight;
        }

        function calculate() {
            const credits = document.querySelectorAll('.credit-input');
            const grades = document.querySelectorAll('.grade-input');
            
            let totalCredit = 0;
            let totalPoints = 0;

            credits.forEach((c, i) => {
                const cv = parseFloat(c.value);
                const gv = parseFloat(grades[i].value);
                if(!isNaN(cv) && !isNaN(gv)) {
                    totalCredit += cv;
                    let point = 0;
                    if(gv >= 90) point = 4.0;
                    else if(gv >= 85) point = 3.7;
                    else if(gv >= 82) point = 3.3;
                    else if(gv >= 78) point = 3.0;
                    else if(gv >= 75) point = 2.7;
                    else if(gv >= 72) point = 2.3;
                    else if(gv >= 68) point = 2.0;
                    else if(gv >= 64) point = 1.5;
                    else if(gv >= 60) point = 1.0;
                    totalPoints += point * cv;
                }
            });

            if (totalCredit === 0) {
                Utils.toast('请输入有效的课程和学分哦', 'warning');
                return;
            }

            const gpa = totalPoints / totalCredit;
            document.getElementById('resGPA').innerText = gpa.toFixed(2);
            Utils.toast('GPA 计算成功！', 'success');
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
