<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>书目管理 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10 md:mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 animate-item">图书分类号速查</h1>
            <p class="text-gray-500 text-sm md:text-base animate-item" style="animation-delay: 0.1s">记录你的阅读足迹，管理私人书库清单</p>
        </header>

        <section class="cute-card p-6 md:p-10 mb-12 bg-white animate-item" style="animation-delay: 0.2s">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                <input type="text" id="bookTitle" placeholder="书名" class="p-3 md:p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-300 transition-colors">
                <input type="text" id="bookAuthor" placeholder="作者" class="p-3 md:p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-300 transition-colors">
                <select id="bookStatus" class="p-3 md:p-4 bg-gray-50 rounded-2xl border border-pink-50 outline-none focus:border-pink-300 transition-colors">
                    <option>想读</option>
                    <option>在读</option>
                    <option>已读</option>
                </select>
            </div>
            <button onclick="addBook()" class="cute-button w-full py-4 bg-pink-400 hover:bg-pink-500 text-white font-bold rounded-2xl mb-8 shadow-lg">📖 添加新书到清单</button>
            
            <div class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="filter('all')" class="flex-shrink-0 px-5 py-2 bg-pink-50 text-pink-500 rounded-full text-sm font-bold hover:bg-pink-100 transition-colors">全部</button>
                <button onclick="filter('想读')" class="flex-shrink-0 px-5 py-2 bg-yellow-50 text-yellow-600 rounded-full text-sm font-bold hover:bg-yellow-100 transition-colors">想读</button>
                <button onclick="filter('在读')" class="flex-shrink-0 px-5 py-2 bg-blue-50 text-blue-600 rounded-full text-sm font-bold hover:bg-blue-100 transition-colors">在读</button>
                <button onclick="filter('已读')" class="flex-shrink-0 px-5 py-2 bg-green-50 text-green-600 rounded-full text-sm font-bold hover:bg-green-100 transition-colors">已读</button>
            </div>

            <div class="space-y-3" id="bookList"></div>
            <p class="text-xs text-gray-400 mt-6 text-center" id="count"></p>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let books = JSON.parse(localStorage.getItem('qBookCatalog') || '[]');
        const statusColors = {
            '想读': 'bg-yellow-50 text-yellow-600 border-yellow-100',
            '在读': 'bg-blue-50 text-blue-600 border-blue-100',
            '已读': 'bg-green-50 text-green-600 border-green-100'
        };

        function save() { localStorage.setItem('qBookCatalog', JSON.stringify(books)); }

        function addBook() {
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const status = document.getElementById('bookStatus').value;
            if (!title) { Utils.toast('请输入书名', 'warning'); return; }
            books.unshift({ title, author, status, id: Date.now() });
            save(); render();
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            Utils.toast('已加入书库', 'success');
        }

        function removeBook(id) {
            books = books.filter(b => b.id !== id);
            save(); render();
            Utils.toast('已移出书库');
        }

        function changeStatus(id, newStatus) {
            const b = books.find(b => b.id === id);
            if (b) b.status = newStatus;
            save(); render();
            Utils.toast('状态已更新');
        }

        let currentFilter = 'all';
        function filter(f) { currentFilter = f; render(); }

        function render() {
            const filtered = currentFilter === 'all' ? books : books.filter(b => b.status === currentFilter);
            document.getElementById('bookList').innerHTML = filtered.length > 0 ? filtered.map(b => `
                <div class="p-4 bg-gray-50/50 rounded-2xl flex items-center gap-3 border border-pink-50/30 hover:shadow-sm transition-all animate-item">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-gray-800 truncate">${b.title}</p>
                        <p class="text-xs text-gray-400 truncate">${b.author || '未知作者'}</p>
                    </div>
                    <select onchange="changeStatus(${b.id}, this.value)" class="px-2 py-1 ${statusColors[b.status]} border rounded-lg text-[10px] font-bold outline-none cursor-pointer">
                        ${['想读', '在读', '已读'].map(s => `<option ${s === b.status ? 'selected' : ''}>${s}</option>`).join('')}
                    </select>
                    <button onclick="removeBook(${b.id})" class="w-8 h-8 flex items-center justify-center text-gray-300 hover:text-pink-400 hover:bg-pink-50 rounded-full transition-all">🗑️</button>
                </div>
            `).join('') : '<p class="text-center text-gray-300 py-10">空的书单...</p>';
            document.getElementById('count').textContent = `📊 藏书共 ${books.length} 本，当前筛选显示 ${filtered.length} 本`;
        }

        // 加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        // 统一点击特效
        document.addEventListener('click', (e) => {
            const item = document.createElement('div');
            item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
            item.textContent = Math.random() > 0.5 ? '💖' : '✨';
            item.style.position = 'fixed';
            item.style.left = `${e.clientX - 10}px`;
            item.style.top = `${e.clientY - 10}px`;
            item.style.pointerEvents = 'none';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 1000);
        });

        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
