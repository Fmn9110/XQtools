<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji 组合 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 text-gradient">Emoji 组合专家</h1>
            <p class="text-gray-500 italic text-sm md:text-base">快捷选择并组合属于你的表情符号风格，一键复制到聊天框。✨</p>
        </header>

            <div id="display" class="w-full min-h-[140px] p-8 bg-orange-50/20 border-2 border-dashed border-orange-100 rounded-3xl text-5xl mb-10 flex flex-wrap justify-center items-center gap-2">
                 <!-- Selected emojis -->
            </div>
            
            <div class="grid grid-cols-4 md:grid-cols-8 gap-4 mb-10 h-64 overflow-auto p-4 bg-gray-50 rounded-2xl scrollbar-hide">
                 <!-- Emoji picker demo -->
                 <script>
                    const baseEmojis = ["😂", "❤️", "🤣", "👍", "😭", "🙏", "😘", "🥰", "😍", "😊", "🎉", "😁", "💕", "🥺", "😅", "🔥", "✨", "🙌", "😋", "😎", "🤔", "🤩", "💖", "😜", "😉", "🙄", "🥳", "🌈", "☀️", "👏", "🎈", "💎", "🦋", "🌸", "🍕", "🎮", "🎸", "🚀", "🪐", "💡", "🍀"];
                    baseEmojis.forEach(e => {
                        document.write(`<button onclick="add('${e}')" class="text-3xl p-2 hover:bg-white rounded-xl transition-all hover:scale-125 transform">${e}</button>`);
                    });
                 </script>
            </div>

            <div class="flex gap-4 justify-center">
                 <button onclick="clearAll()" class="theme-secondary-btn px-8 py-4">清空</button>
                 <button onclick="copy()" class="theme-download-btn px-12 py-4">复制组合</button>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const display = document.getElementById('display');
        let current = [];

        function add(e) {
            current.push(e);
            render();
        }

        function clearAll() {
            current = [];
            render();
        }

        function render() {
            display.innerText = current.join('');
        }

        function copy() {
            if(!current.length) return;
            navigator.clipboard.writeText(current.join('')).then(() => {
                Utils.toast('Emoji 已复制', 'success');
            });
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
