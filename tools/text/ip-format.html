<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP校验与转换 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-2xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 text-gradient">IP 校验与规范化</h1>
            <p class="text-gray-500 italic text-sm md:text-base">验证 IPv4/v6 地址格式并计算其二进制、整数形式。🌐</p>
        </header>

            <input type="text" id="ipInput" class="w-full p-6 bg-white border-2 border-pink-50 rounded-3xl text-xl font-black text-center outline-none focus:border-pink-200 mb-8 transition-all" placeholder="192.168.1.1">
            
            <div id="resBox" class="hidden space-y-4 text-left p-6 bg-pink-50/10 rounded-2xl border border-pink-50">
                 <div class="flex justify-between">
                     <span class="text-[10px] font-bold text-gray-400 uppercase">类型</span>
                     <span id="ipType" class="text-xs font-bold text-pink-500">-</span>
                 </div>
                 <div class="flex justify-between">
                      <span class="text-[10px] font-bold text-gray-400 uppercase">整数形式</span>
                      <span id="ipInt" class="text-xs font-mono text-gray-600">-</span>
                 </div>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('ipInput');
        const box = document.getElementById('resBox');
        
        input.oninput = () => {
             const val = input.value.trim();
             if(!val) { box.classList.add('hidden'); return; }
             
             let type = "";
             let intVal = "-";

             // IPv4
             const v4Regex = /^(\d{1,3}\.){3}\d{1,3}$/;
             if(v4Regex.test(val)) {
                 const parts = val.split('.');
                 if(parts.every(p => parseInt(p) <= 255)) {
                     type = "IPv4";
                     intVal = (parseInt(parts[0]) << 24 | parseInt(parts[1]) << 16 | parseInt(parts[2]) << 8 | parseInt(parts[3])) >>> 0;
                 }
             }

             // IPv6 (simple check)
             if(!type && val.includes(':')) {
                  type = "IPv6 (格式初步通过)";
             }

             if(type) {
                 box.classList.remove('hidden');
                 document.getElementById('ipType').innerText = type;
                 document.getElementById('ipInt').innerText = intVal;
             } else {
                 box.classList.add('hidden');
             }
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
