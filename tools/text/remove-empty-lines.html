<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>去除空行 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen pb-20 md:pb-0">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">去除空行</h1>
            <p class="text-gray-500 italic">快速清理文本中多余的换行符，让段落更紧凑。🍃</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-xl mb-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="flex flex-col relative group">
                    <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-3 ml-2">包含空行的原始文本</label>
                    <textarea id="rawInput" class="w-full h-80 p-6 bg-pink-50/10 border-2 border-pink-50 rounded-[2rem] text-xs outline-none focus:border-pink-200 transition-all resize-none shadow-inner" placeholder="在此输入原始文本内容..."></textarea>
                    <button onclick="clearInput()" class="absolute right-4 top-10 text-pink-200 hover:text-pink-400 p-2 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
                <div class="flex flex-col relative group">
                    <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-3 ml-2">处理结果</label>
                    <textarea id="resultOutput" readonly class="w-full h-80 p-6 bg-pink-50/5 border-2 border-pink-50 rounded-[2rem] text-xs outline-none resize-none shadow-sm" placeholder="处理后的内容将显示在这里..."></textarea>
                    <button onclick="copyResult()" class="absolute right-4 bottom-4 bg-white/80 backdrop-blur-sm p-3 rounded-2xl border border-pink-100 text-pink-400 hover:text-pink-600 shadow-sm transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    </button>
                </div>
            </div>

            <div class="mt-10 flex justify-center">
                <button id="execBtn" class="theme-download-btn px-16 py-4 text-lg shadow-lg shadow-pink-100">
                    立即去除所有空行
                </button>
            </div>
        </section>

        <section class="max-w-2xl mx-auto">
             <div class="p-8 bg-white/60 backdrop-blur-sm border border-pink-200 border-dashed rounded-[2.5rem]">
                 <div class="flex items-center gap-3 mb-4">
                     <div class="w-10 h-10 bg-pink-100 rounded-2xl flex items-center justify-center text-xl shadow-inner shadow-pink-200">✨</div>
                     <h3 class="font-bold text-gray-700 uppercase tracking-wider">工具小贴士</h3>
                 </div>
                 <p class="text-xs text-gray-500 leading-relaxed font-medium">
                     该工具会自动过滤所有“纯空白”行（即使行内包含空格）。它可以帮助您从网页或 PDF 复制文字后，快速恢复正常的文章结构，让排版更美观。
                 </p>
             </div>
        </section>
    </main>



    <script src="../../assets/js/utils.js"></script>
    <script>
        const rawInput = document.getElementById('rawInput');
        const resultOutput = document.getElementById('resultOutput');
        const execBtn = document.getElementById('execBtn');

        execBtn.onclick = () => {
             const text = rawInput.value;
             if (!text) {
                 Utils.toast('请输入内容', 'warning');
                 return;
             }
             
             const processed = text.split('\n')
                                   .filter(line => line.trim() !== '')
                                   .join('\n');
             
             resultOutput.value = processed;
             Utils.toast('已去除所有空行', 'success');
        };

        function copyResult() {
            if (!resultOutput.value) {
                Utils.toast('没有可复制的内容', 'warning');
                return;
            }
            navigator.clipboard.writeText(resultOutput.value).then(() => {
                Utils.toast('已复制到剪贴板', 'success');
            });
        }

        function clearInput() {
            rawInput.value = '';
            resultOutput.value = '';
            Utils.toast('已清空', 'info');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
