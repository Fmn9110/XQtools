<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AES 加密解密 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">AES 加解密</h1>
            <p class="text-gray-500 italic text-sm md:text-base">基于工业级 AES-256 算法，为您的文字信息提供本地高强度保护。🛡️</p>
        </header>

            <textarea id="textInput" class="w-full h-48 p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-xs outline-none focus:border-slate-200 transition-all resize-none mb-6" placeholder="在此输入需要处理的文本..."></textarea>
            
            <div class="flex flex-wrap gap-4 justify-center items-center mb-6">
                <input type="password" id="secretKey" class="p-4 bg-gray-50 border border-gray-100 rounded-xl text-xs flex-grow max-w-xs" placeholder="设置密钥 (Key)">
                <button id="encryptBtn" class="theme-download-btn px-8 py-4">文本加密</button>
                <button id="decryptBtn" class="theme-secondary-btn px-8 py-4">解密还原</button>
            </div>

            <textarea id="textOutput" readonly class="w-full h-32 p-6 bg-slate-50/20 border border-slate-50 rounded-3xl text-[10px] font-mono outline-none resize-none" placeholder="结果将显示在这里..."></textarea>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('textInput');
        const output = document.getElementById('textOutput');
        const key = document.getElementById('secretKey');

        document.getElementById('encryptBtn').onclick = () => {
             const k = key.value;
             if(!k) { Utils.toast('请设置密钥以增强安全性', 'warning'); return; }
             try {
                const encrypted = CryptoJS.AES.encrypt(input.value, k).toString();
                output.value = encrypted;
                Utils.toast('加密成功', 'success');
             } catch(e) {
                 Utils.toast('加密异常', 'error');
             }
        };

        document.getElementById('decryptBtn').onclick = () => {
             const k = key.value;
             if(!k) { Utils.toast('请输入解密密钥', 'warning'); return; }
             try {
                const bytes = CryptoJS.AES.decrypt(input.value, k);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if(!decrypted) throw new Error();
                output.value = decrypted;
                Utils.toast('解密成功', 'success');
             } catch(e) {
                 Utils.toast('解密失败：可能密钥错误或数据损坏', 'error');
             }
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
