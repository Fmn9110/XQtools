<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UUID 生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen pb-20 md:pb-0">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-2xl text-center">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4 tracking-tight">UUID 生成器</h1>
            <p class="text-gray-500 italic">快速生成通用的唯一标识符 (Version 4)。🆔</p>
        </header>

        <section class="cute-card p-8 md:p-10 bg-white shadow-xl mb-8">
            <div class="space-y-4 mb-10">
                <div id="uuidList" class="space-y-4">
                     <!-- UUIDs here -->
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                 <button id="genBtn" class="theme-download-btn py-5 text-base font-bold shadow-lg shadow-pink-100">✨ 重新生成 5 个</button>
                 <button id="copyAll" class="theme-secondary-btn border-2 py-5 text-base font-bold">📋 复制所有</button>
            </div>
            <p class="text-xs text-pink-300 font-bold tracking-widest uppercase">支持浏览器标准 crypto 算法</p>
        </section>
    </main>



    <script src="../../assets/js/utils.js"></script>
    <script>
        const uuidList = document.getElementById('uuidList');
        const genBtn = document.getElementById('genBtn');
        const copyAllBtn = document.getElementById('copyAll');

        function generateUUID() {
            if (crypto.randomUUID) return crypto.randomUUID();
            // Fallback
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function refresh() {
            uuidList.innerHTML = '';
            for(let i=0; i<5; i++) {
                const id = generateUUID();
                const div = document.createElement('div');
                div.className = "p-5 bg-pink-50/20 border border-pink-50 rounded-2xl text-[11px] font-mono text-gray-600 flex justify-between items-center transition-all hover:bg-pink-50/40 hover:shadow-sm";
                div.innerHTML = `<span>${id}</span> <button class="text-[10px] font-bold text-pink-400 hover:text-pink-600" onclick="navigator.clipboard.writeText('${id}'); Utils.toast('已复制单条', 'success')">复制</button>`;
                uuidList.appendChild(div);
            }
        }

        genBtn.onclick = () => {
            refresh();
            Utils.toast('UUID 已更新', 'success');
        };

        copyAllBtn.onclick = () => {
             const allChars = Array.from(uuidList.querySelectorAll('span')).map(s => s.innerText).join('\n');
             if(!allChars) return;
             navigator.clipboard.writeText(allChars).then(() => {
                 Utils.toast('全部 UUID 已复制', 'success');
             });
        };

        // Initial
        refresh();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
