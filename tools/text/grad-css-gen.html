<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSS渐变背景生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 text-gradient">线性渐变生成器</h1>
            <p class="text-gray-500 italic text-sm md:text-base">选择颜色与角度，瞬间生成酷炫的网页背景代码。🌈</p>
        </header>

            <div id="preview" class="w-full h-48 rounded-3xl shadow-inner mb-10 transition-all" style="background: linear-gradient(135deg, #6366f1, #a855f7);"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                <input type="color" id="c1" value="#6366f1" class="w-full h-12 rounded-xl cursor-pointer">
                <input type="color" id="c2" value="#a855f7" class="w-full h-12 rounded-xl cursor-pointer">
                <input type="number" id="deg" value="135" class="w-full h-12 bg-gray-50 border border-gray-100 rounded-xl text-center font-bold" placeholder="角度">
            </div>

            <div class="p-6 bg-slate-900 rounded-2xl mb-8">
                 <code id="cssCode" class="text-indigo-300 text-xs font-mono">background: linear-gradient(135deg, #6366f1, #a855f7);</code>
            </div>

            <button onclick="navigator.clipboard.writeText(document.getElementById('cssCode').innerText); Utils.toast('已复制', 'success');" class="theme-download-btn px-12 py-4">复制代码</button>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const preview = document.getElementById('preview');
        const code = document.getElementById('cssCode');
        const inputs = ['c1', 'c2', 'deg'];

        function update() {
            const v1 = document.getElementById('c1').value;
            const v2 = document.getElementById('c2').value;
            const d = document.getElementById('deg').value;
            const grad = `linear-gradient(${d}deg, ${v1}, ${v2})`;
            preview.style.background = grad;
            code.innerText = `background: ${grad};`;
        }

        inputs.forEach(id => document.getElementById(id).oninput = update);
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
