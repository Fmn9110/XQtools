<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>User-Agent解析 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen pb-20 md:pb-0">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">User-Agent 分析</h1>
            <p class="text-gray-500 italic">识别浏览器、操作系统、引擎等详细软硬件信息。💻</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-xl mb-12">
            <div class="relative group mb-8">
                <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-3 ml-2">User-Agent 字符串</label>
                <textarea id="uaInput" class="w-full h-32 p-6 bg-pink-50/10 border-2 border-pink-50 rounded-[2rem] text-sm font-mono outline-none focus:border-pink-200 mb-4 transition-all resize-none shadow-inner" placeholder="在此粘贴 UA 字符串..."></textarea>
                <button onclick="clearInput()" class="absolute right-6 top-10 text-pink-200 hover:text-pink-400 p-2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
            
            <button onclick="parseUA()" class="theme-download-btn w-full py-4 text-base font-bold shadow-lg shadow-pink-100 mb-10">
                ✨ 立即识别我的设备信息
            </button>

            <div id="resBox" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 text-left">
                 <div class="p-6 bg-pink-50/20 rounded-[1.5rem] border border-pink-50 transition-all hover:bg-pink-50/30">
                     <p class="text-[10px] text-pink-300 font-bold uppercase mb-2 tracking-widest">浏览器</p>
                     <p id="browser" class="text-sm font-black text-gray-700">-</p>
                 </div>
                 <div class="p-6 bg-pink-50/20 rounded-[1.5rem] border border-pink-50 transition-all hover:bg-pink-50/30">
                     <p class="text-[10px] text-pink-300 font-bold uppercase mb-2 tracking-widest">操作系统</p>
                     <p id="os" class="text-sm font-black text-gray-700">-</p>
                 </div>
                 <div class="p-6 bg-pink-50/20 rounded-[1.5rem] border border-pink-50 transition-all hover:bg-pink-50/30">
                     <p class="text-[10px] text-pink-300 font-bold uppercase mb-2 tracking-widest">渲染内核</p>
                     <p id="engine" class="text-sm font-black text-gray-700">-</p>
                 </div>
                 <div class="p-6 bg-pink-50/20 rounded-[1.5rem] border border-pink-50 transition-all hover:bg-pink-50/30">
                     <p class="text-[10px] text-pink-300 font-bold uppercase mb-2 tracking-widest">移动设备</p>
                     <p id="mobile" class="text-sm font-black text-gray-700">-</p>
                 </div>
            </div>
        </section>
    </main>



    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('uaInput');
        input.value = navigator.userAgent;

        function parseUA() {
            const ua = input.value;
            if(!ua) { Utils.toast('请输入 UA 字符串', 'warning'); return; }

            let browser = "Unknown";
            let os = "Unknown";
            let engine = "Unknown";
            let IsMobile = /Mobile|Android|iPhone|iPad/i.test(ua);

            if(ua.includes("Chrome")) browser = "Chrome";
            if(ua.includes("Firefox")) browser = "Firefox";
            if(ua.includes("Edge")) browser = "Edge";
            if(ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
            
            if(ua.includes("Windows")) os = "Windows";
            if(ua.includes("Mac OS")) os = "macOS";
            if(ua.includes("Android")) os = "Android";
            if(ua.includes("iPhone")) os = "iOS";
            if(ua.includes("iPad")) os = "iPadOS";

            if(ua.includes("WebKit")) engine = "WebKit";
            if(ua.includes("Gecko") && !ua.includes("WebKit")) engine = "Gecko";
            if(ua.includes("Trident")) engine = "Trident (IE)";

            document.getElementById('browser').innerText = browser;
            document.getElementById('os').innerText = os;
            document.getElementById('engine').innerText = engine;
            document.getElementById('mobile').innerText = IsMobile ? "YES ✨" : "NO";
            
            Utils.toast('设备信息已更新', 'success');
        }

        function clearInput() {
            input.value = '';
            Utils.toast('已清空', 'info');
        }

        parseUA();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
