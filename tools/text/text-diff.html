<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文本比对 (Diff) - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff/dist/diff.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .diff-added { background-color: #D1FAE5; color: #065F46; text-decoration: none; border-radius: 2px; }
        .diff-removed { background-color: #FFE4E6; color: #9F1239; text-decoration: line-through; border-radius: 2px; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen pb-20 md:pb-0">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-6xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">文本比对 (Diff)</h1>
            <p class="text-gray-500 italic">直观地发现两段文本之间的微小差异。🔍</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="relative group">
                <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-3 ml-2">版本 A (原始)</label>
                <textarea id="t1" class="w-full h-64 p-6 bg-pink-50/10 border-2 border-pink-50 rounded-3xl text-sm outline-none focus:border-pink-200 transition-all resize-none shadow-inner" placeholder="在此输入原始文本..."></textarea>
                <button onclick="clearVal('t1')" class="absolute right-6 top-10 text-pink-200 hover:text-pink-400 p-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
            <div class="relative group">
                <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-3 ml-2">版本 B (修改后)</label>
                <textarea id="t2" class="w-full h-64 p-6 bg-pink-50/10 border-2 border-pink-50 rounded-3xl text-sm outline-none focus:border-pink-200 transition-all resize-none shadow-inner" placeholder="在此输入修改后的文本..."></textarea>
                <button onclick="clearVal('t2')" class="absolute right-6 top-10 text-pink-200 hover:text-pink-400 p-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </div>

        <section id="diffResult" class="hidden cute-card p-8 md:p-12 bg-white shadow-xl text-left font-mono text-sm leading-relaxed whitespace-pre-wrap mb-10 border border-pink-50 animate-fade-in">
             <!-- Result -->
        </section>

        <div class="flex flex-col md:flex-row gap-4 justify-center">
            <button id="execBtn" class="theme-download-btn px-16 py-4 text-lg shadow-lg shadow-pink-100 font-bold">
                立即比对差异
            </button>
            <button onclick="location.reload()" class="theme-secondary-btn px-12 py-4 text-lg font-bold border-2">
                重置内容
            </button>
        </div>
    </main>



    <script src="../../assets/js/utils.js"></script>
    <script>
        const execBtn = document.getElementById('execBtn');
        const diffResult = document.getElementById('diffResult');

        execBtn.onclick = () => {
             const v1 = document.getElementById('t1').value;
             const v2 = document.getElementById('t2').value;
             
             if (!v1 && !v2) {
                 Utils.toast('请输入需要比对的文本', 'warning');
                 return;
             }

             const diff = Diff.diffChars(v1, v2);
             let html = "";
             diff.forEach((part) => {
                 const cls = part.added ? 'diff-added' : (part.removed ? 'diff-removed' : '');
                 html += `<span class="${cls}">${Utils.escapeHtml(part.value)}</span>`;
             });

             diffResult.innerHTML = html;
             diffResult.classList.remove('hidden');
             Utils.toast('比对完成', 'success');
        };

        function clearVal(id) {
            document.getElementById(id).value = '';
            Utils.toast('已清空', 'info');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
