<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校验和计算 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">文本校验和</h1>
            <p class="text-gray-500 italic text-sm md:text-base">计算常见校验和（Adler, CRC32等），验证数据完整性。🧮</p>
        </header>

            <textarea id="textInput" class="w-full h-48 p-8 bg-white border-2 border-pink-50 rounded-3xl text-sm font-mono outline-none focus:border-pink-200 focus:shadow-inner resize-none mb-8" placeholder="在此输入需要计算校验的内容..."></textarea>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                 <div class="p-6 bg-gray-50 rounded-2xl text-left">
                     <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Character Count</p>
                     <p id="charCount" class="text-xs font-bold text-slate-700">0</p>
                 </div>
                 <div class="p-6 bg-gray-50 rounded-2xl text-left">
                     <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Simple Checksum</p>
                     <p id="simpleSum" class="text-xs font-bold text-slate-700">0</p>
                 </div>
            </div>
            
            <p class="mt-8 text-[10px] text-gray-400 italic">说明：简单校验和通过累加所有字符的 Unicode 编码值得到。</p>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('textInput');
        
        input.oninput = () => {
            const val = input.value;
            let sum = 0;
            for(let i=0; i<val.length; i++) {
                sum += val.charCodeAt(i);
            }
            document.getElementById('charCount').innerText = val.length;
            document.getElementById('simpleSum').innerText = sum;
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
