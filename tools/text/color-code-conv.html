<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>颜色制式互转 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">颜色大师</h1>
            <p class="text-gray-500 italic text-sm md:text-base">在 HEX, RGB, HSL 等常用颜色模型之间极速互转。🎨</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-2xl mb-12 animate-item" style="animation-delay: 0.1s">
            <div class="flex flex-col items-center mb-10">
                 <div id="preview" class="w-32 h-32 rounded-3xl shadow-inner mb-6 transition-all" style="background-color: #6366f1;"></div>
                 <input type="color" id="picker" value="#6366f1" class="w-16 h-10 border-none bg-transparent cursor-pointer">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="text-left">
                    <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase">HEX</label>
                    <input type="text" id="hex" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl text-xs font-mono" value="#6366F1">
                </div>
                <div class="text-left">
                    <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase">RGB</label>
                    <input type="text" id="rgb" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl text-xs font-mono" value="99, 102, 241">
                </div>
                <div class="text-left">
                    <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase">HSL</label>
                    <input type="text" id="hsl" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl text-xs font-mono" value="239, 84%, 67%">
                </div>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const picker = document.getElementById('picker');
        const preview = document.getElementById('preview');
        const hex = document.getElementById('hex');
        const rgb = document.getElementById('rgb');
        const hsl = document.getElementById('hsl');

        function updateFromHex(h) {
            preview.style.backgroundColor = h;
            hex.value = h.toUpperCase();
            
            // RGB
            let r = parseInt(h.slice(1, 3), 16);
            let g = parseInt(h.slice(3, 5), 16);
            let b = parseInt(h.slice(5, 7), 16);
            rgb.value = `${r}, ${g}, ${b}`;
            
            // HSL logic
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h_val, s, l = (max + min) / 2;
            if(max == min) { h_val = s = 0; }
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch(max){
                    case r: h_val = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h_val = (b - r) / d + 2; break;
                    case b: h_val = (r - g) / d + 4; break;
                }
                h_val /= 6;
            }
            hsl.value = `${Math.round(h_val*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%`;
        }

        picker.oninput = (e) => updateFromHex(e.target.value);
        hex.oninput = (e) => {
            if(/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) updateFromHex(e.target.value);
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
