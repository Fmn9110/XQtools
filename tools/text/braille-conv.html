<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>盲文转换 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">盲文转换 (Braille)</h1>
            <p class="text-gray-500 italic text-sm md:text-base">将普通文本转换为盲文字符，适合创意设计或特殊交流。⠝</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-2xl mb-12 animate-item" style="animation-delay: 0.1s">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="text-left">
                    <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase">普通文本</label>
                    <textarea id="text" class="w-full h-48 p-4 bg-gray-50 border border-gray-100 rounded-2xl text-xs outline-none" placeholder="Hello..."></textarea>
                </div>
                <div class="text-left">
                    <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase">盲文结果</label>
                    <textarea id="braille" class="w-full h-48 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-2xl font-serif outline-none" placeholder="⠓⠑⠇⠇⠕"></textarea>
                </div>
            </div>

            <div class="flex gap-4 justify-center">
                <button onclick="toBraille()" class="theme-download-btn px-12 py-4">Text ➡️ Braille</button>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const brailleAlphabet = {
            'a': '⠁', 'b': '⠃', 'c': '⠉', 'd': '⠙', 'e': '⠑', 'f': '⠋', 'g': '⠛', 'h': '⠓', 'i': '⠊', 'j': '⠚', 'k': '⠅', 'l': '⠇', 'm': '⠍', 'n': '⠝', 'o': '⠕', 'p': '⠌', 'q': '⠬', 'r': '⠜', 's': '⠎', 't': '⠞', 'u': '⠥', 'v': '⠧', 'w': '⠺', 'x': '⠭', 'y': '⠽', 'z': '⠵', ' ': ' ',
            '1': '⠼⠁', '2': '⠼⠃', '3': '⠼⠉', '4': '⠼⠙', '5': '⠼⠑', '6': '⠼⠋', '7': '⠼⠛', '8': '⠼⠓', '9': '⠼⠊', '0': '⠼⠚'
        };

        function toBraille() {
            const val = document.getElementById('text').value.toLowerCase();
            const res = Array.from(val).map(c => brailleAlphabet[c] || c).join('');
            document.getElementById('braille').value = res;
            Utils.toast('转换完成', 'success');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
