<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASCII 艺术字 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/figlet.js/1.5.0/figlet.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">ASCII 艺术字</h1>
            <p class="text-gray-500 italic text-sm md:text-base">将普通字符转化为酷炫的字符拼贴画，代码注释必备。🎨</p>
        </header>

            <div class="flex flex-wrap gap-4 mb-8">
                <input type="text" id="textInput" value="Q-Tools" class="flex-grow p-4 bg-gray-50 border border-gray-100 rounded-xl text-sm outline-none font-bold" placeholder="输入英文单词...">
                <select id="fontSelect" class="p-4 bg-white border border-gray-100 rounded-xl text-xs">
                    <option value="Standard">标准 (Standard)</option>
                    <option value="Slant">倾斜 (Slant)</option>
                    <option value="Shadow">阴影 (Shadow)</option>
                    <option value="Banner">横幅 (Banner)</option>
                    <option value="Mini">迷你 (Mini)</option>
                </select>
                <button id="genBtn" class="theme-download-btn px-8 py-4">立即生成</button>
            </div>

            <pre id="outputArea" class="w-full min-h-[300px] p-10 bg-slate-900 text-green-400 rounded-3xl text-[10px] md:text-sm font-mono overflow-auto scrollbar-hide text-left leading-none"></pre>

            <div class="mt-8 flex gap-4 justify-center">
                <button id="copyBtn" class="theme-secondary-btn px-8 py-4">复制艺术字</button>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('textInput');
        const output = document.getElementById('outputArea');
        const fontSelect = document.getElementById('fontSelect');

        function generate() {
            const val = input.value || 'Q';
            figlet(val, { font: fontSelect.value }, function(err, data) {
                if (err) {
                    Utils.toast('生成失败', 'error');
                    return;
                }
                output.textContent = data;
            });
        }

        document.getElementById('genBtn').onclick = generate;
        document.getElementById('copyBtn').onclick = () => {
             navigator.clipboard.writeText(output.textContent).then(() => {
                 Utils.toast('艺术字已复制', 'success');
             });
        };

        // Initial
        generate();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
