<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贝塞尔曲线 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">Cubic Bezier 动效助手</h1>
            <p class="text-gray-500 italic text-sm md:text-base">可视化自定义 CSS 动画曲线，预览运行效果。🎢</p>
        </header>

            <div class="w-full h-8 bg-gray-50 rounded-full mb-12 relative overflow-hidden">
                 <div id="ball" class="w-6 h-6 bg-indigo-600 rounded-full absolute top-1 left-0 transition-all duration-1000" style="transition-timing-function: cubic-bezier(0.42, 0, 0.58, 1);"></div>
            </div>
            
            <input type="text" id="bezierInput" class="w-full p-4 bg-slate-50 border border-indigo-100 rounded-xl text-center font-mono text-indigo-600 mb-8" value="0.42, 0, 0.58, 1">
            
            <button onclick="run()" class="theme-download-btn px-12 py-4 mb-8">运行预览</button>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
                 <button onclick="set('0,0,1,1')" class="theme-secondary-btn p-4">linear</button>
                 <button onclick="set('0.42,0,1,1')" class="theme-secondary-btn p-4">ease-in</button>
                 <button onclick="set('0,0,0.58,1')" class="theme-secondary-btn p-4">ease-out</button>
                 <button onclick="set('0.42,0,0.58,1')" class="theme-secondary-btn p-4">ease-in-out</button>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const ball = document.getElementById('ball');
        const input = document.getElementById('bezierInput');

        window.run = () => {
             ball.style.transitionTimingFunction = `cubic-bezier(${input.value})`;
             ball.style.left = ball.style.left === "95%" ? "0%" : "95%";
        };

        window.set = (v) => {
            input.value = v;
            run();
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
