<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正则测试器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen pb-20 md:pb-0">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">正则表达式测试</h1>
            <p class="text-gray-500 italic">实时匹配测试，支持全局、忽略大小写等模式。🔍</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-xl mb-12">
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                 <div class="flex-1 relative group">
                    <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-2 ml-2">正则表达式</label>
                    <input type="text" id="regexInput" class="w-full p-6 bg-pink-50/20 border-2 border-pink-50 rounded-2xl text-lg font-mono outline-none focus:border-pink-200 transition-all shadow-inner" placeholder="/your-regex/">
                 </div>
                 <div class="flex items-end gap-3 pb-2 md:pb-4 justify-center">
                      <label class="flex flex-col items-center gap-1 group cursor-pointer">
                          <span class="text-[10px] font-bold text-pink-300 group-hover:text-pink-400 transition-colors">Global</span>
                          <input type="checkbox" id="flagG" checked class="w-5 h-5 accent-pink-500 border-pink-100 rounded">
                      </label>
                      <label class="flex flex-col items-center gap-1 group cursor-pointer">
                          <span class="text-[10px] font-bold text-pink-300 group-hover:text-pink-400 transition-colors">Ignore</span>
                          <input type="checkbox" id="flagI" class="w-5 h-5 accent-pink-500 border-pink-100 rounded">
                      </label>
                 </div>
            </div>

            <div class="relative group mb-8">
                <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-2 ml-2">待匹配文本</label>
                <textarea id="testText" class="w-full h-48 p-6 bg-pink-50/10 border-2 border-pink-50 rounded-[2rem] text-sm font-mono outline-none focus:border-pink-200 transition-all resize-none shadow-inner" placeholder="在此输入待匹配的文本内容..."></textarea>
                <button onclick="clearAll()" class="absolute right-6 top-10 text-pink-200 hover:text-pink-400 p-2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
            
            <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-2 ml-2 text-left">匹配结果预览</label>
            <div id="matchRes" class="p-8 bg-pink-50/30 rounded-[2.5rem] border border-pink-50 text-left text-sm font-mono min-h-[120px] break-all leading-relaxed shadow-inner">
                <span class="text-pink-200 italic">等待输入进行实时匹配...</span>
            </div>
        </section>
    </main>



    <script src="../../assets/js/utils.js"></script>
    <script>
        const regInput = document.getElementById('regexInput');
        const testArea = document.getElementById('testText');
        const resBox = document.getElementById('matchRes');
        const flagG = document.getElementById('flagG');
        const flagI = document.getElementById('flagI');

        function test() {
            const pattern = regInput.value;
            const text = testArea.value;
            
            if(!pattern) {
                resBox.innerHTML = '<span class="text-pink-200 italic">请输入正则表达式以开始匹配...</span>';
                return;
            }
            if(!text) {
                resBox.innerHTML = '<span class="text-pink-200 italic">请输入匹配文本...</span>';
                return;
            }

            try {
                let flags = "";
                if(flagG.checked) flags += "g";
                if(flagI.checked) flags += "i";
                
                const re = new RegExp(pattern, flags);
                const matches = text.match(re);
                
                if(matches) {
                    // Filter unique and avoid empty strings if possible
                    const filteredMatches = flags.includes('g') ? matches : [matches[0]];
                    resBox.innerHTML = filteredMatches.map(m => `<span class="bg-pink-500 text-white px-2 py-0.5 rounded-lg mx-0.5 shadow-sm inline-block my-1">${m}</span>`).join('');
                    // Only toast on manual trigger or significant change if needed, but here we'll skip to avoid too many toasts during typing
                } else {
                    resBox.innerHTML = '<span class="text-gray-400 bg-gray-100 px-3 py-1 rounded-lg">未发现匹配项</span>';
                }
            } catch(e) {
                resBox.innerHTML = `<span class="text-red-400 font-bold group flex items-center gap-2 animate-pulse">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    正则错误: ${e.message}
                </span>`;
            }
        }

        regInput.oninput = test;
        testArea.oninput = test;
        flagG.onchange = test;
        flagI.onchange = test;

        function clearAll() {
            testArea.value = '';
            regInput.value = '';
            test();
            Utils.toast('已重置测试器', 'info');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
