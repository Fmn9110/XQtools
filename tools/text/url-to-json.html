<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URL传参转JSON - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#FFF5F7] min-h-screen pb-20 md:pb-0">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 py-4 px-6 bg-white/70 backdrop-blur-lg border-b border-pink-100 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="location.href='../../index.html'">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-pink-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200 group-hover:rotate-6 transition-transform">
                <span class="font-black">Q</span>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-pink-400">小Q工具箱</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
            <a href="../../tools.html" class="text-pink-400 hover:text-pink-600 font-medium transition-colors">所有工具</a>
            <a href="../../categories.html" class="text-gray-500 hover:text-pink-500 font-medium transition-colors">分类列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">URL 参数转 JSON</h1>
            <p class="text-gray-500 italic">将 URL Query String 转换为结构化的 JSON 对象。🧩</p>
        </header>

        <section class="cute-card p-6 md:p-10 bg-white shadow-xl mb-12">
            <div class="relative group mb-8">
                <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-3 ml-2">URL 或 Query String</label>
                <textarea id="textInput" class="w-full h-32 p-6 bg-pink-50/10 border-2 border-pink-50 rounded-[2rem] text-sm outline-none focus:border-pink-200 transition-all resize-none shadow-inner" placeholder="在此粘贴 URL 或 Query String (e.g. name=lee&age=18)..."></textarea>
                <button onclick="clearRaw()" class="absolute right-6 top-10 text-pink-200 hover:text-pink-400 p-2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
            
            <button id="execBtn" class="theme-download-btn w-full py-4 text-base font-bold shadow-lg shadow-pink-100 mb-8">
                ✨ 立即转换
            </button>

            <div class="relative group">
                <label class="block text-[10px] font-bold text-pink-300 uppercase tracking-widest mb-3 ml-2">JSON 结果</label>
                <textarea id="textOutput" readonly class="w-full h-64 p-8 bg-pink-50/10 border border-pink-50 rounded-[2.5rem] text-sm font-mono outline-none resize-none shadow-inner" placeholder="JSON 结果..."></textarea>
            </div>
        </section>
    </main>



    <script src="../../assets/js/utils.js"></script>
    <script>
        document.getElementById('execBtn').onclick = () => {
             const val = document.getElementById('textInput').value;
             if(!val) { Utils.toast('请输入 URL 或参数', 'warning'); return; }
             try {
                 const search = val.includes('?') ? val.split('?')[1] : val;
                 const params = new URLSearchParams(search);
                 const obj = {};
                 for(let [key, value] of params) {
                     obj[key] = value;
                 }
                 document.getElementById('textOutput').value = JSON.stringify(obj, null, 4);
                 Utils.toast('转换成功', 'success');
             } catch(e) {
                 Utils.toast('解析错误', 'error');
             }
        };

        function clearRaw() {
            document.getElementById('textInput').value = '';
            Utils.toast('已清空', 'info');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
