<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>代码截图生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">代码艺术画布</h1>
            <p class="text-gray-500 italic text-sm md:text-base">将代码片段转换为高颜值的社交平台分享图。🎨</p>
        </header>

            <div id="captureArea" class="w-full p-12 rounded-3xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-2xl mb-10 overflow-hidden">
                 <div class="bg-slate-900 rounded-xl shadow-2xl p-8 text-left overflow-hidden border border-slate-700/50">
                      <div class="flex gap-1.5 mb-6">
                           <div class="w-3 h-3 rounded-full bg-red-400"></div>
                           <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                           <div class="w-3 h-3 rounded-full bg-green-400"></div>
                      </div>
                      <pre id="codePreview" class="text-indigo-200 font-mono text-sm leading-relaxed outline-none" contenteditable="true">function hello() {
    console.log("Hello, Art!");
}</pre>
                 </div>
            </div>
            
            <p class="text-[10px] text-gray-400 italic mb-8 uppercase tracking-widest leading-loose">
                 点击上方代码区域可直接编辑。后续版本将支持更换背景图。
            </p>

            <button onclick="Utils.toast('截图功能开发中', 'info')" class="theme-download-btn px-12 py-4">下载图片 (Beta)</button>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
