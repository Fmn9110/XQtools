<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大小写转换 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">大小写转换</h1>
            <p class="text-gray-500 italic text-sm md:text-base">支持全大写、全小写、驼峰、帕斯卡等多种文本格式一键转换。🔡</p>
        </header>

            <textarea id="textInput" class="w-full h-64 p-8 bg-teal-50/10 border-2 border-teal-50 rounded-3xl text-sm outline-none focus:border-teal-100 transition-all resize-none mb-8" placeholder="输入英文文本..."></textarea>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="transform('upper')" class="theme-secondary-btn py-4">全大写 (UPPER)</button>
                <button onclick="transform('lower')" class="theme-secondary-btn py-4">全小写 (lower)</button>
                <button onclick="transform('title')" class="theme-secondary-btn py-4">单词首字母 (Title)</button>
                <button onclick="transform('sentence')" class="theme-secondary-btn py-4">句首大写 (Sent.)</button>
                <button onclick="transform('camel')" class="theme-secondary-btn py-4">小驼峰 (camelCase)</button>
                <button onclick="transform('pascal')" class="theme-secondary-btn py-4">大驼峰 (PascalCase)</button>
                <button onclick="transform('snake')" class="theme-secondary-btn py-4">蛇形 (snake_case)</button>
                <button id="copyBtn" class="theme-download-btn py-4">复制结果</button>
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('textInput');

        function transform(type) {
            const val = input.value;
            if(!val) return;

            let result = '';
            switch(type) {
                case 'upper': result = val.toUpperCase(); break;
                case 'lower': result = val.toLowerCase(); break;
                case 'title': 
                    result = val.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                    break;
                case 'sentence':
                    result = val.toLowerCase().replace(/(^\w|\.\s+\w)/g, c => c.toUpperCase());
                    break;
                case 'camel':
                    result = val.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (m, c) => c.toUpperCase());
                    break;
                case 'pascal':
                    const camel = val.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (m, c) => c.toUpperCase());
                    result = camel.charAt(0).toUpperCase() + camel.slice(1);
                    break;
                case 'snake':
                    result = val.replace(/\s+/g, '_').toLowerCase();
                    break;
            }
            input.value = result;
            Utils.toast('转换成功', 'success');
        }

        document.getElementById('copyBtn').onclick = () => {
            if(!input.value) return;
            navigator.clipboard.writeText(input.value).then(() => {
                Utils.toast('已复制', 'success');
            });
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
