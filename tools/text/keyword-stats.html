<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>关键词统计 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 text-gradient">关键词统计中心</h1>
            <p class="text-gray-500 italic text-sm md:text-base">自动提取文中的高频词汇并排行，快速锁定文章核心。🏷️</p>
        </header>

            <textarea id="textInput" class="w-full h-80 p-8 bg-white border-2 border-pink-50 rounded-3xl text-sm outline-none focus:border-pink-200 transition-all resize-none mb-8" placeholder="在此粘贴长文本内容..."></textarea>
            
            <div class="flex gap-4 justify-center">
                <button id="calcBtn" class="theme-download-btn px-12 py-4">分析词频</button>
            </div>
        </section>

        <section id="resultArea" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 mb-12 animate-fade-in">
             <div class="cute-card p-6 bg-white shadow-lg text-left">
                  <h3 class="font-bold text-gray-800 mb-6 flex justify-between">
                       <span>TOP 20 高频词</span>
                       <span class="text-[10px] text-gray-400">词汇 / 频率</span>
                  </h3>
                  <div id="wordList" class="space-y-3 h-[300px] overflow-auto scrollbar-hide">
                       <!-- List -->
                  </div>
             </div>
             <div class="cute-card p-6 bg-white shadow-lg text-left flex flex-col justify-center">
                  <h3 class="font-bold text-gray-800 mb-2">摘要洞察</h3>
                  <p id="summaryText" class="text-sm text-gray-400 leading-relaxed italic">分析结果将为您提供核心关键词的权重模型。</p>
             </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const input = document.getElementById('textInput');
        const calcBtn = document.getElementById('calcBtn');
        const resultArea = document.getElementById('resultArea');
        const wordList = document.getElementById('wordList');

        calcBtn.onclick = () => {
             const val = input.value.trim();
             if (!val) {
                 Utils.toast('请输入内容', 'warning');
                 return;
             }
             
             // Simple regex based tokenization for demo
             // Better: Use Intl.Segmenter in newer browsers
             let words;
             if (window.Intl && Intl.Segmenter) {
                 const segmenter = new Intl.Segmenter('zh', { granularity: 'word' });
                 words = Array.from(segmenter.segment(val))
                              .filter(s => s.isWordLike)
                              .map(s => s.segment);
             } else {
                 words = val.match(/[\u4e00-\u9fa5]{2,}|[a-zA-Z]+/g) || [];
             }

             const freq = {};
             words.forEach(w => {
                 if (w.length < 2) return; 
                 freq[w] = (freq[w] || 0) + 1;
             });

             const sorted = Object.entries(freq)
                                 .sort((a,b) => b[1] - a[1])
                                 .slice(0, 20);

             wordList.innerHTML = sorted.map(([w, f], idx) => `
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="w-5 h-5 bg-pink-50 text-[10px] flex items-center justify-center rounded-full text-pink-400">${idx+1}</span>
                        <span class="font-bold text-gray-700">${w}</span>
                    </div>
                    <div class="flex items-center gap-2 flex-grow mx-4">
                        <div class="h-1 bg-pink-50 rounded-full flex-grow relative overflow-hidden">
                             <div class="absolute inset-y-0 left-0 bg-pink-400 rounded-full" style="width: ${Math.min(100, (f/sorted[0][1])*100)}%"></div>
                        </div>
                    </div>
                    <span class="text-xs text-gray-400 font-mono">${f}</span>
                </div>
             `).join('');

             resultArea.classList.remove('hidden');
             Utils.toast('词频分析完成', 'success');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
