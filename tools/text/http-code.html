<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTTP状态码速查 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm bg-white/80 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">
                    Q
                </div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="../../index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="../../categories.html" class="hover:text-pink-500 transition-colors">全部分类</a>
                <a href="../../tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
            <div class="md:hidden">
                <a href="../../tools.html" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <span class="text-2xl">🛠️</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl text-center">
        <header class="mb-12 animate-item">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 text-gradient">HTTP 状态码词典</h1>
            <p class="text-gray-500 italic text-sm md:text-base">404, 500, 200... 快速检索每一个 HTTP 响应码的深刻内涵。📖</p>
        </header>

            <input type="text" id="searchInput" class="w-full p-6 bg-white border-2 border-pink-50 rounded-3xl text-2xl font-black text-center outline-none focus:border-pink-200 mb-10 transition-all" placeholder="输入状态码 (如 200)">
            
            <div id="resList" class="space-y-4 text-left">
                 <!-- Generated List -->
            </div>
        </section>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const codes = {
            "200": "OK - 请求成功",
            "201": "Created - 已创建",
            "301": "Moved Permanently - 永久重定向",
            "302": "Found - 临时重定向",
            "400": "Bad Request - 客户端请求语法错误",
            "401": "Unauthorized - 请求要求身份验证",
            "403": "Forbidden - 服务器拒绝请求",
            "404": "Not Found - 资源不存在",
            "500": "Internal Server Error - 服务器内部错误",
            "502": "Bad Gateway - 无效响应",
            "503": "Service Unavailable - 服务不可用"
        };

        const input = document.getElementById('searchInput');
        const list = document.getElementById('resList');

        function render(filter = "") {
            list.innerHTML = Object.entries(codes)
                .filter(([k]) => k.includes(filter))
                .map(([k, v]) => `
                    <div class="flex items-center gap-6 p-6 bg-white border border-pink-50 rounded-2xl group hover:bg-pink-400 transition-all">
                        <span class="text-2xl font-black text-pink-500 group-hover:text-white">${k}</span>
                        <span class="text-sm font-bold text-gray-700 group-hover:text-white">${v}</span>
                    </div>
                `).join('');
        }

        input.oninput = (e) => render(e.target.value);
        render();
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
