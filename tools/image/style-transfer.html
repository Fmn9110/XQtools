    <script src="../../assets/js/utils.js"></script>
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewStage = document.getElementById('preview-stage');
        const mainPreview = document.getElementById('main-preview');
        const filterCards = document.querySelectorAll('.filter-card');
        const downloadBtn = document.getElementById('download-btn');

        let currentFilter = 'none';

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                mainPreview.src = e.target.result;
                dropZone.classList.add('hidden');
                previewStage.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        filterCards.forEach(card => {
            card.onclick = () => {
                filterCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentFilter = card.dataset.filter;
                mainPreview.style.filter = currentFilter;
            };
        });

        downloadBtn.onclick = () => {
            if (!mainPreview.src) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = mainPreview.naturalWidth;
            canvas.height = mainPreview.naturalHeight;

            // 应用滤镜到 Canvas
            ctx.filter = currentFilter;
            ctx.drawImage(mainPreview, 0, 0);

            Utils.downloadFile(canvas.toDataURL('image/jpeg', 0.92), 'style_' + Date.now() + '.jpg', 'image/jpeg');
            Utils.toast('保存成功！', 'success');
        };
    </script>
