<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>视频缩略图 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f6]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-rose-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg font-bold">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-400 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-4xl text-center">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4 tracking-tight">视频帧提取</h1>
            <p class="text-gray-500 text-lg">轻松从视频中截取高清缩略图，捕捉每一个精彩瞬间 🎬</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white border border-rose-50 shadow-sm rounded-3xl">
            <div id="upload-area" class="w-full max-w-md p-8 md:p-16 border-4 border-dashed border-pink-50 rounded-3xl mb-8 group hover:border-pink-200 transition-all cursor-pointer bg-pink-50/30 mx-auto" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="video/*" class="hidden" onchange="loadVideo(event)">
                <div class="text-7xl mb-6 opacity-40 group-hover:scale-110 transition-transform">📁</div>
                <p class="text-lg font-bold text-pink-300">选择视频文件</p>
            </div>

            <div id="editor-area" class="hidden animate-fade-in space-y-8 text-center px-4">
                <div class="relative inline-block w-full max-w-xl bg-black rounded-2xl shadow-xl overflow-hidden border-4 border-white">
                    <video id="video" class="w-full" controls></video>
                </div>

                <div class="flex flex-col md:flex-row gap-4 items-center justify-center bg-pink-50/50 p-6 rounded-2xl border border-pink-100/50">
                    <div class="flex items-center gap-3">
                        <label class="text-sm font-bold text-gray-600">跳转到 (秒)</label>
                        <input type="number" id="seekTime" value="1" min="0" step="0.5" class="w-24 p-3 bg-white rounded-xl border border-pink-100 outline-none focus:ring-2 focus:ring-pink-200 transition-all text-gray-700 font-mono font-bold text-center">
                    </div>
                    <button onclick="capture()" class="px-8 py-3 bg-pink-400 text-white rounded-xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-500 transition-all active:scale-95 flex items-center gap-2">
                        <span>📸 捕捉当前帧</span>
                    </button>
                </div>

                <div class="space-y-4">
                    <h3 class="font-bold text-gray-800 text-lg flex items-center justify-center gap-2">
                        <span class="w-2 h-5 bg-pink-400 rounded-full"></span> 已提取的缩略图
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="thumbs"></div>
                </div>
            </div>
        </section>
    
        <!-- 视频缩略图 的专属定制说明与FAQ区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in custom-faq-section">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">
                        
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💬</span>
                    视频缩略图 - 常见答疑
                </h2>
                <div class="space-y-4">
                    
                <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm mt-4 hover:border-pink-200 transition-colors">
                    <div class="font-bold text-gray-700 mb-2 flex items-center">
                        <span class="w-1.5 h-1.5 rounded-full bg-pink-400 mr-2"></span>
                        为啥我处理【视频缩略图】的时候，放在公司电脑处理和随身手机端耗时悬殊如此巨大？
                    </div>
                    <div class="text-gray-500 text-sm leading-relaxed pl-3.5">这也是本地纯前端小工具站最大的特性反馈。因为它所有的运算均不借助光纤去发往超级机房借兵，它所有的性能天花板全权依赖于您手中设备的物理硬实力芯片能力。</div>
                </div>
                </div>
            </section>
        </div>

    </main>
<footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱</footer>
<script>
const video=document.getElementById('video');
function loadVideo(e){
    const file=e.target.files[0];if(!file)return;
    video.src=URL.createObjectURL(file);
    document.getElementById('upload-area').classList.add('hidden');
    document.getElementById('editor-area').classList.remove('hidden');
}
function capture(){
    const time=parseFloat(document.getElementById('seekTime').value)||0;
    video.currentTime=time;
    video.onseeked=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(video,0,0);
        const dataUrl=canvas.toDataURL('image/png');
        const div=document.createElement('div');
        div.className='bg-white rounded-2xl p-3 text-center border border-pink-50 shadow-sm hover:shadow-md transition-shadow group';
        div.innerHTML=`
            <div class="relative mb-2 overflow-hidden rounded-xl">
                <img src="${dataUrl}" class="w-full aspect-video object-cover transition-transform group-hover:scale-105">
            </div>
            <p class="text-xs font-mono font-bold text-gray-400 mb-2">${time}s</p>
            <a href="${dataUrl}" download="thumb-${time}s.png" class="inline-flex items-center gap-1 text-xs text-pink-500 font-bold hover:text-pink-600">📥 下载</a>
        `;
        document.getElementById('thumbs').prepend(div);
        video.onseeked=null;
        Utils.toast('截取成功！', 'success');
    };
}
</script>
    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body></html>
