<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网页长截图 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f6]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-rose-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg font-bold">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-400 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-4xl text-center">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4 tracking-tight">多图拼接长图</h1>
            <p class="text-gray-500 text-lg">将多张截图按顺序纵向拼接，轻松制作长图分享 📜</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white border border-rose-50 shadow-sm rounded-3xl">
            <div id="upload-area" class="w-full max-w-md p-8 md:p-16 border-4 border-dashed border-pink-50 rounded-3xl mb-8 group hover:border-pink-200 transition-all cursor-pointer bg-pink-50/30 mx-auto" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" multiple class="hidden" onchange="loadImgs(event)">
                <div class="text-7xl mb-6 opacity-40 group-hover:scale-110 transition-transform">🖼️</div>
                <p class="text-lg font-bold text-pink-300">选择多张图片（按顺序）</p>
                <p class="text-xs text-gray-400 mt-2">支持拖拽多张图片到此处</p>
            </div>

            <div id="editor-area" class="hidden animate-fade-in space-y-8">
                <div class="p-4 bg-pink-50/50 rounded-2xl border border-pink-100/50 inline-block px-10">
                    <p class="text-sm text-pink-400 font-bold" id="info"></p>
                </div>

                <div class="p-4 bg-white shadow-inner rounded-3xl border border-rose-50 overflow-hidden">
                    <canvas id="canvas" class="max-w-full mx-auto rounded-xl shadow-sm border border-gray-50"></canvas>
                </div>

                <button onclick="dl()" id="dlBtn" class="w-full py-4 bg-pink-400 text-white font-bold rounded-xl shadow-lg shadow-pink-100 hover:bg-pink-500 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span>📥 下载拼接长图</span>
                </button>
            </div>
        </section>
<section class="cute-card p-6 mb-8 bg-white"><h2 class="text-xl font-bold text-gray-800 mb-3">📘 使用说明</h2><ol class="text-gray-600 text-sm space-y-2 list-decimal list-inside"><li>选择多张截图（按从上到下的顺序）</li><li>工具自动将它们纵向拼接</li><li>下载拼接后的长图</li></ol></section>
</main>
<footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱</footer>
<script>
function loadImgs(e){
    const files=Array.from(e.target.files);
    if(!files.length)return;
    const imgs=[];let loaded=0;
    files.forEach((f,i)=>{
        const img=new Image();
        img.onload=()=>{imgs[i]=img;loaded++;if(loaded===files.length)stitch(imgs);};
        img.src=URL.createObjectURL(f);
    });
}
function stitch(imgs){
    const maxW=Math.max(...imgs.map(i=>i.width));
    const totalH=imgs.reduce((s,i)=>s+Math.round(i.height*(maxW/i.width)),0);
    document.getElementById('upload-area').classList.add('hidden');
    document.getElementById('editor-area').classList.remove('hidden');
    const canvas=document.getElementById('canvas');canvas.width=maxW;canvas.height=totalH;
    const ctx=canvas.getContext('2d');
    let y=0;
    imgs.forEach(img=>{
        const h=Math.round(img.height*(maxW/img.width));
        ctx.drawImage(img,0,y,maxW,h);y+=h;
    });
    document.getElementById('info').textContent=`已拼接 ${imgs.length} 张图 → ${maxW}×${totalH}`;
}
function dl(){const a=document.createElement('a');a.download='long-pic.png';a.href=document.getElementById('canvas').toDataURL();a.click();}
</script>
    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body></html>
