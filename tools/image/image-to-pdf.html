<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片转 PDF - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">图片转 PDF</h1>
            <p class="text-gray-500">将多张图片串联成册，一键生成 PDF 📄</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
            <div id="upload-area" class="w-full h-64 md:h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all duration-500 cursor-pointer bg-pink-50/30 text-center">
                <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
                <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform duration-500">📄</div>
                <p class="text-pink-400 font-bold text-lg px-4 text-center">点击或拖拽上传多张图片</p>
                <p class="text-pink-300 text-sm mt-2 text-center">支持批量选择 JPG, PNG, WebP</p>
            </div>

            <div id="editor-area" class="w-full hidden animate-fade-in">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-[#4a4a4a]">已选择图片 (<span id="fileCount">0</span>)</h3>
                    <button id="addMoreBtn" class="text-sm font-bold text-pink-500 hover:text-pink-600 flex items-center gap-1">
                        <span>+</span> 继续添加
                    </button>
                </div>

                <div id="previewList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mb-10 max-h-[400px] overflow-y-auto p-2 scrollbar-hide">
                    <!-- 预览项将动态添加 -->
                </div>

                <div class="flex flex-col md:flex-row gap-4 justify-center px-4 md:px-0 py-4 border-t border-pink-50 pt-8">
                    <button id="convertBtn" class="cute-button px-10 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-lg flex items-center justify-center gap-2">
                        <span>🚀</span> 生成并下载 PDF
                    </button>
                    <button id="clearBtn" class="px-10 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all">清空列表</button>
                </div>
            </div>
        </section>

        <!-- 说明与FAQ区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">PDF 的页面顺序将按照您选择图片的先后顺序排列。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">工具会自动根据图片尺寸调整 PDF 的页面规格，确保图片不缩放变形。</p>
                        </li>
                    </ul>
                </div>
            </section>

            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">💬</span>
                    常见答疑
                </h2>
                <div class="space-y-4">
                    <div class="bg-white/60 backdrop-blur-sm p-6 rounded-[2rem] border border-white shadow-lg shadow-pink-100/20">
                        <h3 class="font-bold text-[#4a4a4a] mb-2 flex items-center gap-2">
                            <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                            有上传数量限制吗？
                        </h3>
                        <p class="text-gray-500 text-sm leading-relaxed">建议一次转换不超过 50 张图片以保证浏览器运行流畅。</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const { jsPDF } = window.jspdf;
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const previewList = document.getElementById('previewList');
        const fileCountSpan = document.getElementById('fileCount');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const addMoreBtn = document.getElementById('addMoreBtn');
        const loader = document.getElementById('loader-overlay');

        let imageFiles = [];

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();
        addMoreBtn.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) handleFiles(files);
        };

        async function handleFiles(files) {
            showLoader();
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                const dataUrl = await Utils.readFileAsDataURL(file);
                imageFiles.push({ file, dataUrl });
                
                const item = document.createElement('div');
                item.className = 'relative aspect-[3/4] rounded-2xl overflow-hidden shadow-sm border border-pink-100 group';
                item.innerHTML = `
                    <img src="${dataUrl}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <button class="w-8 h-8 bg-white/20 backdrop-blur-md rounded-full text-white font-bold hover:bg-pink-500 transition-colors">×</button>
                    </div>
                `;
                const removeBtn = item.querySelector('button');
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    const index = imageFiles.findIndex(f => f.dataUrl === dataUrl);
                    if (index > -1) {
                        imageFiles.splice(index, 1);
                        item.remove();
                        updateFileCount();
                    }
                };
                previewList.appendChild(item);
            }
            updateFileCount();
            uploadArea.classList.add('hidden');
            editorArea.classList.remove('hidden');
            hideLoader();
        }

        function updateFileCount() {
            fileCountSpan.textContent = imageFiles.length;
            if (imageFiles.length === 0) {
                uploadArea.classList.remove('hidden');
                editorArea.classList.add('hidden');
            }
        }

        convertBtn.onclick = async () => {
            if (imageFiles.length === 0) return;
            showLoader();
            
            try {
                const doc = new jsPDF({
                    orientation: 'p',
                    unit: 'px',
                    compress: true
                });

                for (let i = 0; i < imageFiles.length; i++) {
                    const img = new Image();
                    img.src = imageFiles[i].dataUrl;
                    await new Promise(resolve => img.onload = resolve);

                    const imgW = img.width;
                    const imgH = img.height;
                    
                    if (i > 0) doc.addPage([imgW, imgH], imgW > imgH ? 'l' : 'p');
                    else doc.deletePage(1), doc.addPage([imgW, imgH], imgW > imgH ? 'l' : 'p');
                    
                    doc.addImage(imageFiles[i].dataUrl, 'JPEG', 0, 0, imgW, imgH);
                }

                doc.save(`images_${Date.now()}.pdf`);
                Utils.toast('PDF 生成成功！', 'success');
            } catch (err) {
                Utils.toast('生成 PDF 失败', 'error');
            }
            hideLoader();
        };

        clearBtn.onclick = () => {
            imageFiles = [];
            previewList.innerHTML = '';
            updateFileCount();
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
