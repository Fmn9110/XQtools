<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片阴影添加 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        #preview-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">图片阴影添加</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">为您的素材添加具有高级感的层次阴影，瞬间提升质感。✨</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 flex flex-col md:flex-row gap-8 md:gap-12 items-start animate-item" style="animation-delay: 0.2s">
            <div class="flex-1 w-full flex flex-col items-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 text-center hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🔳</div>
                    <p class="text-xl font-bold text-gray-700">将图片拖入这里</p>
                    <p class="text-pink-400 mt-2 text-sm italic">点击或拖拽上传</p>
                </div>

                <div id="preview-stage" class="hidden w-full animate-fade-in flex flex-col items-center">
                    <canvas id="preview-canvas" class="shadow-inner border border-gray-100"></canvas>
                </div>
            </div>

            <div class="w-full md:w-80 space-y-6 bg-pink-50/30 p-6 md:p-8 rounded-3xl">
                <h3 class="font-bold text-gray-800 flex items-center">
                    <span class="w-1.5 h-6 bg-pink-400 rounded-full mr-3"></span>
                    阴影细节
                </h3>
                
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-600">模糊半径 (Blur)</label>
                    <input type="range" id="shadow-blur" min="0" max="100" value="40" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                </div>

                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-600">水平偏移 (Offset X)</label>
                    <input type="range" id="shadow-x" min="-50" max="50" value="0" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                </div>

                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-600">垂直偏移 (Offset Y)</label>
                    <input type="range" id="shadow-y" min="-50" max="50" value="20" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                </div>

                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-600">阴影颜色</label>
                    <input type="color" id="shadow-color" value="#000000" class="w-full h-[50px] rounded-xl border-0 bg-transparent cursor-pointer">
                </div>

                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-600">内边距 (Padding)</label>
                    <input type="range" id="padding" min="20" max="200" value="100" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                </div>

                <div class="pt-4 space-y-3">
                    <button id="download-btn" class="cute-button w-full theme-download-btn px-6 py-4 rounded-full font-bold">确认并下载</button>
                    <button onclick="location.reload()" class="w-full theme-secondary-btn px-6 py-3 rounded-full text-sm">重新上传</button>
                </div>
            </div>
        </section>
    
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-item" style="animation-delay: 0.3s">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden h-full">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">
                        <li>上传带有透明背景或白色背景的素材效果最佳。</li>
                        <li>通过调整“内边距”可以为阴影预留足够的展示空间。</li>
                        <li>阴影颜色建议选择较暗的颜色，以获得更真实的层次感。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💬</span>
                    常见答疑
                </h2>
                <div class="space-y-4 h-full">
                    <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm hover:border-pink-200 transition-colors">
                        <div class="font-bold text-gray-700 mb-2 flex items-center">
                            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 mr-2"></span>
                            为什么导出的图片变大了？
                        </div>
                        <div class="text-gray-500 text-sm leading-relaxed pl-3.5">
                            为了放下阴影，我们会在原图四周增加“内边距”。增加的空间和阴影效果本身会使文件尺寸略微增大。
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端离线实验室 · 保护隐私 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewStage = document.getElementById('preview-stage');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        
        const shadowBlur = document.getElementById('shadow-blur');
        const shadowX = document.getElementById('shadow-x');
        const shadowY = document.getElementById('shadow-y');
        const shadowColor = document.getElementById('shadow-color');
        const paddingInput = document.getElementById('padding');
        const downloadBtn = document.getElementById('download-btn');

        let sourceImg = null;

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                sourceImg = new Image();
                sourceImg.onload = () => {
                    dropZone.classList.add('hidden');
                    previewStage.classList.remove('hidden');
                    render();
                };
                sourceImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function render() {
            if (!sourceImg) return;

            const pad = parseInt(paddingInput.value);
            canvas.width = sourceImg.width + pad * 2;
            canvas.height = sourceImg.height + pad * 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 设置阴影
            ctx.shadowBlur = parseInt(shadowBlur.value);
            ctx.shadowOffsetX = parseInt(shadowX.value);
            ctx.shadowOffsetY = parseInt(shadowY.value);
            ctx.shadowColor = shadowColor.value;

            // 绘制原图
            ctx.drawImage(sourceImg, pad, pad);
        }

        [shadowBlur, shadowX, shadowY, shadowColor, paddingInput].forEach(el => el.oninput = render);

        downloadBtn.onclick = () => {
            if (!sourceImg) return;
            Utils.downloadFile(canvas.toDataURL('image/png'), 'shadowed_' + Date.now() + '.png', 'image/png');
            Utils.toast('保存成功！', 'success');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
