    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const saveBtn = document.getElementById('saveBtn');

        uploadArea.onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.src = await Utils.readFileAsDataURL(file);
            img.onload = () => {
                uploadArea.classList.add('hidden');
                editorArea.classList.remove('hidden');
                render(img);
            };
        };

        function render(img) {
            canvas.width = img.width;
            canvas.height = img.height;
            
            // 算法：灰度 -> 反转 -> 模糊 -> 颜色减淡
            // 步骤 1: 灰度并绘制到主 Canvas
            ctx.filter = 'grayscale(100%)';
            ctx.drawImage(img, 0, 0);
            const base = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // 步骤 2: 在临时 Canvas 制作反转+模糊
            const temp = document.createElement('canvas');
            temp.width = canvas.width;
            temp.height = canvas.height;
            const tCtx = temp.getContext('2d');
            tCtx.filter = 'grayscale(100%) invert(100%) blur(5px)';
            tCtx.drawImage(img, 0, 0);
            const blend = tCtx.getImageData(0, 0, canvas.width, canvas.height);
            
            // 步骤 3: 混合
            const d1 = base.data;
            const d2 = blend.data;
            const output = ctx.createImageData(canvas.width, canvas.height);
            const d3 = output.data;

            for (let i = 0; i < d1.length; i += 4) {
                // Color Dodge formula: Result = Base / (1 - Blend)
                d3[i] = Math.min(255, d1[i] * 255 / (255 - d2[i] + 0.1));
                d3[i+1] = Math.min(255, d1[i+1] * 255 / (255 - d2[i+1] + 0.1));
                d3[i+2] = Math.min(255, d1[i+2] * 255 / (255 - d2[i+2] + 0.1));
                d3[i+3] = 255;
            }
            
            ctx.filter = 'none';
            ctx.putImageData(output, 0, 0);
        }

        saveBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/jpeg', 0.92), 'sketch_' + Date.now() + '.jpg', 'image/jpeg');
        };
    </script>
