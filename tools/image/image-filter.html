<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艺术滤镜库 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">像素美学实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">一键切换，发现不一样的色彩视界。让每张图片都拥有灵魂。🌈</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🌈</div>
                    <p class="text-xl font-bold text-gray-700">提交需要润色的艺术样本</p>
                    <p class="text-pink-400 mt-2 text-sm italic">多重深度滤镜叠加，实时预览</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden animate-fade-in flex flex-col lg:flex-row gap-8 lg:gap-12 items-start">
                <!-- Workspace -->
                <div class="flex-1 w-full space-y-6">
                    <div class="bg-gray-50 rounded-[2.5rem] p-4 flex justify-center items-center overflow-hidden border border-pink-50 shadow-inner min-h-[350px]">
                        <img id="preview" class="max-w-full max-h-[500px] rounded-2xl shadow-sm transition-all duration-500">
                    </div>
                </div>

                <!-- Controls -->
                <div class="w-full lg:w-96 space-y-8 bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50 self-stretch flex flex-col">
                    <div class="space-y-6 flex-1">
                        <h3 class="font-black text-gray-800 italic uppercase flex items-center gap-2">
                             <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                             风格选择
                        </h3>
                        
                        <div class="grid grid-cols-2 gap-4" id="filterList">
                            <button data-filter="none" class="filter-btn active-filter p-5 rounded-2xl border-2 border-pink-100 bg-pink-50 text-pink-500 font-bold text-[10px] uppercase transition-all shadow-sm">原版回归</button>
                            <button data-filter="sepia(100%)" class="filter-btn p-5 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-[10px] uppercase transition-all hover:bg-white hover:border-pink-50">绝绝紫(怀旧)</button>
                            <button data-filter="invert(100%)" class="filter-btn p-5 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-[10px] uppercase transition-all hover:bg-white hover:border-pink-50">幻彩反向</button>
                            <button data-filter="hue-rotate(90deg)" class="filter-btn p-5 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-[10px] uppercase transition-all hover:bg-white hover:border-pink-50">清凉一夏</button>
                            <button data-filter="hue-rotate(180deg)" class="filter-btn p-5 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-[10px] uppercase transition-all hover:bg-white hover:border-pink-50">多巴胺紫</button>
                            <button data-filter="saturate(200%)" class="filter-btn p-5 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-[10px] uppercase transition-all hover:bg-white hover:border-pink-50">像素躁动</button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 mt-auto">
                        <button id="saveBtn" class="w-full py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn uppercase">保存艺术成品</button>
                        <button id="resetBtn" class="w-full py-3 text-gray-400 font-bold hover:text-pink-500 transition-all theme-secondary-btn uppercase text-[10px] font-black italic">更换实验样本</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                美学建议
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <p>1. <b>情绪表达：</b>冷色调（如“清凉一夏”）适合表达宁静、疏离感；暖色调（如“绝绝紫”）则更具叙事感和复古韵味。</p>
                    <p>2. <b>动态叠加：</b>尝试在不同的风格间切换，感受色彩对图像构图重心的细微影响。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 滤镜实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const preview = document.getElementById('preview');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalUrl = '';
        let currentFilter = 'none';

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            originalUrl = await Utils.readFileAsDataURL(file);
            preview.src = originalUrl;
            uploadStage.classList.add('hidden');
            editorStage.classList.remove('hidden');
        };

        filterBtns.forEach(btn => {
            btn.onclick = () => {
                filterBtns.forEach(b => {
                    b.classList.remove('active-filter', 'bg-pink-50', 'border-pink-100', 'text-pink-500');
                    b.classList.add('bg-gray-50', 'border-transparent', 'text-gray-500');
                });
                btn.classList.add('active-filter', 'bg-pink-50', 'border-pink-100', 'text-pink-500');
                btn.classList.remove('bg-gray-50', 'border-transparent', 'text-gray-500');
                currentFilter = btn.dataset.filter;
                preview.style.filter = currentFilter;
            };
        });

        saveBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            const img = new Image();
            img.src = originalUrl;
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.filter = currentFilter;
                ctx.drawImage(img, 0, 0);
                Utils.downloadFile(canvas.toDataURL('image/jpeg', 0.95), `q_filter_${Date.now()}.jpg`, 'image/jpeg');
                Utils.toast('已保存滤镜作品', 'success');
            };
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadStage.classList.remove('hidden');
            editorStage.classList.add('hidden');
            preview.style.filter = 'none';
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
