<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>比例裁剪 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">比例裁剪</h1>
            <p class="text-gray-500">精准掌握视觉构图，适配多社交平台规格 📐</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        画幅比例
                    </h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="ratio-btn px-4 py-3 rounded-xl border-2 border-pink-50 font-bold text-pink-400 hover:bg-pink-50 transition-all text-sm" data-ratio="1">1:1 正方形</button>
                        <button class="ratio-btn px-4 py-3 rounded-xl border-2 border-pink-50 font-bold text-pink-400 hover:bg-pink-50 transition-all text-sm" data-ratio="1.777">16:9 宽屏</button>
                        <button class="ratio-btn px-4 py-3 rounded-xl border-2 border-pink-50 font-bold text-pink-400 hover:bg-pink-50 transition-all text-sm" data-ratio="0.75">3:4 经典</button>
                        <button class="ratio-btn px-4 py-3 rounded-xl border-2 border-pink-50 font-bold text-pink-400 hover:bg-pink-50 transition-all text-sm" data-ratio="1.5">3:2 画幅</button>
                        <button class="ratio-btn px-4 py-3 rounded-xl border-2 border-pink-50 font-bold text-pink-400 hover:bg-pink-50 transition-all text-sm active-ratio" data-ratio="NaN">自由比例</button>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <button id="downloadBtn" class="cute-button px-6 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-sm flex items-center justify-center gap-2">
                        <span>🚀</span> 下载裁剪图
                    </button>
                    <button id="resetBtn" class="px-6 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all text-sm">更换图片</button>
                </div>
            </div>

            <!-- 编辑区 -->
            <div class="lg:col-span-3">
                <div class="cute-card p-4 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] flex flex-col items-center justify-center min-h-[400px]">
                    <div id="upload-area" class="w-full h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all cursor-pointer bg-pink-50/30 text-center">
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                        <span class="text-4xl mb-4">🖼️</span>
                        <p class="text-pink-400 font-bold text-lg px-4">上传需要裁剪的图片</p>
                    </div>
                    
                    <div id="cropperContainer" class="hidden w-full h-[400px] bg-gray-100 rounded-2xl overflow-hidden">
                        <img id="image" class="max-w-full">
                    </div>
                    
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6">EDITOR AREA</p>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">自由比例模式下可以随意调整选框；固定比例下，选框形状将保持纵横比。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">工具会自动保留最高画质，裁剪结果将以 PNG 格式导出。</p>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <style>
        .active-ratio {
            background-color: #fce7f3;
            border-color: #f472b6;
            color: #ec4899;
        }
    </style>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const cropperContainer = document.getElementById('cropperContainer');
        const image = document.getElementById('image');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const ratioBtns = document.querySelectorAll('.ratio-btn');
        const loader = document.getElementById('loader-overlay');

        let cropper = null;

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                if (cropper) cropper.destroy();
                
                image.src = dataUrl;
                uploadArea.classList.add('hidden');
                cropperContainer.classList.remove('hidden');
                
                cropper = new Cropper(image, {
                    aspectRatio: NaN,
                    viewMode: 1,
                    background: false,
                    autoCropArea: 0.8
                });
                hideLoader();
            } catch (err) {
                Utils.toast('图像读取失败', 'error');
                hideLoader();
            }
        }

        ratioBtns.forEach(btn => {
            btn.onclick = () => {
                if (!cropper) return;
                ratioBtns.forEach(b => b.classList.remove('active-ratio'));
                btn.classList.add('active-ratio');
                const ratio = parseFloat(btn.dataset.ratio);
                cropper.setAspectRatio(ratio);
            };
        });

        downloadBtn.onclick = () => {
            if (!cropper) return Utils.toast('请先上传图片', 'warning');
            showLoader();
            const canvas = cropper.getCroppedCanvas({
                imageSmoothingQuality: 'high'
            });
            Utils.downloadFile(canvas.toDataURL('image/png'), `cropped_${Date.now()}.png`, 'image/png');
            Utils.toast('裁剪成功', 'success');
            hideLoader();
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            cropperContainer.classList.add('hidden');
            if (cropper) cropper.destroy();
            cropper = null;
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
