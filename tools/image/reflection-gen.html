<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倒影生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">倒影生成</h1>
            <p class="text-gray-500">为你的图片开启「镜像世界」，增加纵深美感 ✨</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        倒影设置
                    </h3>
                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between items-center text-xs font-bold text-gray-400 mb-3 px-1">
                                <span>透明度 (Opacity)</span>
                                <span id="opacityVal" class="text-pink-500">40%</span>
                            </div>
                            <input type="range" id="opacityRange" min="0" max="100" value="40" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                        </div>
                        <div>
                            <div class="flex justify-between items-center text-xs font-bold text-gray-400 mb-3 px-1">
                                <span>高度比例 (Height)</span>
                                <span id="heightVal" class="text-pink-500">50%</span>
                            </div>
                            <input type="range" id="heightRange" min="10" max="100" value="50" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <button id="downloadBtn" class="cute-button px-6 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-sm flex items-center justify-center gap-2">
                        <span>🚀</span> 下载成品图
                    </button>
                    <button id="resetBtn" class="px-6 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all text-sm">更换图片</button>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="lg:col-span-3">
                <div class="cute-card p-4 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] flex flex-col items-center justify-center min-h-[400px]">
                    <div id="upload-area" class="w-full h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all cursor-pointer bg-pink-50/30 text-center">
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                        <span class="text-4xl mb-4">✨</span>
                        <p class="text-pink-400 font-bold text-lg px-4">点此上传需要添加倒影的图</p>
                    </div>
                    
                    <div id="previewContainer" class="hidden w-full flex flex-col items-center">
                        <canvas id="canvas" class="max-w-full shadow-2xl rounded-xl"></canvas>
                    </div>
                    
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6">REFLECTION PREVIEW</p>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <p class="text-[#6b7280] text-sm leading-relaxed mb-4">工具会自动在图片下方生成一个垂直翻转的淡出镜像。这种效果常用于展示产品、Logo 或精美摄影，能瞬间提升页面的高级感。</p>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const previewContainer = document.getElementById('previewContainer');
        const opacityRange = document.getElementById('opacityRange');
        const heightRange = document.getElementById('heightRange');
        const opacityVal = document.getElementById('opacityVal');
        const heightVal = document.getElementById('heightVal');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loader = document.getElementById('loader-overlay');

        let originalImg = null;

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                originalImg = new Image();
                originalImg.src = dataUrl;
                originalImg.onload = () => {
                    uploadArea.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                    draw();
                    hideLoader();
                };
            } catch (err) {
                Utils.toast('读取图片失败', 'error');
                hideLoader();
            }
        }

        function draw() {
            if (!originalImg) return;

            const w = originalImg.naturalWidth;
            const h = originalImg.naturalHeight;
            const refH = h * (parseInt(heightRange.value) / 100);
            
            canvas.width = w;
            canvas.height = h + refH + 2; // +2 为了留个小缝隙或对齐

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制原图
            ctx.drawImage(originalImg, 0, 0);

            // 绘制倒影
            ctx.save();
            ctx.translate(0, h + refH + 2);
            ctx.scale(1, -1);
            ctx.drawImage(originalImg, 0, 0, w, refH, 0, 0, w, refH);
            ctx.restore();

            // 渐变蒙版
            const gradient = ctx.createLinearGradient(0, h, 0, h + refH);
            const baseOpacity = parseInt(opacityRange.value) / 100;
            gradient.addColorStop(0, `rgba(255,255,255,${1 - baseOpacity})`);
            gradient.addColorStop(1, 'rgba(255,255,255,1)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, h, w, refH + 2);
        }

        [opacityRange, heightRange].forEach(el => {
            el.oninput = () => {
                opacityVal.textContent = `${opacityRange.value}%`;
                heightVal.textContent = `${heightRange.value}%`;
                draw();
            };
        });

        downloadBtn.onclick = () => {
            if (!originalImg) return Utils.toast('请先上传图片', 'warning');
            Utils.downloadFile(canvas.toDataURL('image/png'), `reflection_${Date.now()}.png`, 'image/png');
            Utils.toast('下载成功', 'success');
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            originalImg = null;
            uploadArea.classList.remove('hidden');
            previewContainer.classList.add('hidden');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
