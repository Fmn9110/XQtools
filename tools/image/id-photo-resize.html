<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>证件照尺寸生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">证件照构图工坊</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">一键适配全球标准人像规格，让每一张证件照都完美出镜。📐</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">📷</div>
                    <p class="text-xl font-bold text-gray-700">请提交您的人像素材</p>
                    <p class="text-pink-400 mt-2 text-sm italic">后台将自动锁定面部并提供辅助线指导</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden flex flex-col lg:flex-row gap-8 lg:gap-12 animate-fade-in items-start">
                <!-- Preview -->
                <div class="flex-1 w-full bg-pink-50/20 p-6 md:p-10 rounded-[2.5rem] border border-pink-50 flex flex-col items-center min-h-[400px]">
                    <div id="canvas-wrapper" class="relative shadow-2xl bg-white border-4 border-white overflow-hidden shrink-0 transition-transform duration-500">
                        <canvas id="preview-canvas" class="block"></canvas>
                        <!-- Reference guide -->
                        <div class="pointer-events-none absolute inset-0 border border-pink-500/10">
                            <div class="border-b border-pink-500/10 absolute w-full top-1/3"></div>
                            <div class="border-b border-pink-500/10 absolute w-full top-2/3"></div>
                            <div class="border-r border-pink-500/10 absolute h-full left-1/3"></div>
                            <div class="border-r border-pink-500/10 absolute h-full left-2/3"></div>
                            <!-- Face guide oval -->
                            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-3/5 h-[70%] border-2 border-dashed border-pink-300/40 rounded-[50%]"></div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="w-full lg:w-96 space-y-6 bg-white p-8 rounded-[2rem] shadow-sm border border-pink-50">
                    <div class="space-y-4">
                        <h3 class="font-black text-gray-800 italic uppercase flex items-center gap-2">
                             <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                             选择标准规格
                        </h3>
                        <select id="sizeSelect" class="w-full px-5 py-4 bg-pink-50/50 border-2 border-transparent rounded-2xl text-gray-700 outline-none focus:border-pink-300 transition-all font-bold appearance-none cursor-pointer">
                            <option value="295x413">标准 1寸 (25x35mm)</option>
                            <option value="413x579">标准 2寸 (35x49mm)</option>
                            <option value="390x567">护照 / 小2寸 (33x48mm)</option>
                            <option value="260x378">小 1寸 (22x32mm)</option>
                            <option value="400x400">正方形简历 (400x400px)</option>
                        </select>
                    </div>

                    <div class="space-y-5 pt-4 border-t border-pink-50">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">比例缩放</label>
                            <span id="zoomVal" class="font-black text-pink-500 font-mono">100%</span>
                        </div>
                        <input type="range" id="zoomRange" min="10" max="300" value="100" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                        
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase">水平偏移</label>
                                <input type="range" id="posXRange" min="-500" max="500" value="0" class="w-full h-1.5 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase">垂直偏移</label>
                                <input type="range" id="posYRange" min="-500" max="500" value="0" class="w-full h-1.5 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 flex flex-col gap-4">
                        <button id="downloadBtn" class="w-full py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn">保存高清成片</button>
                        <button onclick="location.reload()" class="w-full py-3 text-gray-400 font-bold hover:text-pink-500 text-xs border border-gray-100 rounded-2xl theme-secondary-btn">重新选择人像</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                构图小帮手
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <p>1. 请尽量使面部圆心对准虚线椭圆中心，以保证符合大多数证件照的人像比例要求。</p>
                    <p>2. 水平、垂直刻度可协助您精准修正拍摄时的构图倾斜或偏移。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端视觉实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const sizeSelect = document.getElementById('sizeSelect');
        const zoomRange = document.getElementById('zoomRange');
        const posXRange = document.getElementById('posXRange');
        const posYRange = document.getElementById('posYRange');
        const zoomVal = document.getElementById('zoomVal');
        const downloadBtn = document.getElementById('downloadBtn');

        let img = null, baseScale = 1;

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();
        
        fileInput.onchange = async (e) => {
            if(!e.target.files[0]) return;
            const dataUrl = await Utils.readFileAsDataURL(e.target.files[0]);
            img = new Image();
            img.onload = () => {
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
                updateCanvasSize();
                resetControls();
                render();
            };
            img.src = dataUrl;
        };

        function updateCanvasSize() {
            const [w, h] = sizeSelect.value.split('x').map(Number);
            canvas.width = w; canvas.height = h;
            canvasWrapper.style.width = w + 'px';
            canvasWrapper.style.height = h + 'px';
            
            const ratio = Math.min((window.innerWidth > 1024 ? 500 : 320) / w, 450 / h);
            canvasWrapper.style.transform = ratio < 1 ? `scale(${ratio})` : 'none';
            canvasWrapper.style.transformOrigin = 'top center';
            
            baseScale = Math.max(w / img.width, h / img.height);
        }

        function resetControls() {
            zoomRange.value = 100; posXRange.value = 0; posYRange.value = 0;
            posXRange.min = -img.width; posXRange.max = img.width;
            posYRange.min = -img.height; posYRange.max = img.height;
        }

        function render() {
            if(!img) return;
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const zoom = parseInt(zoomRange.value) / 100;
            zoomVal.textContent = zoomRange.value + '%';
            const scale = baseScale * zoom;
            const dx = (canvas.width - img.width * scale) / 2 + parseInt(posXRange.value);
            const dy = (canvas.height - img.height * scale) / 2 + parseInt(posYRange.value);
            ctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);
        }

        [sizeSelect, zoomRange, posXRange, posYRange].forEach(el => {
            el.oninput = () => { if(el === sizeSelect) updateCanvasSize(); render(); };
        });

        downloadBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/jpeg', 1.0), `q_idphoto_${Date.now()}.jpg`, 'image/jpeg');
            Utils.toast('图像已成功离线生成', 'success');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
