<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精准裁剪 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        #crop-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(244, 114, 182, 0.1);
            background: white;
            border: 4px solid white;
        }
        #crop-box {
            position: absolute;
            border: 3px solid #f472b6;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            cursor: move;
            display: none;
            z-index: 10;
        }
        #crop-box::after {
            content: '';
            position: absolute;
            top: 33.33%; bottom: 33.33%; left: 0; right: 0;
            border-top: 1px dashed rgba(255, 255, 255, 0.5);
            border-bottom: 1px dashed rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        #crop-box::before {
            content: '';
            position: absolute;
            left: 33.33%; right: 33.33%; top: 0; bottom: 0;
            border-left: 1px dashed rgba(255, 255, 255, 0.5);
            border-right: 1px dashed rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        .handle {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #f472b6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .handle-se { right: -8px; bottom: -8px; cursor: se-resize; }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-5xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">构图重塑实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">精准选区，留住最精彩的视觉核心。✂️</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">✂️</div>
                    <p class="text-xl font-bold text-gray-700">提交需要裁剪的样本</p>
                    <p class="text-pink-400 mt-2 text-sm italic">支持多种黄金比例，即选即切</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden animate-fade-in flex flex-col items-center">
                <div class="bg-white/50 px-6 py-2 rounded-full mb-8 border border-pink-100 shadow-sm">
                    <p class="text-[10px] text-pink-500 font-black italic tracking-widest uppercase">拖动缩放手柄，定义完美构图</p>
                </div>

                <div id="crop-container" class="mb-12">
                    <img id="sourceImage" class="block max-w-full max-h-[550px]">
                    <div id="crop-box">
                        <div class="handle handle-se"></div>
                    </div>
                </div>

                <div class="w-full max-w-2xl bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50 space-y-8">
                    <div class="flex flex-wrap justify-center gap-4">
                        <button id="ratioFree" class="ratio-btn active-ratio px-6 py-3 rounded-2xl border-2 border-pink-100 bg-pink-50 text-pink-500 font-bold text-xs uppercase transition-all">自由比例</button>
                        <button id="ratio11" class="ratio-btn px-6 py-3 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-xs uppercase transition-all hover:bg-white hover:border-pink-50">1 : 1</button>
                        <button id="ratio43" class="ratio-btn px-6 py-3 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-xs uppercase transition-all hover:bg-white hover:border-pink-50">4 : 3</button>
                        <button id="ratio169" class="ratio-btn px-6 py-3 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-xs uppercase transition-all hover:bg-white hover:border-pink-50">16 : 9</button>
                    </div>

                    <div class="flex gap-4">
                        <button id="saveBtn" class="flex-1 py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn">完成并导出</button>
                        <button id="resetBtn" class="px-8 py-5 text-gray-400 font-bold hover:text-pink-500 transition-all theme-secondary-btn rounded-full border border-gray-100 uppercase text-[10px] font-black italic">更换实验样本</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                构图准则
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <p>1. <b>三分构图：</b>裁剪框内的虚线是经典的“三分法则”辅助线，尝试将视觉主体放置在虚线交点附近，画面会更有灵气。</p>
                    <p>2. <b>输出保障：</b>裁剪操作在浏览器内实时进行，确保导出的成品与原图画质在相同缩放比下完全一致。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 裁剪实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const sourceImg = document.getElementById('sourceImage');
        const cropBox = document.getElementById('crop-box');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');

        let isDragging = false;
        let isResizing = false;
        let startX, startY, startW, startH, startLeft, startTop;
        let currentRatio = 0;

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = await Utils.readFileAsDataURL(file);
            sourceImg.src = url;
            sourceImg.onload = () => {
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
                initCropBox();
            };
        };

        function initCropBox() {
            cropBox.style.display = 'block';
            const w = Math.min(250, sourceImg.clientWidth * 0.8);
            const h = Math.min(250, sourceImg.clientHeight * 0.8);
            cropBox.style.width = w + 'px';
            cropBox.style.height = h + 'px';
            cropBox.style.left = (sourceImg.clientWidth - w) / 2 + 'px';
            cropBox.style.top = (sourceImg.clientHeight - h) / 2 + 'px';
        }

        cropBox.onmousedown = (e) => {
            if (e.target.classList.contains('handle')) { isResizing = true; } 
            else { isDragging = true; }
            startX = e.clientX; startY = e.clientY;
            startW = parseFloat(cropBox.style.width); startH = parseFloat(cropBox.style.height);
            startLeft = parseFloat(cropBox.style.left); startTop = parseFloat(cropBox.style.top);
            e.preventDefault();
        };

        window.onmousemove = (e) => {
            if (!isDragging && !isResizing) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            if (isDragging) {
                let left = startLeft + dx;
                let top = startTop + dy;
                left = Math.max(0, Math.min(left, sourceImg.clientWidth - parseFloat(cropBox.style.width)));
                top = Math.max(0, Math.min(top, sourceImg.clientHeight - parseFloat(cropBox.style.height)));
                cropBox.style.left = left + 'px';
                cropBox.style.top = top + 'px';
            } else if (isResizing) {
                let w = startW + dx;
                let h = startH + dy;
                if (currentRatio > 0) {
                    if (Math.abs(dx) > Math.abs(dy)) { h = w / currentRatio; } 
                    else { w = h * currentRatio; }
                }

                if (startLeft + w > sourceImg.clientWidth) {
                    w = sourceImg.clientWidth - startLeft;
                    if (currentRatio > 0) h = w / currentRatio;
                }
                if (startTop + h > sourceImg.clientHeight) {
                    h = sourceImg.clientHeight - startTop;
                    if (currentRatio > 0) w = h * currentRatio;
                }

                w = Math.max(30, w); h = Math.max(30, h);
                cropBox.style.width = w + 'px'; cropBox.style.height = h + 'px';
            }
        };

        window.onmouseup = () => { isDragging = false; isResizing = false; };

        saveBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const s = sourceImg.naturalWidth / sourceImg.clientWidth;
            const w = parseFloat(cropBox.style.width) * s;
            const h = parseFloat(cropBox.style.height) * s;
            const x = parseFloat(cropBox.style.left) * s;
            const y = parseFloat(cropBox.style.top) * s;
            canvas.width = w; canvas.height = h;
            ctx.drawImage(sourceImg, x, y, w, h, 0, 0, w, h);
            Utils.downloadFile(canvas.toDataURL('image/png'), `q_crop_${Date.now()}.png`, 'image/png');
            Utils.toast('已保存裁剪作品', 'success');
        };

        const ratioBtns = document.querySelectorAll('.ratio-btn');
        function setRatio(ratio, btnId) {
            currentRatio = ratio;
            ratioBtns.forEach(btn => {
                if (btn.id === btnId) {
                    btn.className = "ratio-btn px-6 py-3 rounded-2xl border-2 border-pink-100 bg-pink-50 text-pink-500 font-bold text-xs uppercase transition-all";
                } else {
                    btn.className = "ratio-btn px-6 py-3 rounded-2xl border-2 border-transparent bg-gray-50 text-gray-400 font-bold text-xs uppercase transition-all hover:bg-white hover:border-pink-50";
                }
            });
            
            if (ratio > 0) {
                let w = parseFloat(cropBox.style.width);
                let h = w / ratio;
                if (parseFloat(cropBox.style.top) + h > sourceImg.clientHeight) {
                    h = sourceImg.clientHeight - parseFloat(cropBox.style.top);
                    w = h * ratio;
                }
                if (parseFloat(cropBox.style.left) + w > sourceImg.clientWidth) {
                    w = sourceImg.clientWidth - parseFloat(cropBox.style.left);
                    h = w / ratio;
                }
                cropBox.style.width = w + 'px'; cropBox.style.height = h + 'px';
            }
        }

        document.getElementById('ratioFree').onclick = () => setRatio(0, 'ratioFree');
        document.getElementById('ratio11').onclick = () => setRatio(1, 'ratio11');
        document.getElementById('ratio43').onclick = () => setRatio(4/3, 'ratio43');
        document.getElementById('ratio169').onclick = () => setRatio(16/9, 'ratio169');
        resetBtn.onclick = () => { uploadStage.classList.remove('hidden'); editorStage.classList.add('hidden'); fileInput.value = ''; };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
