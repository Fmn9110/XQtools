<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIF制作 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Required Libraries -->
    <script src="../../assets/lib/gifshot.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/gifshot@0.4.5/build/gifshot.min.js';"></script>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">GIF 创意实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">将一组静态图片串联，打造属于你的趣味动图。🎬</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🎞️</div>
                    <p class="text-xl font-bold text-gray-700">上传多张图片（支持顺序拖拽）</p>
                    <p class="text-pink-400 mt-2 text-sm italic">按顺序合成您的第一个 GIF</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden flex flex-col lg:flex-row gap-8 lg:gap-12 animate-fade-in">
                <!-- Controls -->
                <div class="flex-1 space-y-6">
                    <div class="bg-pink-50/30 p-6 md:p-8 rounded-3xl space-y-8">
                        <h3 class="font-bold text-gray-800 flex items-center">
                            <span class="w-1.5 h-6 bg-pink-400 rounded-full mr-3"></span>
                            合成参数
                        </h3>
                        
                        <div class="grid md:grid-cols-2 gap-6">
                            <div class="space-y-4 bg-white/60 p-5 rounded-2xl border border-white">
                                <label class="flex justify-between text-xs font-bold text-gray-400 uppercase tracking-widest">
                                    <span>每帧间隔</span>
                                    <span id="delay-val" class="text-pink-500 font-mono">0.2s</span>
                                </label>
                                <input type="range" id="gif-delay" min="0.01" max="1" step="0.05" value="0.2" class="w-full h-1.5 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                                <p class="text-[9px] text-gray-400 italic font-medium leading-relaxed">间隔越短，动作越丝滑流利。</p>
                            </div>
                            <div class="space-y-4 bg-white/60 p-5 rounded-2xl border border-white">
                                <label class="flex justify-between text-xs font-bold text-gray-400 uppercase tracking-widest">
                                    <span>输出质量</span>
                                    <span id="quality-val" class="text-pink-500 font-mono">10</span>
                                </label>
                                <input type="range" id="gif-quality" min="1" max="30" step="1" value="10" class="w-full h-1.5 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                                <p class="text-[9px] text-gray-400 italic font-medium leading-relaxed">数值越小背景越清晰（但也越慢且文件越大）。</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest pl-1">帧序列预览</h4>
                            <div id="frames-container" class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide">
                                <!-- JS Inject -->
                            </div>
                        </div>

                        <div id="progress-container" class="hidden space-y-3 bg-white/50 p-4 rounded-2xl border border-white shadow-inner">
                            <div class="flex justify-between text-[10px] font-bold text-gray-500 items-center uppercase tracking-widest pl-1">
                                <span class="animate-pulse flex items-center gap-2 pb-1 text-pink-500">正在生成...</span>
                                <span id="progress-percent" class="font-mono text-xs">0%</span>
                            </div>
                            <div class="w-full bg-pink-50 rounded-full h-2 overflow-hidden border border-pink-100 p-0.5">
                                <div id="progress-bar" class="bg-gradient-to-r from-pink-300 to-pink-500 h-1 rounded-full w-0 transition-all duration-300"></div>
                            </div>
                        </div>

                        <div class="pt-4 flex flex-col sm:flex-row gap-4">
                            <button id="startBtn" class="cute-button flex-1 theme-download-btn px-6 py-4 rounded-full font-bold">开始合成 GIF</button>
                            <button onclick="location.reload()" class="theme-secondary-btn py-4 px-8 rounded-full text-xs font-bold">重置</button>
                        </div>
                    </div>
                </div>

                <!-- Preview -->
                <div class="w-full lg:w-96 space-y-6">
                    <h3 class="font-bold text-gray-800 pl-2">合成效果</h3>
                    <div class="bg-white rounded-[2.5rem] p-6 border border-pink-50 shadow-sm flex flex-col items-center justify-center min-h-[300px] relative overflow-hidden">
                        <div class="absolute inset-0 bg-[radial-gradient(#fff1f2_1px,transparent_1px)] [background-size:20px_20px] opacity-40"></div>
                        <img id="gif-preview" class="max-w-full max-h-[250px] object-contain rounded-2xl shadow-lg relative z-10 hidden">
                        <div id="preview-placeholder" class="text-center z-10">
                            <div class="w-20 h-20 bg-pink-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-pink-100">
                                <span class="text-4xl">✨</span>
                            </div>
                            <p class="text-xs text-gray-400 font-medium italic">完成后在此处展现魔法</p>
                        </div>
                    </div>
                    <button id="downloadBtn" class="w-full py-5 bg-gray-50 text-gray-300 rounded-[1.5rem] font-black cursor-not-allowed border border-gray-100 transition-all" disabled>下载这份惊喜</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端离线合成器 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const framesContainer = document.getElementById('frames-container');
        const startBtn = document.getElementById('startBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const gifPreview = document.getElementById('gif-preview');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        
        let imagesData = [], generatedGifUrl = null;

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            uploadStage.classList.add('hidden');
            editorStage.classList.remove('hidden');
            
            for (const file of files) {
                const dataUrl = await Utils.readFileAsDataURL(file);
                imagesData.push(dataUrl);
            }
            renderFrames();
        };

        function renderFrames() {
            framesContainer.innerHTML = imagesData.map((img, i) => `
                <div class="relative flex-shrink-0 group">
                    <img src="${img}" class="w-20 h-20 object-cover rounded-2xl border-2 border-pink-50 group-hover:border-pink-300 transition-all">
                    <button onclick="removeFrame(${i})" class="absolute -top-2 -right-2 w-6 h-6 bg-red-400 text-white rounded-full flex items-center justify-center text-[10px] shadow-md hover:bg-red-500">×</button>
                    <span class="absolute bottom-1 right-1 px-1.5 bg-black/40 text-white text-[8px] rounded-lg font-mono">${i+1}</span>
                </div>
            `).join('');
            startBtn.disabled = imagesData.length < 2;
        }

        window.removeFrame = (i) => {
            imagesData.splice(i, 1);
            if (imagesData.length === 0) location.reload(); else renderFrames();
        };

        document.getElementById('gif-delay').oninput = (e) => document.getElementById('delay-val').innerText = e.target.value + 's';
        document.getElementById('gif-quality').oninput = (e) => document.getElementById('quality-val').innerText = e.target.value;

        startBtn.onclick = () => {
            if (imagesData.length < 2) return;
            startBtn.disabled = true;
            startBtn.innerText = '合成中...';
            document.getElementById('progress-container').classList.remove('hidden');
            
            gifshot.createGIF({
                images: imagesData,
                interval: parseFloat(document.getElementById('gif-delay').value),
                sampleInterval: parseInt(document.getElementById('gif-quality').value),
                progressCallback: (p) => {
                    const percent = Math.round(p * 100);
                    document.getElementById('progress-bar').style.width = percent + '%';
                    document.getElementById('progress-percent').innerText = percent + '%';
                }
            }, (obj) => {
                startBtn.disabled = false;
                startBtn.innerText = '重新合成';
                if (!obj.error) {
                    generatedGifUrl = obj.image;
                    gifPreview.src = generatedGifUrl;
                    gifPreview.classList.remove('hidden');
                    previewPlaceholder.classList.add('hidden');
                    downloadBtn.disabled = false;
                    downloadBtn.className = 'w-full py-5 bg-pink-500 text-white rounded-[1.5rem] font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all';
                    Utils.toast('合成成功！', 'success');
                } else {
                    Utils.toast('合成失败', 'error');
                }
            });
        };

        downloadBtn.onclick = () => {
            if (!generatedGifUrl) return;
            Utils.downloadFile(generatedGifUrl, `qtool_${Date.now()}.gif`, 'image/gif');
            Utils.toast('已保存！', 'success');
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
