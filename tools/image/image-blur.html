<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片柔焦模糊 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">视觉蒙版实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">柔焦岁月，为画面披上一层梦幻的轻纱。🌫️</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">✨</div>
                    <p class="text-xl font-bold text-gray-700">将作品投入实验室</p>
                    <p class="text-pink-400 mt-2 text-sm italic">支持平滑的高斯模糊渲染</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden animate-fade-in flex flex-col items-center">
                <div class="w-full bg-pink-50/20 p-6 md:p-10 rounded-[2.5rem] border border-pink-50 mb-10 flex justify-center">
                    <div class="relative shadow-2xl rounded-3xl overflow-hidden bg-white max-w-full">
                        <img id="preview" class="max-w-full max-h-[450px] object-contain transition-all duration-300">
                        <div class="absolute inset-x-0 bottom-4 flex justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                             <span class="bg-black/20 backdrop-blur-md text-white text-[10px] px-3 py-1 rounded-full font-black italic">PRISTINE RENDERING</span>
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-xl bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50 space-y-8">
                    <div class="space-y-6">
                        <div class="flex justify-between items-center px-1">
                            <h3 class="font-black text-gray-800 italic uppercase flex items-center gap-2">
                                <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                                模糊程度
                            </h3>
                            <span id="blurVal" class="font-black text-pink-500 font-mono text-xl">5px</span>
                        </div>
                        <input type="range" id="blurRange" min="0" max="100" value="5" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                    </div>

                    <div class="pt-4 flex flex-col sm:flex-row gap-4">
                        <button id="saveBtn" class="flex-1 py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn flex items-center justify-center gap-3">
                            <span>采集实验室成果</span>
                        </button>
                        <button id="resetBtn" class="py-5 px-10 text-gray-400 font-bold hover:text-pink-500 text-xs border border-gray-100 rounded-full theme-secondary-btn transition-all">更换素材</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">📘</span>
                视觉小百科
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <div class="space-y-2">
                        <h4 class="font-black text-gray-700">高斯模糊与隐私</h4>
                        <p>适当的模糊处理是保护图像中隐私信息（如人脸、敏感文本）的优雅方式，而不必使用突兀的遮盖色块。</p>
                    </div>
                    <div class="space-y-2">
                        <h4 class="font-black text-gray-700">性能声明</h4>
                        <p>渲染过程完全基于浏览器端 CSS3 滤镜与 Canvas 2D 绘图接口，处理速度由您本机的 GPU 渲染能力决定。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 柔焦实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const preview = document.getElementById('preview');
        const blurRange = document.getElementById('blurRange');
        const blurVal = document.getElementById('blurVal');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalUrl = '';

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            originalUrl = await Utils.readFileAsDataURL(file);
            preview.src = originalUrl;
            uploadStage.classList.add('hidden');
            editorStage.classList.remove('hidden');
            updateBlur();
        };

        blurRange.oninput = updateBlur;

        function updateBlur() {
            const val = blurRange.value;
            blurVal.textContent = val + 'px';
            preview.style.filter = `blur(${val}px)`;
        }

        saveBtn.onclick = () => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.filter = `blur(${blurRange.value}px)`;
                ctx.drawImage(img, 0, 0);
                Utils.downloadFile(canvas.toDataURL('image/png'), `q_blur_${Date.now()}.png`, 'image/png');
                Utils.toast('保存成功！', 'success');
            };
            img.src = originalUrl;
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadStage.classList.remove('hidden');
            editorStage.classList.add('hidden');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
