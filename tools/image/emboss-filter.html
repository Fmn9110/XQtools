<!DOCTYPE html>
<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

        #preview-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
            background-color: white;
            border: 4px solid white;
        }
    </style>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">图片浮雕化</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">模拟雕像、石碑般的立体凹凸质感，让静态图片跃然纸上。🗿</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-area" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🗿</div>
                    <p class="text-xl font-bold text-gray-700">点击或拖拽上传图片</p>
                    <p class="text-pink-400 mt-2 text-sm italic">即刻体验石刻艺术质感</p>
                </div>
            </div>

            <div id="editor-area" class="hidden flex flex-col items-center animate-fade-in space-y-8">
                <div class="w-full flex justify-center bg-gray-50 p-4 rounded-3xl">
                    <canvas id="preview-canvas"></canvas>
                </div>
                
                <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                    <button id="saveBtn" class="cute-button theme-download-btn px-12 py-4 rounded-full font-bold shadow-lg">下载浮雕艺术图</button>
                    <button onclick="location.reload()" class="theme-secondary-btn py-4 px-8 rounded-full text-sm font-bold">更换图片</button>
                </div>
            </div>
        </section>
    
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-item" style="animation-delay: 0.3s">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🎯</span>
                    艺术原理
                </h2>
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden h-full">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">
                        <li>系统通过计算相邻像素的色差来模拟光影的凹凸效果。</li>
                        <li>建议选择轮廓清晰、对比度较高的图片以获得最佳效果。</li>
                        <li>处理后的图片会自动转为灰度模式，增强历史厚重感。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💬</span>
                    常见答疑
                </h2>
                <div class="space-y-4 h-full">
                    <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm hover:border-pink-200 transition-colors">
                        <div class="font-bold text-gray-700 mb-2 flex items-center">
                            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 mr-2"></span>
                            为什么图片变灰了？
                        </div>
                        <div class="text-gray-500 text-sm leading-relaxed pl-3.5">
                            经典的浮雕效果通过去除颜色、仅保留亮度差来实现。这能让视觉焦点集中在纹理细节上，达到类似石雕的艺术表现力。
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端离线实验室 · 保护隐私 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        const saveBtn = document.getElementById('saveBtn');
        const dropZone = document.getElementById('drop-zone');

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.src = await Utils.readFileAsDataURL(file);
            img.onload = () => {
                uploadArea.classList.add('hidden');
                editorArea.classList.remove('hidden');
                render(img);
            };
        };

        function render(img) {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const output = ctx.createImageData(canvas.width, canvas.height);
            const res = output.data;

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    const iNext = (y * canvas.width + (x + 1)) * 4;
                    
                    if (x < canvas.width - 1) {
                        const r = data[i] - data[iNext] + 128;
                        const g = data[i+1] - data[iNext+1] + 128;
                        const b = data[i+2] - data[iNext+2] + 128;
                        
                        const avg = (r + g + b) / 3;
                        res[i] = res[i+1] = res[i+2] = avg;
                    } else {
                        res[i] = res[i+1] = res[i+2] = 128;
                    }
                    res[i+3] = 255;
                }
            }
            ctx.putImageData(output, 0, 0);
        }

        saveBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/jpeg', 0.9), 'emboss_' + Date.now() + '.jpg', 'image/jpeg');
            Utils.toast('保存成功！', 'success');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
