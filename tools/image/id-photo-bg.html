<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">证件照一键换底</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">基于智能色彩填充算法，让您的证件照背景瞬间焕发专业光彩。🏢</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🎨</div>
                    <p class="text-xl font-bold text-gray-700">点击或投递您的原图</p>
                    <p class="text-pink-400 mt-2 text-sm italic">推荐使用背景单纯的正面免冠照片</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden flex flex-col lg:flex-row gap-8 lg:gap-12 animate-fade-in items-start">
                <!-- Preview -->
                <div class="flex-1 w-full bg-pink-50/20 p-6 md:p-10 rounded-[2.5rem] border border-pink-50 flex flex-col items-center">
                    <div class="bg-white/50 backdrop-blur-sm px-4 py-2 rounded-full mb-6 border border-pink-100 animate-pulse">
                        <p class="text-[10px] text-pink-500 font-black italic tracking-widest uppercase">✨ 在画布上点击背景区域进行抹除</p>
                    </div>
                    <div id="canvas-container" class="relative group shadow-2xl border-4 border-white inline-block overflow-hidden transition-all duration-700">
                         <canvas id="bg-canvas" class="absolute inset-0 w-full h-full"></canvas>
                         <canvas id="fg-canvas" class="relative z-10 block cursor-crosshair"></canvas>
                    </div>
                </div>

                <!-- Controls -->
                <div class="w-full lg:w-96 space-y-8 bg-white p-8 rounded-[2rem] shadow-sm border border-pink-50">
                    <div>
                        <h3 class="font-black text-gray-800 italic uppercase flex items-center gap-2 mb-6">
                             <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                             选择目标背景
                        </h3>
                        <div class="flex flex-wrap gap-4">
                            <button class="bg-selector group relative" data-color="#438EDB">
                                <div class="w-12 h-12 rounded-2xl shadow-sm border-2 border-white group-hover:scale-110 transition-all bg-[#438EDB]"></div>
                                <span class="text-[8px] absolute -bottom-5 left-1/2 -translate-x-1/2 font-black text-gray-400">专业蓝</span>
                            </button>
                            <button class="bg-selector group relative" data-color="#FF0000">
                                <div class="w-12 h-12 rounded-2xl shadow-sm border-2 border-white group-hover:scale-110 transition-all bg-[#FF0000]"></div>
                                <span class="text-[8px] absolute -bottom-5 left-1/2 -translate-x-1/2 font-black text-gray-400">喜庆红</span>
                            </button>
                            <button class="bg-selector group relative" data-color="#FFFFFF">
                                <div class="w-12 h-12 rounded-2xl shadow-sm border-2 border-white group-hover:scale-110 transition-all bg-white"></div>
                                <span class="text-[8px] absolute -bottom-5 left-1/2 -translate-x-1/2 font-black text-gray-400">纯洁白</span>
                            </button>
                            <div class="relative group">
                                <input type="color" id="colorPicker" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value="#ff99cc">
                                <div id="customPreview" class="w-12 h-12 rounded-2xl border-2 border-white shadow-sm bg-[linear-gradient(45deg,#ff99cc,#99ccff)] group-hover:rotate-12 transition-all"></div>
                                <span class="text-[8px] absolute -bottom-5 left-1/2 -translate-x-1/2 font-black text-gray-400">自定义</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-8 border-t border-pink-50">
                        <div class="flex justify-between items-center px-1 mb-4">
                            <label class="text-[10px] font-black text-gray-400 uppercase">颜色容差 (Tolerance)</label>
                            <span id="toleranceValue" class="font-black text-pink-500 font-mono">32</span>
                        </div>
                        <input type="range" id="toleranceRange" min="0" max="150" value="32" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                    </div>

                    <div class="pt-4 flex flex-col gap-4">
                        <button id="downloadBtn" class="w-full py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn">下载高清换底照</button>
                        <div class="flex gap-2">
                             <button id="resetBtn" class="flex-1 py-3 text-gray-400 font-bold hover:text-pink-500 text-xs border border-gray-100 rounded-2xl theme-secondary-btn">撤销操作</button>
                             <button onclick="location.reload()" class="flex-1 py-3 text-gray-400 font-bold hover:text-pink-500 text-xs border border-gray-100 rounded-2xl">更换照片</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">📑</span>
                算法说明
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <p class="text-xs text-gray-500 leading-relaxed italic font-medium relative z-10">我们使用的是高效的洪泛填充算法（Flood Fill），它能根据您点击的像素点，自动扩散并消除相邻的相似颜色。对于细碎的发丝边缘，请合理调整「颜色容差」滑快以获得最自然的融合效果。</p>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端视觉实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const fgCanvas = document.getElementById('fg-canvas');
        const bgCanvas = document.getElementById('bg-canvas');
        const ctxFg = fgCanvas.getContext('2d', { willReadFrequently: true });
        const ctxBg = bgCanvas.getContext('2d');
        const toleranceRange = document.getElementById('toleranceRange');
        const toleranceValue = document.getElementById('toleranceValue');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const colorPicker = document.getElementById('colorPicker');
        const bgSelectors = document.querySelectorAll('.bg-selector');

        let originalImageData = null, currentImageData = null, selectedColor = '#438EDB';

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();
        
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const dataUrl = await Utils.readFileAsDataURL(file);
            const img = new Image();
            img.onload = () => {
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
                initCanvas(img);
                Utils.toast('图像加载成功', 'success');
            };
            img.src = dataUrl;
        };

        function initCanvas(img) {
            fgCanvas.width = img.width; fgCanvas.height = img.height;
            bgCanvas.width = img.width; bgCanvas.height = img.height;
            
            const container = document.getElementById('canvas-container');
            const maxW = window.innerWidth > 1024 ? 600 : 320;
            const scale = Math.min(maxW / img.width, 500 / img.height);
            if (scale < 1) {
                container.style.transform = `scale(${scale})`;
                container.style.transformOrigin = 'top center';
            }

            ctxFg.drawImage(img, 0, 0);
            originalImageData = ctxFg.getImageData(0, 0, img.width, img.height);
            currentImageData = new ImageData(new Uint8ClampedArray(originalImageData.data), img.width, img.height);
            updateBg();
        }

        function updateBg() {
            ctxBg.fillStyle = selectedColor;
            ctxBg.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        }

        bgSelectors.forEach(btn => btn.onclick = () => {
            selectedColor = btn.dataset.color;
            updateBg();
        });

        colorPicker.oninput = (e) => {
            selectedColor = e.target.value;
            document.getElementById('customPreview').style.backgroundColor = selectedColor;
            document.getElementById('customPreview').style.backgroundImage = 'none';
            updateBg();
        };

        toleranceRange.oninput = () => toleranceValue.innerText = toleranceRange.value;

        fgCanvas.onmousedown = (e) => {
            const rect = fgCanvas.getBoundingClientRect();
            const scaleX = fgCanvas.width / rect.width;
            const scaleY = fgCanvas.height / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            floodFill(x, y, parseInt(toleranceRange.value));
        };

        function floodFill(startX, startY, tolerance) {
            const width = fgCanvas.width, height = fgCanvas.height;
            const data = currentImageData.data;
            const idx = (startY * width + startX) * 4;
            const target = [data[idx], data[idx+1], data[idx+2], data[idx+3]];
            if (target[3] === 0) return;

            const stack = [[startX, startY]];
            const visited = new Uint8Array(width * height);
            
            while (stack.length) {
                const [x, y] = stack.pop();
                const pos = y * width + x;
                if (visited[pos]) continue; visited[pos] = 1;
                const i = pos * 4;
                const diff = Math.sqrt(Math.pow(data[i]-target[0],2) + Math.pow(data[i+1]-target[1],2) + Math.pow(data[i+2]-target[2],2));
                
                if (data[i+3] > 0 && diff <= tolerance) {
                    data[i+3] = 0;
                    if (x > 0) stack.push([x-1, y]);
                    if (x < width-1) stack.push([x+1, y]);
                    if (y > 0) stack.push([x, y-1]);
                    if (y < height-1) stack.push([x, y+1]);
                }
            }
            ctxFg.putImageData(currentImageData, 0, 0);
        }

        resetBtn.onclick = () => {
            currentImageData = new ImageData(new Uint8ClampedArray(originalImageData.data), fgCanvas.width, fgCanvas.height);
            ctxFg.putImageData(currentImageData, 0, 0);
            Utils.toast('图像已重置', 'info');
        };

        downloadBtn.onclick = () => {
            const out = document.createElement('canvas');
            out.width = fgCanvas.width; out.height = fgCanvas.height;
            const octx = out.getContext('2d');
            octx.drawImage(bgCanvas, 0, 0);
            octx.drawImage(fgCanvas, 0, 0);
            Utils.downloadFile(out.toDataURL('image/jpeg', 1.0), `q_idphoto_${Date.now()}.jpg`, 'image/jpeg');
            Utils.toast('美照已导出', 'success');
        };
    </script>

    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>

    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
