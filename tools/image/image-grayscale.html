<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黑白灰度 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-4xl text-center">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">经典灰度实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">黑白经典，记录时光的质感。去除色彩繁杂，回归画面本质。🖤</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🌚</div>
                    <p class="text-xl font-bold text-gray-700">提交需要褪色的素材</p>
                    <p class="text-pink-400 mt-2 text-sm italic">无损灰度处理，保留像素纹理</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden animate-fade-in space-y-8">
                <div class="bg-gray-50 rounded-[2.5rem] p-4 flex flex-col items-center border border-pink-50 shadow-inner">
                    <img id="preview" class="max-w-full max-h-[450px] mb-8 shadow-sm rounded-2xl transition-all duration-300">
                    
                    <div class="w-full max-w-md space-y-4 px-4 bg-white p-6 rounded-3xl shadow-sm border border-pink-50/50">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">灰度强度</label>
                            <span id="grayVal" class="font-black text-pink-500 font-mono text-xl">100%</span>
                        </div>
                        <input type="range" id="grayRange" min="0" max="100" value="100" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                    </div>
                </div>

                <div class="flex flex-col md:flex-row justify-center gap-4">
                    <button id="saveBtn" class="flex-1 py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn uppercase">保存预览成果</button>
                    <button id="saveFullBtn" class="flex-1 py-5 bg-gray-800 text-white rounded-full font-black shadow-lg shadow-gray-100 hover:bg-black transition-all uppercase">保存高清原图</button>
                    <button id="resetBtn" class="px-8 py-5 text-gray-300 font-bold hover:text-pink-500 transition-all theme-secondary-btn rounded-full border border-gray-100 uppercase text-[10px] font-black italic">更换实验样本</button>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center justify-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                灰度哲学
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden text-left">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <p>1. <b>剔除杂念：</b>灰度处理能够帮助创作者更清晰地审视画面的构图、明暗交界线以及物体间的空间体积关系。</p>
                    <p>2. <b>动态灰度：</b>通过调整强度（<100%），可以创造出类似复古胶片感或者是偏冷淡风的“半褪色”视觉效果。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 经典实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const preview = document.getElementById('preview');
        const saveBtn = document.getElementById('saveBtn');
        const saveFullBtn = document.getElementById('saveFullBtn');
        const resetBtn = document.getElementById('resetBtn');
        const grayRange = document.getElementById('grayRange');
        const grayVal = document.getElementById('grayVal');

        let originalImg = null;

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        grayRange.oninput = (e) => {
            const val = e.target.value;
            grayVal.textContent = val + '%';
            preview.style.filter = `grayscale(${val}%)`;
        };

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const dataUrl = await Utils.readFileAsDataURL(file);
            originalImg = new Image();
            originalImg.src = dataUrl;
            originalImg.onload = () => {
                preview.src = dataUrl;
                preview.style.filter = `grayscale(${grayRange.value}%)`;
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
            };
        };

        function downloadWithFilter(isFull = false) {
            const canvas = document.createElement('canvas');
            const source = isFull ? originalImg : preview;
            canvas.width = source.naturalWidth;
            canvas.height = source.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.filter = `grayscale(${grayRange.value}%)`;
            ctx.drawImage(source, 0, 0);
            Utils.downloadFile(canvas.toDataURL('image/jpeg', 0.95), `q_grayscale_${isFull?'full_':''}${Date.now()}.jpg`, 'image/jpeg');
            Utils.toast('已保存处理成果', 'success');
        }

        saveBtn.onclick = () => downloadWithFilter(false);
        saveFullBtn.onclick = () => downloadWithFilter(true);

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadStage.classList.remove('hidden');
            editorStage.classList.add('hidden');
            originalImg = null;
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
