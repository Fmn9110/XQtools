<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片翻转 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">空间映射实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">左右互换，上下倒置。切换透视角度，重新认识画面。🙃</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🤳</div>
                    <p class="text-xl font-bold text-gray-700">提交需要翻转的素材</p>
                    <p class="text-pink-400 mt-2 text-sm italic">像素级无损镜像处理</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden animate-fade-in flex flex-col items-center gap-10">
                <div class="w-full bg-gray-50 rounded-[2.5rem] p-4 flex justify-center items-center overflow-hidden border border-pink-50 min-h-[300px]">
                    <canvas id="canvas" class="max-w-full max-h-[500px] shadow-sm rounded-lg"></canvas>
                </div>

                <div class="w-full max-w-md space-y-8 bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50">
                    <div class="grid grid-cols-2 gap-4">
                        <button id="flipHorizontal" class="group p-6 bg-pink-50 rounded-[2rem] border-2 border-transparent hover:border-pink-300 transition-all text-center flex flex-col items-center">
                            <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">↔️</span>
                            <span class="text-xs font-black text-pink-500 uppercase italic">水平镜像</span>
                        </button>
                        <button id="flipVertical" class="group p-6 bg-pink-50 rounded-[2rem] border-2 border-transparent hover:border-pink-300 transition-all text-center flex flex-col items-center">
                            <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">↕️</span>
                            <span class="text-xs font-black text-pink-500 uppercase italic">垂直倒置</span>
                        </button>
                    </div>

                    <div class="flex flex-col gap-4">
                        <button id="saveBtn" class="w-full py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn">完成并导出</button>
                        <button id="resetBtn" class="w-full py-3 text-gray-400 font-bold hover:text-pink-500 transition-all theme-secondary-btn rounded-full border border-gray-100 uppercase text-[10px] font-black italic">更换实验样本</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                映射逻辑
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <p>1. <b>视觉反差：</b>水平翻转（镜像）常用于纠正自拍的角度，使画面看起来更符合他人视角；而垂直翻转则能创造出类似水面倒影的奇异艺术感。</p>
                    <p>2. <b>性能机制：</b>本实验室采用原生 Canvas 加速渲染，瞬间完成万级像素的镜像重排，不产生任何画质折损。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 空间实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const flipH = document.getElementById('flipHorizontal');
        const flipV = document.getElementById('flipVertical');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');

        let img = null;
        let currentFlipH = 1;
        let currentFlipV = 1;

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            img = new Image();
            img.src = await Utils.readFileAsDataURL(file);
            img.onload = () => {
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
                currentFlipH = 1; currentFlipV = 1;
                draw();
            };
        };

        function draw() {
            canvas.width = img.width; canvas.height = img.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(currentFlipH, currentFlipV);
            const dx = currentFlipH === -1 ? -img.width : 0;
            const dy = currentFlipV === -1 ? -img.height : 0;
            ctx.drawImage(img, dx, dy);
            ctx.restore();
        }

        flipH.onclick = () => { currentFlipH *= -1; draw(); Utils.toast('已完成水平镜像', 'info'); };
        flipV.onclick = () => { currentFlipV *= -1; draw(); Utils.toast('已完成垂直翻转', 'info'); };

        saveBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/png'), `q_flip_${Date.now()}.png`, 'image/png');
            Utils.toast('已保存翻转成果', 'success');
        };

        resetBtn.onclick = () => { fileInput.value = ''; uploadStage.classList.remove('hidden'); editorStage.classList.add('hidden'); };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
