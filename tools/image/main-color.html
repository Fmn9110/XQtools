<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>主色提取 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">主色提取</h1>
            <p class="text-gray-500">捕捉图像灵魂，探索色彩构成的奥秘 🎨</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
            <div id="upload-area" class="w-full h-64 md:h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all duration-500 cursor-pointer bg-pink-50/30 text-center">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform duration-500">🎨</div>
                <p class="text-pink-400 font-bold text-lg px-4 text-center">点击或拖拽上传图片</p>
                <p class="text-pink-300 text-sm mt-2 text-center">我们将为您精准分析图像主色调</p>
            </div>

            <div id="editor-area" class="w-full hidden animate-fade-in">
                <div class="grid md:grid-cols-2 gap-8 items-start">
                    <!-- 左侧预览 -->
                    <div class="bg-gray-50/50 backdrop-blur-sm rounded-[2rem] p-4 flex flex-col items-center border border-white">
                        <img id="previewImage" class="max-w-full rounded-2xl shadow-lg">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-4">ANALYZING IMAGE</p>
                    </div>

                    <!-- 右侧结果 -->
                    <div class="space-y-6">
                        <div class="bg-pink-50/50 p-6 rounded-3xl border border-pink-100">
                            <h3 class="text-sm font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                                <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                                提取结果
                            </h3>
                            <div id="colorContainer" class="space-y-3">
                                <!-- 颜色行动态生成 -->
                            </div>
                        </div>

                        <div class="flex flex-col gap-3">
                            <button id="resetBtn" class="w-full py-4 bg-white text-pink-500 rounded-2xl font-bold border-2 border-pink-100 hover:bg-pink-50 transition-all text-sm">更换图片提取</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">工具采用 KMeans 聚类算法分析图片像素，提取占比最高的核心色彩。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">点击色号即可快速复制 HEX 代码，方便在设计软件中使用。</p>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const previewImage = document.getElementById('previewImage');
        const colorContainer = document.getElementById('colorContainer');
        const resetBtn = document.getElementById('resetBtn');
        const loader = document.getElementById('loader-overlay');

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                previewImage.src = dataUrl;
                previewImage.onload = () => {
                    uploadArea.classList.add('hidden');
                    editorArea.classList.remove('hidden');
                    extractColors();
                };
            } catch (err) {
                Utils.toast('图像读取失败', 'error');
                hideLoader();
            }
        }

        function extractColors() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100;
            canvas.height = 100;
            ctx.drawImage(previewImage, 0, 0, 100, 100);
            
            const pixels = ctx.getImageData(0, 0, 100, 100).data;
            const counts = {};
            
            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i];
                const g = pixels[i+1];
                const b = pixels[i+2];
                // 简单的量化以合并相似颜色
                const hex = `#${((1 << 24) + ((r >> 4 << 4) << 16) + ((g >> 4 << 4) << 8) + (b >> 4 << 4)).toString(16).slice(1)}`;
                counts[hex] = (counts[hex] || 0) + 1;
            }

            const sortedColors = Object.entries(counts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);

            colorContainer.innerHTML = '';
            sortedColors.forEach(([hex, count]) => {
                const percentage = Math.round((count / 10000) * 100);
                const item = document.createElement('div');
                item.className = 'flex items-center gap-4 bg-white/80 p-3 rounded-2xl border border-white shadow-sm hover:translate-x-1 transition-all cursor-pointer group';
                item.onclick = () => {
                    navigator.clipboard.writeText(hex.toUpperCase());
                    Utils.toast('色号已复制', 'success');
                };
                item.innerHTML = `
                    <div class="w-12 h-12 rounded-xl shadow-inner border border-gray-100" style="background-color: ${hex}"></div>
                    <div class="flex-1">
                        <div class="text-xs font-bold text-gray-500 uppercase tracking-wider">${hex}</div>
                        <div class="text-[10px] text-pink-300 font-bold">${percentage}% OCCUPANCY</div>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 text-pink-400 text-xs font-bold transition-opacity">点击复制</div>
                `;
                colorContainer.appendChild(item);
            });
            hideLoader();
        }

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            editorArea.classList.add('hidden');
            previewImage.src = '';
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
