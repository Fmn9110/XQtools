            <div class="w-full flex flex-col md:flex-row gap-8 items-start">
                <div class="flex-1 w-full space-y-6 text-left">
                    <h3 class="font-bold text-gray-800 text-xl border-b border-rose-50 pb-3 flex items-center gap-2">
                        <span class="w-2 h-6 bg-pink-400 rounded-full"></span> 填写 WiFi 信息
                    </h3>
 
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-gray-400 uppercase">WiFi 名称 (SSID)</label>
                            <input type="text" id="wifi-ssid"

                        </div>
 
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-gray-400 uppercase">WiFi 密码</label>
                            <input type="text" id="wifi-pass"
                                class="w-full p-4 border border-gray-100 rounded-2xl bg-gray-50 focus:bg-white focus:ring-4 focus:ring-pink-100 outline-none transition-all font-medium"
                                placeholder="请输入密码（如无则留空）">
                        </div>
 
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-gray-400 uppercase">加密类型</label>
                                <select id="wifi-type"
                                    class="w-full p-4 border border-gray-100 rounded-2xl bg-gray-50 focus:bg-white focus:ring-4 focus:ring-pink-100 outline-none transition-all cursor-pointer font-medium">
                                    <option value="WPA">WPA/WPA2/WPA3</option>
                                    <option value="WEP">WEP</option>
                                    <option value="nopass">无加密</option>
                                </select>
                            </div>
                            <div class="flex items-center pt-8 pl-2">
                                <label class="flex items-center cursor-pointer group">
                                    <input type="checkbox" id="wifi-hidden"
                                        class="w-5 h-5 text-pink-500 border-gray-300 rounded focus:ring-pink-500 transition-all">
                                    <span class="ml-2 font-bold text-gray-500 text-sm group-hover:text-pink-400 transition-colors">隐含网络</span>
                                </label>
                            </div>
                        </div>
 
                        <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-rose-50">
                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-gray-400 uppercase">前景色</label>
                                <input type="color" id="fg-color" value="#000000"
                                    class="w-full h-12 p-1 rounded-2xl cursor-pointer border border-gray-100 bg-gray-50 hover:border-pink-200 transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-gray-400 uppercase">背景色</label>
                                <input type="color" id="bg-color" value="#ffffff"

                        </div>

                <div class="w-full md:w-80 flex flex-col items-center space-y-8">
                    <h3 class="font-bold text-gray-800 text-xl border-b border-rose-50 pb-3 w-full text-center">效果预览</h3>

                </div>

        <div class="grid md:grid-cols-2 gap-8 mb-12">

                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">

                    </ul>
                </div>
            </section>

            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">常见问题</h2>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">隐私性如何？</div>
                        <div class="text-gray-500 text-sm">所有操作均为本地处理，不经过任何服务器。</div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-pink-50">
                        <div class="font-bold text-gray-700 mb-1">出现微信中暂不支持二维码内容怎么办？</div>
                        <div class="text-gray-500 text-sm">点击屏幕下方“复制文本内容”粘贴出来即可查看。</div>
                    </div>
                </div>
            </section>

    <footer class="py-12 text-center text-gray-300 text-xs">

    </footer>

    <script src="../../assets/js/qrcode.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const wifiSsid = document.getElementById('wifi-ssid');
        const wifiPass = document.getElementById('wifi-pass');
        const wifiType = document.getElementById('wifi-type');
        const wifiHidden = document.getElementById('wifi-hidden');

        const fgColor = document.getElementById('fg-color');
        const bgColor = document.getElementById('bg-color');
        const placeholder = document.getElementById('qr-placeholder');
        const downloadBtn = document.getElementById('downloadBtn');
        const qrImage = document.getElementById('qr-image');
        const qrBuffer = document.getElementById('qrcode-buffer');
        const mobileHint = document.getElementById('mobile-hint');

        function escapeWifiString(str) {
            return str.replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/:/g, '\\:');
        }

        function generateQR() {
            const ssid = wifiSsid.value.trim();
            const pass = wifiPass.value.trim();
            const type = wifiType.value;
            const hidden = wifiHidden.checked;

            if (!ssid) {
                placeholder.classList.remove('hidden');
                qrImage.classList.add('hidden');
                mobileHint.classList.add('hidden');
                downloadBtn.disabled = true;
                return;
            }

            if (fgColor.value === bgColor.value) {
                Utils.toast('前景色和背景色不能一样', 'warning');
                return;
            }

            // 采用 100% 兼容微信的格式：WIFI:T:TYPE;S:SSID;P:PASS;;
            let val = `WIFI:T:${type};S:${escapeWifiString(ssid)};`;
            if (type !== 'nopass') {
                val += `P:${escapeWifiString(pass)};`;
            } else {
                val += `P:;`;
            }
            // 除非明确勾选隐藏，否则不添加 H 避免引发微信错误解析
            if (hidden) {
                val += `H:true;`;
            }
            val += `;`;

            placeholder.classList.add('hidden');
            qrImage.classList.remove('hidden');
            mobileHint.classList.remove('hidden');
            downloadBtn.disabled = false;

            // 为了完美兼容微信并绕过 ECI UTF-8 标识导致微信将 WiFi 卡片识别为纯文本的特性，
            // 直接将字符串转为 Uint8Array 的 raw byte buffer 喂给 qrcode。
            let qrData = val;
            try {
                qrData = [{ data: new Uint8Array(new TextEncoder().encode(val)), mode: 'byte' }];
            } catch (e) {
                // fall back for old browsers
            }

            // 使用现代版 qrcode@1.5.3 库
            QRCode.toDataURL(qrData, {
                width: 800,
                margin: 2,
                color: {
                    dark: fgColor.value,
                    light: bgColor.value
                },
                errorCorrectionLevel: 'H'
            }, (err, url) => {
                if (err) {
                    console.error('二维码生成发生错误:', err);
                    Utils.toast('二维码生成失败', 'error');
                    return;
                }
                qrImage.src = url;
            });
        }

        [wifiSsid, wifiPass, wifiType, wifiHidden, fgColor, bgColor].forEach(el => {
            el.addEventListener('input', generateQR);
            el.addEventListener('change', generateQR);
        });

        downloadBtn.addEventListener('click', () => {
            if (!wifiSsid.value.trim() || !qrImage.src) return;
            Utils.downloadFile(qrImage.src, 'wifi-qr_' + Date.now() + '.png', 'image/png');
            Utils.toast('二维码已保存', 'success');
        });
    </script>
