<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebP转JPG - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f6]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-rose-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg font-bold">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-400 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-4xl text-center">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4 tracking-tight">WebP 转 JPG</h1>
            <p class="text-gray-500 text-lg">将现代格式还原为经典，兼容所有设备与场景 📼</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 bg-white border border-rose-50 shadow-sm rounded-3xl">
            <div id="upload-area" class="w-full max-w-md p-10 border-4 border-dashed border-pink-50 rounded-3xl mb-8 group hover:border-pink-200 transition-all cursor-pointer text-center bg-pink-50/30 mx-auto">
                <input type="file" id="fileInput" accept="image/webp" class="hidden">
                <div class="text-7xl mb-6 opacity-40 group-hover:scale-110 transition-transform">🌪️</div>
                <p class="text-xl font-bold text-pink-300">拖入 WebP 图片</p>
                <p class="text-xs text-gray-400 mt-2">点击此处浏览文件</p>
            </div>

            <div id="result-area" class="w-full hidden animate-fade-in text-center space-y-8">
                <div class="flex flex-col items-center">
                    <div class="w-24 h-24 bg-pink-50 rounded-full flex items-center justify-center text-5xl mb-4 shadow-inner border border-pink-100">📄</div>
                    <p class="text-2xl font-bold text-gray-800 tracking-tight">JPG 文件已就绪 ✨</p>
                    <p class="text-gray-400 text-sm mt-2 font-medium">转换已按高质量算法完成</p>
                </div>
                
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button id="downloadBtn" class="px-12 py-4 bg-pink-400 text-white rounded-xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-500 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <span>📥 下载 JPG 图片</span>
                    </button>
                    <button id="resetBtn" class="px-8 py-4 text-gray-400 font-bold hover:text-pink-400 transition-colors uppercase tracking-widest text-xs">换一张图片</button>
                </div>
            </div>
        </section>
    
        <!-- WebP转JPG 的专属定制说明与FAQ区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in custom-faq-section">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">
                        
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💬</span>
                    WebP转JPG - 常见答疑
                </h2>
                <div class="space-y-4">
                    
                <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm mt-4 hover:border-pink-200 transition-colors">
                    <div class="font-bold text-gray-700 mb-2 flex items-center">
                        <span class="w-1.5 h-1.5 rounded-full bg-pink-400 mr-2"></span>
                        为啥我处理【WebP转JPG】的时候，放在公司电脑处理和随身手机端耗时悬殊如此巨大？
                    </div>
                    <div class="text-gray-500 text-sm leading-relaxed pl-3.5">这也是本地纯前端小工具站最大的特性反馈。因为它所有的运算均不借助光纤去发往超级机房借兵，它所有的性能天花板全权依赖于您手中设备的物理硬实力芯片能力。</div>
                </div>
                </div>
            </section>
        </div>

    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const resultArea = document.getElementById('result-area');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let lastDataUrl = '';

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const img = new Image();
            img.src = await Utils.readFileAsDataURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height); // WebP 转 JPG 自动补白底
                ctx.drawImage(img, 0, 0);
                
                lastDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                uploadArea.classList.add('hidden');
                resultArea.classList.remove('hidden');
            };
        };

        downloadBtn.onclick = () => {
            Utils.downloadFile(lastDataUrl, 'converted_' + Date.now() + '.jpg', 'image/jpeg');
            Utils.toast('还原成功', 'success');
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
