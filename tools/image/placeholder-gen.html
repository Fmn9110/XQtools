<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>占位图生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">占位图生成</h1>
            <p class="text-gray-500">为你的原型设计填补空白，优雅且实用 📐</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        基础参数
                    </h3>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 mb-2">宽度 (px)</label>
                                <input type="number" id="widthInput" value="400" class="w-full px-4 py-3 border-2 border-pink-50 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-400 mb-2">高度 (px)</label>
                                <input type="number" id="heightInput" value="300" class="w-full px-4 py-3 border-2 border-pink-50 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-2">显示文字</label>
                            <input type="text" id="textInput" placeholder="默认显示尺寸" class="w-full px-4 py-3 border-2 border-pink-50 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 mb-2">背景色</label>
                                <input type="color" id="bgColor" value="#fce7f3" class="w-full h-10 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-400 mb-2">文字色</label>
                                <input type="color" id="textColor" value="#ec4899" class="w-full h-10 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <button id="downloadBtn" class="cute-button px-6 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all flex items-center justify-center gap-2">
                        <span>🚀</span> 下载占位图
                    </button>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="lg:col-span-3">
                <div class="cute-card p-4 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] h-full flex flex-col items-center justify-center min-h-[300px]">
                    <div class="bg-gray-100/30 rounded-2xl p-4 w-full flex items-center justify-center overflow-auto max-h-[400px]">
                        <canvas id="canvas" class="max-w-full shadow-lg rounded-lg"></canvas>
                    </div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6">PLACEHOLDER PREVIEW</p>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <p class="text-[#6b7280] text-sm leading-relaxed mb-4">生成各种比例的图片填充您的设计稿，支持自定义文字和配色。</p>
                    <p class="text-[#6b7280] text-sm leading-relaxed">导出的 PNG 格式在各种预览环境下都能保持完美显示。</p>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const textInput = document.getElementById('textInput');
        const bgColor = document.getElementById('bgColor');
        const textColor = document.getElementById('textColor');
        const downloadBtn = document.getElementById('downloadBtn');

        function draw() {
            const w = parseInt(widthInput.value) || 400;
            const h = parseInt(heightInput.value) || 300;
            const text = textInput.value || `${w} × ${h}`;

            canvas.width = w;
            canvas.height = h;

            // 背景
            ctx.fillStyle = bgColor.value;
            ctx.fillRect(0, 0, w, h);

            // 文字
            ctx.fillStyle = textColor.value;
            const fontSize = Math.min(w / 8, h / 4, 100);
            ctx.font = `bold ${fontSize}px "Outfit", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, w / 2, h / 2);
        }

        [widthInput, heightInput, textInput, bgColor, textColor].forEach(el => {
            el.oninput = draw;
        });

        downloadBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/png'), `placeholder_${widthInput.value}x${heightInput.value}.png`, 'image/png');
            Utils.toast('下载成功', 'success');
        };

        // 初始化
        window.onload = draw;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
