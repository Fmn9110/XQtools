    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script>
        const vcName = document.getElementById('vc-name');
        const vcPhone = document.getElementById('vc-phone');
        const vcOrg = document.getElementById('vc-org');
        const vcTitle = document.getElementById('vc-title');
        const vcEmail = document.getElementById('vc-email');
        const vcUrl = document.getElementById('vc-url');
        
        const fgColor = document.getElementById('fg-color');
        const bgColor = document.getElementById('bg-color');
        const canvas = document.getElementById('qr-canvas');
        const placeholder = document.getElementById('qr-placeholder');
        const downloadBtn = document.getElementById('downloadBtn');

        let qr;

        function generateQR() {
            const name = vcName.value.trim();
            const phone = vcPhone.value.trim();
            const org = vcOrg.value.trim();
            const title = vcTitle.value.trim();
            const email = vcEmail.value.trim();
            const url = vcUrl.value.trim();

            if(!name || !phone) {
                placeholder.classList.remove('hidden');
                canvas.classList.add('hidden');
                downloadBtn.disabled = true;
                return;
            }

            let val = `BEGIN:VCARD\nVERSION:3.0\n`;
            val += `N:${name}\nFN:${name}\n`;
            if(org) val += `ORG:${org}\n`;
            if(title) val += `TITLE:${title}\n`;
            if(phone) val += `TEL:${phone}\n`;
            if(email) val += `EMAIL:${email}\n`;
            if(url) val += `URL:${url}\n`;
            val += `END:VCARD`;

            placeholder.classList.add('hidden');
            canvas.classList.remove('hidden');
            downloadBtn.disabled = false;

            if(!qr) {
                qr = new QRious({
                    element: canvas,
                    size: 800,
                    padding: 20
                });
            }

            qr.set({
                value: val,
                foreground: fgColor.value,
                background: bgColor.value,
                level: 'M' // Using M for VCards to allow for more data without becoming too dense
            });
        }

        [vcName, vcPhone, vcOrg, vcTitle, vcEmail, vcUrl, fgColor, bgColor].forEach(el => {
            el.addEventListener('input', generateQR);
            el.addEventListener('change', generateQR);
        });

        downloadBtn.addEventListener('click', () => {
            if(!vcName.value.trim() || !vcPhone.value.trim() || !qr) return;
            Utils.downloadFile(canvas.toDataURL('image/png'), 'vcard-qr_' + Date.now() + '.png', 'image/png');
            Utils.toast('二维码已保存', 'success');
        });
    </script>
