<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老照片修复 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">老照片修复</h1>
            <p class="text-gray-500">重拾岁月的记忆，让模糊的往事重新清晰 🕰️</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
            <div id="upload-area" class="w-full h-64 md:h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all duration-500 cursor-pointer bg-pink-50/30 text-center">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform duration-500">🕰️</div>
                <p class="text-pink-400 font-bold text-lg px-4 text-center">上传您的老照片</p>
                <p class="text-pink-300 text-sm mt-2 text-center">支持黑白或老旧彩色照片</p>
            </div>

            <div id="editor-area" class="w-full hidden animate-fade-in text-center">
                <div class="bg-gray-50/50 backdrop-blur-sm rounded-[2rem] p-4 md:p-8 mb-8 flex flex-col items-center border border-white">
                    <canvas id="canvas" class="max-w-full max-h-[500px] shadow-2xl rounded-2xl mb-4"></canvas>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">REPAIR PREVIEW</p>
                </div>

                <div class="max-w-md mx-auto mb-10 bg-pink-50/50 p-6 rounded-3xl border border-pink-100 space-y-6">
                    <div>
                        <div class="flex justify-between items-center text-sm font-bold text-[#4a4a4a] mb-4">
                            <span>去噪强度</span>
                            <span id="denoiseVal" class="text-pink-500 font-mono">50</span>
                        </div>
                        <input type="range" id="denoiseRange" min="0" max="100" value="50" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                    </div>
                    <div>
                        <div class="flex justify-between items-center text-sm font-bold text-[#4a4a4a] mb-4">
                            <span>色彩增强</span>
                            <span id="colorVal" class="text-pink-500 font-mono">30</span>
                        </div>
                        <input type="range" id="colorRange" min="0" max="100" value="30" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 justify-center px-4 md:px-0 py-6">
                    <button id="repairBtn" class="cute-button px-10 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-lg flex items-center justify-center gap-2">
                        <span>✨</span> 开始修复
                    </button>
                    <button id="downloadBtn" class="hidden cute-button px-10 py-4 bg-gradient-to-r from-rose-400 to-pink-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-lg flex items-center justify-center gap-2">
                        <span>🚀</span> 下载修复图
                    </button>
                    <button id="resetBtn" class="px-10 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all">更换图片</button>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">工具通过智能对比度调整与柔化算法减少照片颗粒感，提升色彩鲜艳度。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">修复并非AI色彩还原，无法将黑白照片自动变彩色，旨在优化现有图像质量。</p>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const repairBtn = document.getElementById('repairBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const denoiseRange = document.getElementById('denoiseRange');
        const denoiseVal = document.getElementById('denoiseVal');
        const colorRange = document.getElementById('colorRange');
        const colorVal = document.getElementById('colorVal');
        const loader = document.getElementById('loader-overlay');

        let originalImg = null;

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        [denoiseRange, colorRange].forEach(el => {
            el.oninput = () => {
                if (el === denoiseRange) denoiseVal.textContent = denoiseRange.value;
                if (el === colorRange) colorVal.textContent = colorRange.value;
            };
        });

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                originalImg = new Image();
                originalImg.src = dataUrl;
                originalImg.onload = () => {
                    uploadArea.classList.add('hidden');
                    editorArea.classList.remove('hidden');
                    const maxW = 800;
                    const ratio = Math.min(1, maxW / originalImg.width);
                    canvas.width = originalImg.width * ratio;
                    canvas.height = originalImg.height * ratio;
                    ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
                    repairBtn.classList.remove('hidden');
                    downloadBtn.classList.add('hidden');
                    hideLoader();
                };
            } catch (err) {
                Utils.toast('图像读取失败', 'error');
                hideLoader();
            }
        }

        repairBtn.onclick = () => {
            if (!originalImg) return;
            showLoader();
            setTimeout(() => {
                // 执行简单修复算法
                const denoise = parseInt(denoiseRange.value) / 100;
                const color = parseInt(colorRange.value) / 100;
                
                // 去噪（模糊处理）
                if (denoise > 0) {
                    ctx.globalAlpha = denoise * 0.3;
                    ctx.filter = `blur(${denoise * 2}px)`;
                    ctx.drawImage(canvas, 0, 0);
                    ctx.filter = 'none';
                    ctx.globalAlpha = 1.0;
                }

                // 色彩增强（对比度与饱和度）
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const factor = (259 * (color * 100 + 255)) / (255 * (259 - color * 100));

                for (let i = 0; i < data.length; i += 4) {
                    data[i] = factor * (data[i] - 128) + 128;     // R
                    data[i+1] = factor * (data[i+1] - 128) + 128; // G
                    data[i+2] = factor * (data[i+2] - 128) + 128; // B
                }
                ctx.putImageData(imageData, 0, 0);
                
                repairBtn.classList.add('hidden');
                downloadBtn.classList.remove('hidden');
                hideLoader();
                Utils.toast('修复已完成', 'success');
            }, 500);
        };

        downloadBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/png'), `repaired_${Date.now()}.png`, 'image/png');
            Utils.toast('已保存修复后的照片', 'success');
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            editorArea.classList.add('hidden');
            originalImg = null;
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
