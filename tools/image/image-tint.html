<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片色彩转换 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">图片色彩转换</h1>
            <p class="text-gray-500">为图片披上彩虹，随心所欲变换色调 🌈</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
            <div id="upload-area" class="w-full h-64 md:h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all duration-500 cursor-pointer bg-pink-50/30 text-center">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform duration-500">🎨</div>
                <p class="text-pink-400 font-bold text-lg px-4 text-center">点击或拖拽上传图片</p>
                <p class="text-pink-300 text-sm mt-2 text-center">支持 JPG, PNG, WebP</p>
            </div>

            <div id="editor-area" class="w-full hidden animate-fade-in text-center">
                <div class="bg-gray-50/50 backdrop-blur-sm rounded-[2rem] p-4 md:p-8 mb-8 flex flex-col items-center border border-white">
                    <canvas id="canvas" class="max-w-full max-h-[400px] shadow-2xl rounded-2xl mb-4"></canvas>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">REAL-TIME PREVIEW</p>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-10 max-w-2xl mx-auto">
                    <div class="bg-pink-50/50 p-6 rounded-3xl border border-pink-100 space-y-4">
                        <div class="flex items-center justify-between text-sm font-bold text-[#4a4a4a]">
                            <span class="flex items-center gap-2">
                                <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                                转换颜色
                            </span>
                        </div>
                        <input type="color" id="tintColor" value="#ff4081" class="w-full h-12 rounded-xl cursor-pointer border-2 border-pink-100 bg-white p-1">
                    </div>

                    <div class="bg-pink-50/50 p-6 rounded-3xl border border-pink-100 space-y-4">
                        <div class="flex items-center justify-between text-sm font-bold text-[#4a4a4a]">
                            <span class="flex items-center gap-2">
                                <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                                混合模式
                            </span>
                        </div>
                        <select id="blendMode" class="w-full px-4 py-3 border-2 border-pink-100 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 bg-white">
                            <option value="multiply">正片叠底 (Multiply)</option>
                            <option value="screen">滤色 (Screen)</option>
                            <option value="overlay">叠加 (Overlay)</option>
                            <option value="color">色彩 (Color)</option>
                            <option value="hard-light">强光 (Hard Light)</option>
                        </select>
                    </div>

                    <div class="bg-pink-50/50 p-6 rounded-3xl border border-pink-100 space-y-4 md:col-span-2">
                        <div class="flex justify-between items-center text-sm font-bold text-[#4a4a4a]">
                            <span class="flex items-center gap-2">
                                <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                                透明度
                            </span>
                            <span id="opacityVal" class="text-pink-500 text-lg font-mono">50%</span>
                        </div>
                        <input type="range" id="opacityRange" min="0" max="100" value="50" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 justify-center px-4 md:px-0 py-6">
                    <button id="saveBtn" class="cute-button px-10 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-lg flex items-center justify-center gap-2">
                        <span>🚀</span> 保存处理图
                    </button>
                    <button id="resetBtn" class="px-10 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all">更换图片</button>
                </div>
            </div>
        </section>

        <!-- 说明与FAQ区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">不同的混合模式会产生截然不同的艺术效果，建议一一尝试。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">使用“色彩”模式可以保留原图明度分布而仅改变色相。</p>
                        </li>
                    </ul>
                </div>
            </section>

            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">💬</span>
                    常见答疑
                </h2>
                <div class="space-y-4">
                    <div class="bg-white/60 backdrop-blur-sm p-6 rounded-[2rem] border border-white shadow-lg shadow-pink-100/20">
                        <h3 class="font-bold text-[#4a4a4a] mb-2 flex items-center gap-2">
                            <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                            图片导出格式是什么？
                        </h3>
                        <p class="text-gray-500 text-sm leading-relaxed">默认导出为高像素的 PNG 格式，完美保留色彩转换细节。</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tintColor = document.getElementById('tintColor');
        const blendMode = document.getElementById('blendMode');
        const opacityRange = document.getElementById('opacityRange');
        const opacityVal = document.getElementById('opacityVal');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loader = document.getElementById('loader-overlay');

        let originalImg = null;

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            showLoader();
            try {
                originalImg = new Image();
                originalImg.src = await Utils.readFileAsDataURL(file);
                originalImg.onload = () => {
                    uploadArea.classList.add('hidden');
                    editorArea.classList.remove('hidden');
                    draw();
                    hideLoader();
                };
            } catch (err) {
                Utils.toast('读取图片失败', 'error');
                hideLoader();
            }
        }

        function draw() {
            if (!originalImg) return;
            const maxPreview = 800;
            let w = originalImg.width;
            let h = originalImg.height;
            if (w > maxPreview || h > maxPreview) {
                const ratio = Math.min(maxPreview/w, maxPreview/h);
                w *= ratio; h *= ratio;
            }
            canvas.width = w; canvas.height = h;
            
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(originalImg, 0, 0, w, h);
            
            ctx.save();
            ctx.globalCompositeOperation = blendMode.value;
            ctx.globalAlpha = parseInt(opacityRange.value) / 100;
            ctx.fillStyle = tintColor.value;
            ctx.fillRect(0, 0, w, h);
            ctx.restore();
        }

        [tintColor, blendMode, opacityRange].forEach(el => {
            el.oninput = () => {
                if (el === opacityRange) opacityVal.textContent = opacityRange.value + '%';
                draw();
            };
        });

        saveBtn.onclick = () => {
            if (!originalImg) return;
            showLoader();
            setTimeout(() => {
                const fullCanvas = document.createElement('canvas');
                fullCanvas.width = originalImg.width;
                fullCanvas.height = originalImg.height;
                const fCtx = fullCanvas.getContext('2d');
                
                fCtx.drawImage(originalImg, 0, 0);
                fCtx.save();
                fCtx.globalCompositeOperation = blendMode.value;
                fCtx.globalAlpha = parseInt(opacityRange.value) / 100;
                fCtx.fillStyle = tintColor.value;
                fCtx.fillRect(0, 0, fullCanvas.width, fullCanvas.height);
                fCtx.restore();
                
                Utils.downloadFile(fullCanvas.toDataURL('image/png'), `tinted_${Date.now()}.png`, 'image/png');
                Utils.toast('色彩转换已完成', 'success');
                hideLoader();
            }, 100);
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            editorArea.classList.add('hidden');
            originalImg = null;
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
