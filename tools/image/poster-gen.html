<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海报制作 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">海报制作</h1>
            <p class="text-gray-500">简单几步，打造极简风的摄影海报 🎨</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        核心图片
                    </h3>
                    <div id="upload-area" class="w-full h-32 border-4 border-dashed border-pink-100 rounded-2xl flex flex-col items-center justify-center group hover:border-pink-300 transition-all cursor-pointer bg-pink-50/30 text-center">
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                        <span class="text-xl">🖼️</span>
                        <p class="text-[10px] font-bold text-pink-400 mt-1">上传主图</p>
                    </div>
                </div>

                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        文本内容
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-2 px-1">大标题</label>
                            <input type="text" id="titleInput" placeholder="请输入标题..." class="w-full px-4 py-3 border-2 border-pink-50 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-2 px-1">副标题 / 日期</label>
                            <input type="text" id="subTitleInput" placeholder="请输入副标题..." class="w-full px-4 py-3 border-2 border-pink-50 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 text-sm">
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <button id="downloadBtn" class="cute-button px-6 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-sm flex items-center justify-center gap-2">
                        <span>🚀</span> 下载海报
                    </button>
                    <button id="resetBtn" class="px-6 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all text-sm">重置</button>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="lg:col-span-3">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] h-full flex flex-col items-center justify-center">
                    <div class="bg-gray-100/30 rounded-2xl p-4 w-full flex items-center justify-center">
                        <canvas id="canvas" class="max-w-full shadow-2xl"></canvas>
                    </div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6">POSTER PREVIEW</p>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <p class="text-[#6b7280] text-sm leading-relaxed mb-4">采用经典的「上图下字」杂志风布局。建议上传高质量的摄影作品，配合简短的有力的文字，效果更佳。</p>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const titleInput = document.getElementById('titleInput');
        const subTitleInput = document.getElementById('subTitleInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loader = document.getElementById('loader-overlay');

        let mainImg = null;

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                mainImg = new Image();
                mainImg.src = dataUrl;
                mainImg.onload = () => {
                    draw();
                    hideLoader();
                };
            } catch (err) {
                Utils.toast('读取图片失败', 'error');
                hideLoader();
            }
        }

        function draw() {
            const w = 800;
            const h = 1200;
            canvas.width = w;
            canvas.height = h;

            // 背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            if (mainImg) {
                // 图片区域 (占上面的 3/4)
                const imgH = 900;
                const ratio = Math.max(w / mainImg.width, imgH / mainImg.height);
                const drawW = mainImg.width * ratio;
                const drawH = mainImg.height * ratio;
                const offsetX = (w - drawW) / 2;
                const offsetY = (imgH - drawH) / 2;

                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, w, imgH);
                ctx.clip();
                ctx.drawImage(mainImg, offsetX, offsetY, drawW, drawH);
                ctx.restore();
            } else {
                ctx.fillStyle = '#fce7f3';
                ctx.fillRect(0, 0, w, 900);
            }

            // 文字区域
            ctx.fillStyle = '#4a4a4a';
            ctx.textAlign = 'center';

            // 标题
            ctx.font = 'bold 72px "Noto Serif SC", serif';
            ctx.fillText(titleInput.value || 'TITLE HERE', w / 2, 1050);

            // 副标题
            ctx.font = '32px "Outfit", sans-serif';
            ctx.fillStyle = '#9ca3af';
            ctx.fillText(subTitleInput.value || 'DESIGNED BY LITTLE Q', w / 2, 1120);

            // 装饰线
            ctx.strokeStyle = '#f472b6';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(w / 2 - 50, 1075);
            ctx.lineTo(w / 2 + 50, 1075);
            ctx.stroke();
        }

        [titleInput, subTitleInput].forEach(el => el.oninput = draw);

        downloadBtn.onclick = () => {
            if (!mainImg) return Utils.toast('请先上传一张主图', 'warning');
            Utils.downloadFile(canvas.toDataURL('image/png'), `poster_${Date.now()}.png`, 'image/png');
            Utils.toast('海报已保存', 'success');
        };

        resetBtn.onclick = () => {
            mainImg = null;
            titleInput.value = '';
            subTitleInput.value = '';
            draw();
        };

        // 初始化
        window.onload = draw;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
