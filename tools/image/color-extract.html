<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">图片颜色提取</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">探索图片的色彩深度，一键提取并捕捉最美的主色调。🎨</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-area" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🖼️</div>
                    <p class="text-xl font-bold text-gray-700">点击或拖拽上传图片</p>
                    <p class="text-pink-400 mt-2 text-sm italic">本地处理，光速捕捉色彩灵感</p>
                </div>
            </div>

            <div id="result-area" class="hidden flex flex-col lg:flex-row gap-8 lg:gap-12 items-start animate-fade-in">
                <div class="flex-1 w-full bg-gray-50/50 rounded-3xl p-4 flex justify-center items-center relative overflow-hidden min-h-[300px] md:min-h-[450px]">
                    <img id="preview-img" class="max-w-full max-h-[400px] rounded-2xl shadow-xl z-10 scale-95 hover:scale-100 transition-transform duration-500" />
                    <!-- Background blurred img for aesthetics -->
                    <img id="preview-blur" class="absolute inset-0 w-full h-full object-cover opacity-20 blur-3xl z-0" />
                </div>
                
                <div class="w-full lg:w-96 space-y-6">
                    <div class="bg-pink-50/30 p-6 md:p-8 rounded-3xl space-y-6">
                        <h3 class="font-bold text-gray-800 flex items-center">
                            <span class="w-1.5 h-6 bg-pink-400 rounded-full mr-3"></span>
                            主色调调色盘
                        </h3>
                        
                        <div id="color-palette" class="grid grid-cols-1 gap-3">
                            <!-- Colors inserted here -->
                        </div>

                        <div class="pt-4 space-y-3">
                            <button onclick="location.reload()" class="w-full theme-secondary-btn py-3 rounded-full text-sm font-bold flex items-center justify-center gap-2">
                                🔄 重新提取
                            </button>
                            <p class="text-[10px] text-gray-400 text-center italic">点击色块即可快速复制 HEX 颜色代码</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-item" style="animation-delay: 0.3s">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🎯</span>
                    使用小贴士
                </h2>
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden h-full">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">
                        <li>上传图片后，系统会自动分析像素分布并聚类。</li>
                        <li>提取的结果已按色彩重要程度和出现频率排序。</li>
                        <li>如果图片较大，提取过程可能会有毫秒级的加载。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💬</span>
                    常见答疑
                </h2>
                <div class="space-y-4 h-full">
                    <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm hover:border-pink-200 transition-colors">
                        <div class="font-bold text-gray-700 mb-2 flex items-center">
                            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 mr-2"></span>
                            隐私安全性
                        </div>
                        <div class="text-gray-500 text-sm leading-relaxed pl-3.5">
                            所有图片均在您的浏览器本地进行像素级分析，任何数据都不会上传到服务器。请放心使用。
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端离线实验室 · 保护隐私 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const resultArea = document.getElementById('result-area');
        const previewImg = document.getElementById('preview-img');
        const previewBlur = document.getElementById('preview-blur');
        const colorPalette = document.getElementById('color-palette');
        const dropZone = document.getElementById('drop-zone');

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            if(!e.target.files[0]) return;
            const dataUrl = await Utils.readFileAsDataURL(e.target.files[0]);
            const img = new Image();
            img.src = dataUrl;
            img.onload = () => {
                previewImg.src = dataUrl;
                previewBlur.src = dataUrl;
                uploadArea.classList.add('hidden');
                resultArea.classList.remove('hidden');
                extractColors(img);
            };
        };

        function extractColors(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100;
            canvas.height = 100;
            ctx.drawImage(img, 0, 0, 100, 100);
            
            const data = ctx.getImageData(0, 0, 100, 100).data;
            const colorCounts = {};
            
            for(let i=0; i<data.length; i+=4) {
                const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                if(a < 128) continue; 
                
                const step = 24;
                const rG = Math.round(r/step)*step;
                const gG = Math.round(g/step)*step;
                const bG = Math.round(b/step)*step;
                const key = `${rG},${gG},${bG}`;
                
                if(colorCounts[key]) {
                    colorCounts[key].count++;
                    colorCounts[key].r += r;
                    colorCounts[key].g += g;
                    colorCounts[key].b += b;
                } else {
                    colorCounts[key] = { count: 1, r: r, g: g, b: b };
                }
            }
            
            const sortedColors = Object.values(colorCounts).sort((a,b) => b.count - a.count);
            const palette = [];
            for(let i=0; i<sortedColors.length; i++) {
                if(palette.length >= 6) break;
                const c = sortedColors[i];
                const rgb = [Math.round(c.r/c.count), Math.round(c.g/c.count), Math.round(c.b/c.count)];
                
                let tooClose = false;
                for(let p of palette) {
                    const dist = Math.sqrt(Math.pow(p[0]-rgb[0], 2) + Math.pow(p[1]-rgb[1], 2) + Math.pow(p[2]-rgb[2], 2));
                    if(dist < 50) { tooClose = true; break; }
                }
                
                if(!tooClose) palette.push(rgb);
            }
            renderPalette(palette);
        }
        
        function rgbToHex(r, g, b) {
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        function renderPalette(palette) {
            colorPalette.innerHTML = '';
            palette.forEach((color) => {
                const hex = rgbToHex(color[0], color[1], color[2]);
                const el = document.createElement('div');
                el.className = "flex items-center gap-4 bg-white p-3 rounded-2xl border border-pink-50 hover:border-pink-200 transition-all cursor-pointer group";
                el.innerHTML = `
                    <div class="w-12 h-12 rounded-xl shadow-inner border border-gray-100 group-hover:scale-105 transition-transform" style="background-color: rgb(${color[0]}, ${color[1]}, ${color[2]})"></div>
                    <div class="flex-1">
                        <div class="font-bold text-gray-700 font-mono text-lg">${hex}</div>
                        <div class="text-[10px] text-gray-400 font-medium">RGB: ${color[0]}, ${color[1]}, ${color[2]}</div>
                    </div>
                `;
                el.onclick = () => {
                    navigator.clipboard.writeText(hex);
                    Utils.toast('已复制 ' + hex, 'success');
                };
                colorPalette.appendChild(el);
            });
        }
    </script>

    <!-- Webmeji Desktop Buddy -->

    <script src="../../assets/js/webmeji-config.js"></script>

</body>
</html>
