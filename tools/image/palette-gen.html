<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>调色盘生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">调色盘生成器</h1>
            <p class="text-gray-500">发现色彩的和谐之美，激发你的设计灵感 🎨</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        生成参数
                    </h3>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2 px-1">基础色相</label>
                            <input type="range" id="hueRange" min="0" max="360" value="330" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2 px-1">生成模式</label>
                            <select id="modeSelect" class="w-full px-4 py-3 border-2 border-pink-50 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 bg-white">
                                <option value="monochromatic">单色 (Monochromatic)</option>
                                <option value="analogous">相邻色 (Analogous)</option>
                                <option value="complementary">互补色 (Complementary)</option>
                                <option value="triad">三角色 (Triad)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <button id="randomBtn" class="cute-button px-6 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all flex items-center justify-center gap-2">
                        <span>✨</span> 随机灵感
                    </button>
                    <button id="exportBtn" class="px-6 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all">导出色值</button>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="lg:col-span-3">
                <div id="paletteGrid" class="grid grid-cols-1 sm:grid-cols-1 h-full gap-4 min-h-[400px]">
                    <!-- 颜色条动态生成 -->
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">工具根据色彩学理论计算色轮位置，助您快速搭建视觉风格。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">直接点击色块右侧的 HEX 代码即可一键复制到剪贴板。</p>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const paletteGrid = document.getElementById('paletteGrid');
        const hueRange = document.getElementById('hueRange');
        const modeSelect = document.getElementById('modeSelect');
        const randomBtn = document.getElementById('randomBtn');
        const exportBtn = document.getElementById('exportBtn');
        const loader = document.getElementById('loader-overlay');

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function generate() {
            const hue = parseInt(hueRange.value);
            const mode = modeSelect.value;
            let colors = [];

            if (mode === 'monochromatic') {
                for (let i = 0; i < 5; i++) colors.push({ h: hue, s: 70, l: 20 + i * 15 });
            } else if (mode === 'analogous') {
                for (let i = -2; i <= 2; i++) colors.push({ h: (hue + i * 30 + 360) % 360, s: 70, l: 50 });
            } else if (mode === 'complementary') {
                colors.push({ h: hue, s: 70, l: 40 }, { h: hue, s: 70, l: 60 }, { h: (hue + 180) % 360, s: 70, l: 50 }, { h: (hue + 180) % 360, s: 60, l: 70 }, { h: (hue + 180) % 360, s: 50, l: 30 });
            } else if (mode === 'triad') {
                colors.push({ h: hue, s: 70, l: 50 }, { h: (hue + 120) % 360, s: 70, l: 50 }, { h: (hue + 240) % 360, s: 70, l: 50 }, { h: hue, s: 60, l: 70 }, { h: hue, s: 50, l: 30 });
            }

            paletteGrid.innerHTML = '';
            colors.forEach(c => {
                const hex = hslToHex(c.h, c.s, c.l);
                const item = document.createElement('div');
                item.className = 'group relative flex flex-col sm:flex-row items-center justify-between p-6 rounded-[1.5rem] shadow-sm border border-white transition-all hover:scale-[1.02] cursor-pointer';
                item.style.backgroundColor = hex;
                
                // 根据亮度决定文字颜色
                const textColor = c.l > 60 ? '#4a4a4a' : '#ffffff';
                
                item.innerHTML = `
                    <span class="text-xl font-bold tracking-wider" style="color: ${textColor}">${hex.toUpperCase()}</span>
                    <button class="px-4 py-2 rounded-full bg-white/20 backdrop-blur-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity" style="color: ${textColor}">复制</button>
                `;
                item.onclick = () => {
                    navigator.clipboard.writeText(hex.toUpperCase());
                    Utils.toast('已复制色值', 'success');
                };
                paletteGrid.appendChild(item);
            });
        }

        [hueRange, modeSelect].forEach(el => el.oninput = generate);

        randomBtn.onclick = () => {
            hueRange.value = Math.floor(Math.random() * 361);
            const modes = ['monochromatic', 'analogous', 'complementary', 'triad'];
            modeSelect.value = modes[Math.floor(Math.random() * modes.length)];
            generate();
        };

        exportBtn.onclick = () => {
            const hexes = Array.from(paletteGrid.querySelectorAll('span')).map(s => s.textContent).join(', ');
            Utils.toast(`当前色盘: ${hexes}`, 'info');
        };

        // 初始化
        window.onload = generate;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
