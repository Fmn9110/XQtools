<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文字 Logo 生成器 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">文字 Logo 生成器</h1>
            <p class="text-gray-500">简单几步，打造极简主义的高级感 Logo ✨</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 左侧配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        定制内容
                    </h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2 px-1">LOGO 文字</label>
                            <input type="text" id="logoText" value="WebMeji" class="w-full px-4 py-3 border-2 border-pink-100 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 bg-white shadow-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2 px-1">字体选择</label>
                            <select id="fontFamily" class="w-full px-4 py-3 border-2 border-pink-100 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 bg-white">
                                <option value="'Outfit', sans-serif">Outfit (现代)</option>
                                <option value="'Noto Sans SC', sans-serif">思源黑体 (中文)</option>
                                <option value="serif">宋体 (衬线)</option>
                                <option value="monospace">等宽 (极简)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        外观样式
                    </h3>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">文字颜色</label>
                                <input type="color" id="textColor" value="#ec4899" class="w-full h-11 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">背景颜色</label>
                                <input type="color" id="bgColor" value="#ffffff" class="w-full h-11 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between text-sm font-bold text-gray-400 mb-2">
                                <span>字体大小</span>
                                <span id="sizeVal" class="text-pink-500 font-mono">120px</span>
                            </div>
                            <input type="range" id="fontSize" min="20" max="300" value="120" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                        </div>

                        <div>
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-bold text-gray-400">圆角效果</label>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="roundedBox" checked class="sr-only peer">
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-pink-400"></div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧预览区 -->
            <div class="lg:col-span-3">
                <div class="cute-card p-4 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] h-full flex flex-col items-center justify-center text-center">
                    <div class="bg-gray-50/50 backdrop-blur-sm rounded-[2rem] p-4 md:p-12 mb-8 flex flex-col items-center border border-white w-full">
                        <canvas id="canvas" class="max-w-full shadow-2xl rounded-3xl cursor-move"></canvas>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6">LOGO PREVIEW</p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 w-full">
                        <button id="downloadBtn" class="flex-1 cute-button px-6 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all flex items-center justify-center gap-2">
                            <span>🚀</span> 一键导出 PNG
                        </button>
                        <button id="resetBtn" class="px-8 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all">重置参数</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 说明与FAQ区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">导出的图片分辨率默认为 1000x1000，适合作为社交媒体头像或网站图标。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">调整文字大小可以实现从“铺满”到“留白”的不同视觉风格。</p>
                        </li>
                    </ul>
                </div>
            </section>

            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">💬</span>
                    常见答疑
                </h2>
                <div class="space-y-4">
                    <div class="bg-white/60 backdrop-blur-sm p-6 rounded-[2rem] border border-white shadow-lg shadow-pink-100/20">
                        <h3 class="font-bold text-[#4a4a4a] mb-2 flex items-center gap-2">
                            <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                            可以导出透明背景吗？
                        </h3>
                        <p class="text-gray-500 text-sm leading-relaxed">目前版本默认带背景色。建议选择与您网页背景一致的色号，或者导出后使用我们的“去背景”工具。</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const logoText = document.getElementById('logoText');
        const fontFamily = document.getElementById('fontFamily');
        const textColor = document.getElementById('textColor');
        const bgColor = document.getElementById('bgColor');
        const fontSize = document.getElementById('fontSize');
        const sizeVal = document.getElementById('sizeVal');
        const roundedBox = document.getElementById('roundedBox');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loader = document.getElementById('loader-overlay');

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        function draw() {
            const size = 1000;
            canvas.width = size;
            canvas.height = size;
            
            // 绘制背景
            ctx.fillStyle = bgColor.value;
            if (roundedBox.checked) {
                const radius = 150;
                ctx.beginPath();
                ctx.roundRect(0, 0, size, size, radius);
                ctx.fill();
            } else {
                ctx.fillRect(0, 0, size, size);
            }

            // 绘制文字
            ctx.fillStyle = textColor.value;
            ctx.font = `bold ${fontSize.value}px ${fontFamily.value}`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(logoText.value, size / 2, size / 2);
        }

        [logoText, fontFamily, textColor, bgColor, fontSize, roundedBox].forEach(el => {
            el.oninput = () => {
                if (el === fontSize) sizeVal.textContent = fontSize.value + 'px';
                draw();
            };
        });

        downloadBtn.onclick = () => {
            showLoader();
            setTimeout(() => {
                Utils.downloadFile(canvas.toDataURL('image/png'), `logo_${logoText.value}.png`, 'image/png');
                Utils.toast('Logo 已导出', 'success');
                hideLoader();
            }, 500);
        };

        resetBtn.onclick = () => {
            logoText.value = 'WebMeji';
            fontFamily.value = "'Outfit', sans-serif";
            textColor.value = '#ec4899';
            bgColor.value = '#ffffff';
            fontSize.value = 120;
            sizeVal.textContent = '120px';
            roundedBox.checked = true;
            draw();
        };

        // 初始化
        window.onload = draw;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
