<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二维码生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">二维码生成</h1>
            <p class="text-gray-500">连接数字世界的桥梁，简约便捷 🔗</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        输入内容
                    </h3>
                    <div class="space-y-4">
                        <textarea id="textInput" rows="4" placeholder="在此输入链接、文本或任何你想编码的内容..." class="w-full px-6 py-4 border-2 border-pink-100 rounded-2xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 bg-white shadow-sm resize-none"></textarea>
                    </div>
                </div>

                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        外观配色
                    </h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-2 px-1">码点颜色</label>
                            <input type="color" id="qrDark" value="#4a4a4a" class="w-full h-11 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-2 px-1">背景背景</label>
                            <input type="color" id="qrLight" value="#ffffff" class="w-full h-11 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 w-full">
                    <button id="downloadBtn" class="cute-button py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-sm flex items-center justify-center gap-2">
                        <span>🚀</span> 保存图片
                    </button>
                    <button id="resetBtn" class="py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all text-sm">清空</button>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="lg:col-span-3">
                <div class="cute-card p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] h-full flex flex-col items-center justify-center text-center">
                    <div id="qrcode" class="bg-white p-6 rounded-3xl shadow-lg mb-8 border-4 border-pink-50 min-h-[300px] flex items-center justify-center"></div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-8">LIVE QR CODE PREVIEW</p>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">工具采用标准的 QR Code 算法，纠错级别设为 H（最高级），即使部分脏污也能扫出。</p>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const qrContainer = document.getElementById('qrcode');
        const textInput = document.getElementById('textInput');
        const qrDark = document.getElementById('qrDark');
        const qrLight = document.getElementById('qrLight');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loader = document.getElementById('loader-overlay');

        let qrcode = new QRCode(qrContainer, {
            width: 256,
            height: 256,
            correctLevel: QRCode.CorrectLevel.H
        });

        function generateQR() {
            const text = textInput.value.trim();
            if(!text) {
                qrContainer.innerHTML = '<div class="text-gray-300 font-bold">等待输入内容...</div>';
                return;
            }
            
            qrContainer.innerHTML = '';
            qrcode = new QRCode(qrContainer, {
                text: text,
                width: 256,
                height: 256,
                colorDark: qrDark.value,
                colorLight: qrLight.value,
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        [textInput, qrDark, qrLight].forEach(el => {
            el.oninput = generateQR;
        });

        downloadBtn.onclick = () => {
            const img = qrContainer.querySelector('img');
            if (img) {
                Utils.downloadFile(img.src, `qr_code_${Date.now()}.png`, 'image/png');
                Utils.toast('下载成功', 'success');
            } else {
                Utils.toast('请先输入内容', 'warning');
            }
        };

        resetBtn.onclick = () => {
            textInput.value = '';
            generateQR();
        };

        // 初始化
        window.onload = generateQR;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
