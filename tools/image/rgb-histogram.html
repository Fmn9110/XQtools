<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB 直方图 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-5xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">RGB 直方图</h1>
            <p class="text-gray-500">透视光的色彩分布，从专业角度读懂每一张照片 📊</p>
        </header>

        <section class="grid lg:grid-cols-2 gap-8 mb-12">
            <!-- 上传与预览 -->
            <div class="space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] flex flex-col items-center justify-center min-h-[400px]">
                    <div id="upload-area" class="w-full h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all cursor-pointer bg-pink-50/30 text-center">
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                        <span class="text-4xl mb-4">📊</span>
                        <p class="text-pink-400 font-bold text-lg px-4">拖入照片，即刻分析色彩分布</p>
                    </div>
                    
                    <div id="imagePreview" class="hidden w-full flex flex-col items-center">
                        <img id="imgSource" class="max-w-full max-h-[400px] shadow-2xl rounded-2xl mb-6">
                        <button id="resetBtn" class="px-10 py-3 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all text-sm">更换图片</button>
                    </div>
                </div>
            </div>

            <!-- 图表分析区 -->
            <div class="space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] h-full flex flex-col">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-10 h-10 bg-pink-100 text-pink-400 rounded-2xl flex items-center justify-center text-lg">📈</span>
                        光谱分析报告
                    </h3>
                    
                    <div class="flex-1 bg-white rounded-2xl p-4 border border-pink-50 flex items-center justify-center">
                        <canvas id="histogramChart"></canvas>
                    </div>
                    
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6 text-center">RGB CHANNEL DISTRIBUTION</p>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <p class="text-[#6b7280] text-sm leading-relaxed mb-4">直方图横坐标代表亮度（0-255），纵坐标代表像素数量。如果波峰偏左，说明图像较暗；偏右则较亮；如果红色波峰明显，说明画面色调偏暖。</p>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const imagePreview = document.getElementById('imagePreview');
        const imgSource = document.getElementById('imgSource');
        const resetBtn = document.getElementById('resetBtn');
        const loader = document.getElementById('loader-overlay');
        const ctxChart = document.getElementById('histogramChart').getContext('2d');

        let chart = null;

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                imgSource.src = dataUrl;
                imgSource.onload = () => {
                    uploadArea.classList.add('hidden');
                    imagePreview.classList.remove('hidden');
                    analyzeImage();
                    hideLoader();
                };
            } catch (err) {
                Utils.toast('图像分析失败', 'error');
                hideLoader();
            }
        }

        function analyzeImage() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            // 为了性能缩放分析
            canvas.width = 100;
            canvas.height = 100;
            ctx.drawImage(imgSource, 0, 0, 100, 100);

            const imageData = ctx.getImageData(0, 0, 100, 100).data;
            const rData = new Array(256).fill(0);
            const gData = new Array(256).fill(0);
            const bData = new Array(256).fill(0);

            for (let i = 0; i < imageData.length; i += 4) {
                rData[imageData[i]]++;
                gData[imageData[i + 1]]++;
                bData[imageData[i + 2]]++;
            }

            renderChart(rData, gData, bData);
        }

        function renderChart(r, g, b) {
            if (chart) chart.destroy();

            chart = new Chart(ctxChart, {
                type: 'line',
                data: {
                    labels: Array.from({ length: 256 }, (_, i) => i),
                    datasets: [
                        { label: 'Red', data: r, borderColor: '#ff6b6b', backgroundColor: 'rgba(255, 107, 107, 0.1)', borderWidth: 1, pointRadius: 0, fill: true },
                        { label: 'Green', data: g, borderColor: '#51cf66', backgroundColor: 'rgba(81, 207, 102, 0.1)', borderWidth: 1, pointRadius: 0, fill: true },
                        { label: 'Blue', data: b, borderColor: '#339af0', backgroundColor: 'rgba(51, 154, 240, 0.1)', borderWidth: 1, pointRadius: 0, fill: true }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { display: false }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { font: { family: 'Outfit', weight: 'bold' } } }
                    }
                }
            });
        }

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            imagePreview.classList.add('hidden');
            if(chart) chart.destroy();
        };

        // 默认初始化一个空图表
        window.onload = () => {
            renderChart(new Array(256).fill(0), new Array(256).fill(0), new Array(256).fill(0));
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
