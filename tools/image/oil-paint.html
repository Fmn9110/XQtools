<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>油画滤镜 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">油画滤镜</h1>
            <p class="text-gray-500">笔触细腻，赋予照片古典艺术的质感 🖌️</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
            <div id="upload-area" class="w-full h-64 md:h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all duration-500 cursor-pointer bg-pink-50/30 text-center">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform duration-500">🖌️</div>
                <p class="text-pink-400 font-bold text-lg px-4 text-center">点击或拖拽上传图片</p>
                <p class="text-pink-300 text-sm mt-2 text-center">我们将为您进行艺术化处理</p>
            </div>

            <div id="editor-area" class="w-full hidden animate-fade-in text-center">
                <div class="bg-gray-50/50 backdrop-blur-sm rounded-[2rem] p-4 md:p-8 mb-8 flex flex-col items-center border border-white">
                    <canvas id="canvas" class="max-w-full max-h-[500px] shadow-2xl rounded-2xl mb-4"></canvas>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">OIL PAINT PREVIEW</p>
                </div>

                <div class="max-w-md mx-auto mb-10 bg-pink-50/50 p-6 rounded-3xl border border-pink-100 space-y-6">
                    <div>
                        <div class="flex justify-between items-center text-sm font-bold text-[#4a4a4a] mb-4">
                            <span>画笔粗细</span>
                            <span id="radiusVal" class="text-pink-500 font-mono">4</span>
                        </div>
                        <input type="range" id="radiusRange" min="1" max="10" value="4" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                    </div>
                    <div>
                        <div class="flex justify-between items-center text-sm font-bold text-[#4a4a4a] mb-4">
                            <span>色彩强度</span>
                            <span id="intVal" class="text-pink-500 font-mono">20</span>
                        </div>
                        <input type="range" id="intRange" min="10" max="50" value="20" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-400">
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 justify-center px-4 md:px-0 py-6">
                    <button id="applyBtn" class="cute-button px-10 py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-lg flex items-center justify-center gap-2">
                        <span>✨</span> 立即渲染
                    </button>
                    <button id="downloadBtn" class="hidden cute-button px-10 py-4 bg-gradient-to-r from-rose-400 to-pink-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-lg flex items-center justify-center gap-2">
                        <span>🚀</span> 下载成品
                    </button>
                    <button id="resetBtn" class="px-10 py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all">更换图片</button>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">油画算法计算量较大，大分辨率图片渲染可能需要几秒钟，请稍候。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">“画笔粗细”越大，画面越抽象；“色彩强度”影响色彩的聚集程度。</p>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const applyBtn = document.getElementById('applyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const radiusRange = document.getElementById('radiusRange');
        const radiusVal = document.getElementById('radiusVal');
        const intRange = document.getElementById('intRange');
        const intVal = document.getElementById('intVal');
        const loader = document.getElementById('loader-overlay');

        let originalImg = null;

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        [radiusRange, intRange].forEach(el => {
            el.oninput = () => {
                if (el === radiusRange) radiusVal.textContent = radiusRange.value;
                if (el === intRange) intVal.textContent = intRange.value;
            };
        });

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                originalImg = new Image();
                originalImg.src = dataUrl;
                originalImg.onload = () => {
                    uploadArea.classList.add('hidden');
                    editorArea.classList.remove('hidden');
                    const maxW = 600; // 预览用较小尺寸
                    const ratio = Math.min(1, maxW / originalImg.width);
                    canvas.width = originalImg.width * ratio;
                    canvas.height = originalImg.height * ratio;
                    ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
                    applyBtn.classList.remove('hidden');
                    downloadBtn.classList.add('hidden');
                    hideLoader();
                };
            } catch (err) {
                Utils.toast('图像读取失败', 'error');
                hideLoader();
            }
        }

        applyBtn.onclick = () => {
            if (!originalImg) return;
            showLoader();
            setTimeout(() => {
                oilPaint(canvas, parseInt(radiusRange.value), parseInt(intRange.value));
                applyBtn.classList.add('hidden');
                downloadBtn.classList.remove('hidden');
                hideLoader();
            }, 100);
        };

        function oilPaint(c, radius, intensity) {
            const width = c.width;
            const height = c.height;
            const ctx = c.getContext('2d');
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            const output = ctx.createImageData(width, height);
            const outData = output.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const intensityCount = new Int32Array(intensity + 1);
                    const averageR = new Int32Array(intensity + 1);
                    const averageG = new Int32Array(intensity + 1);
                    const averageB = new Int32Array(intensity + 1);

                    for (let sy = -radius; sy <= radius; sy++) {
                        for (let sx = -radius; sx <= radius; sx++) {
                            const curY = y + sy;
                            const curX = x + sx;
                            if (curY >= 0 && curY < height && curX >= 0 && curX < width) {
                                const offset = (curY * width + curX) * 4;
                                const r = data[offset];
                                const g = data[offset + 1];
                                const b = data[offset + 2];
                                const curIntensity = Math.floor(((r + g + b) / 3) * intensity / 255);
                                intensityCount[curIntensity]++;
                                averageR[curIntensity] += r;
                                averageG[curIntensity] += g;
                                averageB[curIntensity] += b;
                            }
                        }
                    }

                    let maxIntensity = 0;
                    let maxCount = 0;
                    for (let i = 0; i <= intensity; i++) {
                        if (intensityCount[i] > maxCount) {
                            maxCount = intensityCount[i];
                            maxIntensity = i;
                        }
                    }

                    const outOffset = (y * width + x) * 4;
                    outData[outOffset] = averageR[maxIntensity] / maxCount;
                    outData[outOffset + 1] = averageG[maxIntensity] / maxCount;
                    outData[outOffset + 2] = averageB[maxIntensity] / maxCount;
                    outData[outOffset + 3] = 255;
                }
            }
            ctx.putImageData(output, 0, 0);
        }

        downloadBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/png'), `oil_paint_${Date.now()}.png`, 'image/png');
            Utils.toast('保存成功', 'success');
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            editorArea.classList.add('hidden');
            originalImg = null;
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
