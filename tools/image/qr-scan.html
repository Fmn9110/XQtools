<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二维码扫描 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">二维码扫描</h1>
            <p class="text-gray-500">解析隐藏在黑白方块下的数字秘密 🔍</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 扫描区 -->
            <div class="lg:col-span-3 space-y-6">
                <div class="cute-card p-4 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] flex flex-col items-center justify-center">
                    <div id="upload-area" class="w-full h-80 border-4 border-dashed border-pink-100 rounded-[2rem] flex flex-col items-center justify-center group hover:border-pink-300 transition-all cursor-pointer bg-pink-50/30 text-center relative overflow-hidden">
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                        <div id="previewContainer" class="hidden absolute inset-0 bg-white p-4 flex items-center justify-center">
                            <img id="previewImage" class="max-w-full max-h-full rounded-xl">
                        </div>
                        <div id="uploadPrompt">
                            <span class="text-4xl mb-4 block">📸</span>
                            <p class="text-pink-400 font-bold text-lg px-4">上传包含二维码的图片</p>
                        </div>
                    </div>
                    
                    <button id="scanAgainBtn" class="hidden mt-6 px-10 py-4 bg-white text-pink-500 rounded-2xl font-bold border-2 border-pink-100 hover:bg-pink-50 transition-all">重新上传</button>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6">SCANNING AREA</p>
                </div>
            </div>

            <!-- 结果区 -->
            <div class="lg:col-span-2">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] h-full flex flex-col">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-10 h-10 bg-pink-100 text-pink-500 rounded-2xl flex items-center justify-center text-lg">💡</span>
                        扫描结果
                    </h3>
                    
                    <div id="resultContent" class="flex-1 bg-gray-50/50 rounded-2xl p-6 font-mono text-sm text-gray-500 break-all overflow-y-auto mb-6 border border-pink-50 min-h-[200px]">
                        尚未识别到二维码内容...
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <button id="copyBtn" class="cute-button py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-sm flex items-center justify-center gap-2">
                            <span>📋</span> 复制内容
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <ul class="space-y-4">
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">工具会自动识别并提取图片中的 URL、文本或联系人信息。</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="flex-shrink-0 w-6 h-6 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-[#6b7280] text-sm leading-relaxed">如果图片中有多个二维码，工具会尝试识别中心区域最为明显的一个。</p>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loader-overlay" class="fixed inset-0 bg-pink-50/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="cute-loader-candy"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('upload-area');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const scanAgainBtn = document.getElementById('scanAgainBtn');
        const resultContent = document.getElementById('resultContent');
        const copyBtn = document.getElementById('copyBtn');
        const loader = document.getElementById('loader-overlay');

        const showLoader = () => loader.classList.remove('hidden');
        const hideLoader = () => loader.classList.add('hidden');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            showLoader();
            try {
                const dataUrl = await Utils.readFileAsDataURL(file);
                previewImage.src = dataUrl;
                previewImage.onload = () => {
                    uploadPrompt.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                    scanAgainBtn.classList.remove('hidden');
                    scanQRCode();
                };
            } catch (err) {
                Utils.toast('图像读取失败', 'error');
                hideLoader();
            }
        }

        function scanQRCode() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = previewImage.naturalWidth;
            canvas.height = previewImage.naturalHeight;
            ctx.drawImage(previewImage, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code) {
                resultContent.textContent = code.data;
                resultContent.className = "flex-1 bg-pink-50/50 rounded-2xl p-6 font-mono text-sm text-pink-600 break-all overflow-y-auto mb-6 border border-pink-100";
                Utils.toast('识别成功', 'success');
            } else {
                resultContent.textContent = "未能识别到有效的二维码，请确保图片清晰且二维码完整。";
                resultContent.className = "flex-1 bg-gray-50/50 rounded-2xl p-6 font-mono text-sm text-gray-400 break-all overflow-y-auto mb-6 border border-pink-50";
                Utils.toast('识别失败', 'warning');
            }
            hideLoader();
        }

        copyBtn.onclick = () => {
            const text = resultContent.textContent;
            if (text && text !== "尚未识别到二维码内容..." && text.indexOf("未能识别") === -1) {
                navigator.clipboard.writeText(text);
                Utils.toast('内容已复制', 'success');
            }
        };

        scanAgainBtn.onclick = (e) => {
            e.stopPropagation();
            fileInput.click();
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
