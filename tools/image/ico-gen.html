<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="theme-color" content="#000000">

<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">ICO 图标实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">将精美图像打包为适配 Windows 系统的高清图标文件。💿</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">💎</div>
                    <p class="text-xl font-bold text-gray-700">上传并打磨您的图标</p>
                    <p class="text-pink-400 mt-2 text-sm italic">支持多种像素规格批量封装</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden flex flex-col lg:flex-row gap-8 lg:gap-12 animate-fade-in items-start">
                <!-- Controls -->
                <div class="flex-1 space-y-8 w-full">
                    <div class="bg-pink-50/30 p-6 md:p-8 rounded-[2rem] border border-pink-50 space-y-8">
                        <div>
                            <h3 class="font-black text-gray-800 flex items-center gap-2 mb-6 italic">
                                <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                                规格选择
                            </h3>
                            <div id="size-options" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                <!-- 由 JS 动态填充 -->
                            </div>
                        </div>

                        <div class="pt-4 border-t border-pink-100">
                             <h3 class="font-black text-gray-800 flex items-center gap-2 mb-6 italic">
                                <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                                输出模式
                            </h3>
                            <div class="flex flex-col sm:flex-row gap-4">
                                <label class="flex-1 flex items-center p-4 bg-white rounded-2xl border-2 border-transparent cursor-pointer hover:border-pink-200 transition-all group has-[:checked]:border-pink-400 has-[:checked]:bg-pink-50/50">
                                    <input type="radio" name="downloadMode" value="combined" checked class="hidden">
                                    <div class="w-5 h-5 rounded-full border-2 border-pink-100 flex items-center justify-center mr-3 bg-white">
                                        <div class="w-2.5 h-2.5 rounded-full bg-pink-400 opacity-0 transition-opacity"></div>
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="font-black text-gray-700 text-sm">智能封装</span>
                                        <span class="text-[10px] text-gray-400 font-bold italic">合并为一个 .ico 文件</span>
                                    </div>
                                </label>
                                <label class="flex-1 flex items-center p-4 bg-white rounded-2xl border-2 border-transparent cursor-pointer hover:border-pink-200 transition-all group has-[:checked]:border-pink-400 has-[:checked]:bg-pink-50/50">
                                    <input type="radio" name="downloadMode" value="separate" class="hidden">
                                    <div class="w-5 h-5 rounded-full border-2 border-pink-100 flex items-center justify-center mr-3 bg-white">
                                        <div class="w-2.5 h-2.5 rounded-full bg-pink-400 opacity-0 transition-opacity"></div>
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="font-black text-gray-700 text-sm">全量拆分</span>
                                        <span class="text-[10px] text-gray-400 font-bold italic">导出 ZIP 资源文件夹</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="pt-6 flex flex-col sm:flex-row gap-4">
                            <button id="generateBtn" class="cute-button flex-1 py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all flex items-center justify-center gap-3 theme-download-btn">
                                <span>立即生成图标</span>
                                <div id="btn-loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                            </button>
                            <button onclick="location.reload()" class="theme-secondary-btn py-5 px-8 rounded-full text-xs font-black">更换素材</button>
                        </div>
                    </div>
                </div>

                <!-- Preview Card -->
                <div class="w-full lg:w-96 space-y-6">
                    <h3 class="font-black text-gray-800 pl-2 uppercase italic tracking-tighter">实时渲染预览</h3>
                    <div class="bg-white rounded-[2.5rem] p-8 border border-pink-50 shadow-sm flex flex-center relative overflow-hidden aspect-square h-full">
                        <div class="absolute inset-0 bg-[radial-gradient(#fff1f2_1px,transparent_1px)] [background-size:24px_24px] opacity-40"></div>
                        <img id="preview-image" class="max-w-full max-h-full object-contain relative z-10 shadow-xl rounded-xl">
                    </div>
                    <div class="bg-pink-50/50 rounded-2xl p-4 text-center">
                        <p class="text-[10px] text-gray-400 italic font-bold">建议上传 1:1 比例的正方形图以获得最佳切割效果</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">📘</span>
                ICO 知识小讲堂
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10">
                    <div class="space-y-3">
                        <h4 class="font-black text-gray-700 flex items-center gap-2">
                             <span class="w-1.5 h-1.5 bg-pink-400 rounded-full"></span>
                             什么是封装？
                        </h4>
                        <p class="text-xs text-gray-500 leading-relaxed italic">ICO 文件的独特之处在于它可以同时包裹多种尺寸。Windows 系统会根据您桌面图标的排列方式（大图标或详细列表）自动抓取最适合的那一张。</p>
                    </div>
                    <div class="space-y-3">
                        <h4 class="font-black text-gray-700 flex items-center gap-2">
                             <span class="w-1.5 h-1.5 bg-pink-400 rounded-full"></span>
                             隐私与性能
                        </h4>
                        <p class="text-xs text-gray-500 leading-relaxed italic">所有的打包操作均在内存中瞬时完成，图像数据永不外流，确保您的设计私密性。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端离线实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const previewImage = document.getElementById('preview-image');
        const generateBtn = document.getElementById('generateBtn');
        const btnLoader = document.getElementById('btn-loader');

        let originalImg = new Image();

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            
            // 动态填充规格选择栏
            const sizeOptions = document.getElementById('size-options');
            if (sizeOptions) {
                sizeOptions.innerHTML = [16, 32, 48, 64, 128, 256, 512, 1024].map(s => `
                    <label class="flex items-center p-4 bg-white rounded-2xl border-2 border-transparent cursor-pointer hover:border-pink-200 transition-all group has-[:checked]:border-pink-400 has-[:checked]:bg-pink-50/50">
                        <input type="checkbox" value="${s}" checked class="hidden">
                        <div class="w-5 h-5 rounded-full border-2 border-pink-100 flex items-center justify-center group-hover:border-pink-300 transition-colors mr-3 bg-white">
                            <div class="w-2.5 h-2.5 rounded-full bg-pink-400 opacity-0 transition-opacity"></div>
                        </div>
                        <span class="font-black text-gray-700 text-sm">${s} px</span>
                    </label>
                `).join('');
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = await Utils.readFileAsDataURL(file);
            originalImg.src = url;
            previewImage.src = url;
            originalImg.onload = () => {
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
                Utils.toast('素材载入成功！', 'success');
            };
        };

        generateBtn.onclick = async () => {
            const selectedSizes = Array.from(document.querySelectorAll('#size-options input:checked')).map(cb => parseInt(cb.value));
            if (!selectedSizes.length) {
                Utils.toast('请至少勾选一组尺寸', 'warning');
                return;
            }

            const downloadMode = document.querySelector('input[name="downloadMode"]:checked').value;
            generateBtn.disabled = true;
            btnLoader.classList.remove('hidden');

            try {
                if (downloadMode === 'combined') {
                    const icoBlob = await createIco(originalImg, selectedSizes);
                    Utils.downloadFile(URL.createObjectURL(icoBlob), `q_icon_${Date.now()}.ico`, 'image/x-icon');
                    Utils.toast('封装版本已生成！', 'success');
                } else {
                    const zip = new JSZip();
                    for (const size of selectedSizes) {
                        const icoBlob = await createIco(originalImg, [size]);
                        zip.file(`icon_${size}x${size}.ico`, icoBlob);
                    }
                    const content = await zip.generateAsync({type:"blob"});
                    Utils.downloadFile(URL.createObjectURL(content), `q_icons_${Date.now()}.zip`, 'application/zip');
                    Utils.toast('资源包下载开启', 'success');
                }
            } catch (err) {
                Utils.toast('封装失败', 'error');
            } finally {
                generateBtn.disabled = false;
                btnLoader.classList.add('hidden');
            }
        };

        async function createIco(img, sizes) {
            const pngBlobs = await Promise.all(sizes.map(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size; canvas.height = size;
                const ctx = canvas.getContext('2d');
                const s = Math.min(img.width, img.height);
                const x = (img.width - s) / 2;
                const y = (img.height - s) / 2;
                ctx.drawImage(img, x, y, s, s, 0, 0, size, size);
                return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            }));

            const pngBuffers = await Promise.all(pngBlobs.map(blob => blob.arrayBuffer()));
            const header = new DataView(new ArrayBuffer(6));
            header.setUint16(0, 0, true);
            header.setUint16(2, 1, true);
            header.setUint16(4, sizes.length, true);

            const directory = new DataView(new ArrayBuffer(16 * sizes.length));
            let offset = 6 + 16 * sizes.length;

            pngBuffers.forEach((buffer, i) => {
                const size = sizes[i];
                const entry = i * 16;
                directory.setUint8(entry + 0, size >= 256 ? 0 : size);
                directory.setUint8(entry + 1, size >= 256 ? 0 : size);
                directory.setUint32(entry + 8, buffer.byteLength, true);
                directory.setUint32(entry + 12, offset, true);
                offset += buffer.byteLength;
                directory.setUint16(entry + 4, 1, true);
                directory.setUint16(entry + 6, 32, true);
            });
            return new Blob([header.buffer, directory.buffer, ...pngBuffers], { type: 'image/x-icon' });
        }
    </script>
    <style>
        .has-\[\:checked\]\:border-pink-400:has(:checked) { border-color: #f472b6; }
        .has-\[\:checked\]\:bg-pink-50\/50:has(:checked) { background-color: rgb(253 242 248 / 0.5); }
        .group:has(:checked) .opacity-0 { opacity: 1; }
    </style>

    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>

</body>
