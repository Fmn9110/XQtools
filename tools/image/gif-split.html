<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIF分帧 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Required Libraries -->
    <script src="../../assets/lib/gif-frames.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/gif-frames@1.0.1/dist/gif-frames.min.js';"></script>
    <script src="../../assets/lib/jszip.min.js" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';"></script>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">GIF 深度拆解</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">将灵动的 GIF 瞬间凝固为高清帧图序列。🎞️</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 animate-item" style="animation-delay: 0.2s text-center">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/gif" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">📁</div>
                    <p class="text-xl font-bold text-gray-700">点击或拖入 GIF 图片</p>
                    <p class="text-pink-400 mt-2 text-sm italic">快速提取每一帧精彩</p>
                </div>
            </div>

            <div id="result-stage" class="hidden animate-fade-in w-full space-y-6">
                <div class="flex flex-col md:flex-row justify-between items-center bg-pink-50/30 p-6 rounded-3xl border border-pink-50 gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-8 bg-pink-400 rounded-full"></div>
                        <p class="font-bold text-gray-700" id="info-text">正在解析...</p>
                    </div>
                    <div class="flex gap-3 w-full md:w-auto">
                        <button id="downloadAllBtn" class="flex-1 md:flex-none theme-download-btn px-8 py-3 bg-pink-500 text-white rounded-full font-bold shadow-lg hover:bg-pink-600 transition-all flex items-center justify-center gap-2">
                            <span>📦 打包下载全帧</span>
                        </button>
                        <button onclick="location.reload()" class="flex-1 md:flex-none theme-secondary-btn py-3 px-6 rounded-full text-xs font-bold">更换图片</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 p-4 bg-white rounded-3xl border border-pink-50 shadow-inner max-h-[600px] overflow-y-auto" id="frames-grid">
                    <!-- JS Inject -->
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                功能贴士
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-3 gap-6 relative z-10">
                    <div class="space-y-2">
                        <h4 class="font-bold text-pink-500 break-all">什么是分帧？</h4>
                        <p class="text-xs text-gray-500 leading-relaxed italic">分帧是将动图中的每一格静止画面单独提取出来的过程，方便二次创作。</p>
                    </div>
                    <div class="space-y-2">
                        <h4 class="font-bold text-pink-500 break-all">保存说明</h4>
                        <p class="text-xs text-gray-500 leading-relaxed italic">提取出的每一帧均保持原始画质，您可以单独下载某一张，或一键导出资源包。</p>
                    </div>
                    <div class="space-y-2">
                        <h4 class="font-bold text-pink-500 break-all">隐私保障</h4>
                        <p class="text-xs text-gray-500 leading-relaxed italic">所有处理均在您的浏览器本地完成，动图不会上传到任何服务器。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端分帧实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        let extractedFrames = [];
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('drop-zone');
        const uploadStage = document.getElementById('upload-stage');
        const resultStage = document.getElementById('result-stage');
        const framesGrid = document.getElementById('frames-grid');
        const infoText = document.getElementById('info-text');
        const downloadAllBtn = document.getElementById('downloadAllBtn');

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            uploadStage.classList.add('hidden');
            resultStage.classList.remove('hidden');
            infoText.innerText = '正在精准拆解中...';
            framesGrid.innerHTML = '';
            extractedFrames = [];

            try {
                const frameData = await gifFrames({ 
                    url: URL.createObjectURL(file), 
                    frames: 'all', 
                    outputType: 'canvas' 
                });

                infoText.innerText = `提取成功！共 ${frameData.length} 帧 | ${frameData[0].getImage().width}px × ${frameData[0].getImage().height}px`;
                
                frameData.forEach((frame, i) => {
                    const canvas = frame.getImage();
                    const url = canvas.toDataURL('image/png');
                    extractedFrames.push(url);

                    const div = document.createElement('div');
                    div.className = 'group relative bg-gray-50/50 rounded-2xl p-2 border border-gray-100 hover:border-pink-300 hover:bg-white transition-all duration-300';
                    div.innerHTML = `
                        <img src="${url}" class="rounded-xl mb-2 mx-auto object-contain h-24 w-full shadow-sm group-hover:scale-105 transition-transform">
                        <div class="flex justify-between items-center px-1">
                            <span class="text-[8px] font-black text-gray-400 uppercase tracking-tighter">Frame #${i + 1}</span>
                            <a href="${url}" download="q_frame_${i+1}.png" class="text-[10px] text-pink-500 font-bold hover:pink-600 transition-colors">保存</a>
                        </div>
                    `;
                    framesGrid.appendChild(div);
                });

                downloadAllBtn.onclick = async () => {
                    if (window.innerWidth <= 768) {
                        Utils.toast('移动端建议单独保存常用帧，打包功能推荐在电脑使用~', 'info');
                        return;
                    }
                    Utils.toast('正在打包压缩中...', 'info');
                    const zip = new JSZip();
                    extractedFrames.forEach((data, index) => {
                        zip.file(`frame_${index + 1}.png`, data.split(',')[1], {base64: true});
                    });

                    const content = await zip.generateAsync({type: "blob"});
                    Utils.downloadFile(content, `gif_frames_${Date.now()}.zip`, "application/zip");
                    Utils.toast('打包完毕！', 'success');
                };

            } catch (err) {
                Utils.toast('解析失败', 'error');
                location.reload();
            }
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
