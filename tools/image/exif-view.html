<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXIF信息查看 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">EXIF信息查看</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">深度解析照片背后的故事，探索每一份光影记录的秘密。📷</p>
        </header>

        <section class="cute-card p-6 md:p-8 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/jpeg,image/tiff" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">📁</div>
                    <p class="text-xl font-bold text-gray-700">选择 JPG/TIFF 图片</p>
                    <p class="text-pink-400 mt-2 text-sm italic">本地读取，隐私无忧</p>
                </div>
            </div>

            <div id="result-stage" class="hidden flex flex-col lg:flex-row gap-8 lg:gap-12 animate-fade-in">
                <div class="flex-1 bg-gray-50/50 rounded-3xl p-6 flex flex-col items-center justify-center min-h-[300px]">
                    <img id="preview" class="max-w-full max-h-[400px] rounded-2xl shadow-xl hover:scale-105 transition-transform duration-500">
                </div>
                
                <div class="w-full lg:w-96 space-y-6">
                    <div class="bg-pink-50/30 p-6 md:p-8 rounded-3xl space-y-4">
                        <h3 class="font-bold text-gray-800 flex items-center mb-2">
                            <span class="w-1.5 h-6 bg-pink-400 rounded-full mr-3"></span>
                            元数据清单
                        </h3>
                        <div id="info-list" class="space-y-2">
                            <!-- JS Inject -->
                        </div>
                        <div class="pt-4">
                            <button onclick="location.reload()" class="w-full theme-secondary-btn py-3 rounded-full text-sm font-bold">重新上传</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-item" style="animation-delay: 0.3s">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🎯</span>
                    功能说明
                </h2>
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden h-full">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">
                        <li>支持读取 JPEG、TIFF 等主流照片格式。</li>
                        <li>自动解析分辨率、宽高比、百万像素等核心物理参数。</li>
                        <li>一站式了解文件大小及修改时间。</li>
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💬</span>
                    常见答疑
                </h2>
                <div class="space-y-4 h-full">
                    <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm hover:border-pink-200 transition-colors">
                        <div class="font-bold text-gray-700 mb-2 flex items-center">
                            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 mr-2"></span>
                            为什么有些照片不显示信息？
                        </div>
                        <div class="text-gray-500 text-sm leading-relaxed pl-3.5">
                            经过社交媒体（如微信、微博）转发的照片通常会被剔除 EXIF 隐私数据。此外，截图或 PNG 格式本身不包含 EXIF。
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 纯前端离线实验室 · 保护隐私 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('drop-zone');
        const uploadStage = document.getElementById('upload-stage');
        const resultStage = document.getElementById('result-stage');
        const preview = document.getElementById('preview');
        const infoList = document.getElementById('info-list');

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const img = new Image();
            img.onload = () => {
                preview.src = img.src;
                renderInfo(file, img);
                uploadStage.classList.add('hidden');
                resultStage.classList.remove('hidden');
            };
            img.src = URL.createObjectURL(file);
        }

        function renderInfo(file, img) {
            const info = [
                { label: '📁 文件名', val: file.name },
                { label: '📐 尺寸', val: `${img.naturalWidth} × ${img.naturalHeight} px` },
                { label: '💾 文件大小', val: Utils.formatSize(file.size) },
                { label: '📄 类型', val: file.type || 'image/jpeg' },
                { label: '📅 修改时间', val: new Date(file.lastModified).toLocaleString() },
                { label: '📏 宽高比', val: getAspectRatio(img.naturalWidth, img.naturalHeight) },
                { label: '🖥️ 像素', val: ((img.naturalWidth * img.naturalHeight) / 1000000).toFixed(2) + ' MP' }
            ];

            infoList.innerHTML = info.map(i => `
                <div class="flex justify-between items-center p-3 bg-white rounded-2xl border border-pink-50 hover:border-pink-200 transition-colors">
                    <span class="text-gray-400 text-xs font-bold">${i.label}</span>
                    <span class="text-gray-700 text-sm font-mono font-bold">${i.val}</span>
                </div>
            `).join('');
        }

        function getAspectRatio(w, h) {
            const common = gcd(w, h);
            return `${w / common}:${h / common}`;
        }

        function gcd(a, b) {
            return b === 0 ? a : gcd(b, a % b);
        }
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
