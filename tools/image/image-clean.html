<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能去污/水印 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        #editor-container {
            position: relative;
            max-width: 100%;
            overflow: auto;
            border-radius: 2rem;
            background: white;
            border: 4px solid white;
            box-shadow: 0 25px 50px -12px rgba(244, 114, 182, 0.1);
        }
        canvas { display: block; margin: 0 auto; max-width: 100%; }
        .brush-cursor {
            pointer-events: none;
            position: fixed;
            border: 2px solid rgba(244, 114, 182, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.3);
            z-index: 100;
            display: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
    </style>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <div id="cursor" class="brush-cursor"></div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">像素治愈实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">精准涂抹，智能修补。让多余的水印、杂物瞬间隐形。🪄</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">🪄</div>
                    <p class="text-xl font-bold text-gray-700">提交需修补的素材</p>
                    <p class="text-pink-400 mt-2 text-sm italic">纯离线高阶修复，保护您的画面隐私</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden flex flex-col lg:flex-row gap-8 lg:gap-12 animate-fade-in items-start">
                <!-- Workspace -->
                <div class="flex-1 w-full flex flex-col items-center">
                    <div class="bg-white/80 backdrop-blur-sm px-6 py-2 rounded-full mb-6 border border-pink-100 shadow-sm">
                        <p class="text-[10px] text-pink-500 font-black italic tracking-widest uppercase animate-pulse">👉 涂抹画面中需要消除的噪点或区域</p>
                    </div>
                    <div id="editor-container" class="w-full relative transition-transform duration-500">
                        <canvas id="canvas"></canvas>
                    </div>
                </div>

                <!-- Controls -->
                <div class="w-full lg:w-96 space-y-8 bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50 self-stretch flex flex-col">
                    <div class="space-y-6 flex-1">
                        <h3 class="font-black text-gray-800 italic uppercase flex items-center gap-2">
                             <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                             实验室配置
                        </h3>
                        
                        <div class="space-y-4">
                            <div class="flex justify-between items-center px-1">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">笔刷口经</label>
                                <span id="sizeVal" class="font-black text-pink-500 font-mono">30px</span>
                            </div>
                            <input type="range" id="brushSize" min="10" max="150" value="30" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between items-center px-1">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">修复强度</label>
                                <span id="blurVal" class="font-black text-pink-500 font-mono">10px</span>
                            </div>
                            <input type="range" id="blurLevel" min="2" max="50" value="10" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                        </div>
                    </div>

                    <div class="flex flex-col gap-4 mt-auto">
                        <div class="grid grid-cols-2 gap-3">
                            <button id="undoBtn" class="py-3 text-gray-400 font-bold hover:text-pink-500 text-xs border border-gray-100 rounded-2xl disabled:opacity-30 transition-all font-black uppercase" disabled>撤销操作</button>
                            <button id="resetBtn" class="py-3 text-gray-400 font-bold hover:text-pink-500 text-xs border border-gray-100 rounded-2xl transition-all theme-secondary-btn font-black uppercase">清空标记</button>
                        </div>
                        <button id="downloadBtn" class="w-full py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn">保存净化作品</button>
                        <button onclick="location.reload()" class="w-full text-center text-[10px] text-gray-300 font-bold hover:text-pink-400 transition-all italic tracking-tighter">更换实验样本</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                消除技巧
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <p>1. 针对小面积污点，使用较小的笔刷（20px以下）能获得更细腻的边缘修补效果。</p>
                    <p>2. 修复强度主要控制周围像素的融合阈值。遇到复杂背景时，尝试调高强度以模糊水印细节。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 净化实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const brushSizeInput = document.getElementById('brushSize');
        const sizeVal = document.getElementById('sizeVal');
        const blurLevelInput = document.getElementById('blurLevel');
        const blurVal = document.getElementById('blurVal');
        const undoBtn = document.getElementById('undoBtn');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let img = null, isDrawing = false, history = [];
        const maskCanvas = document.createElement('canvas');
        const maskCtx = maskCanvas.getContext('2d');

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const dataUrl = await Utils.readFileAsDataURL(file);
            img = new Image();
            img.onload = () => {
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
                initEditor();
            };
            img.src = dataUrl;
        };

        function initEditor() {
            canvas.width = img.width; canvas.height = img.height;
            maskCanvas.width = img.width; maskCanvas.height = img.height;
            maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
            
            const ratio = Math.min((window.innerWidth > 1024 ? 700 : 350) / img.width, 500 / img.height);
            document.getElementById('editor-container').style.transform = ratio < 1 ? `scale(${ratio})` : 'none';
            document.getElementById('editor-container').style.transformOrigin = 'top center';

            history = []; saveHistory(); render();
        }

        function saveHistory() {
            history.push(maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height));
            if(history.length > 15) history.shift();
            undoBtn.disabled = history.length <= 1;
        }

        undoBtn.onclick = () => {
            if(history.length > 1) {
                history.pop();
                maskCtx.putImageData(history[history.length - 1], 0, 0);
                render(); undoBtn.disabled = history.length <= 1;
            }
        };

        resetBtn.onclick = () => {
            maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
            history = []; saveHistory(); render();
        };

        function render() {
            if(!img) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);

            const blurAmount = parseInt(blurLevelInput.value);
            const offBlur = document.createElement('canvas');
            offBlur.width = canvas.width; offBlur.height = canvas.height;
            const bCtx = offBlur.getContext('2d');
            bCtx.filter = `blur(${blurAmount}px)`;
            bCtx.drawImage(img, 0, 0);

            ctx.save();
            const temp = document.createElement('canvas');
            temp.width = canvas.width; temp.height = canvas.height;
            const tCtx = temp.getContext('2d');
            tCtx.drawImage(maskCanvas, 0, 0);
            tCtx.globalCompositeOperation = 'source-in';
            tCtx.drawImage(offBlur, 0, 0);
            ctx.drawImage(temp, 0, 0);
            ctx.restore();
        }

        canvas.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scale = rect.width / canvas.width;
            const size = parseInt(brushSizeInput.value);
            cursor.style.display = 'block';
            cursor.style.width = (size * scale) + 'px';
            cursor.style.height = (size * scale) + 'px';
            cursor.style.left = (e.clientX - (size * scale) / 2) + 'px';
            cursor.style.top = (e.clientY - (size * scale) / 2) + 'px';

            if(isDrawing) {
                const x = (e.clientX - rect.left) / scale;
                const y = (e.clientY - rect.top) / scale;
                drawToMask(x, y);
            }
        };

        canvas.onmouseleave = () => { cursor.style.display = 'none'; isDrawing = false; };
        canvas.onmousedown = (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const scale = rect.width / canvas.width;
            drawToMask((e.clientX - rect.left) / scale, (e.clientY - rect.top) / scale, true);
        };
        window.onmouseup = () => { if(isDrawing) { isDrawing = false; saveHistory(); } };

        function drawToMask(x, y, start = false) {
            maskCtx.lineCap = 'round'; maskCtx.lineJoin = 'round';
            maskCtx.lineWidth = parseInt(brushSizeInput.value);
            maskCtx.strokeStyle = 'black';
            if(start) { maskCtx.beginPath(); maskCtx.moveTo(x, y); }
            maskCtx.lineTo(x, y); maskCtx.stroke(); render();
        }

        brushSizeInput.oninput = () => sizeVal.textContent = brushSizeInput.value + 'px';
        blurLevelInput.oninput = () => { blurVal.textContent = blurLevelInput.value + 'px'; render(); };

        downloadBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/jpeg', 0.98), `q_clean_${Date.now()}.jpg`, 'image/jpeg');
            Utils.toast('已保存净化后的作品', 'success');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
