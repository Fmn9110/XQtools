    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">

        </header>

        <section class="cute-card p-6 md:p-8 mb-12 flex flex-col md:flex-row gap-8 md:gap-12 items-center md:items-start animate-item" style="animation-delay: 0.2s">

            </div>

            <div class="w-full md:w-80 space-y-6">

                    <div class="space-y-4">

        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-item" style="animation-delay: 0.3s">

                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden h-full">

                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">

                    </ul>

            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">

                <div class="space-y-4 h-full">
                    <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm hover:border-pink-200 transition-colors">

                            为什么每次生成都不一样？

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">

    <script src="../../assets/js/utils.js"></script>
    <script>
        const canvas = document.getElementById('avatar-canvas');
        const ctx = canvas.getContext('2d');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const seedDisplay = document.getElementById('seed-display');

        const bgColors = ['#FFD1DC', '#FFB7B2', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#FDFD96', '#E0BBE4', '#957DAD'];
        const skinColors = ['#FFDFD3', '#FEC8D8', '#f1c27d', '#e0ac69', '#d2996c', '#8d5524', '#ffccb6'];
        const hairColors = ['#4A4A4A', '#2C2C2C', '#FADA5E', '#A52A2A', '#D2B48C', '#FF69B4', '#87CEEB', '#98FF98'];
        const clothColors = ['#FF9AA2', '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#FFF'];

        function randomPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
            drawAvatar();
        });

        function drawAvatar() {
            const seed = Math.random().toString(36).substring(7).toUpperCase();
            seedDisplay.textContent = '#' + seed;

            ctx.clearRect(0, 0, 400, 400);
            
            // 1. Background
            ctx.fillStyle = randomPick(bgColors);
            ctx.fillRect(0, 0, 400, 400);

            const skinColor = randomPick(skinColors);

            // 2. Body / Clothes
            ctx.fillStyle = randomPick(clothColors);
            ctx.beginPath();
            ctx.arc(200, 360, 120, Math.PI, 0); // shoulders
            ctx.lineTo(320, 400);
            ctx.lineTo(80, 400);
            ctx.fill();

            // 3. Neck
            ctx.fillStyle = skinColor;
            ctx.fillRect(170, 270, 60, 60);

            // 4. Face Base
            ctx.beginPath();
            ctx.arc(200, 200, 95, 0, Math.PI * 2);
            ctx.fill();

            // 5. Hair (Back)
            const hairColor = randomPick(hairColors);
            ctx.fillStyle = hairColor;
            const hairType = randomInt(1, 4);
            
            if (hairType === 2) { // Long hair back
                ctx.beginPath();
                ctx.arc(200, 180, 110, Math.PI, Math.PI * 2);
                ctx.rect(90, 180, 220, 180);
                ctx.fill();
            }

            // 6. Blush
            ctx.fillStyle = 'rgba(255, 105, 180, 0.25)';
            ctx.beginPath(); ctx.arc(145, 230, 15, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(255, 230, 15, 0, Math.PI * 2); ctx.fill();

            // 7. Eyes
            ctx.fillStyle = '#333';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            const eyeType = randomInt(1, 4);
            if (eyeType === 1) { // Dots
                ctx.beginPath(); ctx.arc(155, 205, 8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(245, 205, 8, 0, Math.PI * 2); ctx.fill();
            } else if (eyeType === 2) { // Closed happy
                ctx.beginPath(); ctx.arc(155, 210, 10, Math.PI, 0); ctx.stroke();
                ctx.beginPath(); ctx.arc(245, 210, 10, Math.PI, 0); ctx.stroke();
            } else if (eyeType === 3) { // Glasses
                ctx.beginPath(); ctx.arc(155, 205, 20, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(245, 205, 20, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(175, 205); ctx.lineTo(225, 205); ctx.stroke();
            } else { // Wink
                ctx.beginPath(); ctx.arc(155, 205, 8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(235, 205); ctx.lineTo(255, 205); ctx.stroke();
            }

            // 8. Mouth
            const mouthType = randomInt(1, 3);
            if (mouthType === 1) { // Smile line
                ctx.beginPath(); ctx.arc(200, 235, 15, 0, Math.PI); ctx.stroke();
            } else if (mouthType === 2) { // Neutral/Cat
                ctx.beginPath(); ctx.arc(192, 235, 8, Math.PI, 0, true); ctx.stroke();
                ctx.beginPath(); ctx.arc(208, 235, 8, Math.PI, 0, true); ctx.stroke();
            } else { // Open smile
                ctx.fillStyle = '#ff6b6b'; 
                ctx.beginPath(); ctx.arc(200, 235, 15, 0, Math.PI); ctx.fill(); ctx.stroke();
            }

            // 9. Hair (Front)
            ctx.fillStyle = hairColor;
            ctx.beginPath();
            if (hairType === 1) { // Short / Boy
                ctx.arc(200, 180, 100, Math.PI, Math.PI * 2);
                ctx.moveTo(100, 180);
                ctx.lineTo(150, 150);
                ctx.lineTo(200, 160);
                ctx.lineTo(250, 130);
                ctx.lineTo(300, 180);
                ctx.fill();
            } else if (hairType === 3) { // Messy
                ctx.moveTo(90, 180);
                for(let i=0; i<6; i++) {
                    ctx.lineTo(90 + i*36 + 18, 80 + Math.random()*50);
                    ctx.lineTo(90 + (i+1)*36, 170);
                }
                ctx.fill();
            } else if (hairType === 4) { // Afro / Curly
                for(let i=0; i<12; i++) {
                    ctx.beginPath();
                    ctx.arc(130 + Math.random()*140, 100 + Math.random()*60, 40, 0, Math.PI*2);
                    ctx.fill();
                }
            } else { // Bangs for Long hair (type 2)
                ctx.arc(200, 170, 100, Math.PI, Math.PI * 2);
                ctx.moveTo(100, 170);
                ctx.lineTo(300, 170);
                ctx.lineTo(200, 140);
                ctx.fill();
            }
        }

        generateBtn.onclick = drawAvatar;
        
        downloadBtn.onclick = () => {
            Utils.downloadFile(canvas.toDataURL('image/png'), 'avatar_' + Date.now() + '.png', 'image/png');
            Utils.toast('保存成功！', 'success');
        };
    </script>
