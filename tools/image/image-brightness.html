<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片亮度调整 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">光影调控实验室</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">点亮暗部细节，控制明暗韵律。重塑画面的影调灵魂。✨</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">💡</div>
                    <p class="text-xl font-bold text-gray-700">请选择待调优的作品</p>
                    <p class="text-pink-400 mt-2 text-sm italic">支持全画幅增值或暗部找回</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden animate-fade-in flex flex-col items-center">
                <div class="w-full bg-pink-50/20 p-6 md:p-10 rounded-[2.5rem] border border-pink-50 mb-10 flex justify-center">
                    <div class="relative shadow-2xl rounded-3xl overflow-hidden bg-white max-w-full">
                        <img id="preview" class="max-w-full max-h-[450px] shadow-lg rounded-2xl transition-all duration-300">
                    </div>
                </div>

                <div class="w-full max-w-xl bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50 space-y-8">
                    <div class="space-y-6">
                        <div class="flex justify-between items-center px-1">
                             <h3 class="font-black text-gray-800 italic uppercase flex items-center gap-2">
                                <span class="w-2 h-6 bg-pink-400 rounded-full"></span>
                                亮度增强
                            </h3>
                            <span id="label" class="font-black text-pink-500 font-mono text-xl tracking-tighter">100%</span>
                        </div>
                        <input type="range" id="range" min="0" max="200" value="100" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                        <div class="flex justify-between text-[10px] text-gray-400 font-bold px-1 italic">
                            <span>TOTAL DARKNESS</span>
                            <span>NATURAL ORIGIN</span>
                            <span>PEAK RADIANCE</span>
                        </div>
                    </div>

                    <div class="pt-4 flex flex-col sm:flex-row gap-4">
                        <button id="saveBtn" class="flex-1 py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn">保存影调作品</button>
                        <button id="resetBtn" class="py-5 px-10 text-gray-400 font-bold hover:text-pink-500 text-xs border border-gray-100 rounded-full theme-secondary-btn">更换素材</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🛡️</span>
                关于本地渲染
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <p class="text-xs text-gray-500 leading-relaxed italic font-medium relative z-10">调节过程实时发生在您的显存缓冲区内。当您点击保存时，V8 引擎会通过 Canvas API 对底层像素进行亮阶补偿运算。图像数据全程绝不涉及联网，守护您的视觉资产安全。</p>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 光影实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const preview = document.getElementById('preview');
        const range = document.getElementById('range');
        const label = document.getElementById('label');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalUrl = '';

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            originalUrl = await Utils.readFileAsDataURL(file);
            preview.src = originalUrl;
            uploadStage.classList.add('hidden');
            editorStage.classList.remove('hidden');
            update();
        };

        range.oninput = update;

        function update() {
            const val = range.value;
            label.textContent = val + '%';
            preview.style.filter = `brightness(${val}%)`;
        }

        saveBtn.onclick = () => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.filter = `brightness(${range.value}%)`;
                ctx.drawImage(img, 0, 0);
                Utils.downloadFile(canvas.toDataURL('image/jpeg', 0.95), `q_bright_${Date.now()}.jpg`, 'image/jpeg');
                Utils.toast('亮度调节成功', 'success');
            };
            img.src = originalUrl;
        };

        resetBtn.onclick = () => {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            editorArea.classList.add('hidden');
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
