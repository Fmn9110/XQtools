<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片压缩 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fffafa]">
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>

    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 transition-transform hover:rotate-0">Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-500 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 animate-item gradient-text">轻量级像素工厂</h1>
            <p class="text-gray-500 animate-item" style="animation-delay: 0.1s">在保持画质的同时，极致减小体积。离线压缩，保护隐私。💎</p>
        </header>

        <section class="cute-card p-6 md:p-12 mb-12 animate-item" style="animation-delay: 0.2s">
            <div id="upload-stage" class="text-center">
                <div id="drop-zone" class="w-full border-4 border-dashed border-pink-100 rounded-3xl p-8 md:p-16 hover:border-pink-300 transition-all cursor-pointer bg-white group">
                    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" class="hidden">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">💎</div>
                    <p class="text-xl font-bold text-gray-700">提交需要瘦身的素材</p>
                    <p class="text-pink-400 mt-2 text-sm italic">支持 JPG / PNG / WebP，纯本地处理</p>
                </div>
            </div>

            <div id="editor-stage" class="hidden animate-fade-in space-y-8">
                <div class="grid md:grid-cols-2 gap-8 items-center">
                    <div class="bg-gray-50 rounded-[2.5rem] p-4 flex justify-center items-center overflow-hidden border border-pink-50 min-h-[300px]">
                        <img id="imagePreview" class="max-w-full max-h-[400px] rounded-2xl shadow-sm">
                    </div>
                    
                    <div class="space-y-8 p-6">
                        <div class="space-y-4">
                            <div class="flex justify-between items-center px-1">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">压缩质量</label>
                                <span id="qualityVal" class="font-black text-pink-500 font-mono text-xl">70%</span>
                            </div>
                            <input type="range" id="qualityRange" min="1" max="100" value="70" class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-4 rounded-2xl border border-pink-50 shadow-sm text-center">
                                <p class="text-[10px] text-gray-400 font-black uppercase tracking-tighter mb-1">原始大小</p>
                                <p id="originalSize" class="text-lg font-black text-gray-700 italic">-</p>
                            </div>
                            <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100 shadow-sm text-center">
                                <p class="text-[10px] text-pink-400 font-black uppercase tracking-tighter mb-1">预计大小</p>
                                <p id="newSize" class="text-lg font-black text-pink-600 italic">-</p>
                            </div>
                        </div>

                        <div class="flex flex-col gap-3">
                            <button id="downloadBtn" class="w-full py-5 bg-pink-500 text-white rounded-full font-black shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all theme-download-btn">保存并导出</button>
                            <button id="resetBtn" class="w-full py-3 text-gray-400 font-bold hover:text-pink-500 transition-all theme-secondary-btn uppercase text-xs font-black italic">更换实验样本</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="animate-item" style="animation-delay: 0.3s">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💡</span>
                压缩指南
            </h2>
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                <div class="grid md:grid-cols-2 gap-8 relative z-10 text-xs text-gray-500 font-medium italic leading-relaxed">
                    <p>1. <b>画质平衡：</b>通常建议将质量设定在 70%-85%，这样可以在肉眼难以察觉差异的情况下获得最大的压缩比。</p>
                    <p>2. <b>格式转换：</b>透明 PNG 格式在压缩时为了获得体积优势，系统将自动使用 WebP 编码输出。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-pink-50 mt-12 bg-white/50">
        © 2026 小Q工具箱 · 瘦身实验室 💖
    </footer>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStage = document.getElementById('upload-stage');
        const editorStage = document.getElementById('editor-stage');
        const qualityRange = document.getElementById('qualityRange');
        const qualityVal = document.getElementById('qualityVal');
        const originalSizeText = document.getElementById('originalSize');
        const newSizeText = document.getElementById('newSize');
        const preview = document.getElementById('imagePreview');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let rawImage = null;
        let originalFileType = '';
        let originalFileName = '';
        let currentCompressedData = null;
        let currentExt = '';

        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            originalFileType = file.type;
            originalFileName = file.name;
            originalSizeText.textContent = Utils.formatSize(file.size);

            rawImage = new Image();
            rawImage.src = await Utils.readFileAsDataURL(file);
            rawImage.onload = () => {
                uploadStage.classList.add('hidden');
                editorStage.classList.remove('hidden');
                preview.src = rawImage.src;
                compress();
            };
        };

        qualityRange.oninput = (e) => {
            qualityVal.textContent = e.target.value + '%';
            compress();
        };

        function compress() {
            if (!rawImage) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = rawImage.width;
            canvas.height = rawImage.height;
            ctx.drawImage(rawImage, 0, 0);

            let quality = parseInt(qualityRange.value) / 100;
            let outputType = originalFileType;
            currentExt = originalFileType === 'image/jpeg' ? '.jpg' : (originalFileType === 'image/webp' ? '.webp' : '.png');
            
            if (originalFileType === 'image/png') {
                outputType = 'image/webp';
                currentExt = '.webp';
            }

            currentCompressedData = canvas.toDataURL(outputType, quality);
            preview.src = currentCompressedData;
            
            const base64Data = currentCompressedData.split(',')[1] || currentCompressedData;
            const size = (base64Data.length * 0.75);
            newSizeText.textContent = Utils.formatSize(size);
        }

        downloadBtn.onclick = () => {
            if (!currentCompressedData) return;
            const name = originalFileName.substring(0, originalFileName.lastIndexOf('.')) || 'image';
            Utils.downloadFile(currentCompressedData, `${name}_compressed${currentExt}`, 'image/octet-stream');
            Utils.toast('压缩并保存成功', 'success');
        };

        resetBtn.onclick = () => {
            uploadStage.classList.remove('hidden');
            editorStage.classList.add('hidden');
            fileInput.value = '';
            rawImage = null;
            currentCompressedData = null;
        };
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
