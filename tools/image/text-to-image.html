<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文字转图片 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Serif+SC:wght@700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f7] min-h-screen font-['Outfit']">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-pink-100 px-4 md:px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-xl md:text-2xl shadow-lg shadow-pink-200">Q</div>
                <span class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-rose-400">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="px-4 py-2 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition-all text-sm font-semibold">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 max-w-4xl">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#4a4a4a] mb-4">文字转图片</h1>
            <p class="text-gray-500">将思绪转化为视觉符号，让表达更有张力 💬</p>
        </header>

        <section class="grid lg:grid-cols-5 gap-8 mb-12">
            <!-- 配置区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem]">
                    <h3 class="text-lg font-bold text-[#4a4a4a] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full"></span>
                        排版样式
                    </h3>
                    <div class="space-y-4">
                        <textarea id="textInput" rows="5" placeholder="在此输入一段文字..." class="w-full px-4 py-3 border-2 border-pink-50 rounded-xl focus:border-pink-300 outline-none transition-all font-bold text-pink-500 text-sm bg-white"></textarea>
                        
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest">字体选择</label>
                                <select id="fontSelect" class="w-full px-4 py-3 bg-white border-2 border-pink-50 rounded-xl outline-none font-bold text-gray-500">
                                    <option value="'Outfit', sans-serif">现代简约 (Outfit)</option>
                                    <option value="'Noto Serif SC', serif">古典优雅 (Noto Serif)</option>
                                    <option value="'Zhi Mang Xing', cursive">灵动手写 (Zhi Mang Xing)</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest">文字颜色</label>
                                    <input type="color" id="textColor" value="#ffffff" class="w-full h-11 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest">背景颜色</label>
                                    <input type="color" id="bgColor" value="#f472b6" class="w-full h-11 rounded-lg cursor-pointer border-2 border-pink-50 bg-white p-1">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 w-full">
                    <button id="downloadBtn" class="cute-button py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-all text-sm flex items-center justify-center gap-2">
                        <span>🚀</span> 下载图片
                    </button>
                    <button id="resetBtn" class="py-4 bg-white text-gray-400 rounded-2xl font-bold border-2 border-gray-100 hover:bg-gray-50 transition-all text-sm">重置</button>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="lg:col-span-3">
                <div class="cute-card p-6 md:p-8 bg-white/70 backdrop-blur-sm border border-white/50 shadow-xl shadow-pink-100/50 rounded-[2rem] flex flex-col items-center justify-center min-h-[400px]">
                    <div class="bg-gray-100/30 rounded-3xl p-4 w-full flex items-center justify-center">
                        <canvas id="canvas" class="max-w-full shadow-2xl rounded-2xl"></canvas>
                    </div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-6">OUTPUT PREVIEW</p>
                </div>
            </div>
        </section>

        <!-- 说明区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in">
            <section class="space-y-6">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center gap-3">
                    <span class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-8 border border-white shadow-xl shadow-pink-100/20">
                    <p class="text-[#6b7280] text-sm leading-relaxed mb-4">适合制作金句卡片、心情语录或社交平台封面。长按下载图片后，可以直接分享给好友哦！</p>
                </div>
            </section>
        </div>
    </main>

    <script src="../../assets/js/utils.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const fontSelect = document.getElementById('fontSelect');
        const textColor = document.getElementById('textColor');
        const bgColor = document.getElementById('bgColor');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        function draw() {
            const lines = textInput.value.split('\n');
            const padding = 60;
            const w = 800;
            
            // 简单计算高度
            ctx.font = `bold 40px ${fontSelect.value}`;
            const lineH = 60;
            const h = Math.max(400, lines.length * lineH + padding * 2);

            canvas.width = w;
            canvas.height = h;

            // 背景
            ctx.fillStyle = bgColor.value;
            ctx.fillRect(0, 0, w, h);

            // 文字
            ctx.fillStyle = textColor.value;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold 40px ${fontSelect.value}`;

            lines.forEach((line, i) => {
                ctx.fillText(line, w / 2, (h / 2) - ((lines.length - 1) * lineH / 2) + (i * lineH));
            });
            
            // 装饰框
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.strokeRect(20, 20, w - 40, h - 40);
        }

        [textInput, fontSelect, textColor, bgColor].forEach(el => el.oninput = draw);

        downloadBtn.onclick = () => {
            if(!textInput.value.trim()) return Utils.toast('请输入文字', 'warning');
            Utils.downloadFile(canvas.toDataURL('image/png'), `text_card_${Date.now()}.png`, 'image/png');
        };

        resetBtn.onclick = () => {
            textInput.value = '';
            draw();
        };

        // 初始化
        window.onload = draw;
    </script>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body>
</html>
