<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社交封面生成 - 小Q工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-[#fff5f6]">
    <nav class="sticky top-0 z-50 py-4 px-6 mb-8 bg-white/80 backdrop-blur-md border-b border-rose-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.href='../../index.html'">
                <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg font-bold">Q</div>
                <span class="text-2xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <a href="../../tools.html" class="text-gray-500 hover:text-pink-400 font-semibold text-sm transition-colors">返回列表</a>
        </div>
    </nav>

    <main class="container mx-auto py-4 md:py-8 px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-4">社交封面生成</h1>
            <p class="text-gray-500 text-lg">将图片裁切为各大社交平台的标准尺寸 📱</p>
        </header>

        <section class="cute-card p-8 md:p-12 mb-12 bg-white flex flex-col items-center border border-rose-50 shadow-sm rounded-3xl">
            <div id="upload-area" class="w-full max-w-md p-8 md:p-16 border-4 border-dashed border-pink-50 rounded-3xl mb-8 group hover:border-pink-200 transition-all cursor-pointer bg-pink-50/30" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadImg(event)">
                <div class="text-7xl mb-6 opacity-40 group-hover:scale-110 transition-transform">📂</div>
                <p class="text-lg font-bold text-pink-300">选择原始图片</p>
            </div>

            <div id="editor-area" class="hidden w-full animate-fade-in flex flex-col items-center">
                <div class="w-full max-w-lg mb-8">
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">选择输出平台</label>
                    <select id="preset" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:ring-2 focus:ring-pink-200 transition-all text-gray-700 font-medium" onchange="render()">
                        <option value="1200x630">Facebook 分享图 (1200 × 630)</option>
                        <option value="1500x500">Twitter 横幅 (1500 × 500)</option>
                        <option value="1080x1080">Instagram 正方形 (1080 × 1080)</option>
                        <option value="1080x1920">Instagram 故事/竖屏 (1080 × 1920)</option>
                        <option value="2560x1440">YouTube 频道封面 (2560 × 1440)</option>
                        <option value="820x312">Facebook 主页封面 (820 × 312)</option>
                        <option value="1584x396">LinkedIn 背景图 (1584 × 396)</option>
                    </select>
                </div>

                <div class="p-4 bg-white shadow-inner rounded-3xl border border-rose-50 mb-8 w-full max-w-2xl">
                    <canvas id="canvas" class="w-full rounded-2xl shadow-sm border border-gray-50"></canvas>
                </div>

                <button id="dlBtn" onclick="dl()" class="w-full max-w-md py-4 bg-pink-400 text-white font-bold rounded-xl shadow-lg shadow-pink-100 hover:bg-pink-500 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span>📥 下载生成的封面</span>
                </button>
            </div>
        </section>
    
        <!-- 社交封面生成 的专属定制说明与FAQ区 -->
        <div class="grid md:grid-cols-2 gap-8 mb-12 animate-fade-in custom-faq-section">
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">🎯</span>
                    专属指南及提示
                </h2>
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-pink-50 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                    <ul class="space-y-4 text-gray-600 list-decimal list-inside text-sm leading-relaxed relative z-10 font-medium">
                        
                    </ul>
                </div>
            </section>
            <section>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-xl flex items-center justify-center mr-3 text-lg font-bold shadow-sm">💬</span>
                    社交封面生成 - 常见答疑
                </h2>
                <div class="space-y-4">
                    
                <div class="bg-white p-5 rounded-2xl border border-pink-50 shadow-sm mt-4 hover:border-pink-200 transition-colors">
                    <div class="font-bold text-gray-700 mb-2 flex items-center">
                        <span class="w-1.5 h-1.5 rounded-full bg-pink-400 mr-2"></span>
                        为啥我处理【社交封面生成】的时候，放在公司电脑处理和随身手机端耗时悬殊如此巨大？
                    </div>
                    <div class="text-gray-500 text-sm leading-relaxed pl-3.5">这也是本地纯前端小工具站最大的特性反馈。因为它所有的运算均不借助光纤去发往超级机房借兵，它所有的性能天花板全权依赖于您手中设备的物理硬实力芯片能力。</div>
                </div>
                </div>
            </section>
        </div>

    </main>
<footer class="py-12 text-center text-gray-300 text-xs">© 2026 小Q工具箱</footer>
<script>
let img=null;
function loadImg(e){
    const file=e.target.files[0];if(!file)return;
    img=new Image();
    img.onload=()=>{render();};
    img.src=URL.createObjectURL(file);
}
function render(){
    if(!img)return;
    const [w,h]=document.getElementById('preset').value.split('x').map(Number);
    const canvas=document.getElementById('canvas');canvas.width=w;canvas.height=h;
    canvas.classList.remove('hidden');
    document.getElementById('upload-area').classList.add('hidden');
    document.getElementById('editor-area').classList.remove('hidden');
    const ctx=canvas.getContext('2d');
    // 居中裁剪（cover模式）
    const scale=Math.max(w/img.width,h/img.height);
    const sw=w/scale,sh=h/scale;
    const sx=(img.width-sw)/2,sy=(img.height-sh)/2;
    ctx.drawImage(img,sx,sy,sw,sh,0,0,w,h);
}
function dl(){const a=document.createElement('a');a.download='cover.png';a.href=document.getElementById('canvas').toDataURL();a.click();}
</script>
    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="../../assets/css/webmeji.css">
    <script src="../../assets/js/webmeji-config.js"></script>
    <script src="../../assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="../../assets/js/pwa-register.js"></script>
</body></html>
