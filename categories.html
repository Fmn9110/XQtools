<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工具分类 - 小Q工具箱</title>
    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pinyin-match@1.2.5/dist/main.js"></script>

</head>

<body>
    <div id="cuteLoader" class="cute-loader-overlay">
        <div class="cute-loader-candy">🍬</div>
    </div>
    <nav class="sticky top-0 z-50 py-3 px-6 shadow-sm">
        <div class="container flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="location.href='index.html'">
                <div
                    class="w-9 h-9 bg-pink-400 rounded-lg flex items-center justify-center text-white text-xl shadow-md rotate-3 group-hover:rotate-0 transition-transform">
                    Q</div>
                <span class="text-xl font-bold gradient-text">小Q工具箱</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-500 text-sm font-semibold">
                <a href="index.html" class="hover:text-pink-500 transition-colors">首页</a>
                <a href="categories.html" class="text-pink-500 transition-colors">全部分类</a>
                <a href="tools.html" class="hover:text-pink-500 transition-colors">所有工具</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto max-w-[1100px] py-4 px-4 pt-6">
        <h1 class="text-3xl md:text-4xl font-extrabold mb-12 text-center text-gray-800 animate-fade-in">探索所有 <span
                class="gradient-text">分类</span></h1>

        <div id="categoryDetailList" class="space-y-16">
        </div>
    </main>

    <footer class="bg-white py-8 border-t border-pink-50 mt-20">
        <div class="container mx-auto text-center text-gray-400 text-xs">
            © 2026 小Q工具箱. 纯前端开发示例. 💖
        </div>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script>
        function renderCategoryDetails() {
            const list = document.getElementById('categoryDetailList');
            list.innerHTML = window.categories.map(cat => {
                const catTools = window.toolsData.filter(t => t.category === cat.slug);
                return `
                    <div id="${cat.slug}" class="animate-fade-in">
                        <div class="flex items-center flex-wrap gap-2 md:gap-4 mb-4 md:mb-6">
                            <div class="text-3xl md:text-4xl hover:scale-110 transition-transform cursor-pointer">${cat.icon}</div>
                            <h2 class="text-xl md:text-2xl font-bold text-gray-800">${cat.name}</h2>
                            <span class="px-3 py-1 bg-pink-100 text-pink-500 rounded-full text-xs font-bold">${cat.count}个</span>
                            <button onclick="toggleCategory('${cat.slug}')" class="ml-auto text-pink-400 hover:text-pink-500 font-bold transition-colors text-sm bg-pink-50 hover:bg-pink-100 px-3 py-1 rounded-full cursor-pointer border border-pink-100">
                                <span id="toggle-icon-${cat.slug}">收起 🔽</span>
                            </button>
                        </div>
                        <div id="grid-${cat.slug}" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 origin-top transition-all duration-300">
                            ${catTools.length > 0 ? catTools.map(t => `
                                <div class="cute-card p-4 md:p-5 cursor-pointer flex flex-col justify-between" onclick="location.href='tools/${t.category}/${t.slug}.html'">
                                    <div class="font-bold text-gray-800 mb-2 truncate"><span class="mr-1">${t.icon || ''}</span> ${t.name}</div>
                                    <div class="text-xs text-gray-400 leading-relaxed line-clamp-2">${t.desc}</div>
                                </div>
                            `).join('') : '<div class="text-gray-300 text-sm italic p-4 bg-white rounded-2xl border border-dashed border-pink-200">正在努力装填中...</div>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderCategoryDetails();

            // 处理 URL 参数实现自动定位和隐藏其余分类
            const urlParams = new URLSearchParams(window.location.search);
            const targetCat = urlParams.get('cat');
            
            if (targetCat) {
                window.categories.forEach(cat => {
                    const grid = document.getElementById(`grid-${cat.slug}`);
                    const icon = document.getElementById(`toggle-icon-${cat.slug}`);
                    if (!grid || !icon) return;

                    if (cat.slug !== targetCat) {
                        // 隐藏非目标分类
                        grid.style.display = 'none';
                        icon.innerHTML = '展开 🔼';
                    } else {
                        // 展开目标分类
                        grid.style.display = 'grid';
                        icon.innerHTML = '收起 🔽';
                        // 滚动定位到目标位置（延时以确保 DOM 和动画就绪，减去导航栏高度）
                        setTimeout(() => {
                            const targetElement = document.getElementById(targetCat);
                            if (targetElement) {
                                const y = targetElement.getBoundingClientRect().top + window.scrollY - 100;
                                window.scrollTo({ top: y, behavior: 'smooth' });
                            }
                        }, 150);
                    }
                });
            }
        });

        // 切换展开/折叠功能
        window.toggleCategory = function(slug) {
            const grid = document.getElementById(`grid-${slug}`);
            const icon = document.getElementById(`toggle-icon-${slug}`);
            if (grid.style.display === 'none') {
                grid.style.display = 'grid';
                icon.innerHTML = '收起 🔽';
            } else {
                grid.style.display = 'none';
                icon.innerHTML = '展开 🔼';
            }
        };

        // 加载与点击特效
        window.addEventListener('load', () => {
            const loader = document.getElementById('cuteLoader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        });

        document.addEventListener('click', (e) => {
            requestAnimationFrame(() => {
                const item = document.createElement('div');
                item.className = Math.random() > 0.5 ? 'falling-heart' : 'falling-star';
                item.textContent = Math.random() > 0.5 ? '💖' : '✨';
                item.style.position = 'fixed';
                item.style.left = `${e.clientX - 10}px`;
                item.style.top = `${e.clientY - 10}px`;
                item.style.pointerEvents = 'none';
                document.body.appendChild(item);
                setTimeout(() => item.remove(), 1000);
            });
        });

        // 滑动性能优化
        let isScrolling = false;
        window.addEventListener('scroll', () => { isScrolling = true; clearTimeout(window.scrollTimer); window.scrollTimer = setTimeout(() => isScrolling = false, 100); }, { passive: true });

        // 回到顶部按钮显隐逻辑
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTopBtn');
            if (window.scrollY > 300) {
                btn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            } else {
                btn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            }
        });
    </script>

    <!-- 回到顶部按钮 -->
    <button id="backToTopBtn" class="fixed right-6 bottom-24 md:bottom-12 w-12 h-12 bg-pink-400 text-white rounded-full shadow-2xl flex items-center justify-center text-xl hover:bg-pink-500 hover:scale-110 transition-all z-50 opacity-0 pointer-events-none translate-y-4" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
        ⬆️
    </button>

    <!-- 移动端底部导航 -->
    <div class="mobile-tab-bar">
        <a href="index.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🏠</span>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="categories.html" class="flex flex-col items-center text-pink-500">
            <span class="text-xl mb-1">🗂️</span>
            <span class="text-[10px] font-bold">分类</span>
        </a>
        <a href="tools.html" class="flex flex-col items-center text-gray-400">
            <span class="text-xl mb-1">🛠️</span>
            <span class="text-[10px] font-bold">全部</span>
        </a>
    </div>

    <!-- Webmeji Desktop Buddy -->
    <link rel="stylesheet" href="assets/css/webmeji.css">
    <script src="assets/js/webmeji-config.js"></script>
    <script src="assets/js/webmeji.js"></script>
    <!-- PWA 注册 -->
    <script src="assets/js/pwa-register.js"></script>
</body>

</html>
